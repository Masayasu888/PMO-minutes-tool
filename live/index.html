<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会議中支援ツール — PMO</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@1.41.0/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo UI','Meiryo',sans-serif;background:#F0F4F8;color:#1a202c;min-height:100vh}
.app-wrap{max-width:960px;margin:0 auto;padding:16px}
.app-header{background:linear-gradient(135deg,#1F3864 0%,#1a4a7a 100%);color:#fff;padding:0 24px;border-radius:10px;margin-bottom:20px;display:flex;align-items:stretch;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.18);min-height:52px}
.app-title{font-size:15px;font-weight:700;letter-spacing:.3px;line-height:1.2}
.app-sub{font-size:10px;color:#a0b4cc;margin-top:2px}
.btn-key{background:#2E75B6;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Meiryo UI','Meiryo',sans-serif;white-space:nowrap}
.btn-key:hover{background:#1a5c9e}
/* ── ヘッダー内サブボタン（半透明ゴースト） ── */
.btn-header-sub{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.28);border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Meiryo UI','Meiryo',sans-serif;transition:.15s}
.btn-header-sub:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.45)}
/* ── フォーム内サブアクションボタン（アウトライン） ── */
.btn-form-sub{background:#fff;color:#2E75B6;border:1.5px solid #2E75B6;border-radius:5px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Meiryo UI','Meiryo',sans-serif;transition:.15s;display:inline-flex;align-items:center;gap:3px}
.btn-form-sub:hover{background:#EBF3FB}
.steps{display:flex;margin-bottom:20px;background:#fff;border-radius:10px;padding:12px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.step-item{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer}
.step-item:not(:last-child)::after{content:'';position:absolute;top:18px;left:60%;width:80%;height:2px;background:#d0d8e4}
.step-item.done:not(:last-child)::after{background:#2E75B6}
.step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:2px solid #d0d8e4;background:#fff;color:#999;position:relative;z-index:1;transition:.2s}
.step-item.active .step-circle{border-color:#2E75B6;background:#2E75B6;color:#fff}
.step-item.done .step-circle{border-color:#1F7A4D;background:#1F7A4D;color:#fff}
.step-label{font-size:10px;color:#666;margin-top:4px;text-align:center;line-height:1.3}
.step-item.active .step-label{color:#2E75B6;font-weight:600}

/* ── AI解析ステップ（独立アクションノード）──────────────── */
.step-item.ai-action{flex:0.7}
.step-item.ai-action .step-circle{
  width:36px;height:36px;border-radius:6px;
  transform:rotate(45deg);
  border-color:#38A169;color:#38A169;background:#F0FFF4;
  font-size:10px;font-weight:900;
}
.step-item.ai-action .step-circle .ai-inner{
  display:flex;align-items:center;justify-content:center;
  transform:rotate(-45deg);font-size:15px;line-height:1;
}
.step-item.ai-action.active .step-circle{
  background:linear-gradient(135deg,#38A169,#276749);
  border-color:#276749;color:#fff;
  box-shadow:0 0 0 4px rgba(56,161,105,.18);
  animation:ai-node-pulse 2s ease-in-out infinite;
}
.step-item.ai-action.done .step-circle{
  background:#1F7A4D;border-color:#1F7A4D;color:#fff;
}
.step-item.ai-action .step-label{color:#38A169;font-weight:600;font-size:10px}
.step-item.ai-action.active .step-label{color:#276749;font-weight:700}
@keyframes ai-node-pulse{
  0%,100%{box-shadow:0 0 0 4px rgba(56,161,105,.18)}
  50%{box-shadow:0 0 0 8px rgba(56,161,105,.07)}
}
/* AI前後のコネクター（緑・破線） */
.step-item.ai-action:not(:last-child)::after{background:none;border-top:2px dashed #38A169;height:0;top:18px}
.step-item.ai-action.done:not(:last-child)::after{border-top-color:#1F7A4D;border-style:solid}
/* step2のコネクターもグリーン系に（AIノードへ向かう） */
.step-item.ai-pre:not(:last-child)::after{background:none;border-top:2px dashed #a0d4b5;height:0;top:18px}
.step-item.ai-pre.done:not(:last-child)::after{border-top-color:#38A169;border-style:solid}
.card{background:#fff;border-radius:10px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.card-title{font-size:16px;font-weight:700;color:#1F3864;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #EBF3FB}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-1{margin-bottom:12px}
label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:4px}
input,textarea,select{width:100%;padding:9px 12px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:13px;font-family:'Meiryo UI','Meiryo',sans-serif;outline:none;transition:.15s;background:#fafbfc}
input:focus,textarea:focus,select:focus{border-color:#2E75B6;background:#fff}
textarea{resize:vertical;min-height:70px}
.req{color:#e53e3e;margin-left:2px}
.btn{padding:10px 24px;border-radius:7px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;font-family:'Meiryo UI',sans-serif}
.btn-primary{background:#1F3864;color:#fff}.btn-primary:hover{background:#16295a}
.btn-green{background:#1F7A4D;color:#fff}.btn-green:hover{background:#175e3b}
.btn-blue{background:#2E75B6;color:#fff}.btn-blue:hover{background:#1d5fa0}
.btn-gray{background:#e2e8f0;color:#444}.btn-gray:hover{background:#cbd5e0}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.upload-area{border:2px dashed #a0aec0;border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:.15s;background:#fafbfc}
.upload-area:hover,.upload-area.drag{border-color:#2E75B6;background:#EBF3FB}
.upload-area input{display:none}
.upload-icon{font-size:28px;margin-bottom:6px}
.upload-hint{font-size:12px;color:#718096;margin-top:4px}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:#EBF3FB;border:1px solid #bee3f8;padding:5px 12px;border-radius:20px;font-size:12px;color:#2c5282;margin-top:8px}
.file-chip button{background:none;border:none;cursor:pointer;color:#e53e3e;font-size:14px;line-height:1}
.analyzing-wrap{text-align:center;padding:40px}
.spinner{width:48px;height:48px;border:4px solid #EBF3FB;border-top-color:#2E75B6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-log{background:#1a202c;color:#68d391;padding:16px;border-radius:8px;font-size:12px;font-family:monospace;max-height:160px;overflow-y:auto;margin-top:16px;text-align:left}
.tabs{display:flex;gap:4px;margin-bottom:0;flex-wrap:wrap}
.tab{padding:7px 12px;border-radius:6px 6px 0 0;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #d0d8e4;border-bottom:none;background:#f0f4f8;color:#555}
.tab.active{background:#fff;color:#1F3864;border-color:#2E75B6;border-bottom-color:#fff}
.tab-content{background:#fff;border:1.5px solid #2E75B6;border-radius:0 8px 8px 8px;padding:16px}
.preview-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
.preview-table th{background:#1F3864;color:#fff;padding:8px 10px;text-align:left;font-size:12px}
.preview-table td{padding:8px 10px;border-bottom:1px solid #eee;vertical-align:top}
.preview-table tr:nth-child(even) td{background:#f8fafc}
.preview-table td textarea{border:none;background:transparent;padding:0;resize:none;width:100%;font-size:13px;font-family:'Meiryo UI',sans-serif;min-height:36px}
.preview-table td textarea:focus{outline:1px solid #2E75B6;background:#fff;border-radius:3px;padding:3px}
.preview-table td select{border:none;background:transparent;padding:0;font-size:13px;font-family:'Meiryo UI',sans-serif}
.preview-table td select:focus{outline:1px solid #2E75B6;background:#fff;border-radius:3px}
.dl-card{border:1.5px solid #d0d8e4;border-radius:8px;padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dl-info .dl-name{font-weight:700;color:#1F3864;font-size:14px}
.dl-info .dl-desc{font-size:12px;color:#718096;margin-top:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:28px;width:90%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:700;color:#1F3864;margin-bottom:16px}
.notice{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:12px}
.notice-info{background:#EBF3FB;color:#1a4a7a;border-left:3px solid #2E75B6}
.notice-warn{background:#FFF3CD;color:#7D4E00;border-left:3px solid #E6A817}
.notice-ok{background:#E8F5E9;color:#1B5E20;border-left:3px solid #4CAF50}
.section-divider{font-size:12px;font-weight:700;color:#2E75B6;padding:10px 0 6px;border-bottom:1px solid #EBF3FB;margin-bottom:10px}
@media(max-width:600px){
  .form-row,.form-row-3{grid-template-columns:1fr}
  .steps{padding:8px}.step-label{display:none}
  .card{padding:16px}.btn{padding:9px 16px;font-size:13px}
}

/* ── 出席者タグ入力UI ───────────────────────────────────── */
.attendee-block{border:1.5px solid #d0d8e4;border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#fafbfc}
.attendee-org-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.attendee-org-label{font-size:12px;font-weight:700;color:#1F3864;min-width:60px;white-space:nowrap}
.attendee-org-input{flex:1;padding:5px 8px;border:1px solid #d0d8e4;border-radius:5px;font-size:12px;font-family:inherit;outline:none}
.attendee-org-input:focus{border-color:#2E75B6;background:#fff}
.attendee-del-btn{background:none;border:none;color:#e53e3e;cursor:pointer;font-size:16px;line-height:1;padding:2px 4px}
.tag-area{display:flex;flex-wrap:wrap;gap:6px;min-height:28px}
.tag{display:inline-flex;align-items:center;gap:4px;background:#EBF3FB;border:1px solid #bee3f8;padding:3px 8px;border-radius:14px;font-size:12px;color:#1a4a7a;cursor:default}
.tag-del{background:none;border:none;color:#888;cursor:pointer;font-size:13px;line-height:1;padding:0 2px}
.tag-del:hover{color:#e53e3e}
.name-input-wrap{position:relative;flex:1;min-width:120px}
.name-input{width:100%;padding:4px 8px;border:1px dashed #a0aec0;border-radius:14px;font-size:12px;font-family:inherit;outline:none;background:transparent}
.name-input:focus{border-color:#2E75B6;background:#fff;border-style:solid}
.suggest-list{position:absolute;top:100%;left:0;z-index:100;background:#fff;border:1.5px solid #2E75B6;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:160px;max-height:180px;overflow-y:auto;margin-top:2px}
.suggest-item{padding:7px 12px;font-size:12px;cursor:pointer;color:#333}
.suggest-item:hover{background:#EBF3FB;color:#1F3864}
.add-org-btn{background:none;border:1.5px dashed #2E75B6;color:#2E75B6;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;width:100%;margin-top:4px}
.add-org-btn:hover{background:#EBF3FB}

/* ── 出席者UI（新設計） ─────────────────────────────────── */
.att-wrap{border:1.5px solid #d0d8e4;border-radius:10px;overflow:hidden;background:#fff}
.att-tabs{display:flex;gap:0;border-bottom:1.5px solid #d0d8e4;background:#f8fafc;flex-wrap:wrap}
.att-tab{padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.att-tab.active{color:#1F3864;border-bottom-color:#2E75B6;background:#fff}
.att-tab:hover:not(.active){background:#EBF3FB;color:#1F3864}
.att-tab-add{padding:7px 10px;font-size:12px;cursor:pointer;border:none;background:none;color:#2E75B6;border-bottom:2px solid transparent}
.att-body{padding:12px 14px}
.att-tags{display:flex;flex-wrap:wrap;gap:6px;min-height:28px;margin-bottom:10px}
.att-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:600;color:#1a4a7a;background:#EBF3FB;border:1px solid #bee3f8}
.att-tag-del{background:none;border:none;cursor:pointer;color:#888;font-size:13px;line-height:1;padding:0 2px}
.att-tag-del:hover{color:#e53e3e}
.att-search-wrap{position:relative}
.att-search-row{display:flex;gap:8px;align-items:center}
.att-search-input{flex:1;padding:7px 10px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:13px;font-family:inherit;outline:none}
.att-search-input:focus{border-color:#2E75B6}
.att-suggest{position:absolute;top:100%;left:0;right:0;z-index:200;background:#fff;border:1.5px solid #2E75B6;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);margin-top:4px;max-height:200px;overflow-y:auto}
.att-suggest-item{padding:8px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.att-suggest-item:hover{background:#EBF3FB}
.att-suggest-badge{font-size:10px;padding:2px 6px;border-radius:8px;background:#EBF3FB;color:#1F3864;font-weight:700}
.att-suggest-new{padding:8px 12px;font-size:12px;color:#2E75B6;cursor:pointer;border-top:1px solid #e2e8f0;display:flex;align-items:center;gap:6px}
.att-suggest-new:hover{background:#EBF3FB}
.att-org-select{padding:7px 10px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#333;min-width:80px}
.att-org-select:focus{border-color:#2E75B6}
/* ── 配布資料リンク入力 ──────────────────────────────────── */
.material-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1.5px solid #d0d8e4;border-radius:6px;margin-bottom:6px;background:#fafbfc;transition:.15s}
.material-item:focus-within{border-color:#2E75B6;background:#fff}
.material-name{flex:1;border:none;background:transparent;font-size:13px;font-family:inherit;outline:none;min-width:0}
.material-url{flex:1;border:none;background:transparent;font-size:12px;font-family:inherit;outline:none;color:#2E75B6;min-width:0}
.material-url::placeholder{color:#a0aec0}
.material-divider{color:#d0d8e4;user-select:none}
.material-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;line-height:1;padding:0 2px;flex-shrink:0}
.material-del:hover{color:#e53e3e}
.material-add{background:none;border:1.5px dashed #2E75B6;color:#2E75B6;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;width:100%;margin-top:2px}
.material-add:hover{background:#EBF3FB}
.material-link-icon{font-size:12px;color:#a0aec0;flex-shrink:0}

/* ── 会議中モード ─────────────────────────────────────────── */
.live-mode-wrap{max-width:1400px;margin:0 auto;padding:16px}
.live-header{background:#1a202c;color:#fff;padding:12px 20px;border-radius:10px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.live-title{font-size:16px;font-weight:700;color:#fc8181;display:flex;align-items:center;gap:6px;white-space:nowrap}
.live-title.recording{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.live-settings{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.live-setting-group{display:flex;flex-direction:column;gap:4px;min-width:160px}
.live-setting-group label{font-size:11px;font-weight:600;color:#444}
.live-setting-group input{padding:6px 10px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
.live-setting-group input:focus{border-color:#2E75B6}
.live-panels{display:grid;grid-template-columns:1fr 1fr;gap:12px;height:calc(100vh - 280px);min-height:400px}
.live-panel{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
.live-panel-header{padding:10px 16px;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;flex-shrink:0}
.live-panel-body{flex:1;overflow-y:auto;padding:12px 16px;font-size:13px;line-height:1.7}
.live-transcript-line{padding:2px 0;border-bottom:1px solid #f0f4f8}
.live-transcript-time{font-size:11px;color:#a0aec0;margin-right:6px;font-family:monospace}
.live-interim{color:#a0aec0;font-style:italic;padding:4px 0}
.ai-flag{padding:8px 12px;border-radius:6px;margin-bottom:8px;font-size:12px}
.ai-flag-root{background:#FFF5F5;border-left:3px solid #E53E3E;color:#742a2a}
.ai-flag-warn{background:#FFFBEB;border-left:3px solid #D69E2E;color:#744210}
.ai-flag-risk{background:#FFF5F5;border-left:3px solid #E53E3E;color:#742a2a}
.ai-flag-issue{background:#FAF5FF;border-left:3px solid #805AD5;color:#44337a}
.ai-section{margin-bottom:14px}
.ai-section-title{font-size:11px;font-weight:700;color:#2E75B6;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid #EBF3FB;text-transform:uppercase;letter-spacing:.5px}
.ai-question{padding:6px 10px;background:#EBF3FB;border-radius:4px;margin-bottom:4px;font-size:12px;color:#1a4a7a}
.ai-contradiction{padding:6px 10px;background:#FFF3CD;border-radius:4px;margin-bottom:4px;font-size:12px;color:#7D4E00}
.ai-summary{font-size:12px;color:#333;line-height:1.7;background:#f8fafc;padding:10px;border-radius:6px}
.ai-exec{font-size:12px;font-weight:600;color:#C55A11;background:#FFF4EB;padding:10px;border-radius:6px;border-left:3px solid #C55A11}
.analyzing-badge{display:inline-flex;align-items:center;gap:4px;background:#EBF3FB;color:#2E75B6;padding:3px 8px;border-radius:10px;font-size:11px}
.live-btn{padding:7px 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;transition:.15s}
.live-btn-red{background:#E53E3E;color:#fff}.live-btn-red:hover{background:#c53030}
.live-btn-green{background:#38A169;color:#fff}.live-btn-green:hover{background:#2f855a}
.live-btn-gray{background:#e2e8f0;color:#444}.live-btn-gray:hover{background:#cbd5e0}
.live-btn-blue{background:#2E75B6;color:#fff}.live-btn-blue:hover{background:#1d5fa0}
.live-btn-dark{background:#1F3864;color:#fff}.live-btn-dark:hover{background:#16295a}
.live-btn:disabled{opacity:.5;cursor:not-allowed}
.mode-toggle{display:flex;gap:0;align-items:center;background:rgba(0,0,0,.25);border-radius:8px;padding:3px}
.mode-btn{padding:6px 16px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:rgba(255,255,255,.65);transition:.15s;white-space:nowrap}
.mode-btn.active{background:#fff;color:#1F3864;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.mode-btn.live-active{background:#E53E3E;color:#fff}
/* ヘッダー設定メニュー */
.header-gear-wrap{position:relative;display:flex;align-items:center}
.header-gear-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px;font-family:'Meiryo UI','Meiryo',sans-serif;white-space:nowrap}

// ── APIコスト単価 (claude-sonnet-4) ──────────────────────
const COST_INPUT_PER_TOKEN  = 3.0  / 1_000_000; // $3.00 / 1M tokens
const COST_OUTPUT_PER_TOKEN = 15.0 / 1_000_000; // $15.00 / 1M tokens

// ── XML escape ───────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function calcCost(usage){
  if (!usage) return 0;
  const inp = usage.input_tokens  || 0;
  const out = usage.output_tokens || 0;
  return inp * COST_INPUT_PER_TOKEN + out * COST_OUTPUT_PER_TOKEN;
}
function formatCost(usd){
  if (usd < 0.001) return `$${(usd * 1000).toFixed(3)}m`;
  return `$${usd.toFixed(4)}`;
}
function formatTokens(usage){
  if (!usage) return '';
  const t = (usage.input_tokens||0) + (usage.output_tokens||0);
  return t >= 1000 ? `${(t/1000).toFixed(1)}K tokens` : `${t} tokens`;
}

// ── Admin API 利用コスト取得 ──────────────────────────────
async function fetchOrgUsage(adminKey) {
  const now = new Date();
  // 今日（JST → UTC補正済みでISOにする）
  const todayJST = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  const ymd = todayJST.toISOString().slice(0, 10);
  const startOfDay  = `${ymd}T00:00:00Z`;
  const endOfDay    = `${ymd}T23:59:59Z`;
  // 今月
  const ym = ymd.slice(0, 7);
  const startOfMonth = `${ym}-01T00:00:00Z`;

  const headers = {
    'Content-Type': 'application/json',
    'x-api-key': adminKey,
    'anthropic-version': '2023-06-01',
    'anthropic-dangerous-direct-browser-access': 'true',
  };

  // 今日の消費コスト
  const [todayRes, monthRes] = await Promise.all([
    fetch(`https://api.anthropic.com/v1/organizations/cost_report?starting_at=${startOfDay}&ending_at=${endOfDay}`, { headers }),
    fetch(`https://api.anthropic.com/v1/organizations/cost_report?starting_at=${startOfMonth}&ending_at=${endOfDay}`, { headers }),
  ]);

  const parseUsd = async (res) => {
    if (!res.ok) return null;
    const d = await res.json();
    // レスポンス形式: {data: [{total_cost: N}, ...]} または {total_cost: N}
    if (Array.isArray(d.data)) {
      return d.data.reduce((s, r) => s + (r.total_cost || 0), 0);
    }
    return d.total_cost ?? null;
  };

  const [todayCost, monthCost] = await Promise.all([parseUsd(todayRes), parseUsd(monthRes)]);
  return { todayCost, monthCost, fetchedAt: now };
}

  const SYSTEM_PROMPT = `あなたは日本の大手製造業グローバルERP/DXプロジェクト（グローバル経営基盤 将来像実現プロジェクト）のクライアント側PMO専門家です。

【出力原則】
- 指定のJSON形式のみで出力すること。説明文・マークダウン・コードブロック不要。
- 情報は必ず文字起こしの根拠に基づくこと。推測・補完は最小限にとどめる。
- 文章はビジネス文書として読みやすく整形すること（体言止め多用NG・主語述語を明確に）。
- 抽出は網羅的に行うこと。「小さな懸念」「曖昧な発言」も含めて漏れなく拾うこと。

【リスク・課題・保留の定義（必ずこの定義に従って分類すること）】
■ リスク（risks）: まだ顕在化していない将来の潜在的な問題・脅威。
  - 「〜になる恐れがある」「〜の可能性がある」「〜が懸念される」「〜に注意が必要」
  - 発生すればプロジェクトに悪影響を与えうる不確実な事象
  - 現時点では問題は起きていないが、放置すると課題になりうるもの
  例: 「ベンダーのリソース不足でスケジュールが遅延するリスクがある」
  NG例: すでに遅延が発生している → 課題

■ 課題（issues）: すでに顕在化・発生している問題。現在進行形で対応が必要な事象。
  - 「〜ができていない」「〜が未解決」「〜で詰まっている」「〜を解決する必要がある」
  - 担当者・期限・解決策が求められる具体的な問題
  例: 「要件定義書の承認が得られていない」「テスト環境が準備できていない」

  const prompt = `以下の会議情報と文字起こしを分析し、管理台帳用データをJSON形式で抽出してください。

【文字起こし】
${transcript}
${existingSection ? existingSection + '\n' : ''}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
【STEP 1: 抽出前の網羅確認（内部処理・出力不要）】
文字起こし全体を読み、以下の観点で言及されたすべての事項を心の中でリストアップすること：
(a) 何らかの作業・対応・確認が発生した発言
(b) 懸念・問題・障害として言及された発言
(c) 「〜すべき」「〜が必要」「〜を検討」「〜が課題」「〜リスクがある」といった表現
(d) 期日・担当者・期限に言及された発言
(e) 上位者への報告・判断依頼が示唆された発言
このリストを元に、STEP 2の各項目を漏れなく抽出すること。

【STEP 2: 発言者の特定ルール】
- 出席者リスト（${attendees}）の氏名と文字起こしの発言者を積極的に照合すること
- 姓のみでの一致でも採用する（例：「宮守さん」→「宮守」）
- 名前が特定できない場合のみ「話者A」「話者B」形式を使用（番号ではなくアルファベット）
- 担当者・決定者は可能な限り実名で記載すること

【STEP 3: 重要度・優先度の判定基準（4段階）】
- 緊急: プロジェクト継続・マイルストーンに即時影響。当日〜3営業日以内に対応必要
- 高: マイルストーンに影響する可能性あり。1〜2週間以内に対応が望ましい
- 中: 影響はあるが回避策・猶予あり。今月中に対応
- 低: 軽微・参考情報・中長期の検討事項

【STEP 4: 課題・リスクのカテゴリ分類（必ずこのリストから選択）】
リスクカテゴリ（8種）: スケジュール | スコープ | リソース | 技術・アーキテクチャ | 予算・コスト | ガバナンス・意思決定 | データ移行・品質 | 外部依存・ベンダー
課題カテゴリ（9種）: 設計・要件 | 開発・実装 | テスト・品質 | データ・マスタ | インフラ・環境 | プロセス・運用 | ベンダー管理 | ステークホルダー調整 | ライセンス・契約

【STEP 5: 既存アイテムとの照合ルール（重要：精度最優先）】
既存アイテムが提供されている場合、以下の基準で厳密に判定すること：

■ match_type="same"（同一）の条件 ─ 以下を"すべて"満たす場合のみ
  ① 対象事項の本質的な内容・目的が既存アイテムと一致する
  ② 担当者（または担当組織）が同一または合理的に同一人物と判断できる
  ③ 会議内で当該アイテムへの言及（進捗報告・確認・議論）が明示されている
  → match_reason に「内容一致の根拠」「発言箇所の要約」を具体的に記載

■ match_type="similar"（類似）の条件 ─ 以下のいずれかを満たす場合
  ① 内容は関連しているが、担当者や範囲が異なる可能性がある
  ② 内容は一致しているが、会議内での言及が間接的・曖昧
  ③ 同一の根本課題から派生した別の事象
  → match_reason に「類似と判断した理由」「不一致点」を記載

■ match_type="new"（新規）の条件
  ① 既存リストに類似するものが存在しない
  ② 明確に新たに発生した事象・要求
  → existing_no は省略（null）

■ 照合の姿勢：不明確な場合は "similar" または "new" を選択すること。
  "same" は確証がある場合のみ使用する（誤同一判定はデータ品質を著しく損なう）。

【STEP 6: 議事内容のビジネス文書化ルール】
minutes_by_agenda の content は以下の基準で作成すること：
- 各発言を「発言者名: 内容」形式で記載
- 発言内容は口語・省略表現を補正し、ビジネス文書として適切な表現に整形する

  （例）「あれ、どうなった?」→「前回課題の対応状況について確認が求められた」
- 固有名詞（システム名・ベンダー名・フェーズ名）は正確に記載
- 1議題あたり5〜15行程度を目安とし、議論の流れが伝わるよう構成する
- 決定に至る経緯・反対意見・条件なども記載する

以下のJSON構造で出力してください（マークダウン不要、JSONのみ）:
{"agenda_items":["議題1","議題2"],"minutes_by_agenda":[{"title":"議題名","content":"発言者名: ビジネス文書体に整形した発言内容の記録。発言の流れを維持し、決定経緯・懸念点・条件も含める。"}],"decisions":[{"content":"決定内容（主語+述語で明確に）","decided_by":"決定者","scope":"影響範囲・対象システム/フェーズ","importance":"高","priority":"高"}],"todos":[{"content":"アクション内容（何を・誰が・いつまでに、が明確になるよう記載）","assignee":"担当者（実名）","due":"YYYY/MM/DD","importance":"高","priority":"高","match_type":"new","existing_no":null,"progress":"今回の文字起こしから読み取れる進捗・対応状況（なければ空文字）","match_reason":"同一・類似と判定した具体的根拠（新規の場合は空文字）"}],"pending":[{"content":"保留事項（具体的に）","reason":"保留理由","next_action":"次回の扱い・期限"}],"risks":[{"content":"リスク内容（影響・発生条件を含めて記述）","category":"スケジュール","impact":"高","probability":"中","response":"対応方針（具体的なアクションを含む）","owner":"担当者","importance":"高","priority":"高","match_type":"new","existing_no":null,"progress":"","match_reason":""}],"issues":[{"content":"課題内容（何が問題か・現状を明確に記述）","category":"設計・要件","owner":"担当者","due":"YYYY/MM/DD","resolution":"解決策・対応内容（未定の場合は「調査中」等）","importance":"中","priority":"中","match_type":"new","existing_no":null,"progress":"","match_reason":""}],"exec_report":[{"content":"役員への報告内容（背景含む・経営判断が必要な理由を明確に）","decision_needed":"要","background":"背景・経緯","recipient":"報告先役員名","deadline":"YYYY/MM/DD","importance":"緊急","priority":"緊急","match_type":"new","existing_no":null,"progress":"","match_reason":""}],"manager_report":[{"content":"室長への報告内容（対応の方向性を含む）","action_needed":"要","background":"背景・経緯","recipient":"担当室長名","deadline":"YYYY/MM/DD","importance":"高","priority":"高","match_type":"new","existing_no":null,"progress":"","match_reason":""}]}`;

  onLog('🤖 文字起こしを解析・照合中（高精度モード）...');
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:10000,system:SYSTEM_PROMPT,messages:[{role:'user',content:prompt}]})
  });
  if(!res.ok) throw new Error(`API Error ${res.status}: ${await res.text()}`);
  const data = await res.json();
  onLog('✅ 解析・照合完了！データを処理中...');
  const text = data.content[0].text.trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
  const cost = calcCost(data.usage);
  const usage = data.usage;
  try {
    const parsed = JSON.parse(text);
    parsed._cost  = cost;
    parsed._usage = usage;
    return parsed;
  }
  catch(e){
    const m=text.match(/\{[\s\S]+\}/);
    if(m){
      const parsed = JSON.parse(m[0]);
      parsed._cost  = cost;
      parsed._usage = usage;
      return parsed;
    }
    throw new Error('JSON解析失敗: '+e.message);
  }
}

function AnalysisEntry({ entry, ei, total, framework, onDelete, briefing }) {
  const [collapsed, setCollapsed] = React.useState(ei !== 0); // 最新以外は初期折りたたみ
  // 現場視点の表示順：進捗→リスク→実行性→体制→変革→DX目的
  const DISPLAY_ORDER = ['⑤','③','④','⑥','②','①'];
  const orderedCats = DISPLAY_ORDER
    .map(id => framework.cats.find(c => c.id === id))
    .filter(c => c && c.enabled);
  const catColors = {
    '①':['#065A82','#EBF8FF'], '②':['#B7410E','#FFF3ED'],
    '③':['#B7791F','#FFFBEB'], '④':['#276749','#E8F5EF'],
    '⑤':['#4A3728','#F5F0EB'], '⑥':['#6B3FA0','#F3EEFF'],
  };
  const copyText = `分析 #${entry._count} (${entry._time})\n\n`+
    (entry.exec_summary?`【役員サマリー】\n${entry.exec_summary}\n\n`:'')+
    (entry.summary?`【要約】\n${entry.summary}\n\n`:'')+
    (entry.top_questions?.length?`【確認すべき質問】\n${entry.top_questions.map(q=>`・${q}`).join('\n')}\n\n`:'')+
    (entry.categories ? orderedCats.map(c=>
      entry.categories[c.id]?.items?.length ?
      `【${c.id} ${c.name}】\n${entry.categories[c.id].items.map(x=>`・${x}`).join('\n')}` : ''
    ).filter(Boolean).join('\n\n') : '');

  return (
    <div style={{borderBottom: ei < total-1 ? '2px solid #EBF3FB' : 'none', background: ei===0 ? '#fff' : '#F7F9FC'}}>
      {/* 分析ヘッダー（クリックで折りたたみ） */}

        background: ei===0 ? '#1F3864' : '#4A5568', color:'#fff', fontSize:11, cursor:'pointer'}}
        onClick={()=>setCollapsed(c=>!c)}>
        <span style={{fontWeight:700}}>分析 #{entry._count}</span>
        <span style={{color:'rgba(255,255,255,.6)'}}>{entry._time}</span>
        {ei===0 && <span style={{background:'#38A169',borderRadius:8,padding:'1px 7px',fontSize:9,fontWeight:700}}>最新</span>}
        {collapsed && entry.exec_summary && (
          <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:10,color:'rgba(255,255,255,.6)',marginLeft:4}}>
            {entry.exec_summary.slice(0,40)}…

        )}
        <span style={{marginLeft:'auto',display:'flex',gap:4,alignItems:'center'}} onClick={e=>e.stopPropagation()}>
          <button style={{background:'none',border:'1px solid rgba(255,255,255,.3)',color:'rgba(255,255,255,.8)',
            borderRadius:4,padding:'1px 7px',fontSize:9,cursor:'pointer'}}
            onClick={()=>navigator.clipboard.writeText(copyText)}>📋</button>
          <button style={{background:'none',border:'1px solid rgba(252,129,129,.4)',color:'rgba(252,129,129,.8)',
            borderRadius:4,padding:'1px 7px',fontSize:9,cursor:'pointer'}}

        </span>
        <span style={{fontSize:12,color:'rgba(255,255,255,.6)',marginLeft:4}}>{collapsed ? '▶' : '▼'}</span>
      </div>

      {/* 折りたたみコンテンツ */}
      {!collapsed && (
        <div style={{padding:'8px 12px',display:'flex',flexDirection:'column',gap:8}}>
          {/* ── 会議ブリーフィング最優先枠 ── */}
          {briefing && briefing.trim() && (
            <div style={{border:'2px solid #276749',borderRadius:6,overflow:'hidden',boxShadow:'0 0 0 3px rgba(56,161,105,.15)'}}>
              <div style={{background:'linear-gradient(135deg,#276749,#38A169)',color:'#fff',padding:'5px 10px',

                <span style={{background:'rgba(255,255,255,.25)',borderRadius:8,padding:'1px 7px',fontSize:9,fontWeight:900,letterSpacing:.5}}>最優先</span>

              </div>
              <div style={{background:'#F0FFF4',padding:'6px 10px',fontSize:10.5,color:'#1B4332',
                whiteSpace:'pre-wrap',lineHeight:1.7,borderLeft:'3px solid #38A169'}}>

          {entry.categories && orderedCats.map(cat => {
            const catData = entry.categories[cat.id];
            if (!catData || !catData.items || catData.items.length===0) return null;
            const [fg,bg] = catColors[cat.id] || ['#444','#f8fafc'];

                  {catData.items.map((item,ii)=>(

                      <span style={{color:fg,fontWeight:700,flexShrink:0}}>・</span><span>{item}</span>

function BriefingManagerModal({ templates, onSave, onClose }) {
  const [list, setList] = React.useState(templates.map(t=>({...t})));
  const [editIdx, setEditIdx] = React.useState(null); // null=新規, number=編集中
  const [editName, setEditName] = React.useState('');
  const [editContent, setEditContent] = React.useState('');
  const [importing, setImporting] = React.useState(false);

  const startNew = () => { setEditIdx(null); setEditName(''); setEditContent(''); setImporting(false); };
  const startEdit = (i) => { setEditIdx(i); setEditName(list[i].name); setEditContent(list[i].content); };
  const cancelEdit = () => { setEditIdx(undefined); setEditName(''); setEditContent(''); };

  const saveItem = () => {
    if(!editName.trim() || !editContent.trim()) return;
    const next = [...list];
    if(editIdx === null) next.push({name:editName.trim(), content:editContent.trim()});
    else next[editIdx] = {name:editName.trim(), content:editContent.trim()};
    setList(next); cancelEdit();
  };
  const deleteItem = (i) => {
    if(!window.confirm(`「${list[i].name}」を削除しますか？`)) return;
    setList(list.filter((_,idx)=>idx!==i));
  };

  const handleFileImport = (file) => {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const text = e.target.result;
      setEditContent(text);
      if(!editName) setEditName(file.name.replace(/\.[^.]+$/, ''));
    };
    reader.readAsText(file, 'UTF-8');
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:520,width:'95%',maxHeight:'85vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">📋 ブリーフィングテンプレート管理</div>
        <div className="notice notice-info" style={{marginBottom:12,fontSize:11}}>
          会議パターンごとに「AIへの指示内容」を登録しておき、会議前にプルダウンで選択して使います。毎回の入力内容はリセットされます。
        </div>

        {/* テンプレート一覧 */}
        {list.length === 0 && editIdx === undefined && (
          <div style={{color:'#a0aec0',fontSize:12,textAlign:'center',padding:'12px 0'}}>テンプレートなし</div>
        )}
        {list.map((t,i)=>(
          <div key={i} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'8px 10px',
            border:'1px solid #e2e8f0',borderRadius:6,marginBottom:6,background:'#fafbfc'}}>
            {editIdx===i ? (
              <div style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>
                <input value={editName} onChange={e=>setEditName(e.target.value)}
                  placeholder="テンプレート名" style={{width:'100%',padding:'5px 8px',border:'1.5px solid #2E75B6',borderRadius:5,fontSize:12,fontFamily:'inherit'}}/>
                <textarea value={editContent} onChange={e=>setEditContent(e.target.value)}
                  rows={5} style={{width:'100%',padding:'6px 8px',border:'1.5px solid #2E75B6',borderRadius:5,fontSize:11,fontFamily:'inherit',resize:'vertical',lineHeight:1.6}}/>
                <div style={{display:'flex',gap:6}}>
                  <button className="btn btn-green" style={{fontSize:12,padding:'5px 14px'}} onClick={saveItem}>保存</button>
                  <button className="btn btn-gray" style={{fontSize:12,padding:'5px 14px'}} onClick={cancelEdit}>キャンセル</button>
                </div>
              </div>
            ):(
              <>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:12,color:'#1F3864',marginBottom:2}}>{t.name}</div>
                  <div style={{fontSize:11,color:'#718096',whiteSpace:'pre-wrap',lineHeight:1.5,
                    maxHeight:48,overflow:'hidden'}}>{t.content.slice(0,100)}{t.content.length>100?'…':''}</div>
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  <button className="btn-form-sub" onClick={()=>startEdit(i)}>✏️</button>
                  <button className="btn-form-sub" style={{color:'#e53e3e',borderColor:'#e53e3e'}} onClick={()=>deleteItem(i)}>🗑</button>
                </div>
              </>
            )}
          </div>
        ))}

        {/* 新規追加フォーム */}
        {editIdx === null && (
          <div style={{border:'1.5px solid #2E75B6',borderRadius:8,padding:'10px 12px',marginTop:8,background:'#EBF3FB'}}>
            <div style={{fontSize:12,fontWeight:700,color:'#1F3864',marginBottom:8}}>＋ 新規テンプレート</div>
            <input value={editName} onChange={e=>setEditName(e.target.value)}
              placeholder="テンプレート名（例：ステコミ、定例PMO、RFP評価）"
              style={{width:'100%',padding:'6px 9px',border:'1.5px solid #90CDF4',borderRadius:5,fontSize:12,fontFamily:'inherit',marginBottom:6}}/>
            <textarea value={editContent} onChange={e=>setEditContent(e.target.value)}
              rows={6} placeholder={`AIへの指示内容を入力（例）：\n・今日はサプライヤーポータルRFP最終評価会議\n・GDPR対応と価格根拠を必ず確認すること\n・前回宿題への回答を全件チェックすること\n・次回ステコミ報告事項を漏れなく抽出すること`}
              style={{width:'100%',padding:'6px 9px',border:'1.5px solid #90CDF4',borderRadius:5,fontSize:11,fontFamily:'inherit',resize:'vertical',lineHeight:1.6,marginBottom:6}}/>
            <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
              <button className="btn btn-blue" style={{fontSize:12,padding:'5px 14px'}} onClick={saveItem}>追加</button>
              <button className="btn btn-gray" style={{fontSize:12,padding:'5px 14px'}} onClick={cancelEdit}>キャンセル</button>
              <label style={{cursor:'pointer',display:'inline-flex',alignItems:'center',gap:4,
                fontSize:11,color:'#2E75B6',border:'1px solid #2E75B6',borderRadius:5,padding:'4px 10px',background:'#fff'}}>
                📄 テキストファイルから読み込み
                <input type="file" accept=".txt" style={{display:'none'}} onChange={e=>handleFileImport(e.target.files[0])}/>
              </label>
            </div>
          </div>
        )}

        {editIdx === undefined && (
          <button className="btn btn-blue" style={{fontSize:12,marginTop:10,width:'100%'}} onClick={startNew}>＋ 新規テンプレートを追加</button>
        )}

        <div className="btn-row" style={{marginTop:16}}>
          <button className="btn btn-primary" onClick={()=>{ onSave(list); onClose(); }}>保存して閉じる</button>
          <button className="btn btn-gray" onClick={onClose}>キャンセル</button>
        </div>
      </div>
    </div>
  );
}

      reader.onload = async e => {
        try {
          const ab = e.target.result;

          alert('マイクのアクセス許可が必要です。\nブラウザのアドレスバーのマイクアイコンから許可してください。');
        } else if (e.error !== 'no-speech' && e.error !== 'aborted') {
          console.warn('Browser STT error:', e.error);
        }
      };
      sr.onend = () => { if (webSpeechRef.current) { try { webSpeechRef.current.start(); } catch(e){} } };
      webSpeechRef.current = sr;
      try { sr.start(); } catch(e) { alert('ブラウザ音声認識の開始に失敗しました: ' + e.message); return; }
      setIsRecording(true);
      setUsingFallback(false); // 手動モードなのでフォールバックバナーは出さない
      setShowSettings(false);
      setAzureStreams(1);
      recordingStartRef.current = Date.now();
      azureTimerRef.current = setInterval(() => setAzureRecordingSec(s => s+1), 1000);
      timerRef.current = setInterval(() => { runAnalysis(); }, 30000);
      return;
    }

    if (!azureKey || !azureRegion) { alert('Azure Speech Services のキーとリージョンを入力してください'); return; }
    if (!apiKey) { onOpenKeyModal(); return; }
    fetchUsage();
    const SpeechSDK = window.SpeechSDK;
    if (!SpeechSDK) { alert('Azure Speech SDK の読み込みに失敗しました。ページを再読込してください。'); return; }

    // 認識器を生成するヘルパー
    const createRecognizer = (deviceId) => {
      const cfg = SpeechSDK.SpeechConfig.fromSubscription(azureKey, azureRegion);
      cfg.speechRecognitionLanguage = 'ja-JP';
      const audio = (deviceId && deviceId !== 'default')
        ? SpeechSDK.AudioConfig.fromMicrophoneInput(deviceId)
        : SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
      const rec = new SpeechSDK.SpeechRecognizer(cfg, audio);
      const pl = SpeechSDK.PhraseListGrammar.fromRecognizer(rec);
      ['PMO','PgMO','ステコミ','IBM','MSOL','KE','KOKUSAI Electric','SAP','S/4HANA',
       'ERP','CRM','Salesforce','ARAS','PLM','Sfotes','サプライヤーポータル',
       'スコープ','マイルストーン','ガバナンス','エスカレーション','リスク','課題台帳'
      ].forEach(t => pl.addPhrase(t));
      return rec;
    };

    // 発話をトランスクリプトに追記するハンドラー（ラベル付き）
    const makeHandlers = (rec, label) => {
      rec.recognizing = (_, e) => { if(!label) setInterimText(e.result.text); };
      rec.recognized  = (_, e) => {
        if (e.result.reason === SpeechSDK.ResultReason.RecognizedSpeech && e.result.text) {
          const time = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
          const text = label ? `[${label}] ${e.result.text}` : e.result.text;
          setTranscript(prev => {
            const next = [...prev, { time, text }];
            transcriptRef.current = next;
            return next;
          });
          setInterimText('');
        }
      };
      rec.canceled = (_, e) => {
        if (e.reason === SpeechSDK.CancellationReason.Error) {
          const details = e.errorDetails || '';
          const isQuota = details.includes('Quota') || details.includes('quota') || details.includes('exceeded') || details.includes('1007') || details.includes('429');
          const isAuth  = details.includes('401') || details.toLowerCase().includes('unauthorized') || details.toLowerCase().includes('authentication');
          if (isQuota) {
            stopRecording();
            const ok = window.confirm(
              '⚠️ Azure Speech クォータ（利用上限）を超過しました。\n\n' +
              '【今すぐ対処】\n' +
              '「OK」→ ブラウザ内蔵STT（無料・Chrome/Edge対応）に切り替えて録音を継続\n' +
              '「キャンセル」→ 録音を停止（Azureポータルで上限確認後に再開）\n\n' +
              '※ブラウザSTTはAzureより精度が低い場合があります。'
            );
            if (ok) {
              setMicMode('browser');
              localStorage.setItem('azure_mic_mode', 'browser');
              // 少し待ってから開始（state更新を待つ）
              setTimeout(() => { startWebSpeechFallback(); }, 100);
            }
          } else if (isAuth) {
            stopRecording();
            alert('🔑 Azure Speech 認証エラー: キーまたはリージョンが正しくありません。\n設定パネルで確認してください。\n\n詳細: ' + details);
          } else {
            stopRecording();
            alert('Azure Speech エラー: ' + details + '\nキーとリージョンを確認してください。');
          }
        }
      };
    };

    try {
      saveAzureSettings();

      // デバイスIDを解決
      // ソース1：selectedMicId（物理マイク・明示指定優先）
      const physDevice = micDevices.find(d => d.label.includes('マイク配列') || d.label.toLowerCase().includes('array'));
      const physId = (selectedMicId && selectedMicId !== 'default')
        ? selectedMicId : (physDevice ? physDevice.deviceId : null);

      // ソース2：selectedMicId2（VB-Cable等・明示指定優先）
      const vbDevice = micDevices.find(d => d.label.toLowerCase().includes('cable') || d.label.toLowerCase().includes('vb-audio') || d.label.toLowerCase().includes('vb audio'));
      const vbId = (selectedMicId2 && selectedMicId2 !== 'default')
        ? selectedMicId2 : (vbDevice ? vbDevice.deviceId : null);

      if (micMode === 'dual') {
        // ── デュアルモード：物理マイク(Anker等)＋VB-Cable(Loopback) ──
        if (!vbId) { 
          const labels = micDevices.map(d=>d.label).join('\n・');
          alert(`VB-Cable（CABLE Output）デバイスが見つかりません。\n\n【検出されたマイク一覧】\n・${labels||'（なし）'}\n\nVB-Cableがインストール済みの場合：\n① Windowsのサウンド設定でCABLE Outputが「録音」タブに表示されているか確認\n② ページを再読み込みして再試行`); 
          return; 
        }
        if (!physId) { alert('物理マイクが見つかりません。\n設定パネルのデバイス指定でAnker PowerConfを選択してください。'); return; }
        const rec1 = createRecognizer(physId);
        const rec2 = createRecognizer(vbId);
        makeHandlers(rec1, null);        // Anker マイク → ラベルなし（対面）
        makeHandlers(rec2, 'Teams');     // VB-Cable → [Teams] ラベル付き
        rec1.startContinuousRecognitionAsync(
          () => {
            rec2.startContinuousRecognitionAsync(
              () => {
                setIsRecording(true); setShowSettings(false);
                setAzureStreams(2);
                recordingStartRef.current = Date.now();
                azureTimerRef.current = setInterval(() => setAzureRecordingSec(s => s+1), 1000);
              },
              (err) => { alert('録音開始エラー（VB-Cable）: ' + err); rec1.stopContinuousRecognitionAsync(); }
            );
          },
          (err) => { alert('録音開始エラー（物理マイク）: ' + err); }
        );
        recognizerRef.current  = rec1;
        recognizerRef2.current = rec2;

      } else if (micMode === 'vbcable') {
        const rec = createRecognizer(vbId || selectedMicId2);
        makeHandlers(rec, 'Teams');
        rec.startContinuousRecognitionAsync(
          () => {
            setIsRecording(true); setShowSettings(false);
            setAzureStreams(1);
            recordingStartRef.current = Date.now();
            azureTimerRef.current = setInterval(() => setAzureRecordingSec(s => s+1), 1000);
          },
          (err) => { alert('録音開始エラー: ' + err); }
        );
        recognizerRef.current = rec;

      } else {
        const rec = createRecognizer(physId);
        makeHandlers(rec, null);
        rec.startContinuousRecognitionAsync(
          () => {
            setIsRecording(true); setShowSettings(false);
            setAzureStreams(1);
            recordingStartRef.current = Date.now();
            azureTimerRef.current = setInterval(() => setAzureRecordingSec(s => s+1), 1000);
          },
          (err) => { alert('録音開始エラー: ' + err); }
        );
        recognizerRef.current = rec;
      }

      timerRef.current = setInterval(() => { runAnalysis(); }, 30000);
    } catch(e) { alert('エラー: ' + e.message); }
  };

  const stopRecording = () => {
    if (recognizerRef.current) {
      recognizerRef.current.stopContinuousRecognitionAsync();
      recognizerRef.current = null;
    }
    if (recognizerRef2.current) {
      recognizerRef2.current.stopContinuousRecognitionAsync();
      recognizerRef2.current = null;
    }
    if (webSpeechRef.current) {
      webSpeechRef.current.onend = null; // 自動再起動を防止
      try { webSpeechRef.current.stop(); } catch(e) {}
      webSpeechRef.current = null;
    }
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
    if (azureTimerRef.current) { clearInterval(azureTimerRef.current); azureTimerRef.current = null; }
    setIsRecording(false);
    setUsingFallback(false);
    setInterimText('');
  };

  const runAnalysis = async (isManual = false) => {
    const lines = transcriptRef.current;
    if (!lines.length || !apiKey) return;
    const fullText = lines.map(l => `[${l.time}] ${l.text}`).join('\n');
    const newText  = lines.slice(analyzedLenRef.current).map(l => `[${l.time}] ${l.text}`).join('\n');
    // 手動実行の場合は新規発言がなくても全文で分析する（自動のみスキップ）
    if (!isManual && !newText.trim()) return;
    const analysisTarget = newText.trim() ? newText : fullText;

    const refText = refFilesRef.current.length > 0
      ? refFilesRef.current.map(f => `=== ${f.name} ===\n${f.text}`).join('\n\n')
      : '';
    const refUrlText = refUrls.filter(r=>r.url.trim()).length > 0
      ? refUrls.filter(r=>r.url.trim()).map((r,i)=>`[参考URL ${i+1}${r.label?` (${r.label})`:''}] ${r.url}`).join('\n')
      : '';

    // 有効カテゴリのJSON出力定義を動的生成
    const enabledCats = framework.cats.filter(c=>c.enabled);
    const catJsonDef = enabledCats.map(c =>
      `  "${c.id}": { "items": ["${c.id}カテゴリの分析結果1", "分析結果2"], "decision_needed": "役員判断要／部門長判断要／PMO完結／不要", "priority": "高／中／低" }`
    ).join(',\n');

    setIsAnalyzing(true);
    setAnalysisError('');
    const analysisTime = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2000,
          messages: [{
            role: 'user',
            content: `あなたは${framework.companyName}のDXプロジェクト（グローバル経営基盤 将来像実現プロジェクト）のクライアント側PMOアシスタントです。
ベンダー（IBM・MSOL等）との会議をリアルタイムでモニタリングし、PMO担当者（Masa）が見落としなく適切に判断・指摘できるよう支援します。

【${framework.companyName} DXの目的・文脈】
${framework.dxGoal}

${briefing ? `【今回の会議ブリーフィング（最優先で意識すること）】\n${briefing}\n` : ''}
【前回議事録】
${prevMinutes || '（なし）'}
${refText ? `\n【参考ファイル】\n${refText}` : ''}
${refUrlText ? `\n【参考URL】\n${refUrlText}` : ''}

【今回の会議テキスト全体】
${fullText}

【最新の新規発言（前回分析以降）】
${analysisTarget}

━━ 分析カテゴリと観点 ━━
${enabledCats.map(c=>`${c.id} ${c.icon} ${c.name}：${c.prompt}`).join('\n')}

以下のJSON形式のみで回答してください（説明文・マークダウン不要）：
{
  "summary": "ここまでの会議内容の要約（3〜5行）",
  "exec_summary": "役員・CIOが知るべきプロジェクト状況（1〜2行・経営者視点）",
  "categories": {
${catJsonDef}
  },
  "top_questions": ["今すぐ確認すべき最重要質問1", "質問2", "質問3"]
}`
          }]
        })
      });
      // HTTPエラー（401: APIキー不正、429: 上限超過など）を明示的にチェック
      if (!res.ok) {
        const errBody = await res.json().catch(() => ({}));
        const msg = errBody?.error?.message || `HTTPステータス ${res.status}`;
        throw new Error(msg);
      }
      const data = await res.json();
      const text = (data.content?.[0]?.text || '').replace(/```json\n?|\n?```/g,'').trim();
      const thisCost = calcCost(data.usage);
      try {
        const parsed = JSON.parse(text);
        const entry = { ...parsed, _time: analysisTime, _count: analysisCount+1 };
        setAnalysis(entry);
        setAnalysisHistory(prev => [entry, ...prev]); // 新しい順（先頭に追加）
        analyzedLenRef.current = lines.length;
        setAnalysisCount(c => c + 1);
        setLiveCostTotal(prev => prev + thisCost);
        setLiveCostLog(prev => [...prev, {
          count: prev.length + 1, cost: thisCost,
          tokens: (data.usage?.input_tokens||0) + (data.usage?.output_tokens||0),
          inp: data.usage?.input_tokens||0, out: data.usage?.output_tokens||0,
        }]);
        if (analysisPanelRef.current) analysisPanelRef.current.scrollTop = 0;
      } catch(e) {
        console.error('JSON Parse error:', e, '\nRaw:', text);
        setAnalysisError(`⚠️ 応答の解析に失敗しました（${analysisTime}）\n${text.slice(0,100)}…`);
      }
    } catch(e) {
      console.error('Analysis error:', e);
      setAnalysisError(`❌ AI分析エラー（${analysisTime}）: ${e.message}`);
    }
    setIsAnalyzing(false);
  };

  const handleEndMeeting = () => {
    stopRecording();
    if (liveCostLog.length > 0) {
      setShowCostModal(true);
    } else {
      const fullText = transcriptRef.current.map(l => `[${l.time}] ${l.text}`).join('\n');
      onEndMeeting(fullText);
    }
  };

  const handleCostModalClose = () => {
    setShowCostModal(false);
    const fullText = transcriptRef.current.map(l => `[${l.time}] ${l.text}`).join('\n');
    onEndMeeting(fullText);
  };

  const flagClass = (type) => ({
    '根拠不足': 'ai-flag-root', '矛盾': 'ai-flag-warn',
    'リスク': 'ai-flag-risk', '課題': 'ai-flag-issue'
  }[type] || 'ai-flag-warn');

  return (
    <div className="live-mode-wrap">
      {/* ヘッダー */}
      <div className="live-header">
        <div className={`live-title ${isRecording ? 'recording' : ''}`}>
          {isRecording ? '🔴' : '⚫'} 会議中モード
          {isRecording && micMode === 'physical' && <span style={{fontSize:11,marginLeft:6,color:'#90CDF4'}}>🎤 対面</span>}
          {isRecording && micMode === 'mixed'    && <span style={{fontSize:11,marginLeft:6,color:'#9AE6B4'}}>🎤💻 混在</span>}
          {isRecording && micMode === 'vbcable'  && <span style={{fontSize:11,marginLeft:6,color:'#FEB2B2'}}>🔁 Teams</span>}
          {isRecording && micMode === 'dual'     && <span style={{fontSize:11,marginLeft:6,color:'#68d391'}}>🎤🔁 全員</span>}
          {isRecording && micMode === 'browser' && <span style={{fontSize:11,marginLeft:6,color:'#9CA3AF'}}>🆓 ブラウザSTT</span>}
          {micMode === 'notta' && <span style={{fontSize:11,marginLeft:6,color:'#F6AD55'}}>👂 聞くだけ</span>}
          {usingFallback && <span style={{fontSize:11,marginLeft:6,background:'#C05621',color:'#fff',padding:'1px 8px',borderRadius:10,fontWeight:700}}>⚠️ ブラウザ音声</span>}
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {micMode === 'notta' ? (
            <button className="live-btn live-btn-blue"
              onClick={()=>window.open('https://app.notta.ai/398793/dashboard', '_blank')}>
              🔗 Nottaを開く
            </button>
          ) : (
            !isRecording
              ? <button className="live-btn live-btn-green" onClick={startRecording}>▶ 録音開始</button>
              : <button className="live-btn live-btn-gray"  onClick={stopRecording}>⏸ 一時停止</button>
          )}
          <button className="live-btn live-btn-blue" onClick={()=>runQuestionSuggestion()} disabled={isGeneratingQuestions || !transcript.length}>
            {isGeneratingQuestions ? '⏳ 生成中...' : '💬 質問を考える'}
          </button>
          <button className="live-btn live-btn-blue" onClick={()=>runAnalysis(true)} disabled={isAnalyzing || !transcript.length}>
            {isAnalyzing ? '⏳ 分析中...' : '🤖 今すぐ分析'}
          </button>
          <button className="live-btn live-btn-gray" onClick={()=>setShowSettings(s=>!s)}>
            ⚙️ 設定
          </button>
          <button className="live-btn live-btn-dark" onClick={handleEndMeeting}>
            ✅ 会議終了→議事録作成
          </button>
        </div>
        {isAnalyzing && <span className="analyzing-badge">⏳ AI分析中...</span>}
        {analysisCount > 0 && !isAnalyzing && <span style={{fontSize:11,color:'#68d391'}}>✓ 分析 {analysisCount}回完了</span>}
      </div>

      {/* ブラウザSTT使用中バナー */}
      {(usingFallback || (isRecording && micMode === 'browser')) && (
        <div style={{
          background: usingFallback ? '#FFFBEB' : '#F0FFF4',
          border: `1.5px solid ${usingFallback ? '#F6AD55' : '#9AE6B4'}`,
          borderRadius:8,
          padding:'10px 16px',fontSize:12,
          color: usingFallback ? '#7D4E00' : '#276749',
          margin:'0 0 10px',display:'flex',alignItems:'flex-start',gap:10
        }}>
          <span style={{fontSize:18,lineHeight:1.2}}>{usingFallback ? '⚠️' : '🆓'}</span>
          <div>
            <div style={{fontWeight:700,marginBottom:3}}>
              {usingFallback
                ? 'Azure Speechクォータ超過のため、ブラウザ内蔵STTに自動切り替えしました'
                : 'ブラウザ内蔵STTモードで録音中（Chrome / Edge 対応・無料）'}
            </div>
            <div style={{color: usingFallback ? '#92400E' : '#1B5E20'}}>
              {usingFallback
                ? <>文字起こしは継続できます（精度はAzureより低い場合があります）。Azureポータルで上限確認：<a href="https://portal.azure.com/" target="_blank" rel="noopener noreferrer" style={{color:'#C05621',fontWeight:700,marginLeft:4}}>portal.azure.com →</a></>
                : '設定パネルの「🆓 ブラウザSTT」を選択中です。Azureに戻すには設定パネルで別モードに切り替えてください。'}
            </div>
          </div>
        </div>
      )}

      {/* 設定パネル */}
      {showSettings && (
        <div className="live-settings">
          {/* Azure Key / Region ── ロック付き ── */}
          <div style={{display:'flex',alignItems:'flex-end',gap:8,flexWrap:'wrap'}}>
            <div className="live-setting-group" style={{minWidth:220}}>
              <label>🔷 Azure Speech キー</label>
              {azureKeyLocked ? (
                <div style={{padding:'6px 10px',border:'1.5px solid #d0d8e4',borderRadius:6,
                  fontSize:12,background:'#f8fafc',color:'#718096',letterSpacing:2,
                  fontFamily:'monospace',userSelect:'none'}}>
                  {'●'.repeat(Math.min(azureKey.length||20,24))}
                </div>
              ) : (
                <input type="password" value={azureKey} onChange={e=>setAzureKey(e.target.value)} placeholder="Azure Subscription Key"/>
              )}
            </div>
            <div className="live-setting-group" style={{minWidth:120}}>
              <label>🌏 リージョン</label>
              {azureKeyLocked ? (
                <div style={{padding:'6px 10px',border:'1.5px solid #d0d8e4',borderRadius:6,
                  fontSize:12,background:'#f8fafc',color:'#555'}}>
                  {azureRegion}
                </div>
              ) : (
                <input value={azureRegion} onChange={e=>setAzureRegion(e.target.value)} placeholder="japaneast"/>
              )}
            </div>
            {azureKeyLocked ? (
              <button className="live-btn live-btn-gray"
                style={{marginBottom:1,whiteSpace:'nowrap',
                  opacity:isRecording?0.4:1, cursor:isRecording?'not-allowed':'pointer'}}
                onClick={()=>{ if(!isRecording) setAzureKeyLocked(false); }}
                title={isRecording ? '録音中は変更できません。一時停止してください' : 'クリックしてキーを編集'}>
                {isRecording ? '🔒' : '🔐'} 変更
              </button>
            ) : (
              <button className="live-btn live-btn-green"
                style={{marginBottom:1,whiteSpace:'nowrap'}}
                onClick={()=>{
                  localStorage.setItem('azure_speech_key', azureKey);
                  localStorage.setItem('azure_speech_region', azureRegion);
                  setAzureKeyLocked(true);
                }}>
                🔒 保存してロック
              </button>
            )}
          </div>

          {/* マイク選択 ── カード型ガイド付き */}
          <div style={{borderLeft:'1px solid #e2e8f0',paddingLeft:12,display:'flex',flexDirection:'column',gap:8,minWidth:320,flex:1}}>
            <div style={{fontSize:11,fontWeight:700,color:'#444',marginBottom:2}}>🎤 会議形式を選択</div>

            {/* 録音中ロック警告 */}
            {isRecording && (
              <div style={{
                background:'#FFF3CD',border:'1.5px solid #F6AD55',borderRadius:6,
                padding:'6px 10px',display:'flex',alignItems:'center',gap:8,fontSize:11,color:'#7D4E00'
              }}>
                <span style={{fontSize:14}}>🔒</span>
                <span><strong>録音中は設定変更できません</strong><br/>
                一時停止してから変更し、録音を再開してください</span>
              </div>
            )}

            {/* モード選択ボタン */}
            <div style={{display:'flex',gap:6,position:'relative',flexWrap:'wrap'}}>
              {[
                {id:'physical', icon:'🎤',   label:'対面のみ',    color:'live-btn-blue',  badge:null},
                {id:'mixed',    icon:'🎤💻', label:'対面＋Teams', color:'live-btn-blue',  badge:null},

                    border:`1.5px solid ${briefing.trim()?'#9AE6B4':'#d0d8e4'}`,
                    borderRadius:6,fontSize:11,fontFamily:'Meiryo UI,Meiryo,sans-serif',

                    background:isRecording?'#f8fafc':briefing.trim()?'#F0FFF4':'#fafbfc',

                    <div style={{flex:1,display:'flex',flexDirection:'column',gap:2,minWidth:0}}>

                    <button style={{background:'none',border:'none',cursor:'pointer',color:'#e53e3e',fontSize:13,flexShrink:0}} onClick={()=>removeRefUrl(i)}>×</button>

            <span style={{marginLeft:'auto',fontSize:10,color:'#a0aec0',display:'flex',gap:8,alignItems:'center'}}>

              <span>{transcript.length}行</span>
            </span>
          </div>
          <div className="live-panel-body" ref={transcriptBodyRef}>
            {/* Nottaモード：貼り付けエリア */}

                  <strong>① Nottaで文字起こしを完了させてください</strong><br/>

                    borderRadius:6,fontSize:12,fontFamily:'Meiryo UI,Meiryo,sans-serif',
                    resize:'vertical',lineHeight:1.7,background:'#FFFBEB'}}

                    const lines = e.target.value.split('\n').filter(l=>l.trim()).map(l=>({time:'--:--:--',text:l.trim()}));
                    setTranscript(lines);
                    transcriptRef.current = lines;
                  }}
                />
                <button className="live-btn live-btn-blue" style={{fontSize:12,padding:'7px 20px',alignSelf:'flex-start'}}

                  ✅ 適用してAI分析
                </button>
              </div>

            {/* 通常モード or Notta貼り付け後 */}

              <>
                {transcript.length === 0 && !interimText && (
                  <div style={{color:'#a0aec0',textAlign:'center',marginTop:40,fontSize:13}}>
                    {isRecording ? '音声を待機中...' : '「録音開始」ボタンで開始します'}
                  </div>
                )}
                {/* 最新が上：interim → transcript逆順 */}
                {interimText && (
                  <div className="live-interim">
                    <span className="live-transcript-time">...</span>
                    {interimText}
                  </div>
                )}
                {[...transcript].reverse().map((line, i) => {
                  // AI分析で「注意すべき発言」に含まれるテキストを赤くハイライト
                  const flagged = analysisHistory.length > 0 && analysisHistory[0].categories &&
                    Object.values(analysisHistory[0].categories).some(cat =>
                      cat.items && cat.items.some(item =>
                        item.length > 6 && line.text.includes(item.slice(0,10))
                      )
                    );
                  // フラグがついた発言かどうか（top_questionsのキーワードも含む）
                  const questioned = analysisHistory.length > 0 &&
                    analysisHistory[0].top_questions &&
                    analysisHistory[0].top_questions.some(q =>
                      q.length > 6 && line.text.includes(q.slice(0,8))
                    );
                  const isAlert = flagged || questioned;
                  return (
                    <div key={i} className="live-transcript-line"
                      style={isAlert ? {
                        background:'#FFF5F5',
                        borderLeft:'3px solid #E53E3E',
                        paddingLeft:8,

                      <span className="live-transcript-time" style={isAlert?{color:'#E53E3E'}:{}}>{line.time}</span>
                      <span style={isAlert?{color:'#C53030',fontWeight:600}:{}}>{line.text}</span>
                      {isAlert && <span style={{marginLeft:6,fontSize:10,color:'#E53E3E',flexShrink:0}}>⚠️</span>}
                    </div>
                  );
                })}
                {micMode === 'notta' && transcript.length > 0 && (
                  <div style={{padding:'8px 12px',borderTop:'1px solid #e2e8f0',marginTop:8}}>
                    <button className="live-btn live-btn-gray" style={{fontSize:10,padding:'3px 10px'}}
                      onClick={()=>{setTranscript([]);transcriptRef.current=[];}}>
                      🗑 クリアして再貼り付け
                    </button>
                  </div>
                )}
              </>
            )}

        {/* 右：AIアシスト */}

              </button>
            </span>
          </div>
          <div className="live-panel-body" ref={analysisPanelRef} style={{padding:0}}>

                  <span style={{fontSize:14}}>💬</span>
                  <span style={{fontWeight:700,fontSize:12}}>話者への質問提案</span>
                  {questionSuggestions && <span style={{fontSize:10,color:'rgba(255,255,255,.6)',marginLeft:2}}>{questionSuggestions._time}</span>}
                  <div style={{marginLeft:'auto',display:'flex',gap:6}}>
                    {questionSuggestions && (
                      <button style={{background:'none',border:'1px solid rgba(255,255,255,.3)',color:'rgba(255,255,255,.8)',
                        borderRadius:4,padding:'1px 8px',fontSize:10,cursor:'pointer'}}
                        onClick={()=>{
                          const txt = questionSuggestions.questions.map((q,i)=>
                            `Q${i+1}【${q.target}】${q.question}\n　理由: ${q.reason}`
                          ).join('\n\n');
                          navigator.clipboard.writeText(txt);
                        }}>📋 コピー</button>
                    )}
                    <button style={{background:'none',border:'1px solid rgba(255,255,255,.3)',color:'rgba(255,255,255,.8)',
                      borderRadius:4,padding:'1px 8px',fontSize:10,cursor:'pointer'}}

                      {showQuestionsPanel ? '▲ 折りたたむ' : '▼ 展開'}

                {questionError && (
                  <div style={{padding:'10px 12px',background:'#FFF5F5',fontSize:11,color:'#742a2a'}}>{questionError}</div>

                      <div style={{background:'#EBF3FB',borderRadius:6,padding:'7px 10px',fontSize:11,color:'#1a4a7a',lineHeight:1.6,marginBottom:4}}>
                        📌 {questionSuggestions.summary}
                      </div>

                    {/* 質問リスト */}
                    {questionSuggestions.questions && questionSuggestions.questions.map((q, i) => {
                      const priorityColor = q.priority === '高' ? '#E53E3E' : q.priority === '中' ? '#D69E2E' : '#718096';
                      const priorityBg   = q.priority === '高' ? '#FFF5F5' : q.priority === '中' ? '#FFFBEB' : '#f8fafc';
                      return (
                        <div key={i} style={{border:`1.5px solid ${priorityColor}44`,borderRadius:8,overflow:'hidden'}}>
                          {/* 質問ヘッダー */}
                          <div style={{background:priorityBg,padding:'5px 10px',display:'flex',alignItems:'center',gap:6,borderBottom:`1px solid ${priorityColor}33`}}>
                            <span style={{fontWeight:700,fontSize:11,color:priorityColor}}>Q{i+1}</span>
                            <span style={{background:priorityColor,color:'#fff',borderRadius:8,padding:'1px 7px',fontSize:9,fontWeight:700}}>{q.priority}</span>
                            <span style={{fontSize:11,color:'#444',fontWeight:600}}>👤 {q.target}</span>
                            <button style={{marginLeft:'auto',background:'none',border:`1px solid ${priorityColor}66`,color:priorityColor,
                              borderRadius:4,padding:'1px 7px',fontSize:9,cursor:'pointer'}}
                              onClick={()=>navigator.clipboard.writeText(q.question)}>📋</button>
                          </div>
                          {/* 質問文 */}
                          <div style={{padding:'7px 10px',background:'#fff'}}>
                            <div style={{fontSize:12,color:'#1a202c',lineHeight:1.7,fontWeight:600,marginBottom:4}}>
                              ❓ {q.question}
                            </div>
                            <div style={{fontSize:10,color:'#718096',lineHeight:1.5,borderTop:'1px solid #f0f0f0',paddingTop:4}}>
                              💡 {q.reason}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                    {/* 再生成ボタン */}
                    <button className="live-btn live-btn-blue" style={{fontSize:11,padding:'5px 14px',alignSelf:'flex-start',marginTop:2}}
                      onClick={runQuestionSuggestion} disabled={isGeneratingQuestions}>
                      🔄 再生成
                    </button>
                  </div>
                )}
              </div>
            )}

            {analysisHistory.length === 0 && (
              <div style={{color:'#a0aec0',textAlign:'center',marginTop:40,fontSize:13,padding:16}}>
                会議開始後30秒で自動分析されます<br/>
                <span style={{fontSize:11}}>または「今すぐ分析」ボタンを押してください</span>
              </div>
            )}
            {/* エラー表示 */}
            {analysisError && (
              <div style={{margin:'10px 12px',padding:'10px 14px',background:'#FFF5F5',
                border:'1.5px solid #E53E3E',borderRadius:8,fontSize:11,color:'#742a2a',
                whiteSpace:'pre-wrap',lineHeight:1.7}}>
                {analysisError}
                <div style={{marginTop:6,fontSize:10,color:'#a0aec0'}}>
                  ヒント：APIキーの設定を確認してください（ヘッダーの🔑ボタン）
                </div>
              </div>
            )}

            {/* 全履歴を新しい順で表示（各エントリは折りたたみ可能） */}
            {analysisHistory.map((entry, ei) => (
              <AnalysisEntry key={ei} entry={entry} ei={ei} total={analysisHistory.length} framework={framework}
                briefing={briefing}
                onDelete={()=>setAnalysisHistory(prev=>prev.filter((_,i)=>i!==ei))}/>
            ))}
          </div>
        </div>
      </div>

      {/* フレームワーク設定モーダル */}
      {showFwModal && (
        <FrameworkModal fw={framework} onSave={saveFw} onClose={()=>setShowFwModal(false)} defaultFw={DEFAULT_FW}/>
      )}

      {/* 統合セットアップガイドモーダル */}
      {showSetupModal && (() => {
        const steps = setupSteps[setupMode] || [];
        const currentStep = steps[setupStep] || {};
        const isLast = setupStep === steps.length - 1;
        const color = modeColors[setupMode] || '#1F3864';
        return (
          <div className="modal-overlay" style={{zIndex:2000}}>
            <div className="modal" style={{maxWidth:540,width:'95%'}}>
              {/* ヘッダー */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:15,color}}>
                  {modeLabels[setupMode]} — 会議前チェックリスト
                </div>
                <button style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:'#888'}}
                  onClick={()=>setShowSetupModal(false)}>✕</button>
              </div>

              {/* ステップインジケーター */}
              <div style={{display:'flex',gap:3,marginBottom:14}}>
                {steps.map((s,i)=>(
                  <div key={i} style={{flex:1,height:6,borderRadius:3,
                    background: setupStep>i ? color : setupStep===i ? color+'99' : '#e2e8f0',
                    transition:'.2s'}}/>
                ))}
              </div>
              <div style={{fontSize:11,color:'#888',marginBottom:12}}>
                ステップ {setupStep+1} / {steps.length}：{currentStep.title}
              </div>

              {/* 現在のステップ内容 */}
              <div className={`notice notice-${currentStep.noticeType||'info'}`} style={{marginBottom:12}}>
                <span dangerouslySetInnerHTML={{__html: currentStep.notice||''}}/>
              </div>

              <div style={{background:'#f8fafc',borderRadius:8,padding:12,marginBottom:16,fontSize:13,lineHeight:1.9}}>
                {(currentStep.steps||[]).map((s,i)=>(
                  <div key={i} style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                    <span style={{minWidth:20,fontWeight:700,color}}>{i+1}.</span>
                    <span dangerouslySetInnerHTML={{__html:s}}/>
                  </div>
                ))}
              </div>

              {/* ナビゲーション */}
              <div style={{display:'flex',gap:8,justifyContent:'space-between',alignItems:'center'}}>
                <div style={{display:'flex',gap:8}}>
                  {setupStep > 0 && (
                    <button className="live-btn live-btn-gray" style={{fontSize:12}}
                      onClick={()=>setSetupStep(s=>s-1)}>← 戻る</button>
                  )}
                  {currentStep.skip && (
                    <button className="live-btn live-btn-gray" style={{fontSize:12}}
                      onClick={()=>setSetupStep(s=>s+1)}>{currentStep.skip} →</button>
                  )}
                </div>
                {!isLast ? (
                  <button className="live-btn live-btn-blue" style={{fontSize:13}}
                    onClick={()=>setSetupStep(s=>s+1)}>✅ 完了 → 次へ</button>
                ) : (
                  <button className="live-btn live-btn-green" style={{fontSize:13}}
                    onClick={()=>{
                      if(setupMode==='vbcable') completeVbSetup();
                      else setShowSetupModal(false);
                    }}>
                    🎉 チェック完了！録音を開始する
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      })()}

      {/* コスト確認モーダル（会議終了時ポップアップ） */}
      {showCostModal && (
        <div className="cost-modal-overlay" onClick={()=>setShowCostModal(false)}>
          <div className="cost-modal" style={{maxHeight:'85vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <div className="cost-modal-title" style={{margin:0}}>💰 今回の会議　コスト集計</div>
              <button onClick={()=>setShowCostModal(false)}
                style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#888',lineHeight:1}}>✕</button>
            </div>

            {/* Claude API */}
            <div style={{fontWeight:700,fontSize:12,color:'#1F3864',marginBottom:4,marginTop:4}}>🤖 Claude API（AI分析）</div>
            <div className="cost-row"><span>分析回数</span><span>{liveCostLog.length} 回</span></div>
            {/* 最新5件のみ表示、残りは折りたたみ */}
            {liveCostLog.slice(-5).map((l,i) => (
              <div key={i} className="cost-row" style={{fontSize:12,color:'#555'}}>
                <span>分析 {l.count} 回目</span>
                <span>{formatCost(l.cost)}<span style={{color:'#a0aec0',fontSize:11,marginLeft:6}}>{l.tokens.toLocaleString()} tokens</span></span>
              </div>
            ))}
            {liveCostLog.length > 5 && (
              <div style={{fontSize:11,color:'#a0aec0',textAlign:'center',padding:'2px 0'}}>… 他 {liveCostLog.length-5} 回分省略</div>
            )}
            <div className="cost-row" style={{fontWeight:700}}>
              <span>Claude 小計</span><span>{formatCost(liveCostTotal)}</span>
            </div>
            <div className="cost-note" style={{marginBottom:8}}>
              Claude Sonnet 4: 入力 $3/MTok・出力 $15/MTok｜
              <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:'#2E75B6'}}>Anthropicコンソール →</a>
            </div>

            {/* Azure Speech */}
            <div style={{fontWeight:700,fontSize:12,color:'#1F3864',marginBottom:4,borderTop:'1px solid #eee',paddingTop:8}}>🎤 Azure Speech（文字起こし）</div>
            <div className="cost-row"><span>録音時間</span><span>{formatAzureSec(azureRecordingSec)}</span></div>
            <div className="cost-row"><span>ストリーム数</span><span>{azureStreams}本{azureStreams===2?' （デュアルモード）':''}</span></div>
            <div className="cost-row" style={{fontWeight:700}}>
              <span>Azure 小計</span>
              <span>{formatAzureCost(azureCostTotal)}
                <span style={{color:'#a0aec0',fontSize:11,marginLeft:6}}>({azureRecordingSec * azureStreams}秒 × $1/時間)</span>
              </span>
            </div>
            <div className="cost-note" style={{marginBottom:8}}>
              Azure Speech STT: $1.00/時間｜無料枠: 5時間/月｜
              <a href="https://portal.azure.com" target="_blank" rel="noreferrer" style={{color:'#2E75B6'}}>Azureポータル →</a>
            </div>

            {/* 合計 */}
            <div className="cost-total">
              <span>今回の合計</span>
              <span>{formatCost(liveCostTotal + azureCostTotal)}</span>
            </div>

            <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'space-between',alignItems:'center'}}>
              <button className="live-btn live-btn-gray" onClick={()=>setShowCostModal(false)}>
                閉じる
              </button>
              <button className="live-btn live-btn-green" onClick={handleCostModalClose}>
                ✅ 議事録作成へ進む
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Usage Bar（下部統合パネル） */}
      <div className="usage-bar">
        {/* Claude AI分析コスト */}
        <div className="usage-seg">
          <span className="usage-label">Claude</span>
          <span className={`usage-val ${liveCostTotal === 0 ? '' : liveCostTotal < 0.05 ? 'green' : liveCostTotal < 0.2 ? 'amber' : 'red'}`}>
            {liveCostLog.length === 0 ? '—' : formatCost(liveCostTotal)}
          </span>
          {liveCostLog.length > 0 && <span className="usage-sub">{liveCostLog.length}回</span>}
        </div>

        {/* Azure Speech コスト */}
        <div className="usage-seg">
          <span className="usage-label">Azure STT</span>
          <span className={`usage-val ${azureRecordingSec === 0 ? '' : azureCostTotal < 0.02 ? 'green' : azureCostTotal < 0.08 ? 'amber' : 'red'}`}>
            {azureRecordingSec === 0 ? '—' : formatAzureCost(azureCostTotal)}
          </span>
          {azureRecordingSec > 0 && <span className="usage-sub">{formatAzureSec(azureRecordingSec)}{azureStreams===2?' ×2':''}</span>}
        </div>

        {/* 今日の消費（Admin API） */}
        <div className="usage-seg">
          <span className="usage-label">今日</span>
          {orgUsageLoading
            ? <span className="usage-spin"/>
            : orgUsageError
              ? <span className="usage-sub" style={{color:'rgba(252,129,129,.7)'}}>{orgUsageError}</span>
              : orgUsage
                ? <><span className="usage-val amber">{formatCost(orgUsage.todayCost ?? 0)}</span>
                    <span className="usage-sub">{orgUsage.fetchedAt.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}時点</span></>
                : <span className="usage-sub">—</span>
          }
        </div>

        {/* 今月の消費（Admin API） */}
        <div className="usage-seg">
          <span className="usage-label">今月</span>
          {orgUsageLoading
            ? <span className="usage-spin"/>
            : orgUsage
              ? <span className="usage-val" style={{color:'rgba(255,255,255,.6)'}}>{formatCost(orgUsage.monthCost ?? 0)}</span>
              : <span className="usage-sub">—</span>
          }
        </div>

        {/* 更新ボタン */}
        <div className="usage-seg">
          <button
            className="usage-btn"
            onClick={fetchUsage}
            disabled={orgUsageLoading || !adminKey}
            title={!adminKey ? 'Admin APIキーを設定してください' : '利用コストを再取得'}
          >
            {orgUsageLoading ? '取得中...' : '↻ 更新'}
          </button>
          {!adminKey && <span className="usage-sub" style={{marginLeft:4}}>Adminキー未設定</span>}
        </div>

        {/* 今回合計 */}
        {(liveCostLog.length > 0 || azureRecordingSec > 0) && (
          <div className="usage-seg" style={{marginLeft:'auto',borderRight:'none'}}>
            <span className="usage-label">合計</span>
            <span className="usage-val" style={{color:'rgba(255,255,255,.9)',fontWeight:700}}>
              {formatCost(liveCostTotal + azureCostTotal)}
            </span>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────
// ── ヘッダー設定メニュー ─────────────────────────────────────

function App(){
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('claude_api_key')||'');
  const [showKeyModal,setShowKeyModal]=useState(false);
  const saveApiKey=(key)=>{setApiKey(key);localStorage.setItem('claude_api_key',key);setShowKeyModal(false);};

  const handleEndMeeting=(transcript)=>{
    localStorage.setItem('pmo_live_transcript', transcript);
    localStorage.setItem('pmo_live_timestamp', new Date().toISOString());
    const base = window.location.href.replace(/\/live\/.*$/, '/');
    window.location.href = base + '?from=live';
  };

  return(
    <div className="live-mode-wrap" style={{maxWidth:'none',padding:0}}>
      <div style={{padding:'0 16px'}}>
        <div className="app-header" style={{borderRadius:'10px 10px 0 0',marginBottom:0,
          background:'linear-gradient(135deg,#1a202c 0%,#2D3748 100%)'}}>
          <div style={{display:'flex',alignItems:'center',gap:12,flex:'0 0 auto'}}>
            <div style={{width:36,height:36,borderRadius:8,background:'rgba(252,129,129,.2)',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🔴</div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:'#fff',letterSpacing:.3}}>会議中支援ツール</div>
              <div style={{fontSize:9,color:'#A0AEC0',marginTop:1}}>リアルタイム文字起こし＋AIアシスト　<span style={{color:'#CBD5E0'}}>v1.9</span></div>
            </div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',flex:'0 0 auto'}}>
            <a href="../" style={{background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.2)',
              color:'rgba(255,255,255,.8)',borderRadius:6,padding:'6px 12px',fontSize:11,
              textDecoration:'none',whiteSpace:'nowrap',fontFamily:'Meiryo UI,Meiryo,sans-serif'}}>
              📄 議事録作成ツール →
            </a>
            <button style={{background:apiKey?'rgba(56,161,105,.3)':'rgba(255,100,100,.3)',
              border:'1px solid rgba(255,255,255,.2)',color:'rgba(255,255,255,.85)',
              borderRadius:6,padding:'6px 12px',fontSize:11,cursor:'pointer',
              fontFamily:'Meiryo UI,Meiryo,sans-serif',whiteSpace:'nowrap'}}
              onClick={()=>setShowKeyModal(true)}>
              {apiKey?'🔑 API設定済':'🔑 APIキー設定'}
            </button>
          </div>
        </div>
      </div>
      <LiveMeetingMode apiKey={apiKey} onEndMeeting={handleEndMeeting} onOpenKeyModal={()=>setShowKeyModal(true)}/>
      {showKeyModal&&<ApiKeyModal current={apiKey} onSave={saveApiKey} onClose={()=>setShowKeyModal(false)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</head>
<body>
<div id="root"></div>
</body>
</html>
