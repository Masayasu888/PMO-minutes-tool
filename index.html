function AutoGlossaryButton({ materials, apiKey, currentGlossary, onApply }) {
  const [state, setState] = React.useState('idle'); // idle|loading|confirm|error
  const [candidates, setCandidates] = React.useState([]);
  const [checks, setChecks] = React.useState({});
  const [errMsg, setErrMsg] = React.useState('');

  const hasFiles = (materials||[]).some(m => m.blobUrl && m.name);

  const handleGenerate = async () => {
    if (!apiKey) { alert('APIキーを設定してください（右上メニュー）'); return; }
    setState('loading');
    try {
      const result = await autoGenerateGlossary(materials, apiKey);
      if (result.error) { setErrMsg(result.error); setState('error'); return; }
      if (!result.candidates.length) { setErrMsg('固有名詞候補が見つかりませんでした。'); setState('error'); return; }
      const init = {};
      result.candidates.forEach((c,i) => { init[i] = true; });
      setCandidates(result.candidates);
      setChecks(init);
      setState('confirm');
    } catch(e) {
      setErrMsg('解析エラー: ' + e.message);
      setState('error');
    }
  };

  const handleApply = () => {
    const selected = candidates.filter((_,i) => checks[i]);
    if (!selected.length) { setState('idle'); return; }
    const existing = (currentGlossary||'').trim();
    const toAdd = selected.filter(c => !existing.includes(c));
    const merged = [existing, ...toAdd].filter(Boolean).join('\n');
    onApply(merged);
    setState('idle');
    setCandidates([]);
  };

  if (!hasFiles) return (
    <span style={{fontSize:10,color:'#a0aec0',fontStyle:'italic'}}>
      ↑ 配布資料にファイルを添付すると自動生成できます
    </span>
  );

  return (
    <div style={{width:'100%'}}>
      {state === 'idle' && (
        <button onClick={handleGenerate}
          style={{background:'#1F7A4D',color:'#fff',border:'none',borderRadius:6,
            padding:'5px 14px',fontSize:11,fontWeight:700,cursor:'pointer',
            display:'flex',alignItems:'center',gap:5}}>
          🔤 資料から辞書を自動生成
        </button>
      )}
      {state === 'loading' && (
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',fontSize:12,color:'#1F7A4D',fontWeight:600}}>
          <div style={{width:14,height:14,border:'2px solid #9AE6B4',borderTopColor:'#1F7A4D',
            borderRadius:'50%',animation:'spin 0.8s linear infinite',flexShrink:0}}/>
          資料を解析中…
        </div>
      )}
      {state === 'error' && (
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <span style={{fontSize:11,color:'#c53030'}}>{errMsg}</span>
          <button onClick={()=>setState('idle')} style={{fontSize:11,background:'none',border:'1px solid #ccc',borderRadius:4,padding:'2px 8px',cursor:'pointer',color:'#666'}}>閉じる</button>
        </div>
      )}
      {state === 'confirm' && (
        <div style={{background:'#F0FFF4',border:'1.5px solid #9AE6B4',borderRadius:8,
          padding:'12px 14px',marginTop:8,width:'100%'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,flexWrap:'wrap',gap:6}}>
            <span style={{fontSize:12,fontWeight:700,color:'#276749'}}>
              ✅ {candidates.length}件の候補が検出されました。追加する項目を選択してください
            </span>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              <button onClick={()=>{const a={};candidates.forEach((_,i)=>{a[i]=true;});setChecks(a);}}
                style={{fontSize:10,background:'#fff',border:'1px solid #9AE6B4',borderRadius:4,padding:'3px 8px',cursor:'pointer',color:'#276749',fontWeight:600}}>全選択</button>
              <button onClick={()=>setChecks({})}
                style={{fontSize:10,background:'#fff',border:'1px solid #ccc',borderRadius:4,padding:'3px 8px',cursor:'pointer',color:'#666'}}>全解除</button>
            </div>
          </div>
          <div style={{maxHeight:160,overflowY:'auto',marginBottom:10,display:'flex',flexDirection:'column',gap:3}}>
            {candidates.map((c,i)=>(
              <label key={i} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'4px 6px',
                background:checks[i]?'#C6F6D5':'#fff',borderRadius:4,cursor:'pointer',
                border:'1px solid '+(checks[i]?'#68D391':'#e2e8f0'),transition:'.1s'}}>
                <input type="checkbox" checked={!!checks[i]}
                  onChange={e=>setChecks({...checks,[i]:e.target.checked})}
                  style={{marginTop:3,flexShrink:0}}/>
                <span style={{fontSize:12,fontFamily:'monospace',lineHeight:1.5,wordBreak:'break-all'}}>{c}</span>
              </label>
            ))}
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={handleApply}
              style={{background:'#1F7A4D',color:'#fff',border:'none',borderRadius:6,
                padding:'7px 18px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
              ✓ 選択した項目を辞書に追加
            </button>
            <button onClick={()=>setState('idle')}
              style={{background:'none',border:'1px solid #ccc',borderRadius:6,
                padding:'7px 12px',fontSize:12,cursor:'pointer',color:'#666'}}>
              キャンセル
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function Step1({data,setData,onNext,onOpenPersonMaster,apiKey,transcript}){

  const [showMaster, setShowMaster] = useState(false);
  const [meetingList, setMeetingList] = useState(()=>loadMeetingMaster());

  useEffect(()=>{ if(!showMaster) setMeetingList(loadMeetingMaster()); },[showMaster]);
  const [showLocationMaster, setShowLocationMaster] = useState(false);
  const [locationList, setLocationList] = useState(()=>loadLocationMaster());
  const [showAuthorMaster, setShowAuthorMaster] = useState(false);
  const [authorList, setAuthorList] = useState(()=>loadAuthorMaster());
  const [showOrgAttMaster, setShowOrgAttMaster] = useState(false);
  // 手入力出席者マスターが閉じたらManualAttendeesInputをリフレッシュ
  useEffect(()=>{ if(!showOrgAttMaster) upd('_masterKey', (data._masterKey||0)+1); },[showOrgAttMaster]);
  // モーダルが閉じるたびにリストを再読み込み
  useEffect(()=>{ if(!showLocationMaster) setLocationList(loadLocationMaster()); },[showLocationMaster]);
  useEffect(()=>{ if(!showAuthorMaster)   setAuthorList(loadAuthorMaster());    },[showAuthorMaster]);
  const icsRef = useRef();
  const [icsLoaded, setIcsLoaded] = useState(false);
  const [showPasteModal, setShowPasteModal] = useState(false);
  const [pasteText, setPasteText] = useState('');
  const [pasteAnalyzing, setPasteAnalyzing] = useState(false);
  const csvRef = useRef();
  // 入力モードはbasicInfo経由で永続化（ステップ移動後も保持）
  const entryMode = data.entryMode || 'ics';
  const setEntryMode = (mode) => upd('entryMode', mode);

  // ── ICS取り込み状態管理（新仕様）──────────────────────────
  // icsPhase: null | 'stepA' | 'stepB' | 'stepC' | 'stepD'
  const [icsPhase, setIcsPhase] = useState(null);
  const [icsRaws, setIcsRaws] = useState([]);        // 全出席者Raw
  const [icsOrgs, setIcsOrgs] = useState([]);        // 構築中の組織データ
  // Step B: 未登録ドメイン
  const [pendingDomains, setPendingDomains] = useState([]); // [{domain, org:'', emails:[]}]
  // Step C: 未登録メンバー
  const [pendingMembers, setPendingMembers] = useState([]); // [{email,name,rawName,detectedOrg,orgName:'',displayName:''}]
  // Step D: 日本語名更新候補
  const [updateQueue, setUpdateQueue] = useState([]);  // [{person, newName}]
  const [updateIdx, setUpdateIdx] = useState(0);

  // 組織配列に名前を追加するヘルパー
  const addToOrgs = (orgs, name, org) => {
    if (!name || !org) return orgs;
    const exists = orgs.find(o => o.org === org);
    if (exists) {
      return orgs.map(o => o.org === org
        ? { ...o, names: o.names.includes(name) ? o.names : [...o.names, name] }
        : o
      );
    }
    return [...orgs, { org, names: [name] }];
  };

  // ── CSV取り込み（Outlookの「状況確認→CSVダウンロード」対応）──
  const handleCsvImport = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const text = e.target.result;
        const lines = text.split(/\r?\n/).filter(l=>l.trim());
        if (!lines.length) return;
        // ヘッダー行を検出
        const header = lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
        const nameIdx   = header.findIndex(h=>/name|名前/i.test(h));
        const emailIdx  = header.findIndex(h=>/email|メール/i.test(h));
        // 出席者をPersonMasterに登録してアコーディオンに反映
        const persons = loadPersonMaster();
        const newPersons = [...persons];
        const domainMaster = loadDomainMaster();
        lines.slice(1).forEach(line => {
          const cols = line.split(',').map(c=>c.replace(/^"|"$/g,'').trim());
          const name  = nameIdx  >= 0 ? cols[nameIdx]  : '';
          const email = emailIdx >= 0 ? cols[emailIdx] : '';
          if (!name && !email) return;
          // 組織判定
          const domain = email ? email.split('@')[1] : '';
          const dm = domainMaster.find(d => domain && domain.includes(d.domain));
          const org = dm ? dm.org : (domain ? domain.split('.')[0].toUpperCase() : '不明');
          const displayName = reverseEnglishName(name) || name;
          if (!newPersons.find(p => p.email === email || (p.name === displayName && p.org === org))) {
            newPersons.push({ name: displayName, email, org });
          }
        });
        savePersonMaster(newPersons);
        setData(p => ({ ...p, _masterKey: (p._masterKey||0)+1 }));
        alert(`✅ ${newPersons.length - persons.length}名をICS出席者マスターに登録しました`);
      } catch(err) {
        alert('CSVの読み込みに失敗しました: ' + err.message);
      }
    };
    reader.readAsText(file, 'UTF-8');
  };

  // ── テキスト貼り付け → AI解析 ──
  const handlePasteAnalyze = async () => {
    if (!pasteText.trim()) return;
    if (!apiKey) { alert('APIキーを設定してください'); return; }
    setPasteAnalyzing(true);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:1500,
          messages:[{role:'user', content:`以下のOutlook会議本文から会議情報を抽出してください。JSONのみ出力してください（説明不要）。

テキスト:
${pasteText}

出力形式（値が不明な場合は空文字）:
{"meetingName":"","date":"YYYY-MM-DD","startTime":"HH:MM","endTime":"HH:MM","location":"","agenda":"1．xxx\\n2．yyy","attendees":[{"org":"組織名","names":["田中","山下"]}]}`
          }]
        })
      });
      const data2 = await res.json();
      const raw = data2.content?.[0]?.text?.trim().replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(raw);
      // basicInfoに反映
      setData(p => ({
        ...p,
        meetingName: parsed.meetingName || p.meetingName,
        date:        parsed.date        || p.date,
        startTime:   parsed.startTime   || p.startTime,
        endTime:     parsed.endTime     || p.endTime,
        location:    parsed.location    || p.location,
        agenda:      parsed.agenda      || p.agenda,
        attendees:   parsed.attendees?.length ? parsed.attendees : p.attendees,
        _masterKey:  (p._masterKey||0)+1,
      }));
      setShowPasteModal(false); setPasteText('');
    } catch(err) {
      alert('解析に失敗しました: ' + err.message);
    }
    setPasteAnalyzing(false);
  };

  // ICS処理の完了（Step1に反映）
  const finalizeIcs = (orgs) => {
    setData(p => ({ ...p, attendees: orgs, _masterKey: (p._masterKey||0)+1 }));
    setIcsPhase(null);
    setIcsLoaded(true);
  };

  // .ics読み込み
  const handleIcs = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = parseIcs(e.target.result);
        setData(p => ({
          ...p,
          meetingName: parsed.meetingName || p.meetingName,
          meetingNo:   parsed.meetingNo   || p.meetingNo,
          date:        parsed.date        || p.date,
          startTime:   parsed.startTime   || p.startTime,
          endTime:     parsed.endTime     || p.endTime,
          location:    (parsed.location || p.location).replace(/\\#/g,'').replace(/[#＃]/g,'').replace(/\s{2,}/g,' ').trim(),
          agenda:      parsed.agenda || p.agenda,
        }));
        const rawAll = (parsed.attendeeRaws || []).filter(r => r.email || r.name);
        // メールアドレスで重複排除
        const seen = new Set();
        const raws = rawAll.filter(r => {
          const key = r.email || r.name;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
        setIcsRaws(raws);
        setData(p => ({ ...p, _icsRaws: raws }));
        setIcsPhase('stepA');
      } catch(err) {
        alert('.icsファイルの解析に失敗しました: ' + err.message);
      }
    };
    reader.readAsText(file, 'UTF-8');
  };

  // Step A: 全員 or 担当者のみ選択後の処理開始
  const startIcsImport = (importAll) => {
    let raws = icsRaws;
    if (!importAll) {
      // 担当者のみ = OWNERまたはORGANIZERのみ（簡易: 自分のメール除外）
      // 実際には主催者のみ残す（最初の1件）
      raws = icsRaws.slice(0, 1);
    }
    const initOrgs = loadDomainMaster().map(d=>({org:d.org,names:[]}))
      .filter((o,i,arr)=>arr.findIndex(x=>x.org===o.org)===i); // 組織名で重複排除
    setIcsOrgs(initOrgs);
    processStepB(raws, initOrgs);
  };

  // Step B: 未登録ドメインを収集してテーブル表示
  const processStepB = (raws, orgs) => {
    const allKnown = loadDomainMaster();
    const unknownDomains = {};
    raws.forEach(r => {
      if (!r.email) return;
      const domain = (r.email.split('@')[1] || '').toLowerCase();
      if (!domain) return;
      // 完全一致のみ（endsWith による誤マッチを防ぐ）
      const known = allKnown.find(d => domain === d.domain);
      if (!known) {
        if (!unknownDomains[domain]) unknownDomains[domain] = new Set();
        unknownDomains[domain].add(r.email); // Setで重複排除
      }
    });
    const domainList = Object.entries(unknownDomains).map(([domain, emailSet]) => ({
      domain, emails: [...emailSet], org: guessOrgFromDomain(domain), confirmed: false
    }));
    if (domainList.length > 0) {
      setPendingDomains(domainList);
      setIcsRaws(raws);
      setIcsOrgs(orgs);
      setIcsPhase('stepB');
    } else {
      processStepC(raws, orgs);
    }
  };

  // Step B完了: ドメインを登録してStep Cへ
  const completStepB = (domainList) => {
    const toAdd = domainList.filter(d => d.org.trim());
    if (toAdd.length > 0) {
      const stored = localStorage.getItem(DOMAIN_MASTER_KEY);
      const master = stored ? JSON.parse(stored) : [...DEFAULT_DOMAINS];
      const newMaster = [...master];
      toAdd.forEach(d => {
        if (!newMaster.find(m => m.domain === d.domain)) {
          newMaster.push({ domain: d.domain, org: d.org.trim() });
        }
      });
      localStorage.setItem(DOMAIN_MASTER_KEY, JSON.stringify(newMaster));
      
      
    } else {
      
    }
    processStepC(icsRaws, icsOrgs);
  };

  // Step C: 未登録メンバーを収集してテーブル表示
  const processStepC = (raws, orgs) => {
    const master = loadPersonMaster();
    const members = [];
    const updateCandidates = [];

    raws.forEach(r => {
      if (!r.email && !r.name) return;
      const existing = r.email
        ? master.find(p => p.email === r.email)
        : null;

      if (existing) {
        // 登録済み
        if (existing.confirmed) {
          // 確定済み: 日本語名なし + 今回日本語名あり → Step D候補
          if (isEnglishName(existing.name) && !isEnglishName(r.name) && r.name !== r.email) {
            updateCandidates.push({ person: existing, newName: r.name });
          }
          // それ以外は何もしない（確定済みは更新しない）
        } else {
          // 未確定: 日本語名があれば更新候補
          if (isEnglishName(existing.name) && !isEnglishName(r.name) && r.name !== r.email) {
            updateCandidates.push({ person: existing, newName: r.name });
          }
        }
      } else {
        // 未登録
        const detectedOrg = orgFromEmail(r.email) || 'KE';
        members.push({
          email: r.email || '',
          name: r.name || '',
          rawName: r.rawName || '',
          detectedOrg,
          orgName: detectedOrg,
          displayName: r.name || '',
          include: true,
          confirmed: false,
        });
      }
    });

    setIcsOrgs(orgs);
    setIcsRaws(raws);

    if (members.length > 0) {
      setPendingMembers(members);
      setUpdateQueue(updateCandidates);
      setIcsPhase('stepC');
    } else if (updateCandidates.length > 0) {
      setUpdateQueue(updateCandidates);
      setUpdateIdx(0);
      setIcsPhase('stepD');
    } else {
      // 全員登録済み → 出席者リストに追加して完了
      let orgsResult = orgs;
      raws.forEach(r => {
        if (!r.email && !r.name) return;
        const existing = master.find(p => p.email === r.email);
        if (existing) orgsResult = addToOrgs(orgsResult, existing.name, existing.org);
      });
      finalizeIcs(orgsResult);
    }
  };

  // Step C完了: メンバー登録してStep Dへ
  const completeStepC = (members) => {
    const master = loadPersonMaster();
    const toRegister = members.filter(m => m.include && m.displayName.trim());
    const newMaster = [...master, ...toRegister.map(m => ({
      name: m.displayName.trim(),
      email: m.email,
      org: m.orgName || m.detectedOrg,
      confirmed: false,
    }))];
    savePersonMaster(newMaster);

    // 出席者リストに追加
    let orgsResult = icsOrgs;
    // 登録済み全員も追加
    const allMaster = newMaster;
    icsRaws.forEach(r => {
      if (!r.email && !r.name) return;
      const p = allMaster.find(m => m.email === r.email);
      if (p) orgsResult = addToOrgs(orgsResult, p.name, p.org);
    });

    if (updateQueue.length > 0) {
      setIcsOrgs(orgsResult);
      setUpdateIdx(0);
      setIcsPhase('stepD');
    } else {
      finalizeIcs(orgsResult);
    }
  };

  // Step D: 日本語名更新（1件ずつ）
  const handleUpdateName = (doUpdate) => {
    const master = loadPersonMaster();
    const current = updateQueue[updateIdx];
    if (doUpdate && current) {
      const updated = master.map(p =>
        p.email === current.person.email ? { ...p, name: current.newName } : p
      );
      savePersonMaster(updated);
      // orgsも更新
      const newOrgs = icsOrgs.map(o => ({
        ...o,
        names: o.names.map(n => n === current.person.name ? current.newName : n)
      }));
      setIcsOrgs(newOrgs);
    }
    const nextIdx = updateIdx + 1;
    if (nextIdx >= updateQueue.length) {
      finalizeIcs(icsOrgs);
    } else {
      setUpdateIdx(nextIdx);
    }
  };


  return(
    <div className="card">
      <div className="card-title" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>

        </div>
      </div>

          <input list="approver-list" value={data.approver||''}
            onChange={e=>upd('approver',e.target.value)}
            onBlur={e=>{
              const v=e.target.value.trim();
              if(v){
                const cur=loadAuthorMaster();
                if(!cur.includes(v)){
                  const next=[...cur,v];
                  saveAuthorMaster(next);
                  setAuthorList(next);
                }
              }

      </div>

      {/* ICS・手入力どちらも同じアコーディオンUI、データソースだけ切り替え */}
      <ManualAttendeesInput
        key={`${data._clearKey||0}-${data._masterKey||0}-${entryMode}`}
        value={data.attendees}

      </div>
      <div style={{marginBottom:12}}>
        <SpeakerMappingInput
          value={data.speakerMap||[]}
          onChange={v=>upd('speakerMap',v)}
          transcript={transcript||''}
          attendees={data.attendees||[]}
        />
      </div>

      {/* ── 配布・投影資料 ── */}
      <div className="section-divider">📎 配布・投影資料</div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:'#718096',marginBottom:6}}>
          💡 PDF・画像・PPTXを添付すると、下の辞書を自動生成できます。
        </div>
        <MaterialsInput value={data.materials} onChange={v=>upd('materials',v)}/>

      {/* ── 固有名詞・補正辞書（自動生成ボタン付き） ── */}
      <div className="section-divider" style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:6}}>
        <span>🔤 固有名詞・補正辞書</span>
        <AutoGlossaryButton
          materials={data.materials}
          apiKey={apiKey}
          currentGlossary={data.glossary||''}
          onApply={newGlossary=>upd('glossary',newGlossary)}

      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:'#718096',marginBottom:4}}>
          「誤記 → 正しい表記」形式で1行1件。AI解析時に自動補正されます。
        </div>
        <textarea value={data.glossary||''} onChange={e=>upd('glossary',e.target.value)}
          placeholder={'例：\nガラス → Aras（PLMパッケージ）\nあらす → Aras\nKDX → OKDX'}
          style={{minHeight:80,fontSize:12,resize:'vertical',fontFamily:'monospace'}}/>
      </div>
      <div className="btn-row">
        <button className="btn btn-primary"
          onClick={onNext}>次へ →</button>
      </div>
    </div>
  );
}

// ── Step 2 ─────────────────────────────────────────────────
function Step2({transcript,setTranscript,prevMinutesFile,setPrevMinutesFile,prevMinutesText,setPrevMinutesText,docxTemplateFile,setDocxTemplateFile,xlsxTemplateFile,setXlsxTemplateFile,xlsxDataFile,setXlsxDataFile,onNext,onBack,liveHandoff,attendees}){
  const txtRef=useRef(),docxTplRef=useRef(),xlsTplRef=useRef(),xlsDatRef=useRef();
  const [drag,setDrag]=useState(false);
  const [importSource,setImportSource]=useState(liveHandoff?'live':'');
  const loadTxt=(file)=>{const r=new FileReader();r.onload=e=>{setTranscript(e.target.result);setImportSource('file');};r.readAsText(file,'UTF-8');};

  const sources=[
    {id:'live',  icon:'🔴', label:'会議中ツール',     desc:'自動引き渡し'},
    {id:'file',  icon:'📄', label:'テキストファイル',  desc:'.txt'},
    {id:'paste', icon:'📋', label:'直接貼り付け',      desc:'Notta等からコピー'},
  ];

  return(
    <div className="card">
      <div className="card-title" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>

// ── 過負荷エラー（529）：カウントダウン付き自動リトライ ─────
function OverloadedError({ onRetry }) {
  const [sec, setSec] = React.useState(30);
  const [retrying, setRetrying] = React.useState(false);
  React.useEffect(() => {
    if (sec <= 0) { setRetrying(true); onRetry(); return; }
    const t = setTimeout(() => setSec(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [sec]);
  return (
    <div className="notice notice-warn">
      <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>🌐 APIサーバーが混雑しています（過負荷エラー）</div>
      <div style={{fontSize:12,lineHeight:1.8,marginBottom:10}}>
        Anthropic APIサーバーが一時的に混雑しています。ユーザー側の問題ではありません。<br/>
        {retrying
          ? <span style={{color:'#276749',fontWeight:700}}>⚡ 自動再試行中...</span>
          : <span><strong style={{fontSize:14,color:'#C55A11'}}>{sec}秒後</strong>に自動的に再試行します。</span>
        }
      </div>
      {!retrying && (
        <button className="btn btn-green" style={{fontSize:12,padding:'6px 18px'}}
          onClick={()=>{setSec(0);}}>
          今すぐ再試行
        </button>
      )}
    </div>
  );
}

function TableEditor({data,setData,cols}){
  if(!data||data.length===0) return <div style={{color:'#888',fontSize:13,padding:'12px 0'}}>（該当する項目はありませんでした）</div>;
  const upd=(i,k,v)=>setData(data.map((r,ri)=>ri===i?{...r,[k]:v}:r));
  const del=(i)=>setData(data.filter((_,ri)=>ri!==i));
  return(
    <div style={{overflowX:'auto'}}>
      <table className="preview-table">
        <thead><tr>{cols.map(c=><th key={c.key} style={{minWidth:c.w||80}}>{c.label}</th>)}<th style={{width:36}}>削除</th></tr></thead>
        <tbody>
          {data.map((row,i)=>(
            <tr key={i}>
              {cols.map(c=>(
                <td key={c.key}>
                  {c.type==='select'?(
                    <select value={row[c.key]||''} onChange={e=>upd(i,c.key,e.target.value)} style={{width:'100%',minWidth:c.w||70}}>
                      {c.options.map(o=><option key={o} value={o}>{o||'―'}</option>)}
                    </select>
                  ):(
                    <textarea value={row[c.key]||''} onChange={e=>upd(i,c.key,e.target.value)} style={{minHeight:c.tall?60:32}}/>
                  )}
                </td>
              ))}
              <td><button onClick={()=>del(i)} style={{color:'#e53e3e',background:'none',border:'none',cursor:'pointer',fontSize:16}}>🗑</button></td>
            </tr>
          ))}
        </tbody>
      </table>
      <button className="btn btn-gray" style={{fontSize:12,padding:'5px 12px',marginTop:6}} onClick={()=>setData([...data,{}])}>＋ 行追加</button>
    </div>
  );
}

function MinutesEditor({data,setData,unknownSpeakers}){
  if(!data||data.length===0) return <div style={{color:'#888',fontSize:13}}>（議事内容なし）</div>;
  const upd=(i,k,v)=>setData(data.map((r,ri)=>ri===i?{...r,[k]:v}:r));

  // 話者名を赤くハイライトしてレンダリング
  const renderHighlighted = (content) => {
    const lines = (content||'').split('\n');
    return lines.map((line,li) => {
      const m = line.match(/^([^:\uff1a]{1,20})[\uff1a:]/);
      if (m) {
        const sp = m[1].trim();
        const isUnknown = (unknownSpeakers||[]).some(u => u === sp);
        const rest = line.slice(m[0].length);
        return (
          <div key={li} style={{lineHeight:1.8}}>
            <span style={isUnknown
              ? {color:'#C53030',fontWeight:700,background:'#FED7D7',borderRadius:3,padding:'0 4px',border:'1px solid #FC8181'}
              : {color:'#1F3864',fontWeight:700}}>
              {sp}
            </span>
            <span style={{color: isUnknown ? '#C53030' : '#555'}}>：{rest}</span>
          </div>
        );
      }
      return <div key={li} style={{lineHeight:1.8,color:'#333'}}>{line||'\u00A0'}</div>;
    });
  };

  const checked = unknownSpeakers !== null;
  const hasUnknown = checked && unknownSpeakers.length > 0;

  return (
    <div>
      {/* チェック結果バナー */}
      {checked && (
        <div style={{marginBottom:12,padding:'8px 14px',borderRadius:8,
          background: hasUnknown ? '#FFF5F5' : '#F0FFF4',
          border: `1.5px solid ${hasUnknown ? '#FC8181' : '#9AE6B4'}`}}>
          {hasUnknown ? (
            <>
              <span style={{fontSize:12,fontWeight:700,color:'#C53030'}}>⚠️ 出席者リストにいない話者が検出されました（赤字で表示）</span>
              <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:6}}>
                {unknownSpeakers.map((sp,i)=>(
                  <span key={i} style={{background:'#FED7D7',color:'#C53030',padding:'2px 8px',
                    borderRadius:10,fontSize:11,fontWeight:700,border:'1px solid #FC8181'}}>{sp}</span>
                ))}
              </div>
            </>
          ) : (
            <span style={{fontSize:12,fontWeight:700,color:'#276749'}}>✅ 全ての話者が出席者リストと一致しています</span>
          )}
        </div>
      )}

      {data.map((item,i)=>(
        <div key={i} style={{marginBottom:16,borderBottom:'1px solid #eee',paddingBottom:12}}>
          <label style={{fontSize:12,color:'#1F3864',fontWeight:700}}>議題 {i+1}</label>
          <input value={item.title||''} onChange={e=>upd(i,'title',e.target.value)} style={{marginBottom:6,fontSize:14,fontWeight:600}}/>
          {checked ? (
            <div style={{border:`1.5px solid ${hasUnknown?'#FC8181':'#9AE6B4'}`,borderRadius:6,
              padding:'9px 12px',minHeight:100,fontSize:13,
              fontFamily:'Meiryo UI,Meiryo,sans-serif',background:'#FAFAFA',lineHeight:1.8,
              whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
              {renderHighlighted(item.content)}
            </div>
          ) : (
            <textarea value={item.content||''} onChange={e=>upd(i,'content',e.target.value)} style={{minHeight:100,fontSize:13}}/>
          )}
        </div>
      ))}
    </div>
  );
}

// ── Step 4 ─────────────────────────────────────────────────
function Step4({result,setResult,onNext,onBack,onReanalyze,transcript,attendees}){
  const [tab,setTab]=useState('minutes');
  const [hasEdits,setHasEdits]=useState(false);
  const [showSpeakerCheck,setShowSpeakerCheck]=useState(false);
  const [unknownSpeakers,setUnknownSpeakers]=useState(null); // null=未実行, []=結果
  const upd=(key,val)=>{setHasEdits(true);setResult(p=>({...p,[key]:val}));};

  // 話者チェック：議事内容テキストから話者名を抽出してチェック
  const runSpeakerCheck = () => {
    const knownNames = [];
    (attendees||[]).forEach(org => {
      (Array.isArray(org.names)?org.names:[]).forEach(n => {
        if (n) knownNames.push(n.trim());
      });
    });
    const allContent = (result.minutes_by_agenda||[]).map(m=>m.content||'').join('\n');
    const speakerRe = /^([^:\uff1a\n]{1,20})[\uff1a:]/gm;
    const foundSpeakers = new Set();
    let m;
    while ((m = speakerRe.exec(allContent)) !== null) {
      const sp = m[1].trim();
      if (sp && !/^\s*$/.test(sp) && !/^[\d\-\[\(（【\s]/.test(sp)) {
        foundSpeakers.add(sp);
      }
    }
    const unknown = [...foundSpeakers].filter(sp =>
      !knownNames.some(kn =>
        kn===sp || kn.includes(sp) || sp.includes(kn) ||
        (kn.length>=2 && sp.length>=2 && (kn.startsWith(sp)||sp.startsWith(kn)))
      )
    );
    setUnknownSpeakers(unknown);
    setShowSpeakerCheck(false); // モーダルは使わない
    setTab('minutes'); // 議事内容タブに切り替え
  };
  const handleBack=()=>{
    if(hasEdits){
      if(!window.confirm('編集内容が失われる可能性があります。Step3（AI解析）に戻りますか？')) return;
    }
    onBack();
  };
  const handleReanalyze=()=>{
    if(!window.confirm('現在の編集内容はリセットされ、AIによる再解析を行います。よろしいですか？')) return;
    onReanalyze();
  };
  const IP=[{key:'importance',label:'重要度',type:'select',options:IP_OPTS,w:70},{key:'priority',label:'優先度',type:'select',options:IP_OPTS,w:70}];
  const tabs=[
    {id:'minutes',label:`📝 議事内容`},
    {id:'decisions',label:`✅ 決定事項 (${(result.decisions && result.decisions.length)||0})`},
    {id:'todos',label:`📌 ToDo (${(result.todos && result.todos.length)||0})`},
    {id:'risks',label:`⚠️ リスク (${(result.risks && result.risks.length)||0})`},
    {id:'issues',label:`🔧 課題 (${(result.issues && result.issues.length)||0})`},
    {id:'exec',label:`👔 役員報告 (${(result.exec_report && result.exec_report.length)||0})`},
    {id:'mgr',label:`📋 室長報告 (${(result.manager_report && result.manager_report.length)||0})`},
    {id:'pending',label:`⏸ 保留 (${(result.pending && result.pending.length)||0})`},
    {id:'invest',label:`💰 投資・契約 (${(result.investment_contracts && result.investment_contracts.length)||0})`},
  ];
  return(
    <div className="card">
      <div className="card-title" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span>📄 Step 4 ― プレビュー・編集</span>
        <button onClick={()=>{
          if(!window.confirm('AI解析結果をクリアしますか？\nStep 3で再解析が必要になります。')) return;
          setResult(null);
          onBack();
        }}
          style={{fontSize:11,background:'none',border:'1px solid #ccc',borderRadius:6,
            padding:'3px 10px',cursor:'pointer',color:'#666',fontWeight:400}}>
          🗑 クリア
        </button>
      </div>
      <div className="notice notice-info" style={{marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
        <span>各タブで内容を確認・編集できます。重要度・優先度はAIが自動判定しましたが、必要に応じて修正してください。</span>
        {unknownSpeakers === null ? (
          <button className="btn-form-sub" onClick={runSpeakerCheck} style={{flexShrink:0}}>
            👤 話者チェック
          </button>
        ) : (
          <button className="btn-form-sub" onClick={()=>{setUnknownSpeakers(null);}} style={{flexShrink:0,borderColor:'#e53e3e',color:'#e53e3e'}}>
            ✕ チェック解除
          </button>
        )}
      </div>
      <div className="tabs">{tabs.map(t=><div key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</div>)}</div>
      <div className="tab-content">
        {tab==='minutes'&&<MinutesEditor data={result.minutes_by_agenda} setData={v=>upd('minutes_by_agenda',v)} unknownSpeakers={unknownSpeakers}/>}
        {tab==='decisions'&&<TableEditor data={result.decisions} setData={v=>upd('decisions',v)} cols={[{key:'content',label:'決定内容',w:200,tall:true},...IP,{key:'decided_by',label:'決定者',w:80},{key:'scope',label:'影響範囲',w:100}]}/>}
        {tab==='todos'&&<TableEditor data={result.todos} setData={v=>upd('todos',v)} cols={[{key:'content',label:'アクション内容',w:200,tall:true},...IP,{key:'assignee',label:'担当者',w:80},{key:'due',label:'期日',w:90}]}/>}
        {tab==='risks'&&<TableEditor data={result.risks} setData={v=>upd('risks',v)} cols={[{key:'content',label:'リスク内容',w:200,tall:true},...IP,{key:'impact',label:'影響度',w:70},{key:'owner',label:'担当者',w:80},{key:'response',label:'対応方針',w:150,tall:true}]}/>}
        {tab==='issues'&&<TableEditor data={result.issues} setData={v=>upd('issues',v)} cols={[{key:'content',label:'課題内容',w:200,tall:true},...IP,{key:'owner',label:'担当者',w:80},{key:'due',label:'期日',w:90},{key:'resolution',label:'解決策',w:150,tall:true}]}/>}
        {tab==='exec'&&<TableEditor data={result.exec_report} setData={v=>upd('exec_report',v)} cols={[{key:'content',label:'報告内容',w:200,tall:true},...IP,{key:'decision_needed',label:'判断要否',type:'select',options:['','要','否'],w:70},{key:'recipient',label:'報告先',w:80},{key:'background',label:'背景',w:150,tall:true}]}/>}
        {tab==='mgr'&&<TableEditor data={result.manager_report} setData={v=>upd('manager_report',v)} cols={[{key:'content',label:'報告内容',w:200,tall:true},...IP,{key:'action_needed',label:'対応要否',type:'select',options:['','要','否'],w:70},{key:'recipient',label:'室長名',w:80},{key:'background',label:'背景',w:150,tall:true}]}/>}
        {tab==='pending'&&<TableEditor data={result.pending} setData={v=>upd('pending',v)} cols={[{key:'content',label:'保留内容',w:200,tall:true},{key:'reason',label:'理由',w:150},{key:'next_action',label:'次回の扱い',w:120}]}/>}
        {tab==='invest'&&<TableEditor data={result.investment_contracts||[]} setData={v=>upd('investment_contracts',v)} cols={[{key:'content',label:'案件内容',w:220,tall:true},{key:'type',label:'種別',w:90},{key:'vendor',label:'ベンダー',w:100},{key:'period',label:'実施期間',w:100},{key:'status',label:'ステータス',w:90}]}/>}
      </div>
      <div className="btn-row">
        <button className="btn btn-gray" onClick={handleBack}>← 戻る</button>
        <button className="btn btn-blue" onClick={handleReanalyze} title="文字起こしデータをもとに再度AI解析を実行します">🔄 AI再解析</button>
        <button className="btn btn-primary" onClick={onNext}>ダウンロードへ →</button>
      </div>
    </div>
  );
}

// ── Step 5 ─────────────────────────────────────────────────
function Step5({basicInfo,result,docxTemplateFile,xlsxTemplateFile,xlsxDataFile,onBack,docVersion,setDocVersion,onGlossaryChange}){
  const [downloading,setDownloading]=useState('');

  // ── 辞書パネル state ──
  const parseGlossary = (raw) =>
    (raw||'').split('\n').map(l=>l.trim()).filter(Boolean);
  const [glossaryLines, setGlossaryLines] = useState(()=>parseGlossary(basicInfo.glossary));
  const [editIdx, setEditIdx] = useState(null);
  const [editVal, setEditVal] = useState('');
  const [addVal, setAddVal] = useState('');

  const saveGlossary = (lines) => {
    setGlossaryLines(lines);
    if(onGlossaryChange) onGlossaryChange(lines.join('\n'));
  };
  const startEdit = (i) => { setEditIdx(i); setEditVal(glossaryLines[i]); };
  const commitEdit = () => {
    if(editIdx===null) return;
    const v = editVal.trim();
    const next = glossaryLines.map((l,i)=>i===editIdx?(v||l):l).filter(Boolean);
    saveGlossary(next); setEditIdx(null); setEditVal('');
  };
  const delLine = (i) => saveGlossary(glossaryLines.filter((_,idx)=>idx!==i));
  const addLine = () => {
    const v = addVal.trim();
    if(!v) return;
    saveGlossary([...glossaryLines, v]);
    setAddVal('');
  };

  // ── ダウンロード前エラーチェック ──────────────────────────
  const getErrors = () => {
    const errs = [];
    if (!basicInfo.meetingName) errs.push('会議名が未入力です（Step 1）');
    if (!basicInfo.date)        errs.push('開催日が未入力です（Step 1）');
    if (!result)                errs.push('AI解析が完了していません（Step 3）');
    return errs;
  };
  const validationErrors = getErrors();

  const dlWord=async()=>{
    if(validationErrors.length) return;
    setDownloading('word');
    try{const blob=await generateDocx(basicInfo,result,docxTemplateFile);downloadBlob(blob,makeDocxFilename(basicInfo.meetingName,basicInfo.date));}
    catch(e){alert('Word生成エラー: '+e.message);}
    setDownloading('');
  };
  const dlExcel=async()=>{
    if(validationErrors.length) return;
    setDownloading('excel');
    try{
      const blob=await generateXlsx(basicInfo,result,xlsxTemplateFile,xlsxDataFile);
      downloadBlob(blob,makeXlsxFilename(basicInfo.meetingName,basicInfo.date));
    }catch(e){alert('Excel生成エラー: '+e.message); console.error(e);}
    setDownloading('');
  };
  const dlBoth=async()=>{await dlWord();await dlExcel();};
  const stats=[
    ['決定事項',(result.decisions && result.decisions.length)||0,'#2E75B6'],
    ['ToDo',(result.todos && result.todos.length)||0,'#1F7A4D'],
    ['リスク',(result.risks && result.risks.length)||0,'#843C0C'],
    ['課題',(result.issues && result.issues.length)||0,'#7030A0'],
    ['役員報告',(result.exec_report && result.exec_report.length)||0,'#C55A11'],
    ['室長報告',(result.manager_report && result.manager_report.length)||0,'#375623'],
  ];

  // 辞書エントリを矢印で分割して色付け表示
  const renderEntry = (line) => {
    const idx = line.indexOf('→');
    if(idx === -1) return <span style={{fontSize:12,fontFamily:'monospace'}}>{line}</span>;
    const before = line.slice(0, idx).trim();
    const after  = line.slice(idx+1).trim();
    return (
      <span style={{fontSize:12,fontFamily:'monospace'}}>
        <span style={{color:'#c53030',fontWeight:600}}>{before}</span>
        <span style={{color:'#718096',margin:'0 5px'}}>→</span>
        <span style={{color:'#276749',fontWeight:600}}>{after}</span>
      </span>
    );
  };

  return(
    <div className="card">
      <div className="card-title">⬇️ Step 5 ― ダウンロード</div>
      {validationErrors.length > 0 ? (
        <div className="notice notice-warn" style={{marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>⚠️ ダウンロード前に以下を確認してください</div>
          {validationErrors.map((e,i)=>(<div key={i} style={{fontSize:12,lineHeight:1.8}}>・{e}</div>))}
        </div>
      ) : (
        <div className="notice notice-ok" style={{marginBottom:16}}>✅ 解析完了！ファイルはダウンロードフォルダに保存されます（既存ファイルは上書きされません）。</div>
      )}

      {/* 抽出サマリー */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:20}}>
        {stats.map(([label,count,color])=>(
          <div key={label} style={{textAlign:'center',background:'#f8fafc',borderRadius:8,padding:'10px 4px',border:`2px solid ${color}22`}}>
            <div style={{fontSize:22,fontWeight:700,color}}>{count}</div>
            <div style={{fontSize:11,color:'#666'}}>{label}</div>
          </div>
        ))}
      </div>

      {/* ── 補正辞書パネル ── */}
      <div style={{
        background:'linear-gradient(135deg,#f0fff4 0%,#f7fff7 100%)',
        border:'1.5px solid #9AE6B4',borderRadius:10,padding:'14px 16px',marginBottom:20
      }}>
        {/* ヘッダー */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:6}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:15}}>🔤</span>
            <span style={{fontSize:13,fontWeight:700,color:'#276749'}}>今回の解析に使用した補正辞書</span>
            <span style={{
              background: glossaryLines.length > 0 ? '#276749' : '#a0aec0',
              color:'#fff',borderRadius:12,padding:'1px 9px',
              fontSize:11,fontWeight:700,minWidth:22,textAlign:'center'
            }}>{glossaryLines.length}</span>
          </div>
          {glossaryLines.length > 0 && (
            <span style={{fontSize:10,color:'#68a68a'}}>
              ※ 修正した内容は次回の解析（Step1の辞書欄）にも反映されます
            </span>
          )}
        </div>

        {/* 辞書エントリ一覧 */}
        {glossaryLines.length === 0 ? (
          <div style={{textAlign:'center',padding:'12px 0',color:'#a0aec0',fontSize:12}}>
            補正辞書は使用されていません
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:10}}>
            {glossaryLines.map((line, i) => (
              <div key={i} style={{
                display:'flex',alignItems:'center',gap:8,
                background:'#fff',borderRadius:6,padding:'6px 10px',
                border:'1px solid '+(editIdx===i?'#2E75B6':'#C6F6D5'),
                transition:'.15s'
              }}>
                {editIdx === i ? (
                  <>
                    <input value={editVal} onChange={e=>setEditVal(e.target.value)}
                      onKeyDown={e=>{if(e.key==='Enter')commitEdit();if(e.key==='Escape'){setEditIdx(null);}}}
                      autoFocus
                      style={{flex:1,padding:'3px 8px',fontSize:12,fontFamily:'monospace',
                        border:'1.5px solid #2E75B6',borderRadius:4,outline:'none'}}/>
                    <button onClick={commitEdit}
                      style={{background:'#2E75B6',color:'#fff',border:'none',borderRadius:4,
                        padding:'4px 10px',cursor:'pointer',fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>
                      保存
                    </button>
                    <button onClick={()=>setEditIdx(null)}
                      style={{background:'none',border:'1px solid #d0d8e4',borderRadius:4,
                        padding:'4px 8px',cursor:'pointer',fontSize:11,color:'#888'}}>
                      ✕
                    </button>
                  </>
                ) : (
                  <>
                    <span style={{flex:1,lineHeight:1.5}}>{renderEntry(line)}</span>
                    <button onClick={()=>startEdit(i)}
                      title="編集"
                      style={{background:'none',border:'1px solid #d0d8e4',borderRadius:4,
                        padding:'3px 8px',cursor:'pointer',fontSize:11,color:'#555',
                        flexShrink:0,transition:'.12s'}}
                      onMouseOver={e=>e.currentTarget.style.borderColor='#2E75B6'}
                      onMouseOut={e=>e.currentTarget.style.borderColor='#d0d8e4'}>
                      ✏️
                    </button>
                    <button onClick={()=>delLine(i)}
                      title="削除"
                      style={{background:'none',border:'1px solid #fed7d7',borderRadius:4,
                        padding:'3px 8px',cursor:'pointer',fontSize:11,color:'#c53030',
                        flexShrink:0,transition:'.12s'}}
                      onMouseOver={e=>e.currentTarget.style.background='#fff5f5'}
                      onMouseOut={e=>e.currentTarget.style.background='none'}>
                      🗑
                    </button>
                  </>
                )}
              </div>
            ))}
          </div>
        )}

        {/* 追加フォーム */}
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <input value={addVal} onChange={e=>setAddVal(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addLine()}
            placeholder="例：ガラス → Aras（PLMパッケージ）"
            style={{flex:1,padding:'6px 10px',fontSize:12,fontFamily:'monospace',
              border:'1.5px dashed #9AE6B4',borderRadius:6,outline:'none',background:'#fff',
              color:'#333'}}/>
          <button onClick={addLine} disabled={!addVal.trim()}
            style={{background: addVal.trim()?'#1F7A4D':'#a0aec0',color:'#fff',border:'none',
              borderRadius:6,padding:'6px 14px',cursor:addVal.trim()?'pointer':'not-allowed',
              fontSize:12,fontWeight:700,whiteSpace:'nowrap',transition:'.15s'}}>
            ＋ 追加
          </button>
        </div>
        <div style={{fontSize:10,color:'#68a68a',marginTop:5}}>
          「誤記 → 正しい表記（補足）」形式で入力 ／ Enter で追加
        </div>
      </div>

      {/* ダウンロードカード */}
      <div className="dl-card">
        <div className="dl-info">
          <div className="dl-name">📄 議事録 .docx</div>
          <div className="dl-desc">{docxTemplateFile?`テンプレート「${docxTemplateFile.name}」の形式で出力。`:'デフォルト形式で出力。'}Meiryo UI / Calibri フォント。室長・役員報告は改ページ分離。</div>
        </div>
        <button className="btn btn-blue" onClick={dlWord} disabled={!!downloading||validationErrors.length>0}>{downloading==='word'?'生成中...':'⬇️ Word'}</button>
      </div>
      <div className="dl-card">
        <div className="dl-info">
          <div className="dl-name">📊 管理台帳 .xlsx</div>
          <div className="dl-desc">{xlsxDataFile?'既存台帳に追記します。':xlsxTemplateFile?'テンプレートに転記します。':'新規作成します。'}To-Doシート対応。</div>
        </div>
        <button className="btn btn-green" onClick={dlExcel} disabled={!!downloading||validationErrors.length>0}>{downloading==='excel'?'生成中...':'⬇️ Excel'}</button>
      </div>
      <div style={{marginTop:12}}>
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={dlBoth} disabled={!!downloading||validationErrors.length>0}>
          {downloading?'生成中...':'⬇️ Word + Excel を両方ダウンロード'}
        </button>
      </div>
      <div className="btn-row" style={{marginTop:20}}>
        <button className="btn btn-gray" onClick={onBack}>← 編集に戻る</button>
      </div>
    </div>
  );
}

// ── 会議中モード（LiveMeetingMode） ───────────────────────────
// ── 分析エントリ（折りたたみ対応） ──────────────────────────

function HeaderMenu({ apiKey, onOpenKey, onOpenPerson, onOpenDomain }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const handler = (e) => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  const click = (fn) => { fn(); setOpen(false); };
  return (
    <div className="header-gear-wrap" ref={ref} style={{flex:'0 0 auto'}}>
      <button className="header-gear-btn" onClick={()=>setOpen(o=>!o)}>
        <span style={{fontSize:14}}>⚙️</span>
        <span style={{fontSize:12}}>設定</span>
        <span style={{fontSize:9,opacity:.7}}>{open?'▲':'▼'}</span>
      </button>
      {open && (
        <div className="header-gear-menu">
          <div className="header-gear-label">API</div>
          <button className="header-gear-item" onClick={()=>click(onOpenKey)}>
            <span style={{fontSize:14}}>{apiKey?'🔑':'🔓'}</span>
            <span>{apiKey ? 'APIキー設定済み' : 'APIキーを設定'}</span>
            {apiKey && <span style={{marginLeft:'auto',fontSize:9,color:'#38A169',fontWeight:700}}>✓</span>}
          </button>
          <div className="header-gear-sep"/>
          <div className="header-gear-label">マスター管理</div>
          <button className="header-gear-item" onClick={()=>click(onOpenPerson)}>
            <span style={{fontSize:14}}>👥</span><span>ICS出席者マスター</span>
          </button>
          <button className="header-gear-item" onClick={()=>click(onOpenDomain)}>
            <span style={{fontSize:14}}>🌐</span><span>ドメイン設定</span>
          </button>
        </div>
      )}
    </div>
  );
}

function App(){
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('claude_api_key')||'');
  const [adminKey,setAdminKey]=useState(()=>localStorage.getItem('claude_admin_api_key')||'');
  const [showKeyModal,setShowKeyModal]=useState(false);
  const [showPersonMaster,setShowPersonMaster]=useState(false);
  const [showDomainMaster,setShowDomainMaster]=useState(false);
  const [step,setStep]=useState(1);
  const [maxReached,setMaxReached]=useState(1);
  const [basicInfo,setBasicInfo]=useState({meetingName:'',meetingNo:'',date:'',startTime:'',endTime:'',location:'',author:'',recorder:'',reviewer:'',approver:'',agenda:'',meetingType:'',meetingGoal:'',facilitator:'',executiveNames:'',vendorNames:'',nextMeetingDate:'',glossary:'',speakerMap:[],entryMode:'manual',attendees:[],materials:[{name:'',url:''}]});
  const [transcript,setTranscript]=useState('');
  const [prevMinutesFile,setPrevMinutesFile]=useState(null);
  const [prevMinutesText,setPrevMinutesText]=useState('');
  const [docxTemplateFile,setDocxTemplateFile]=useState(null);
  const [xlsxTemplateFile,setXlsxTemplateFile]=useState(null);
  const [xlsxDataFile,setXlsxDataFile]=useState(null);
  const [result,setResult]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const abortControllerRef = React.useRef(null);

  const handleAbort = () => {
    if (abortControllerRef.current) {
      abortControllerRef.current.abort();
      abortControllerRef.current = null;
    }
    setAnalyzing(false);
    addLog('⛔ 解析を中断しました');
  };
  const abortRef = useRef(null); // 解析中断用AbortController
  const [logs,setLogs]=useState([]);
  const [error,setError]=useState('');
  const [docVersion,setDocVersion]=useState(1);
  const [lastCost,setLastCost]=useState(null); // {usd, usage} 最後のAPI料金

  // 会議中ツールからの引き渡しチェック
  const [liveHandoff]=useState(()=>{
    const t=localStorage.getItem('pmo_live_transcript');
    const ts=localStorage.getItem('pmo_live_timestamp');
    if(t&&ts){
      localStorage.removeItem('pmo_live_transcript');
      localStorage.removeItem('pmo_live_timestamp');
      return {transcript:t,timestamp:ts};
    }
    return null;
  });

  useEffect(()=>{
    if(liveHandoff){
      setTranscript(liveHandoff.transcript);
      setStep(2);setMaxReached(2);
    }
    const params=new URLSearchParams(window.location.search);
    if(params.get('from')==='live'){
      window.history.replaceState({},'',window.location.pathname);
    }
  },[]);

  const goTo=(n)=>{
    if(analyzing){return;} // 解析中はステップ移動を禁止
    setStep(n);setMaxReached(m=>Math.max(m,n));if(n===3)setError('');
  };

  // 新規作成：入力をすべてクリアしてStep1に戻る
  const handleNewMeeting = () => {
    if(analyzing) return; // グレーアウト中は無効（ボタン側でも制御）
    if(!window.confirm('現在の入力内容をすべてクリアして、新しい議事録の作成を始めますか？\n（マスターデータは保持されます）')) return;
    if(abortControllerRef.current){ abortControllerRef.current.abort(); abortControllerRef.current=null; }
    setBasicInfo({meetingName:'',meetingNo:'',date:'',startTime:'',endTime:'',location:'',author:'',recorder:'',reviewer:'',approver:'',agenda:'',meetingType:'',meetingGoal:'',facilitator:'',executiveNames:'',vendorNames:'',nextMeetingDate:'',glossary:'',speakerMap:[],entryMode:'manual',attendees:[],materials:[{name:'',url:''}],_clearKey:1});
    setTranscript('');
    setDocxTemplateFile(null);
    setXlsxTemplateFile(null);
    setXlsxDataFile(null);
    setResult(null);
    setLogs([]);
    setError('');
    setAnalyzing(false);
    setStep(1);
    setMaxReached(1);
    setDocVersion(1);
  };
  const saveApiKey=(key,admin)=>{
    setApiKey(key);localStorage.setItem('claude_api_key',key);
    if(admin!==undefined){setAdminKey(admin);localStorage.setItem('claude_admin_api_key',admin);}
    setShowKeyModal(false);
  };
  const addLog=(msg)=>setLogs(p=>[...p,msg]);

  const handleAnalyze=async()=>{
    setAnalyzing(true);setLogs([]);setError('');
    if(!apiKey){setShowKeyModal(true);setAnalyzing(false);return;}
    // 必須項目チェック
    const missing=[];
    if(!basicInfo.meetingName) missing.push('会議名（Step 1）');
    if(!basicInfo.date)        missing.push('日付（Step 1）');
    if(!basicInfo.startTime)   missing.push('開始時刻（Step 1）');
    if(!transcript)            missing.push('文字起こし（Step 2）');
    if(missing.length>0){
      setError('以下の必須項目が未入力です：\n・'+missing.join('\n・'));
      setAnalyzing(false);return;
    }
    const controller = new AbortController();
    abortControllerRef.current = controller;
    try{
      addLog('🔍 解析を開始します...');
      let existingData={};
      if(xlsxDataFile){
        addLog('📊 既存台帳データを読み込み中...');
        try{
          const ExcelJS=window.ExcelJS;
          const buf=await xlsxDataFile.arrayBuffer();
          const wb=new ExcelJS.Workbook();
          await wb.xlsx.load(buf);
          wb.eachSheet(ws=>{
            const rows=[];let headerRow=null,headers=[];
            const colCount=ws.columnCount||20;
            ws.eachRow({includeEmpty:false},(row,rowNum)=>{
              const toStr=(v)=>{
                if(v===null||v===undefined)return'';
                if(typeof v==='object'){
                  if(v.richText)return v.richText.map(r=>r.text||'').join('');
                  if(v.result!==undefined)return String(v.result||'');
                  if(v.formula)return'';
                  if(v.text)return v.text;
                  if(v.value!==undefined)return String(v.value);
                  if(v.error!==undefined)return'';
                  return'';
                }
                if(typeof v==='number'&&v>40000&&v<60000){const dt=new Date(Math.round((v-25569)*86400*1000));return dt.getUTCFullYear()+'/'+String(dt.getUTCMonth()+1).padStart(2,'0')+'/'+String(dt.getUTCDate()).padStart(2,'0');}
                return String(v);
              };
              const getV=(ci)=>{const c=row.getCell(ci);return c?c.value:null;};
              if(!headerRow){
                const vals=Array.from({length:colCount},(_,i)=>toStr(getV(i+1)));
                if(vals.some(v=>v.includes('No.'))){headerRow=rowNum;headers=vals.map(v=>v.replace(/\n/g,''));}
              }else{
                const rowObj={};
                headers.forEach((h,i)=>{rowObj[h]=toStr(getV(i+1));});
                const noVal=rowObj['No.']||rowObj['No'];
                if(noVal&&noVal!=='例'&&rowObj['行種別']!=='progress')rows.push(rowObj);
              }
            });
            if(rows.length>0)existingData[ws.name]=rows;
          });
          addLog('📋 既存データ読み込み完了（'+Object.keys(existingData).join('、')+'）');
        }catch(e){addLog('⚠️ 既存ファイル読み込みエラー（無視して続行）');}
      }
      const r=await callClaude(apiKey,basicInfo,transcript,addLog,existingData,controller.signal,prevMinutesText);
      if(r._cost!==undefined){addLog('💰 APIコスト（2Pass合計）: '+formatCost(r._cost)+'（'+formatTokens(r._usage)+'）');setLastCost({usd:r._cost,usage:r._usage});}
      addLog('🎉 完了！結果を確認してください。');
      setResult({...EMPTY,...r,_existingData:existingData});
      goTo(4);
    }catch(e){
      if(e.name==='AbortError'||e.message?.includes('abort')){
        // 中断は正常終了扱い（エラー表示しない）
      } else if(
        e.message==='Failed to fetch' ||
        e.message==='Load failed' ||
        e.message?.includes('Failed to fetch') ||
        e.message?.includes('Load failed') ||
        e.message?.includes('Network request failed')
      ){
        setError('通信エラー（' + e.message + '）\n\n考えられる原因：\n① 配布資料のファイルサイズが大きすぎます\n　→ 配布資料の添付を外して再試行してください\n　→ PDFを軽量化（圧縮）してから再添付してください\n② モバイル回線（4G等）では大容量ファイルが送れない場合があります\n　→ Wi-Fi接続に切り替えて再試行してください\n③ ネットワーク接続が不安定です\n　→ しばらく待ってから「再試行」してください');
      } else if(e.message?.includes('API Error 529')||e.message?.includes('API Error 503')){
        setError('APIが混雑しています（' + e.message + '）\nしばらく待ってから「再試行」してください');
      } else {
        setError(e.message);
      }
    }
    abortControllerRef.current = null;
    setAnalyzing(false);
  };

  return(
    <div className="app-wrap">
      <div className="app-header">
        <div style={{display:'flex',alignItems:'center',gap:12,flex:'0 0 auto'}}>
          <div style={{width:36,height:36,borderRadius:8,background:'rgba(255,255,255,.12)',
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>📋</div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:'#fff',letterSpacing:.3}}>議事録・管理台帳 自動生成</div>
            <div style={{fontSize:9,color:'#7099B0',marginTop:1}}>自動生成ツール　<span style={{color:'#8FA8C0',fontWeight:700,letterSpacing:.5}}>v96</span></div>
          </div>
        </div>
        <div style={{flex:1,display:'flex',justifyContent:'center',alignItems:'center',padding:'0 16px'}}>
          <a href="./live/" style={{background:'rgba(229,62,62,.2)',border:'1px solid rgba(229,62,62,.35)',
            color:'rgba(255,255,255,.85)',borderRadius:8,padding:'7px 16px',fontSize:11,
            textDecoration:'none',fontFamily:'Meiryo UI,Meiryo,sans-serif',fontWeight:600,
            display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap'}}>
            🔴 会議中支援ツールへ
          </a>
        </div>
        {analyzing ? (
          <button onClick={handleAbort}
            style={{background:'rgba(229,62,62,.25)',border:'1px solid rgba(229,62,62,.5)',
              color:'rgba(255,200,200,.95)',borderRadius:8,padding:'7px 14px',fontSize:12,
              cursor:'pointer',fontFamily:'Meiryo UI,Meiryo,sans-serif',fontWeight:700,
              display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap',flexShrink:0,
              animation:'pulse 1.5s infinite'}}>
            ⛔ 解析を中断
          </button>
        ) : (
          <button onClick={handleNewMeeting}
            disabled={analyzing}
            style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.25)',
              color:'rgba(255,255,255,.9)',borderRadius:8,padding:'7px 14px',fontSize:12,
              cursor:'pointer',fontFamily:'Meiryo UI,Meiryo,sans-serif',fontWeight:600,
              display:'flex',alignItems:'center',gap:6,whiteSpace:'nowrap',flexShrink:0}}>
            📄 新規作成
          </button>
        )}
        <HeaderMenu apiKey={apiKey} onOpenKey={()=>setShowKeyModal(true)}
          onOpenPerson={()=>setShowPersonMaster(true)} onOpenDomain={()=>setShowDomainMaster(true)}/>
      </div>

      <StepIndicator step={step} setStep={analyzing ? ()=>{} : setStep} maxReached={maxReached} hasResult={!!result}
        validation={buildValidation(basicInfo,transcript,result)} analyzing={analyzing}/>

      {/* APIコスト表示バー */}
      {lastCost && lastCost.usd !== null && (
        <div style={{background:'rgba(30,40,60,.85)',color:'rgba(255,255,255,.75)',
          fontSize:11,padding:'4px 16px',borderRadius:6,marginBottom:8,
          display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          <span>💰 前回のAPIコスト：</span>
          <span style={{color:'#68D391',fontWeight:700}}>{formatCost(lastCost.usd)}</span>
          {lastCost.usage && (
            <span style={{color:'rgba(255,255,255,.45)',fontSize:10}}>
              （{formatTokens(lastCost.usage)}）
            </span>
          )}
        </div>
      )}
      {step===1&&<Step1 data={basicInfo} setData={setBasicInfo} onNext={()=>goTo(2)}
        apiKey={apiKey}
        transcript={transcript}
        onOpenPersonMaster={(type)=>{if(type==='domain')setShowDomainMaster(true);else setShowPersonMaster(true);}}/>}
      {step===2&&<Step2 transcript={transcript} setTranscript={setTranscript}
        prevMinutesFile={prevMinutesFile} setPrevMinutesFile={setPrevMinutesFile}
        prevMinutesText={prevMinutesText} setPrevMinutesText={setPrevMinutesText}
        docxTemplateFile={docxTemplateFile} setDocxTemplateFile={setDocxTemplateFile}
        xlsxTemplateFile={xlsxTemplateFile} setXlsxTemplateFile={setXlsxTemplateFile}
        xlsxDataFile={xlsxDataFile} setXlsxDataFile={setXlsxDataFile}
        liveHandoff={liveHandoff}
        attendees={basicInfo.attendees||[]}
        onNext={()=>goTo(3)} onBack={()=>goTo(1)}/>}
      {step===3&&<Step3 onAnalyze={handleAnalyze} onBack={()=>goTo(2)} analyzing={analyzing} logs={logs} error={error}
        validation={buildValidation(basicInfo,transcript,result)}/>}
      {step===4&&(result
        ?<Step4 result={result} setResult={setResult} onNext={()=>goTo(5)} onBack={()=>goTo(3)} onReanalyze={()=>{goTo(3);handleAnalyze();}}
          transcript={transcript} attendees={basicInfo.attendees||[]}/>
        :<div className="card"><div className="notice notice-warn" style={{marginBottom:12}}>⚠️ まだAI解析が完了していません。Step 3でAI解析を実行してください。</div><div className="btn-row"><button className="btn btn-gray" onClick={()=>goTo(3)}>← Step3 AI解析へ</button></div></div>)}
      {step===5&&(result
        ?<Step5 basicInfo={basicInfo} result={result} docxTemplateFile={docxTemplateFile}
          xlsxTemplateFile={xlsxTemplateFile} xlsxDataFile={xlsxDataFile}
          onBack={()=>goTo(4)} docVersion={docVersion} setDocVersion={setDocVersion}
          onGlossaryChange={v=>setBasicInfo(p=>({...p,glossary:v}))}/>
        :<div className="card"><div className="notice notice-warn" style={{marginBottom:12}}>⚠️ まだAI解析が完了していません。Step 3でAI解析を実行してください。</div><div className="btn-row"><button className="btn btn-gray" onClick={()=>goTo(3)}>← Step3 AI解析へ</button></div></div>)}

      {showKeyModal&&<ApiKeyModal current={apiKey} onSave={(k)=>saveApiKey(k,adminKey)} onClose={()=>setShowKeyModal(false)} currentAdmin={adminKey} onSaveAdmin={(a)=>saveApiKey(apiKey,a)}/>}
      {showPersonMaster&&<PersonMasterModal onClose={()=>setShowPersonMaster(false)}/>}
      {showDomainMaster&&<DomainMasterModal onClose={()=>setShowDomainMaster(false)} icsRaws={basicInfo._icsRaws||[]}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
</head>
<body>
<div id="root"></div>
</body>
</html>
