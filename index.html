<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>議事録・管理台帳 自動生成ツール</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo UI','Meiryo',sans-serif;background:#F0F4F8;color:#1a202c;min-height:100vh}
.app-wrap{max-width:960px;margin:0 auto;padding:16px}
.app-header{background:linear-gradient(135deg,#1F3864 0%,#1a4a7a 100%);color:#fff;padding:0 24px;border-radius:10px;margin-bottom:20px;display:flex;align-items:stretch;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.18);min-height:52px}
.app-title{font-size:15px;font-weight:700;letter-spacing:.3px;line-height:1.2}
.app-sub{font-size:10px;color:#a0b4cc;margin-top:2px}
.btn-key{background:#2E75B6;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Meiryo UI','Meiryo',sans-serif;white-space:nowrap}
.btn-key:hover{background:#1a5c9e}
/* ── ヘッダー内サブボタン（半透明ゴースト） ── */
.btn-header-sub{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.28);border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Meiryo UI','Meiryo',sans-serif;transition:.15s}
.btn-header-sub:hover{background:rgba(255,255,255,0.22);border-color:rgba(255,255,255,0.45)}
/* ── フォーム内サブアクションボタン（アウトライン） ── */
.btn-form-sub{background:#fff;color:#2E75B6;border:1.5px solid #2E75B6;border-radius:5px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Meiryo UI','Meiryo',sans-serif;transition:.15s;display:inline-flex;align-items:center;gap:3px}
.btn-form-sub:hover{background:#EBF3FB}
.steps{display:flex;margin-bottom:20px;background:#fff;border-radius:10px;padding:12px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.step-item{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer}
.step-item:not(:last-child)::after{content:'';position:absolute;top:18px;left:60%;width:80%;height:2px;background:#d0d8e4}
.step-item.done:not(:last-child)::after{background:#2E75B6}
.step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:2px solid #d0d8e4;background:#fff;color:#999;position:relative;z-index:1;transition:.2s}
.step-item.active .step-circle{border-color:#2E75B6;background:#2E75B6;color:#fff}
.step-item.done .step-circle{border-color:#1F7A4D;background:#1F7A4D;color:#fff}
.step-label{font-size:10px;color:#666;margin-top:4px;text-align:center;line-height:1.3}
.step-item.active .step-label{color:#2E75B6;font-weight:600}

/* ── AI解析ステップ（独立アクションノード）──────────────── */
.step-item.ai-action{flex:0.7}
.step-item.ai-action .step-circle{
  width:36px;height:36px;border-radius:6px;
  transform:rotate(45deg);
  border-color:#38A169;color:#38A169;background:#F0FFF4;
  font-size:10px;font-weight:900;
}
.step-item.ai-action .step-circle .ai-inner{
  display:flex;align-items:center;justify-content:center;
  transform:rotate(-45deg);font-size:15px;line-height:1;
}
.step-item.ai-action.active .step-circle{
  background:linear-gradient(135deg,#38A169,#276749);
  border-color:#276749;color:#fff;
  box-shadow:0 0 0 4px rgba(56,161,105,.18);
  animation:ai-node-pulse 2s ease-in-out infinite;
}
.step-item.ai-action.done .step-circle{
  background:#1F7A4D;border-color:#1F7A4D;color:#fff;
}
.step-item.ai-action .step-label{color:#38A169;font-weight:600;font-size:10px}
.step-item.ai-action.active .step-label{color:#276749;font-weight:700}
@keyframes ai-node-pulse{
  0%,100%{box-shadow:0 0 0 4px rgba(56,161,105,.18)}
  50%{box-shadow:0 0 0 8px rgba(56,161,105,.07)}
}
/* AI前後のコネクター（緑・破線） */
.step-item.ai-action:not(:last-child)::after{background:none;border-top:2px dashed #38A169;height:0;top:18px}
.step-item.ai-action.done:not(:last-child)::after{border-top-color:#1F7A4D;border-style:solid}
/* step2のコネクターもグリーン系に（AIノードへ向かう） */
.step-item.ai-pre:not(:last-child)::after{background:none;border-top:2px dashed #a0d4b5;height:0;top:18px}
.step-item.ai-pre.done:not(:last-child)::after{border-top-color:#38A169;border-style:solid}
.card{background:#fff;border-radius:10px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.card-title{font-size:16px;font-weight:700;color:#1F3864;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #EBF3FB}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-1{margin-bottom:12px}
label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:4px}
input,textarea,select{width:100%;padding:9px 12px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:13px;font-family:'Meiryo UI','Meiryo',sans-serif;outline:none;transition:.15s;background:#fafbfc}
input:focus,textarea:focus,select:focus{border-color:#2E75B6;background:#fff}
textarea{resize:vertical;min-height:70px}
.req{color:#e53e3e;margin-left:2px}
.btn{padding:10px 24px;border-radius:7px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;font-family:'Meiryo UI',sans-serif}
.btn-primary{background:#1F3864;color:#fff}.btn-primary:hover{background:#16295a}
.btn-green{background:#1F7A4D;color:#fff}.btn-green:hover{background:#175e3b}
.btn-blue{background:#2E75B6;color:#fff}.btn-blue:hover{background:#1d5fa0}
.btn-gray{background:#e2e8f0;color:#444}.btn-gray:hover{background:#cbd5e0}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.upload-area{border:2px dashed #a0aec0;border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:.15s;background:#fafbfc}
.upload-area:hover,.upload-area.drag{border-color:#2E75B6;background:#EBF3FB}
.upload-area input{display:none}
.upload-icon{font-size:28px;margin-bottom:6px}
.upload-hint{font-size:12px;color:#718096;margin-top:4px}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:#EBF3FB;border:1px solid #bee3f8;padding:5px 12px;border-radius:20px;font-size:12px;color:#2c5282;margin-top:8px}
.file-chip button{background:none;border:none;cursor:pointer;color:#e53e3e;font-size:14px;line-height:1}
.analyzing-wrap{text-align:center;padding:40px}
.spinner{width:48px;height:48px;border:4px solid #EBF3FB;border-top-color:#2E75B6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-log{background:#1a202c;color:#68d391;padding:16px;border-radius:8px;font-size:12px;font-family:monospace;max-height:160px;overflow-y:auto;margin-top:16px;text-align:left}
.tabs{display:flex;gap:4px;margin-bottom:0;flex-wrap:wrap}
.tab{padding:7px 12px;border-radius:6px 6px 0 0;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #d0d8e4;border-bottom:none;background:#f0f4f8;color:#555}
.tab.active{background:#fff;color:#1F3864;border-color:#2E75B6;border-bottom-color:#fff}
.tab-content{background:#fff;border:1.5px solid #2E75B6;border-radius:0 8px 8px 8px;padding:16px}
.preview-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
.preview-table th{background:#1F3864;color:#fff;padding:8px 10px;text-align:left;font-size:12px}
.preview-table td{padding:8px 10px;border-bottom:1px solid #eee;vertical-align:top}
.preview-table tr:nth-child(even) td{background:#f8fafc}
.preview-table td textarea{border:none;background:transparent;padding:0;resize:none;width:100%;font-size:13px;font-family:'Meiryo UI',sans-serif;min-height:36px}
.preview-table td textarea:focus{outline:1px solid #2E75B6;background:#fff;border-radius:3px;padding:3px}
.preview-table td select{border:none;background:transparent;padding:0;font-size:13px;font-family:'Meiryo UI',sans-serif}
.preview-table td select:focus{outline:1px solid #2E75B6;background:#fff;border-radius:3px}
.dl-card{border:1.5px solid #d0d8e4;border-radius:8px;padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dl-info .dl-name{font-weight:700;color:#1F3864;font-size:14px}
.dl-info .dl-desc{font-size:12px;color:#718096;margin-top:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:28px;width:90%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:700;color:#1F3864;margin-bottom:16px}
.notice{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:12px}
.notice-info{background:#EBF3FB;color:#1a4a7a;border-left:3px solid #2E75B6}
.notice-warn{background:#FFF3CD;color:#7D4E00;border-left:3px solid #E6A817}
.notice-ok{background:#E8F5E9;color:#1B5E20;border-left:3px solid #4CAF50}
.section-divider{font-size:12px;font-weight:700;color:#2E75B6;padding:10px 0 6px;border-bottom:1px solid #EBF3FB;margin-bottom:10px}
@media(max-width:600px){
  .form-row,.form-row-3{grid-template-columns:1fr}
  .steps{padding:8px}.step-label{display:none}
  .card{padding:16px}.btn{padding:9px 16px;font-size:13px}
}

/* ── 出席者タグ入力UI ───────────────────────────────────── */
.attendee-block{border:1.5px solid #d0d8e4;border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#fafbfc}
.attendee-org-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.attendee-org-label{font-size:12px;font-weight:700;color:#1F3864;min-width:60px;white-space:nowrap}
.attendee-org-input{flex:1;padding:5px 8px;border:1px solid #d0d8e4;border-radius:5px;font-size:12px;font-family:inherit;outline:none}
.attendee-org-input:focus{border-color:#2E75B6;background:#fff}
.attendee-del-btn{background:none;border:none;color:#e53e3e;cursor:pointer;font-size:16px;line-height:1;padding:2px 4px}
.tag-area{display:flex;flex-wrap:wrap;gap:6px;min-height:28px}
.tag{display:inline-flex;align-items:center;gap:4px;background:#EBF3FB;border:1px solid #bee3f8;padding:3px 8px;border-radius:14px;font-size:12px;color:#1a4a7a;cursor:default}
.tag-del{background:none;border:none;color:#888;cursor:pointer;font-size:13px;line-height:1;padding:0 2px}
.tag-del:hover{color:#e53e3e}
.name-input-wrap{position:relative;flex:1;min-width:120px}
.name-input{width:100%;padding:4px 8px;border:1px dashed #a0aec0;border-radius:14px;font-size:12px;font-family:inherit;outline:none;background:transparent}
.name-input:focus{border-color:#2E75B6;background:#fff;border-style:solid}
.suggest-list{position:absolute;top:100%;left:0;z-index:100;background:#fff;border:1.5px solid #2E75B6;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:160px;max-height:180px;overflow-y:auto;margin-top:2px}
.suggest-item{padding:7px 12px;font-size:12px;cursor:pointer;color:#333}
.suggest-item:hover{background:#EBF3FB;color:#1F3864}
.add-org-btn{background:none;border:1.5px dashed #2E75B6;color:#2E75B6;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;width:100%;margin-top:4px}
.add-org-btn:hover{background:#EBF3FB}

/* ── 出席者UI（新設計） ─────────────────────────────────── */
.att-wrap{border:1.5px solid #d0d8e4;border-radius:10px;overflow:hidden;background:#fff}
.att-tabs{display:flex;gap:0;border-bottom:1.5px solid #d0d8e4;background:#f8fafc;flex-wrap:wrap}
.att-tab{padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.att-tab.active{color:#1F3864;border-bottom-color:#2E75B6;background:#fff}
.att-tab:hover:not(.active){background:#EBF3FB;color:#1F3864}
.att-tab-add{padding:7px 10px;font-size:12px;cursor:pointer;border:none;background:none;color:#2E75B6;border-bottom:2px solid transparent}
.att-body{padding:12px 14px}
.att-tags{display:flex;flex-wrap:wrap;gap:6px;min-height:28px;margin-bottom:10px}
.att-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:600;color:#1a4a7a;background:#EBF3FB;border:1px solid #bee3f8}
.att-tag-del{background:none;border:none;cursor:pointer;color:#888;font-size:13px;line-height:1;padding:0 2px}
.att-tag-del:hover{color:#e53e3e}
.att-search-wrap{position:relative}
.att-search-row{display:flex;gap:8px;align-items:center}
.att-search-input{flex:1;padding:7px 10px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:13px;font-family:inherit;outline:none}
.att-search-input:focus{border-color:#2E75B6}
.att-suggest{position:absolute;top:100%;left:0;right:0;z-index:200;background:#fff;border:1.5px solid #2E75B6;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);margin-top:4px;max-height:200px;overflow-y:auto}
.att-suggest-item{padding:8px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.att-suggest-item:hover{background:#EBF3FB}
.att-suggest-badge{font-size:10px;padding:2px 6px;border-radius:8px;background:#EBF3FB;color:#1F3864;font-weight:700}
.att-suggest-new{padding:8px 12px;font-size:12px;color:#2E75B6;cursor:pointer;border-top:1px solid #e2e8f0;display:flex;align-items:center;gap:6px}
.att-suggest-new:hover{background:#EBF3FB}
.att-org-select{padding:7px 10px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#333;min-width:80px}
.att-org-select:focus{border-color:#2E75B6}
/* ── 配布資料リンク入力 ──────────────────────────────────── */
.material-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1.5px solid #d0d8e4;border-radius:6px;margin-bottom:6px;background:#fafbfc;transition:.15s}
.material-item:focus-within{border-color:#2E75B6;background:#fff}
.material-name{flex:1;border:none;background:transparent;font-size:13px;font-family:inherit;outline:none;min-width:0}
.material-url{flex:1;border:none;background:transparent;font-size:12px;font-family:inherit;outline:none;color:#2E75B6;min-width:0}
.material-url::placeholder{color:#a0aec0}
.material-divider{color:#d0d8e4;user-select:none}
.material-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;line-height:1;padding:0 2px;flex-shrink:0}
.material-del:hover{color:#e53e3e}
.material-add{background:none;border:1.5px dashed #2E75B6;color:#2E75B6;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;width:100%;margin-top:2px}
.material-add:hover{background:#EBF3FB}
.material-link-icon{font-size:12px;color:#a0aec0;flex-shrink:0}

/* ── 会議中モード ─────────────────────────────────────────── */
.live-mode-wrap{max-width:1400px;margin:0 auto;padding:16px}
.live-header{background:#1a202c;color:#fff;padding:12px 20px;border-radius:10px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.live-title{font-size:16px;font-weight:700;color:#fc8181;display:flex;align-items:center;gap:6px;white-space:nowrap}
.live-title.recording{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.live-settings{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.live-setting-group{display:flex;flex-direction:column;gap:4px;min-width:160px}
.live-setting-group label{font-size:11px;font-weight:600;color:#444}
.live-setting-group input{padding:6px 10px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
.live-setting-group input:focus{border-color:#2E75B6}
.live-panels{display:grid;grid-template-columns:1fr 1fr;gap:12px;height:calc(100vh - 280px);min-height:400px}
.live-panel{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
.live-panel-header{padding:10px 16px;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;flex-shrink:0}
.live-panel-body{flex:1;overflow-y:auto;padding:12px 16px;font-size:13px;line-height:1.7}
.live-transcript-line{padding:2px 0;border-bottom:1px solid #f0f4f8}
.live-transcript-time{font-size:11px;color:#a0aec0;margin-right:6px;font-family:monospace}
.live-interim{color:#a0aec0;font-style:italic;padding:4px 0}
.ai-flag{padding:8px 12px;border-radius:6px;margin-bottom:8px;font-size:12px}
.ai-flag-root{background:#FFF5F5;border-left:3px solid #E53E3E;color:#742a2a}
.ai-flag-warn{background:#FFFBEB;border-left:3px solid #D69E2E;color:#744210}
.ai-flag-risk{background:#FFF5F5;border-left:3px solid #E53E3E;color:#742a2a}
.ai-flag-issue{background:#FAF5FF;border-left:3px solid #805AD5;color:#44337a}
.ai-section{margin-bottom:14px}
.ai-section-title{font-size:11px;font-weight:700;color:#2E75B6;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid #EBF3FB;text-transform:uppercase;letter-spacing:.5px}
.ai-question{padding:6px 10px;background:#EBF3FB;border-radius:4px;margin-bottom:4px;font-size:12px;color:#1a4a7a}
.ai-contradiction{padding:6px 10px;background:#FFF3CD;border-radius:4px;margin-bottom:4px;font-size:12px;color:#7D4E00}
.ai-summary{font-size:12px;color:#333;line-height:1.7;background:#f8fafc;padding:10px;border-radius:6px}
.ai-exec{font-size:12px;font-weight:600;color:#C55A11;background:#FFF4EB;padding:10px;border-radius:6px;border-left:3px solid #C55A11}
.analyzing-badge{display:inline-flex;align-items:center;gap:4px;background:#EBF3FB;color:#2E75B6;padding:3px 8px;border-radius:10px;font-size:11px}
.live-btn{padding:7px 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;transition:.15s}
.live-btn-red{background:#E53E3E;color:#fff}.live-btn-red:hover{background:#c53030}
.live-btn-green{background:#38A169;color:#fff}.live-btn-green:hover{background:#2f855a}
.live-btn-gray{background:#e2e8f0;color:#444}.live-btn-gray:hover{background:#cbd5e0}
.live-btn-blue{background:#2E75B6;color:#fff}.live-btn-blue:hover{background:#1d5fa0}
.live-btn-dark{background:#1F3864;color:#fff}.live-btn-dark:hover{background:#16295a}
.live-btn:disabled{opacity:.5;cursor:not-allowed}
.mode-toggle{display:flex;gap:0;align-items:center;background:rgba(0,0,0,.25);border-radius:8px;padding:3px}
.mode-btn{padding:6px 16px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:rgba(255,255,255,.65);transition:.15s;white-space:nowrap}
.mode-btn.active{background:#fff;color:#1F3864;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.mode-btn.live-active{background:#E53E3E;color:#fff}
/* ヘッダー設定メニュー */
.header-gear-wrap{position:relative;display:flex;align-items:center}
.header-gear-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px;font-family:'Meiryo UI','Meiryo',sans-serif;white-space:nowrap}
.header-gear-btn:hover{background:rgba(255,255,255,.18)}
.header-gear-menu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);min-width:190px;z-index:500;overflow:hidden;border:1px solid #e2e8f0}
.header-gear-item{display:flex;align-items:center;gap:10px;padding:11px 16px;font-size:12px;color:#333;cursor:pointer;transition:.1s;font-family:'Meiryo UI','Meiryo',sans-serif;border:none;background:none;width:100%;text-align:left}
.header-gear-item:hover{background:#EBF3FB;color:#1F3864}
.header-gear-sep{height:1px;background:#f0f0f0;margin:2px 0}
.header-gear-label{font-size:10px;color:#a0aec0;padding:8px 16px 3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
@media(max-width:768px){.live-panels{grid-template-columns:1fr;height:auto}}

/* ── APIコスト表示 ───────────────────────────────────────── */
.cost-bar{background:rgba(0,0,0,.25);padding:4px 16px;display:flex;align-items:center;gap:10px;font-size:11px;color:rgba(255,255,255,.5);border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.cost-bar span{color:rgba(255,255,255,.7)}
.cost-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:3000}
.cost-modal{background:#fff;border-radius:12px;padding:24px 28px;width:90%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.cost-modal-title{font-size:16px;font-weight:700;color:#1F3864;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.cost-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0f4f8;font-size:13px}
.cost-row:last-of-type{border-bottom:none}
.cost-total{display:flex;justify-content:space-between;padding:10px 0 0;font-size:15px;font-weight:700;color:#1F3864;border-top:2px solid #EBF3FB;margin-top:4px}
.cost-note{font-size:11px;color:#a0aec0;margin-top:10px;line-height:1.6}

/* ── Usage Bar（下部統合パネル） ─────────────────────────── */
.usage-bar{background:rgba(15,20,30,.55);backdrop-filter:blur(4px);padding:6px 16px;display:flex;align-items:center;gap:0;font-size:11px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;flex-wrap:wrap}
.usage-seg{display:flex;align-items:center;gap:5px;padding:0 12px;border-right:1px solid rgba(255,255,255,.12)}
.usage-seg:first-child{padding-left:0}
.usage-seg:last-child{border-right:none}
.usage-label{color:rgba(255,255,255,.35);font-size:10px;letter-spacing:.3px;text-transform:uppercase}
.usage-val{color:rgba(255,255,255,.75);font-weight:600}
.usage-val.green{color:#68d391}
.usage-val.amber{color:#f6ad55}
.usage-val.red{color:#fc8181}
.usage-sub{color:rgba(255,255,255,.3);font-size:10px}
.usage-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;transition:.15s;white-space:nowrap}
.usage-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.usage-btn:disabled{opacity:.4;cursor:not-allowed}
.usage-spin{display:inline-block;width:10px;height:10px;border:1.5px solid rgba(255,255,255,.2);border-top-color:rgba(255,255,255,.7);border-radius:50%;animation:spin .7s linear infinite}
</style>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

// ── 今日の日付 ─────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const STEPS = [
  {n:1,label:'基本情報'},{n:2,label:'ファイル\nアップロード'},
  {n:3,label:'AI解析'},{n:4,label:'プレビュー\n・編集'},{n:5,label:'ダウンロード'}
];

const IP_OPTS = ['','緊急','高','中','低'];
const EMPTY = {agenda_items:[],minutes_by_agenda:[],decisions:[],todos:[],pending:[],risks:[],issues:[],exec_report:[],manager_report:[],investment_contracts:[]};

// ── XML escape ───────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function generateDocx(basicInfo, result, templateFile){
  const W = 9947;
  const FONT = `<w:rFonts w:ascii="Meiryo UI" w:hAnsi="Meiryo UI" w:cs="Meiryo UI" w:eastAsia="Meiryo UI"/>`;
  const HDR  = '143D69';
  const date = basicInfo.date ? basicInfo.date.replace(/-/g,'/') : '';
  const today = new Date();
  const todayStr = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;
  const meetingTitle = `${basicInfo.meetingName}${basicInfo.meetingNo ? ` 第${basicInfo.meetingNo}回` : ''}`;

  // ── セル生成（テンプレートに合わせてsz=22、罫線はtable levelのみ）──
  function cell(text, w, opts={}){
    const shade = opts.shade ? `<w:shd w:val="clear" w:color="auto" w:fill="${opts.shade}"/>` : '';
    const span  = opts.span  ? `<w:gridSpan w:val="${opts.span}"/>` : '';
    const vA    = `<w:vAlign w:val="center"/>`;
    const BLK = '000000';
    // セルレベルでは「span セルの内部幽霊縦線を消す」目的のみで tcBorders を使う
    // 通常セル・HDRセルはテーブルレベルの insideV:single に任せる
    let tcBdr = '';
    if (opts.span) {
      // span セル：右ボーダー明示 ＋ 内部縦線を nil で幽霊線抑制
      tcBdr = `<w:tcBorders>`
        +`<w:top    w:val="single" w:sz="4" w:color="${BLK}"/>`
        +`<w:left   w:val="single" w:sz="4" w:color="${BLK}"/>`
        +`<w:bottom w:val="single" w:sz="4" w:color="${BLK}"/>`
        +`<w:right  w:val="single" w:sz="4" w:color="${BLK}"/>`
        +`<w:insideV w:val="nil"/>`
        +`</w:tcBorders>`;
    }
    const mar   = `<w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="120" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:right w:w="120" w:type="dxa"/></w:tcMar>`;
    const wElem = w ? `<w:tcW w:w="${w}" w:type="dxa"/>` : '';
    const isHdr = opts.shade === HDR;
    const txtColor = isHdr ? 'FFFFFF' : (opts.textColor || '000000');
    const bold = isHdr ? '<w:b/><w:bCs/>' : (opts.bold ? '<w:b/><w:bCs/>' : '');
    const sz = 22;
    const jc = opts.center ? '<w:jc w:val="center"/>' : '';
    const lines = String(text||'').split('\n');
    const parasXml = lines.map((line, li) => {
      // boldFirstLine: 最初の行のみ太字
      const lineBold = (opts.boldFirstLine && li === 0) ? '<w:b/><w:bCs/>' : bold;
      return `<w:p><w:pPr>${jc}<w:spacing w:before="0" w:after="40"/></w:pPr><w:r><w:rPr>${FONT}${lineBold}<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/><w:color w:val="${txtColor}"/></w:rPr><w:t xml:space="preserve">${esc(line)}</w:t></w:r></w:p>`;
    }).join('');
    return `<w:tc><w:tcPr>${wElem}${span}${tcBdr}${shade}${vA}${mar}</w:tcPr>${parasXml}</w:tc>`;
  }

  function row(h, cells){ return `<w:tr><w:trPr><w:trHeight w:val="${h}"/></w:trPr>${cells}</w:tr>`; }

  // ── マーカー付きテキストのWord描画ユーティリティ ───────────────
  // [?]NAME → 赤太字（人名のみ。「要確認」等には付与しない）
  // （AIが推測） → オレンジ太字italic ＋ ※ プレフィックス
  // （情報源：〇〇） → ティール太字
  const RED_COLOR    = 'C0392B';   // 赤：不確かな人名
  const ORANGE_COLOR = 'C05000';   // オレンジ：AI推測
  const TEAL_COLOR   = '0694A2';   // ティール：情報源
  const AI_MARKER    = '（AIが推測）';
  const SRC_RE       = /（情報源：([^）]+)）/g;

  // 「要確認」「TBD」等の非人名リスト（[?]を付与しない）
  const NON_PERSON = new Set(['要確認','TBD','未定','不明','調査中']);

  function renderRunsWithMarkers(text, baseColor, sz) {
    // 空括弧（）を除去してからレンダリング
    const cleaned = text.replace(/（\s*）/g, '').replace(/\(\s*\)/g, '');
    const segments = [];
    let lastIdx = 0;
    let m;
    SRC_RE.lastIndex = 0;
    while ((m = SRC_RE.exec(cleaned)) !== null) {
      if (m.index > lastIdx) segments.push({ t: cleaned.slice(lastIdx, m.index), color: baseColor, bold: false, italic: false });
      segments.push({ t: `📎（情報源：${m[1]}）`, color: TEAL_COLOR, bold: true, italic: false });
      lastIdx = SRC_RE.lastIndex;
    }
    if (lastIdx < cleaned.length) segments.push({ t: cleaned.slice(lastIdx), color: baseColor, bold: false, italic: false });

    // 各セグメント内で（AIが推測）をさらに分割
    let runs = '';
    for (const seg of segments) {
      if (seg.color === TEAL_COLOR) {
        runs += `<w:r><w:rPr>${FONT}<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/><w:b/><w:bCs/><w:color w:val="${TEAL_COLOR}"/></w:rPr><w:t xml:space="preserve">${esc(seg.t)}</w:t></w:r>`;
      } else {
        const parts = seg.t.split(AI_MARKER);
        for (let i = 0; i < parts.length; i++) {
          if (parts[i]) {
            runs += `<w:r><w:rPr>${FONT}<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/><w:color w:val="${seg.color}"/></w:rPr><w:t xml:space="preserve">${esc(parts[i])}</w:t></w:r>`;
          }
          if (i < parts.length - 1) {
            // ※（AIが推測） → オレンジ太字斜体
            runs += `<w:r><w:rPr>${FONT}<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/><w:color w:val="${ORANGE_COLOR}"/><w:b/><w:bCs/><w:i/><w:iCs/></w:rPr><w:t xml:space="preserve">${esc('※（AIが推測）')}</w:t></w:r>`;
          }
        }
      }
    }
    return runs;
  }

  function renderMarkedLine(line, sz=22, jc='') {
    let baseColor = '000000';
    let renderText = line;
    // [?]NAME → 赤太字。ただし NAME が非人名（要確認等）の場合は [?] を除去するだけ
    if (line.startsWith('[?]')) {
      const nameCandidate = line.slice(3).split(/[:：\s（]/)[0];
      if (!NON_PERSON.has(nameCandidate.trim())) {
        baseColor = RED_COLOR;
      }
      renderText = line.slice(3); // [?] を除去
    }
    const jcXml = jc ? `<w:jc w:val="${jc}"/>` : '';
    const boldPart = baseColor === RED_COLOR ? '<w:b/><w:bCs/>' : '';
    // 赤色テキストの場合は太字で描画
    const runs = baseColor === RED_COLOR
      ? (() => {
          const parts = renderText.split(AI_MARKER);
          let r = '';
          for (let i = 0; i < parts.length; i++) {
            if (parts[i]) r += `<w:r><w:rPr>${FONT}<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/><w:b/><w:bCs/><w:color w:val="${RED_COLOR}"/></w:rPr><w:t xml:space="preserve">${esc(parts[i])}</w:t></w:r>`;
            if (i < parts.length - 1) r += `<w:r><w:rPr>${FONT}<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/><w:color w:val="${ORANGE_COLOR}"/><w:b/><w:bCs/><w:i/><w:iCs/></w:rPr><w:t xml:space="preserve">${esc('※（AIが推測）')}</w:t></w:r>`;
          }
          return r;
        })()
      : renderRunsWithMarkers(renderText, baseColor, sz);
    return `<w:p><w:pPr>${jcXml}<w:spacing w:before="0" w:after="40"/></w:pPr>${runs}</w:p>`;
  }

  function cellMarked(text, w, opts={}) {
    const shade  = opts.shade  ? `<w:shd w:val="clear" w:color="auto" w:fill="${opts.shade}"/>` : '';
    const span   = opts.span   ? `<w:gridSpan w:val="${opts.span}"/>` : '';
    const vA     = `<w:vAlign w:val="center"/>`;
    const mar    = `<w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="120" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:right w:w="120" w:type="dxa"/></w:tcMar>`;
    const wElem  = w ? `<w:tcW w:w="${w}" w:type="dxa"/>` : '';
    const jc     = opts.center ? 'center' : '';
    const lines  = String(text||'').split('\n');
    const boldFirstLine = opts.boldFirstLine || false;
    const parasXml = lines.map((line, li) => {
      if (boldFirstLine && li === 0) {
        return `<w:p><w:pPr><w:spacing w:before="0" w:after="40"/></w:pPr><w:r><w:rPr>${FONT}<w:b/><w:bCs/><w:sz w:val="22"/><w:szCs w:val="22"/><w:color w:val="000000"/></w:rPr><w:t xml:space="preserve">${esc(line)}</w:t></w:r></w:p>`;
      }
      return renderMarkedLine(line, 22, jc);
    }).join('');
    let tcBdr = '';
    if (opts.span) {
      tcBdr = `<w:tcBorders><w:top w:val="single" w:sz="4" w:color="000000"/><w:left w:val="single" w:sz="4" w:color="000000"/><w:bottom w:val="single" w:sz="4" w:color="000000"/><w:right w:val="single" w:sz="4" w:color="000000"/><w:insideV w:val="nil"/></w:tcBorders>`;
    }
    return `<w:tc><w:tcPr>${wElem}${span}${tcBdr}${shade}${vA}${mar}</w:tcPr>${parasXml}</w:tc>`;
  }

  const attendeesCell = (basicInfo.attendees||[]).map(o=>{
    const names = Array.isArray(o.names) ? o.names.join('、') : (o.names||'');
    return names ? `【${o.org}】　${names}` : `【${o.org}】`;
  }).join('\n') || '';

  // テーブルレベル：全境界線を定義（insideVも有効にして縦線を確保）
  const tblBdr = `<w:tblBorders>
<w:top    w:val="single" w:sz="4" w:color="000000"/>
<w:left   w:val="single" w:sz="4" w:color="000000"/>
<w:bottom w:val="single" w:sz="4" w:color="000000"/>
<w:right  w:val="single" w:sz="4" w:color="000000"/>
<w:insideH w:val="single" w:sz="4" w:color="000000"/>
<w:insideV w:val="single" w:sz="4" w:color="000000"/>
</w:tblBorders>`;
  const tblLook = `<w:tblLook w:val="0000" w:firstRow="0" w:lastRow="0" w:firstColumn="0" w:lastColumn="0" w:noHBand="1" w:noVBand="1"/>`;

  // ── ToDo：番号付き、★は末尾。担当者が不確かな場合は[?]マーカーを付与 ──
  const todoLines = result.todos.length
    ? result.todos.map((t,i) => {
        const assignee = t.assignee_uncertain ? `[?]${t.assignee||''}` : (t.assignee||'');
        return `${i+1}．${t.content||''}（${assignee}、${t.due||''}）★`;
      }).join('\n')
    : 'なし';

  // ── 議事内容：★N / 保N / リN / 課N を解析して色付きアンダーラインに変換 ──
  function buildMinutesParasXml(content){
    const BLUE   = '2E75B6';
    const GREEN  = '375623';
    const BROWN  = '843C0C';
    const PURPLE = '7030A0';
    const NML    = '000000';
    const GRAY   = '555555'; // Q&A 回答行

    const TAG_DEFS = [
      { re: /★\s*(\d+)/,           clean: /★\s*\d+/g,              color: BLUE,   label: n => `（${n}★）` },
      { re: /保[・継\s]*(\d+)/,     clean: /保[・継\s]*\d+/g,        color: GREEN,  label: n => `（保・継${n}）` },
      { re: /リ(?:スク)?\s*(\d+)/,  clean: /リ(?:スク)?\s*\d+/g,    color: BROWN,  label: n => `（リスク${n}）` },
      { re: /課(?:題)?\s*(\d+)/,    clean: /課(?:題)?\s*\d+/g,      color: PURPLE, label: n => `（課題${n}）` },
    ];

    const rPr = (color, underline=false, bold=false, italic=false) =>
      `<w:rPr>${FONT}<w:sz w:val="22"/><w:szCs w:val="22"/>`
      +(bold?`<w:b/><w:bCs/>`:'')
      +(italic?`<w:i/><w:iCs/>`:'')
      +(color!==NML?`<w:color w:val="${color}"/>`:'')
      +(underline?`<w:u w:val="single"/>`:'')
      +`</w:rPr>`;

    return (content||'（記録なし）').split('\n').filter(line => line.trim() !== '').map(line => {

      // ── 行の種類を判定 ──────────────────────────────
      // A: アジェンダ見出し行  "1. タイトル"
      const isSectionTitle = /^[1-9]\d*\.\s/.test(line);
      // B: Q&A 回答行  "　→" or "　　→" で始まる
      const isQAResponse   = /^　+→/.test(line);
      // C: 通常コンテンツ行   "　" で始まりB以外
      const isContentLine  = /^　/.test(line) && !isQAResponse;

      // タグ検出
      let matchedDef = null, matchedNum = null;
      for (const def of TAG_DEFS) {
        const m = line.match(def.re);
        if (m) { matchedDef = def; matchedNum = parseInt(m[1], 10); break; }
      }

      // ── A: アジェンダ見出し ──────────────────────────
      if (isSectionTitle) {
        return `<w:p><w:pPr><w:spacing w:before="200" w:after="60"/></w:pPr>`
          +`<w:r>${rPr(NML,false,true)}<w:t xml:space="preserve">${esc(line)}</w:t></w:r></w:p>`;
      }

      // ── B: Q&A 回答行（→ 付き） ──────────────────────
      if (isQAResponse) {
        // 先頭の全角スペース・→・半角スペースを除去
        const lineText = line.replace(/^　+→\s*/, '');
        let textToShow = '→ ' + lineText;

        if (!matchedDef) {
          return `<w:p><w:pPr>`
            +`<w:spacing w:before="0" w:after="40"/>`
            +`<w:ind w:left="440" w:hanging="0"/>`
            +`</w:pPr>`
            +`<w:r>${rPr(GRAY)}<w:t xml:space="preserve">${esc(textToShow)}</w:t></w:r></w:p>`;
        }

        // タグあり（Q&A回答でToDo等が発生している場合）
        let lineBody = lineText;
        for (const def of TAG_DEFS) lineBody = lineBody.replace(def.clean, '');
        lineBody = lineBody.replace(/（[\d★保継・リスク課題\s]+）/g, '').trimEnd();
        const { color, label } = matchedDef;
        return `<w:p><w:pPr>`
          +`<w:spacing w:before="0" w:after="40"/>`
          +`<w:ind w:left="440" w:hanging="0"/>`
          +`</w:pPr>`
          +`<w:r>${rPr(color,true)}<w:t xml:space="preserve">→ ${esc(lineBody)}</w:t></w:r>`
          +`<w:r>${rPr(color,true)}<w:t xml:space="preserve">${esc(label(matchedNum))}</w:t></w:r>`
          +`</w:p>`;
      }

      // ── C: 通常コンテンツ行（・箇条書き） ──────────────
      if (isContentLine) {
        // 先頭の全角スペースを除去して・を付与
        const lineText = line.replace(/^　/, '');
        // [?]スピーカー: 内容 の形式 → スピーカー名を赤色で描画
        const uncertSpeaker = lineText.match(/^\[?\?\]([^:：\n]+)([:：].*)$/);

        if (!matchedDef && !uncertSpeaker) {
          return `<w:p><w:pPr>`
            +`<w:spacing w:before="0" w:after="40"/>`
            +`<w:ind w:left="220" w:hanging="220"/>`
            +`</w:pPr>`
            +renderRunsWithMarkers('・'+lineText, NML, 22)+'</w:p>';
        }

        if (uncertSpeaker && !matchedDef) {
          return `<w:p><w:pPr><w:spacing w:before="0" w:after="40"/><w:ind w:left="220" w:hanging="220"/></w:pPr>`
            +`<w:r>${rPr(NML)}<w:t xml:space="preserve">・</w:t></w:r>`
            +`<w:r><w:rPr>${FONT}<w:sz w:val="22"/><w:szCs w:val="22"/><w:color w:val="C0392B"/></w:rPr><w:t xml:space="preserve">${esc(uncertSpeaker[1])}</w:t></w:r>`
            +`<w:r>${rPr(NML)}<w:t xml:space="preserve">${esc(uncertSpeaker[2])}</w:t></w:r></w:p>`;
        }

        // タグあり（★・保・リ・課）
        let lineBody = uncertSpeaker ? lineText.replace(/^\[?\?\]/, '') : lineText;
        for (const def of TAG_DEFS) lineBody = lineBody.replace(def.clean, '');

// ── Excel生成（ExcelJS版・完全書式対応） ────────────────────
async function generateXlsx(basicInfo, result, xlsxTemplateFile, xlsxDataFile) {
  const mtg = basicInfo.meetingName + (basicInfo.meetingNo ? ` 第${basicInfo.meetingNo}回` : '');
  const dt  = basicInfo.date ? basicInfo.date.replace(/-/g,'/') : '';

  // ── 照合ログ（判定理由シート用） ───────────────────────────
  const matchLog = []; // {sheet, content, match_type, existing_no, reason, progress}

  // ── 既存ファイルから過去データを読み込む ─────────────────
  // ExcelJSはブラウザでarrayBufferからの読み込みをサポート
  let existingSheetData = {}; // {sheetName: [{row data...}, ...]}
  const srcFile = xlsxDataFile || xlsxTemplateFile;
  if (srcFile) {
    try {
      const ab = await srcFile.arrayBuffer();
      const wbOld = new ExcelJS.Workbook();
      await wbOld.xlsx.load(ab);
      wbOld.eachSheet((ws, sheetId) => {
        const rows = [];
        let headerRow = null;
        let headers = [];
        ws.eachRow({ includeEmpty: false }, (row, rowNum) => {
          // ExcelJSのrow.valuesはセルオブジェクトになる場合があるので
          // getCell().valueで確実に値を取得する
          const getCellVal = (colIdx) => {
            const cell = row.getCell(colIdx);
            const v = cell ? cell.value : null;
            return v;
          };
          // 列数を特定
          const colCount = row.cellCount || 30;

          const toStr = (v) => {
            if (v === null || v === undefined) return '';
            if (typeof v === 'object' && v !== null) {
              if (v instanceof Date) {
                const y = v.getFullYear();
                const m = String(v.getMonth()+1).padStart(2,'0');
                const d = String(v.getDate()).padStart(2,'0');
                return `${y}/${m}/${d}`;
              }
              if (v.richText) return v.richText.map(r=>r.text||'').join('');
              if (v.result !== undefined) return toStr(v.result);
              if (v.text !== undefined) return String(v.text);
              if (v.error !== undefined) return '';
              // 共有文字列インデックスなど → JSON化して中身を見る
              try {
                const j = JSON.stringify(v);
                // {"value":"例"} 形式
                if (v.value !== undefined) return String(v.value);
                return '';
              } catch(e) { return ''; }
            }
            if (typeof v === 'number' && v > 40000 && v < 60000) {
              const date = new Date(Math.round((v - 25569) * 86400 * 1000));
              const y = date.getUTCFullYear();
              const mo = String(date.getUTCMonth()+1).padStart(2,'0');
              const d = String(date.getUTCDate()).padStart(2,'0');
              return `${y}/${mo}/${d}`;
            }
            return String(v);
          };

          if (!headerRow) {
            // ヘッダー行を探す（No.を含む行）
            const vals = Array.from({length: colCount}, (_, i) => toStr(getCellVal(i+1)));
            if (vals.some(v => v.includes('No.'))) {
              headerRow = rowNum;
              headers = vals.map(v => v.replace(/\n/g,''));
            }
          } else {
            // データ行
            const rowObj = {};
            headers.forEach((h, i) => {
              rowObj[h] = toStr(getCellVal(i+1));
            });
            // 例行・progress行・空行はスキップ
            const noVal = rowObj['No.'] || rowObj['No'];
            if (noVal && noVal !== '例' && rowObj['行種別'] !== 'progress') {
              rows.push(rowObj);
            }
          }
        });
        if (rows.length > 0) existingSheetData[ws.name] = rows;
      });
    } catch(e) {
      console.warn('既存ファイル読み込みエラー:', e);
    }
  }

  // 既存データ＋新規データを結合する関数
  function mergeData(sheetName, newRows) {
    const existing = existingSheetData[sheetName] || [];
    let maxNo = existing.reduce((m, r) => { const n = parseInt(r['No.']||0); return Math.max(m, isNaN(n)?0:n); }, 0);
    const merged = existing.map(r => ({...r}));

    newRows.forEach(row => {
      const matchType   = row.match_type   || 'new';
      const existingNo  = row.existing_no  ? String(row.existing_no) : null;
      const progressText = row.progress    || '';
      const matchReason = row.match_reason || '';

      // 判定ログに記録
      matchLog.push({
        sheet:      sheetName,
        content:    row.content || row['アクション内容'] || row['リスク内容'] || row['課題内容'] || row['報告内容'] || '',
        match_type: matchType,
        existing_no: existingNo || '',
        reason:     matchReason,
        progress:   progressText,
      });

      if (matchType === 'same' && existingNo) {
        const target = merged.find(r => String(r['No.']) === existingNo);
        if (target) {
          if (progressText) {
            target['最新進捗日']   = row['会議日'] || '';
            target['最新進捗内容'] = progressText;
          }
          target['_updated'] = true;
          return;
        }
      }

      const newRow = { ...row, 'No.': ++maxNo };
      delete newRow.match_type;
      delete newRow.existing_no;
      delete newRow.progress;
      delete newRow.match_reason;
      if (matchType === 'similar') {
        newRow['類似No.\n・判定'] = `⚠️ No.${existingNo} 類似`;
        newRow['_similar'] = true;
      }
      merged.push(newRow);
    });

    return merged;
  }

  // ── スタイル定義 ──────────────────────────────────────────
  const FONT_NAME = 'Meiryo UI';

  // ヘッダーセルスタイル生成
  function hdrStyle(bgArgb) {
    return {
      font:      { name: FONT_NAME, bold: true, color: { argb: 'FFFFFFFF' }, size: 9 },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + bgArgb } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: 'center', vertical: 'middle', wrapText: true },
    };
  }

  // データセルスタイル生成
  function dataStyle(isAlt, center=false) {
    return {
      font:      { name: FONT_NAME, size: 9, color: { argb: 'FF000000' } },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: isAlt ? 'FFEAF2FB' : 'FFFFFFFF' } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: center ? 'center' : 'left', vertical: 'top', wrapText: true },
    };
  }

  // 重要度・優先度の色
  function impStyle(val, isAlt) {
    const fills = { '緊急':'FFFF5252','高':'FFFFCDD2','中':'FFFFF9C4','低':'FFC8E6C9' };
    const bgArgb = fills[val] || (isAlt ? 'FFEAF2FB' : 'FFFFFFFF');
    return {
      font:      { name: FONT_NAME, size: 9, bold: val==='緊急', color: { argb: val==='緊急' ? 'FFFFFFFF' : 'FF000000' } },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: bgArgb } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: 'center', vertical: 'top', wrapText: true },
    };
  }

  // 共有済未の色
  function shareStyle(val, isAlt) {
    const bgArgb = val==='済' ? 'FFC8E6C9' : val==='未' ? 'FFFFCDD2' : (isAlt ? 'FFEAF2FB' : 'FFFFFFFF');
    return {
      font:      { name: FONT_NAME, size: 9, color: { argb: 'FF000000' } },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: bgArgb } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: 'center', vertical: 'top', wrapText: true },
    };
  }

  // 要/否スタイル
  function yohiStyle(val, isAlt) {
    const bgArgb = val==='要' ? 'FFFFCDD2' : (isAlt ? 'FFEAF2FB' : 'FFFFFFFF');
    return {
      font:      { name: FONT_NAME, size: 9, bold: val==='要', color: { argb: val==='要' ? 'FFB71C1C' : 'FF000000' } },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: bgArgb } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: 'center', vertical: 'top', wrapText: true },
    };
  }

  // ステータスの色
  function statusStyle(val, isAlt) {
    const fills = { '完了':'FFC8E6C9','対応中':'FFFFF9C4','遅延':'FFFFCDD2','保留':'FFE0E0E0','未着手':'FFF5F5F5' };
    return {
      font:      { name: FONT_NAME, size: 9, color: { argb: 'FF000000' } },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: fills[val] || (isAlt?'FFEAF2FB':'FFFFFFFF') } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: 'center', vertical: 'top', wrapText: true },
    };
  }

  // ── ExcelJSワークブック生成 ────────────────────────────────
  const wb = new ExcelJS.Workbook();
  wb.creator = '安田 真和';
  wb.created = new Date();

  // セクション見出しスタイル
  function secStyle(bgArgb) {
    return {
      font:      { name: FONT_NAME, bold: true, size: 9, color: { argb: 'FFFFFFFF' } },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + bgArgb } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: 'center', vertical: 'middle', wrapText: true },
    };
  }

  // ── シート構築汎用関数 ─────────────────────────────────────
  function buildSheet(sheetName, tabColor, sections, existingData=[]) {
    const ws = wb.addWorksheet(sheetName, { properties: { tabColor: { argb: 'FF' + tabColor } } });

    // sections: [{ label, bgColor, cols:[{key,header,width,type}] }]
    // 全セクションのカラムをフラットに展開
    const allCols = [];
    sections.forEach(sec => sec.cols.forEach(c => allCols.push({ ...c, secBg: sec.bgColor, secLabel: sec.label })));

    // Row1: セクション見出し（マージ）
    let colIdx = 1;
    sections.forEach(sec => {
      const start = colIdx;
      const end = colIdx + sec.cols.length - 1;
      if (start === end) {
        const cell = ws.getCell(1, start);
        cell.value = sec.label;
        applyStyle(cell, secStyle(sec.bgColor));
      } else {
        ws.mergeCells(1, start, 1, end);
        const cell = ws.getCell(1, start);
        cell.value = sec.label;
        applyStyle(cell, secStyle(sec.bgColor));
      }
      colIdx += sec.cols.length;
    });
    ws.getRow(1).height = 16;

    // Row2: カラムヘッダー
    allCols.forEach((col, i) => {
      const cell = ws.getCell(2, i + 1);
      cell.value = col.header;
      applyStyle(cell, hdrStyle(col.secBg));
      ws.getColumn(i + 1).width = col.width;
    });
    ws.getRow(2).height = 32;

    // Row3: 例データ行（薄く・テンプレート準拠：イタリックなし、9pt）
    const exampleVals = { 'No.':'例','会議名':'第46回 全体PMO定例','会議日':'2026/02/02','最終\nステータス':'未着手','共有\n済未':'未','行種別':'item' };
    allCols.forEach((col, i) => {
      const cell = ws.getCell(3, i + 1);
      cell.value = exampleVals[col.key] || '';
      const s = dataStyle(false, col.center);
      s.font = { ...s.font, size: 9, color: { argb: 'FF999999' } };
      applyStyle(cell, s);
    });
    ws.getRow(3).height = 30;

    // 既存データ行を追記
    let rowNum = 4;
    let maxNo = 0;
    existingData.forEach((rowData, idx) => {
      const isAlt = idx % 2 === 1;
      const isComplete = rowData['最終\nステータス'] === '完了';
      const isSimilar  = !!rowData['_similar'];
      const isUpdated  = !!rowData['_updated'];
      // 行高さ：最長セルの文字数から推定（列幅40文字想定、1行約15px）
      const maxLen = Math.max(...Object.values(rowData).map(v => String(v||'').length));
      const estLines = Math.max(2, Math.ceil(maxLen / 35));
      ws.getRow(rowNum).height = Math.min(150, estLines * 16 + 8);

      allCols.forEach((col, ci) => {
        const cell = ws.getCell(rowNum, ci + 1);
        const val = rowData[col.key] !== undefined ? rowData[col.key] : '';
        // _similar/_updated/_isNew は内部フラグなので空文字
        cell.value = String(col.key.startsWith('_') ? '' : val);

        // 完了は行全体グレー
        if (isComplete) {

// ── Download helper ───────────────────────────────────────
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function makeAiTimestamp(){
  const now = new Date();
  const ymd = now.getFullYear().toString()
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0');
  const hm = String(now.getHours()).padStart(2,'0')
    + String(now.getMinutes()).padStart(2,'0');
  return `${ymd}_${hm}`;
}
function makeDocxFilename(meetingName, date){
  const safe = (meetingName||'会議').replace(/[\\/:*?"<>|]/g,'');
  const d = (date||'').replace(/-/g,'');
  const ts = makeAiTimestamp();
  return `議事録_${safe}_${d}_${ts}_AI.docx`;
}
function makeXlsxFilename(meetingName, date){
  const safe = (meetingName||'会議').replace(/[\\/:*?"<>|]/g,'');
  const d = (date||'').replace(/-/g,'');
  const ts = makeAiTimestamp();
  return `管理台帳_${safe}_${d}_${ts}_AI.xlsx`;
}

// ── Claude API ────────────────────────────────────────────
// ── APIコスト計算 ─────────────────────────────────────────
// Claude Sonnet 4: Input $3/MTok, Output $15/MTok
const COST_INPUT_PER_TOKEN  = 3  / 1_000_000;
const COST_OUTPUT_PER_TOKEN = 15 / 1_000_000;
function calcCost(usage){
  if (!usage) return 0;
  const inp = usage.input_tokens  || 0;
  const out = usage.output_tokens || 0;
  return inp * COST_INPUT_PER_TOKEN + out * COST_OUTPUT_PER_TOKEN;
}
function formatCost(usd){
  if (usd < 0.001) return `$${(usd * 1000).toFixed(3)}m`;
  return `$${usd.toFixed(4)}`;
}
function formatTokens(usage){
  if (!usage) return '';
  const t = (usage.input_tokens||0) + (usage.output_tokens||0);
  return t >= 1000 ? `${(t/1000).toFixed(1)}K tokens` : `${t} tokens`;
}

// ── Admin API 利用コスト取得 ──────────────────────────────
async function fetchOrgUsage(adminKey) {
  const now = new Date();
  // 今日（JST → UTC補正済みでISOにする）
  const todayJST = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  const ymd = todayJST.toISOString().slice(0, 10);
  const startOfDay  = `${ymd}T00:00:00Z`;
  const endOfDay    = `${ymd}T23:59:59Z`;
  // 今月
  const ym = ymd.slice(0, 7);
  const startOfMonth = `${ym}-01T00:00:00Z`;

  const headers = {
    'Content-Type': 'application/json',
    'x-api-key': adminKey,
    'anthropic-version': '2023-06-01',
    'anthropic-dangerous-direct-browser-access': 'true',
  };

  // 今日の消費コスト
  const [todayRes, monthRes] = await Promise.all([
    fetch(`https://api.anthropic.com/v1/organizations/cost_report?starting_at=${startOfDay}&ending_at=${endOfDay}`, { headers }),
    fetch(`https://api.anthropic.com/v1/organizations/cost_report?starting_at=${startOfMonth}&ending_at=${endOfDay}`, { headers }),
  ]);

  const parseUsd = async (res) => {
    if (!res.ok) return null;
    const d = await res.json();
    // レスポンス形式: {data: [{total_cost: N}, ...]} または {total_cost: N}
    if (Array.isArray(d.data)) {
      return d.data.reduce((s, r) => s + (r.total_cost || 0), 0);
    }
    return d.total_cost ?? null;
  };

  const [todayCost, monthCost] = await Promise.all([parseUsd(todayRes), parseUsd(monthRes)]);
  return { todayCost, monthCost, fetchedAt: now };
}

function mergeVerification(base, additional){

  ['decisions','todos','risks','issues','exec_report','manager_report','pending','investment_contracts'].forEach(key=>{

// ── JSON 自動修復ユーティリティ ───────────────────────────
function repairAndParseJSON(raw) {
  // 1. マークダウンコードブロックを除去
  let s = raw.trim()
    .replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/\s*```$/i,'');

  // 2. そのままパースできれば即返す
  try { return JSON.parse(s); } catch(e) {}

  // 3. 最大 JSON オブジェクトを抽出
  const m = s.match(/\{[\s\S]+\}/);
  if (m) s = m[0];
  try { return JSON.parse(s); } catch(e) {}

  // 4. 文字列内の literal 改行を \n にエスケープ
  //    （LLM がたまに JSON 文字列中で改行を直接出力する）
  s = s.replace(/"((?:[^"\\]|\\.)*)"/g, (match) => {
    // 文字列値内の生改行を \\n に変換、タブも同様
    return match.replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t');
  });
  try { return JSON.parse(s); } catch(e) {}

  // 5. 末尾カンマを除去して再試行
  s = s.replace(/,(\s*[}\]])/g, '$1');
  try { return JSON.parse(s); } catch(e) {}

  // 6. 切り捨てられた JSON を閉じる（max_tokens 打ち切り対策）
  s = s.trimEnd().replace(/,\s*$/, '');
  let inStr = false, esc = false;
  const stack = [];
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (esc)         { esc = false; continue; }
    if (c==='\\' && inStr) { esc = true; continue; }
    if (c==='"')     { inStr = !inStr; continue; }
    if (inStr)       continue;
    if (c==='{')     stack.push('}');
    else if (c==='[') stack.push(']');
    else if ((c==='}'||c===']') && stack.length)
      if (stack[stack.length-1]===c) stack.pop();
  }
  if (inStr) s += '"';           // 文字列が途中で切れた場合
  s = s.replace(/,(\s*[}\]])/g, '$1');
  while (stack.length) s += stack.pop();

  try { return JSON.parse(s); } catch(e) {
    throw new Error('JSON修復失敗: ' + e.message + '\n先頭200文字: ' + s.slice(0,200));
  }
}

【会議種別による抽出方針】
基本情報に「会議種別」が指定されている場合、以下の方針に従うこと：
■ ステアリングコミッティ（経営報告）

■ 課題解決会議
  → 課題・リスク・保留を最重視。解決策と担当者・期日の特定に注力する。
■ 情報共有会議
  → 議事詳細（情報共有内容）を重視。ToDoは最小限（明示的な依頼のみ）。
■ 会議種別が未指定の場合はすべてバランスよく抽出する。

【ファシリテーター・役割による発言の重み付け】
基本情報に以下が指定されている場合に適用する：
■ ファシリテーター
  → ファシリテーターの「承知しました」「確認します」「それでは〜」等の取りまとめ発言はToDoとして生成しない。
  → ファシリテーターが「〜ということでよいですか」と確認した場合、それは決定の取りまとめであり、ファシリテーター自身がToDoを受任したわけではない。
■ 役員参加者
  → 役員の発言は役員報告事項・決定事項として優先的に検討する。
  → 役員が「〜をお願いしたい」と指示した場合、受任者が担当者のToDoになる。
■ 外部ベンダー参加者
  → ベンダーの「実施します」「対応します」はコミットメントとして記録するが、
    内部管理台帳のToDoとしては記録せず、議事詳細に記録するにとどめる。

【前回議事録の参照ルール】
「前回議事録」が提供されている場合：
  ✅ 前回の決定事項・継続課題・積み残しToDoの文脈参照に使用する
  ✅ 今回の会議で前回の事項がどう進展したかを議事詳細に記録する
  ❌ 前回議事録にのみある内容を今回のToDo・決定事項・リスク・課題として追加しない
  → 参照した情報には「（情報源：前回議事録）」を末尾に付記すること

【配布資料（スライド等）の使用制限（最重要）】
添付された配布資料（スライド・PDF等）は、以下の用途にのみ使用すること：
  ✅ 許可：発言の表現を適切なビジネス文書体に整形する際の補助
  ✅ 許可：文字起こしで意味が取れない発言（音声認識誤り・途切れた発言等）の内容補完
  ✅ 許可：固有名詞・システム名・数値の正確な表記確認
  ✅ 許可：対応方針・解決策を推測する際の参考情報
  ❌ 禁止：配布資料にのみ記載されている内容をToDoとして新規追加すること
  ❌ 禁止：配布資料にのみ記載されている内容を決定事項・リスク・課題・保留・報告事項として追加すること
  ❌ 禁止：配布資料の記述だけを根拠に担当者・期日を設定すること

【原則】ToDo・決定事項・リスク・課題・保留・役員報告・室長報告は、
必ず文字起こしの発言を根拠とすること。配布資料にしか記載がない項目は抽出しない。


- 指定のJSON形式のみで出力すること。説明文・マークダウン・コードブロック不要。
- 情報は必ず文字起こしに**明示的に記載された内容のみ**を根拠とすること。推測・補完・拡大解釈は行わないこと。
- 文章はビジネス文書として読みやすく整形すること（体言止め多用NG・主語述語を明確に）。
- 口語的な表現をビジネス文書体に直す際も、**発言者が述べていない事実・評価・判断を追加しないこと**。
- 【空括弧の出力禁止】空の括弧 「（）」「( )」をJSONの文字列値に出力してはならない。
  マーカーを付与する場合は必ず「（AIが推測）」「（情報源：スライド）」等の内容を伴うこと。
  内容が不確かでマーカーを付与できない場合はマーカー自体を省略すること。
- 【JSON安全出力ルール（最重要）】JSON文字列値の中で改行が必要な場合は必ず \\n と記述すること。絶対に literal な改行（実際のEnterキー）をJSON文字列内に入れてはならない。同様に、文字列内のダブルクォートは \\\" とエスケープすること。

【期日記載の絶対ルール（todos・risks・issues・exec_report・manager_report すべてに適用）】
期日は以下の5段階で厳密に分類すること。推測・補完・類推による日付の記載は絶対禁止。

■ 段階1「YYYY/MM/DD」
  発言・スライドに「○月○日」「○/○○」など具体的な日付が明示されている場合のみ使用。

■ 段階2「○月末」
  「○月末までに」「○月中に完了」等の月末基準の表現が明示されている場合に使用。
  「○月末」をYYYY/MM/31形式等に変換しないこと。
  例：「5月末に報告する」→ due:"5月末"　「3月末で完了予定」→ due:"3月末"

■ 段階3「YYYY年○月以降」
  「○月以降対応」「○月から開始」等、開始時期のみが明示されている場合に使用。
  例：「4月以降対応していく」→ due:"2026年4月以降"

■ 段階4「要確認」
  期日について言及はあるが、まだ確定しておらず別途確認・決定が必要な場合のみ使用。
  「決まり次第ご案内」「確定後に連絡」「出来次第」「はっきりしていない、決まったら連絡」
  等の表現が出た場合に使用。
  例：「いつまで作るかはっきりしてない、決まった時点でご案内」→ due:"要確認"

■ 段階5「未定」
  発言・スライドのどこにも期日・期限・時期に関する言及が全くない場合にのみ使用。

【重要：要確認と未定の違い】
- 「要確認」= 期日を確認する動作が必要（期日は決まっていないが、確認プロセスがある）
- 「未定」 = 期日自体がどこにも言及されていない（完全に未記録な状態）
この2つを混同しないこと。

【網羅的抽出チェックリスト（抽出前に必ず確認）】
以下のすべてのパターンを文字起こし全体で漏れなく確認すること：
(a) 「〜してください」「〜をお願いします」「〜を確認してください」→ ToDo
(b) 「〜することにしました」「〜で決定」「〜とします」「〜に決まりました」
    「〜することを確認」「〜で進めることにする」「〜と判断」→ 決定事項
(c) 「〜になる恐れがある」「〜リスクがある」「〜が懸念される」「〜に注意が必要」
    「〜が心配」「〜が難しい状況」「〜が問題になる可能性」
    「〜が遅延しており影響が出る可能性」「〜の選定が難航しており」→ リスク
    ※ 配布資料がなくても文字起こしで言及されていれば必ず抽出する
(d) 「〜ができていない」「〜が未解決」「〜で詰まっている」「〜が遅れている」
    「〜が間に合わない」「〜が不足している」「〜に遅延が発生している」
    「〜に影響が出る可能性がある（すでに発生中）」→ 課題
(e) 「持ち越し」「次回確認」「検討継続」「〜待ち」「別途調整」
    「いつまで〜かはっきりしていない」「決まったら案内する」「決まり次第ご連絡」→ 保留
(f) 「役員に報告する必要がある」「上申が必要」「経営判断が必要」→ 役員報告
(g) 「〜N個」「〜N件」「〜N変革」「以下のN」等の列挙表現 → 後続全件を抽出
(h) KPI・目標値・数値定義（「○%」「○億」等）→ 議事詳細に必ず記録
(i) 「室長に共有する」「部長に確認を取る」→ 室長報告

【ToDoの品質基準（生成前に必ずチェック）】
以下のいずれかに該当する発言はToDoとして生成してはならない：

■ 生成禁止パターン（議事内容には記録するがToDoにはしない）
  × 「〜していきましょう」「〜推進する」「〜を進めていく」という方針・意向の表明のみで、
    具体的な成果物・完了条件が不明な場合
  × 「〜さんと連携してしっかり進める」「〜と連携して推進する」という協力関係の表明のみ
  × 「皆さんと相談して〜をしていく」「〜を活用して効率化していく」等の漠然とした推進表明
  × PMOや経営から「全体として〜を目指す」という目標・方針の発言
  × 「引き続き」「継続して」という現行作業の継続を表すだけの発言
  × 「AIエンジニアを確保できたので〜を効率化していく」等、体制整備の報告＋意欲表明の組合せ
  × 「〇〇さんと連携して△△をしっかりやっていく」等、連携意思の表明のみ

  【生成前の3つのテスト（すべてYESでないとToDoにしない）】
  テスト1: 「何を」完了させるか具体的に言えるか？　→ 言えない場合はToDoにしない
  テスト2: 「いつまでに」か「どうなれば完了か」が言えるか？　→ 言えない場合はToDoにしない
  テスト3: 担当者が「承知した」「対応します」と明示的に受任したか？　→ Noならば原則ToDoにしない

  具体例（すべてToDoにしない）：
  「相談しながらやっていきましょう」→ ToDoにしない（「何を」が不明）
  「皆さんと相談して苦労しているところをAI活用で効率化していく」→ ToDoにしない（「何を」「いつ」が不明）
  「南と連携してR&D-DXプロジェクトをしっかり進める」→ ToDoにしない（連携表明のみ・完了条件不明）
  「南さんと連携してしっかり進めるようにいたします」→ ToDoにしない（同上）
  「〜をみんなで推進していきたいと思います」→ ToDoにしない（意向表明のみ）

■ 生成必須パターン（以下は必ずToDoを生成する）
  ○ 「〇〇を〇〇までに完成させる」「〇〇を提出する」等、具体的な成果物と期限が明確
  ○ 「〇〇を確認して報告する」等、次のアクションが明確
  ○ 担当者が「承知しました」「対応します」と受任した発言
  ※ 配布資料（スライド）にのみ記載されているアクションは生成しない。文字起こしの発言が根拠であること。

【担当者判定の絶対ルール（todos・risks・issues すべてに適用）】
会議での発言パターンから担当者を正確に判定すること。以下のルールを優先順に適用する：

■ ルール1「Q&Aペアから生成するToDoは1件のみ」（最重要）
  質問と回答のQ&Aペアが発生した場合、以下の通り処理すること：
  - 質問発言（Aさん）単体ではToDoを生成しない
  - 回答・対応表明（Bさん）からToDoを1件生成し、担当者はBさんとする
  - 「〜をお願いしたい」「〜を確認してほしい」等の要請発言は単体でToDoにしない
  - 回答側の「承知した / 対応する / 検討する / 〜する」が担当者判定の根拠
  【絶対禁止】同一Q&Aから質問ToDoと回答ToDoの2件を生成すること
  【絶対禁止】質問者（Aさん）をToDoの担当者とすること
  例：「（山田）IBMのサポート体制を明確にしてほしい → （本間）承知した」
    → 担当者は本間。山田は質問者であり担当者にならない。
  例：「（弥永）優先順位モデルをお披露目してほしい → （本間）決まり次第ご案内する」
    → これは保留（完了時期が未定）。本間のToDoにも山田のToDoにもしない。

■ ルール2「回答・対応表明者が担当者」
  「→（Bさん）承知した」「（Bさん）確認します」「（Bさん）〜する予定」等
  → 発言したBさんが担当者
  【重要】「承知いたしました」「承知しております」「わかりました」等の受任表明も同様に扱う。
  誰かが「〜をお願いします」と依頼し、Bさんが「承知いたしました」と答えた場合 → Bさんが担当者。
  その後に別の人（Cさん）が「Bさんと連携して進める」と言っても、
  主担当はBさんであり、Cさんを担当者にしてはならない。

■ ルール3「依頼→受任パターン」
  「（Aさん）〜をお願いします / してください」「（Bさん）承知しました / 了解です」
  → Bさん（受任した側）が担当者。Aさん（依頼した側）は担当者にしない

■ ルール4「明示的な担当者・期限記述」
  「担当：〇〇さん」「〇〇さんへ」「期限：〇〇まで」と明示されている場合
  → 明示された内容をそのまま使用

■ ルール5「上位指示パターン」
  役員・経営層が「〜をやってほしい」と指示し、PMO・担当者が受けた場合
  → 受けた側（PMO・担当者）が担当者

■ ルール6「配布資料の限定的参照」
  配布資料（スライド）は、文字起こしの発言から生成したToDoの担当者・期日を
  確認・補完する目的に限り参照してよい。
  スライドにのみ記載されている担当者・期日を根拠に新規ToDoを追加してはならない。

■ ルール7「発表者・報告者が全議題を説明している場合」
  会議の進行上、特定の1名がほぼすべての議題を発表・報告しており、
  その人物が質問への回答や「承知した」の受任も行っている場合、
  その人物がほぼすべてのToDoの担当者になることは正確な抽出結果である。
  担当者が1名に集中していても、文字起こしの根拠がある限り変更してはならない。
  例外として、他の参加者が「承知しました」「対応します」と明示的に受任した場合のみ
  その人物を担当者とする（ルール2・3が優先）。

■ 不明な場合のみ「要確認」とする。発言の根拠なく担当者を変更・分散させることは禁止する。
  また、担当者を文字起こしから明確に特定できなかった場合（「要確認」も含む）は
  assignee_uncertain: true を設定すること。明確に特定できた場合は assignee_uncertain: false。
  【重要】assignee の値が「要確認」「TBD」「未定」等の非人名の場合は assignee_uncertain: false を設定すること。
  [?] マーカーは具体的な人名（「本間」「山田」等）にのみ使用する。

【ToDoの内容記述ルール】
- 1件のToDoには1つの明確なアクションのみを記載する
- 「〜を完了し、〜を実現する」のように複数の大目標を1件にまとめない
- 発言に「ある程度」「できれば」「なるべく」「一定程度」等の留保がある場合、ToDoの内容にそのまま反映する（留保を消さない）
  例：「3月末にある程度できるような状況」→「供給逼迫時着工優先順位モデルをある程度完成させる（3月末）」
  NG：「モデルを完成させる」（「ある程度」という留保が消えている）
- ToDoの内容は「誰が何をする」が分かるように記載する（「〜を推進する」は不可）
- 【重複防止】同一プロジェクト・同一担当者・実質的に同一の目的のToDoを2件以上生成しない。
  内容の7割以上が重複するToDoは1件に統合し、より具体的な表現を採用すること。
  例：「周辺システムベンダー選定のリカバリ計画を推進する」と「周辺システムソリューション選定の遅延リカバリを実施する」→ 1件に統合

【Q&A記録ルール（議事内容への記録形式）】
各議題の質疑応答は、以下の形式で1ブロックとして記録すること：
「（質問者名）: 質問内容
 → （回答者名）: 回答内容・対応方針（★N）」
- 質問と回答は必ずペアで1ブロックに記録する
- ToDoがある場合、★Nは回答行の末尾にのみ付ける（質問行には★を付けない）
- 「→」がない単独の質問・単独の回答は記録してはならない

【列挙構造の完全抽出ルール】
以下のパターンが出現した場合、後続の列挙項目をすべて漏れなく抽出・記録すること：
- 「〜N個」「〜N件」「〜N点」「〜N項目」「以下のN」等の数量表現
- 「1つ目は〜、2つ目は〜」「①〜、②〜」等の連番・枝番表現
- 「変革」「取り組み」「テーマ」等に続く列挙
→ 列挙の途中で省略せず全件を議事内容に記録すること。「等」「以下同様」は使用禁止。
→ 特に「N個の変革を実施」と述べられた場合は、第1変革〜第N変革をすべて個別に記録すること。
→ 各列挙項目の記録形式：「N番目の変革/取り組み：〔内容の詳細〕」として改行して記録。
→ 配布資料が添付されている場合は、発言者が言及した項目の固有名詞・数値表記を確認する補助として使用すること。ただし、発言者が言及していない項目を資料から追加してはならない。

【議事詳細の記録精度ルール（最重要）】
minutes_by_agenda の content において、以下を絶対に省略しないこと：
- 発言中に登場するすべての数値（件数・割合・金額・期間・スコア等）
- システム名・ベンダー名・固有名詞・プロジェクトコード（例：UAT 174件中164件）
- 「〜にする」「〜に変更」等の状態変化・決定の経緯
- 完了・遅延・グリーン/イエロー判定等の状況評価
- 列挙された項目はすべて（「N個ある」と言われたらN個すべて）
※「詳細は〜と同様」「等」等の省略記法は絶対に使用しない

【決定事項の記述ルール】
- decided_by（決定者）が文字起こしに明示されていない場合は decided_by_uncertain: true を設定すること。
  ただし decided_by の値が「要確認」の場合は decided_by_uncertain: false のままとすること。
  [?] マーカーは具体的な人名にのみ使用し、「要確認」「TBD」「未定」等の非人名値には絶対に使用しない。
- 【決定者の推定ルール】文字起こしに決定者の明示がない場合でも、以下のパターンで特定を試みること：
  ① 「〜ということでよいですか」「〜で決定します」と言った発言者を決定者とする
  ② 役員・社長・経営層が「〜をお願いします」「〜でいきましょう」と方針を示した場合は、その人物を決定者とする
  ③ 上記で特定できない場合のみ decided_by: "要確認", decided_by_uncertain: false とする
- scope（影響範囲）が文字起こしに明示されていない場合は値の末尾に「（AIが推測）」を付記すること。
- 決定事項には条件・例外（「〇〇を除く」「〇〇を条件として」「ただし〜」等）が含まれる場合、必ず content に明記すること。

【情報源マーカーのルール（必須）】
配布資料・前回議事録・管理台帳は以下の用途のみに使用し、それ以外の目的には使用しないこと：
- 文字起こしで発言されている数値・固有名詞・スケジュールの正確な表記を確認する → 末尾に「（情報源：スライド）」
- 既存管理台帳から照合・補完した情報 → 末尾に「（情報源：管理台帳）」
- 発言の意味が取れない箇所の内容補完 → 補完した部分の末尾に「（情報源：スライド）」
例：「UATは2月末時点で197件中174件予定に対し164件実績（情報源：スライド）」
  ← これは発言で言及された内容をスライドで正確な数値を確認した場合
配布資料にのみ記載されていて発言で言及されていない項目は一切追加しない。

【（AIが推測）付記チェックリスト（出力前に必ず確認）】
以下のフィールドについて、文字起こしに明示的な発言がない場合は必ず「（AIが推測）」を末尾に付記すること：
- decisions.scope（影響範囲）：発言者が明示した場合のみ付記不要
- risks.response（対応方針）：対応策が発言で述べられていない場合は付記必須
- issues.resolution（解決策）：解決策が発言で述べられていない場合は付記必須
- exec_report.background（背景・経緯）：経緯が発言で述べられていない場合は付記必須
- manager_report.background（背景・経緯）：同上
- investment_contracts.status（ステータス）：ステータスが発言で明示されていない場合は付記必須
「迷ったら付ける」原則。不要な付記は後から削除できるが、欠落は発見しにくい。

【リスク・課題・報告事項の記述ルール】
- risks.response（対応方針）が文字起こしに対応策として明示されていない場合は末尾に「（AIが推測）」を付記。
- issues.resolution（解決策）が文字起こしに明示されていない場合は末尾に「（AIが推測）」を付記。
- exec_report.background / manager_report.background（背景・経緯）が文字起こしに明示されていない場合は末尾に「（AIが推測）」を付記。
- investment_contracts.status（ステータス）が文字起こしに明示されていない場合は末尾に「（AIが推測）」を付記。
  例：「審議予定（AIが推測）」「契約予定（AIが推測）」

【（AIが推測）マーカーの原則】
- 発言者・スライドに明示された情報 → マーカーなし
- AIが文脈・ドメイン知識から補完した情報 → 末尾に「（AIが推測）」を付記
- 迷った場合は付記する（不要な付記は後で削除できるが、欠落は発見しにくい）

【リスク・課題・保留の定義（必ずこの定義に従って分類すること）】
■ リスク（risks）: まだ顕在化していない将来の潜在的な問題・脅威。
  - 「〜になる恐れがある」「〜の可能性がある」「〜が懸念される」「〜に注意が必要」
  - 発生すればプロジェクトに悪影響を与えうる不確実な事象
  - 現時点では問題は起きていないが、放置すると課題になりうるもの
  - 「〜が遅延しており、全体計画への影響が懸念される」→ 影響が確定していない＝リスク
  - 「〜の選定が難航しており、スケジュールへの影響が出る可能性がある」→ リスク
  例: 「ベンダーのリソース不足でスケジュールが遅延するリスクがある」
  例: 「ベンダー選定が2ヶ月遅延しており、全体計画への影響が懸念される」→ リスク（影響未確定）
  NG例: すでに本番稼働に影響が出ている → 課題
  【重要】配布資料なしでも文字起こしで言及されたリスクは必ず抽出すること。
  スライドが添付されていないからといってリスク・課題の抽出を省略してはならない。

■ 課題（issues）: すでに顕在化・発生している問題。現在進行形で対応が必要な事象。
  - 「〜ができていない」「〜が未解決」「〜で詰まっている」「〜を解決する必要がある」
  - 「〜に遅延が発生している」「〜の稼働に影響が出ている」
  - 担当者・期限・解決策が求められる具体的な問題
  例: 「要件定義書の承認が得られていない」「テスト環境が準備できていない」
  例: 「商流変更とシステム開発に遅延があり、〇月稼働に影響している」→ 顕在化済みなので課題
  NG例: まだ発生していない懸念 → リスク

■ 保留（pending）: 今回の会議で結論・決定を出さなかった事項。
  - 情報不足・上位判断待ち・次回に持ち越し
  - 「持ち越し」「次回確認」「検討継続」「別途調整」「〜待ち」
  - 「いつまで〜かはっきりしていない」「決まったら案内する」「決まり次第ご連絡」
  - 「〜がまだ確定していない」「〜を継続検討」「〜はまだ未定」
  - リスクでも課題でもなく、議論や意思決定が一時停止している事項
  【重要：保留とToDoの判別】
  「いつまで作るかはっきりしていない、決まった時点でご案内する」という発言は保留。
  「〜を確認して報告する」という発言はToDo。
  期日が「要確認」のToDoであっても、そもそも着手できない・完了条件が未定の場合は保留として分類すること。`;

【STEP 1: 抽出前の網羅確認（内部処理・出力不要）】
文字起こし全体を読み、以下の観点で言及されたすべての事項を心の中でリストアップすること：

【STEP 2: 発言者の特定ルール】
- 【話者対応表が適用済みの場合（最優先）】文字起こし冒頭に「【話者ラベル置換済み】」の記載がある場合、
  その対応表の実名をそのまま発言者として記録すること。独自の推測・変更は禁止。
- 出席者リスト（${attendees}）の氏名と文字起こしの発言者を積極的に照合すること
- 【ファシリテーターの発言】基本情報に「ファシリテーター」が指定されている場合、
  その人物の「承知しました」「確認します」「〜ということでよいですか」等の発言からはToDoを生成しない。
- 【役員の発言】基本情報に「役員参加者」が指定されている場合、
  その人物の指示・依頼は重要度「高」以上として扱い、役員報告事項の抽出を優先する。
- 姓のみでの一致でも採用する（例：「宮守さん」→「宮守」）
- 名前が特定できない場合のみ「話者A」「話者B」形式を使用（番号ではなくアルファベット）
- 担当者・決定者は可能な限り実名で記載すること
- 【自己紹介の照合ルール（最重要）】文字起こし中で「〇〇です」「〇〇でございます」等の

  フルネームの中に出席者リストの名前が部分的に含まれていれば照合成立とする。
  （例：「大政弥永です」→ 出席者リスト内「弥永」と照合成立 → 発言者は「弥永」として記録）
  この照合は出席者リストの単純な読み仮名一致より優先する
- 【音声認識による人名誤変換への対処】発言者名が音声認識で別の語句に変換されることがある。
  文字起こし中の発言者名が出席者リストに見当たらない場合、音声的・字形的に類似した
  出席者名で照合を再試行すること。文脈も考慮して最も確からしい発言者名を採用する。
- 【不確かな発言者名の [?] マーキング】発言者を出席者リストから特定できず、
  文脈からの推定に頼らざるを得ない場合、content フィールド内のその発言者名の前に [?] を付ける。
  例：「[?]山田: 周辺システムのベンダーについて確認したい。」
  発言者を確実に特定できた場合は [?] を付けない。

【STEP 3: 重要度・優先度の判定基準（4段階）】
- 緊急: プロジェクト継続・マイルストーンに即時影響。当日〜3営業日以内に対応必要
- 高: マイルストーンに影響する可能性あり。1〜2週間以内に対応が望ましい
- 中: 影響はあるが回避策・猶予あり。今月中に対応
- 低: 軽微・参考情報・中長期の検討事項

【STEP 4: 課題・リスクのカテゴリ分類（必ずこのリストから選択）】
リスクカテゴリ（8種）: スケジュール | スコープ | リソース | 技術・アーキテクチャ | 予算・コスト | ガバナンス・意思決定 | データ移行・品質 | 外部依存・ベンダー
課題カテゴリ（9種）: 設計・要件 | 開発・実装 | テスト・品質 | データ・マスタ | インフラ・環境 | プロセス・運用 | ベンダー管理 | ステークホルダー調整 | ライセンス・契約

【STEP 5: 既存アイテムとの照合ルール（重要：精度最優先）】
既存アイテムが提供されている場合、以下の基準で厳密に判定すること：

■ match_type="same"（同一）の条件 ─ 以下を"すべて"満たす場合のみ
  ① 対象事項の本質的な内容・目的が既存アイテムと一致する
  ② 担当者（または担当組織）が同一または合理的に同一人物と判断できる
  ③ 会議内で当該アイテムへの言及（進捗報告・確認・議論）が明示されている
  → match_reason に「内容一致の根拠」「発言箇所の要約」を具体的に記載

■ match_type="similar"（類似）の条件 ─ 以下のいずれかを満たす場合
  ① 内容は関連しているが、担当者や範囲が異なる可能性がある
  ② 内容は一致しているが、会議内での言及が間接的・曖昧
  ③ 同一の根本課題から派生した別の事象
  → match_reason に「類似と判断した理由」「不一致点」を記載

■ match_type="new"（新規）の条件
  ① 既存リストに類似するものが存在しない
  ② 明確に新たに発生した事象・要求
  → existing_no は省略（null）

■ 照合の姿勢：不明確な場合は "similar" または "new" を選択すること。
  "same" は確証がある場合のみ使用する（誤同一判定はデータ品質を著しく損なう）。

【STEP 6: 議事内容のビジネス文書化ルール】
minutes_by_agenda の content は以下の基準で作成すること：
- 【話者改行必須】各発言は必ず「発言者名: 内容\n」形式で記載し、話者が変わるたびに必ず改行（\n）すること。複数の話者の発言を同一行に連続して記載することは絶対に禁止。
- 発言内容は口語・省略表現を補正し、ビジネス文書として適切な表現に整形する
  ただし、発言者が実際に述べた内容・範囲のみを記録すること。発言にない評価・判断は追加しない。
  （例）「なんか遅れそう」→「スケジュールに遅れが生じている旨が報告された」
  （例）「あれ、どうなった?」→「〇〇の対応状況について確認が求められた」
  （NG例）「なんか遅れそう」→「スケジュールの遅延リスクが懸念される旨が報告された」
  　　　　　（「リスクが懸念される」という評価は発言者が述べていないため追加禁止）
- 固有名詞（システム名・ベンダー名・フェーズ名）は正確に記載
- 1議題あたり5〜15行程度を目安とし、議論の流れが伝わるよう構成する
- 決定に至る経緯・反対意見・条件なども記載する
- 【Q&Aの記録形式：最重要】質疑応答は以下の形式で1ブロックとして記録すること：
  「（質問者名）: 質問内容\n　→ （回答者名）: 回答内容・対応方針（★N）」
  ※ 回答行の先頭は必ず全角スペース＋「→ 」で始めること（インデント表示のため）
  ToDoがある場合、★Nは回答行末尾にのみ付ける。質問行に★を付けることは禁止。
  同一Q&Aから質問ToDo・回答ToDo を2件生成することは絶対禁止。回答側から1件のみ生成。
- 【ToDoの記載と番号付け：最重要】todos 配列の各アクションは、それが議論された議題の content に必ず記載すること。記載する際は、該当の文の末尾に「★N」（Nは todos 配列の1始まりのインデックス番号）を付けること。例：todos[0]（1番目）のToDo→「★1」、todos[1]（2番目）→「★2」。ToDoの記載行は必ず独立した1行とし、話者名から始めること。全てのToDoについて漏れなく★N付きで記載すること。★なしでToDoの内容が議事内容に含まれることは絶対に不可。
- 【保留・継続審議の記載と番号付け：最重要】pending 配列の各保留事項は、それが議論された議題の content に必ず記載すること。記載する際は該当の文の末尾に「保N」（Nは pending 配列の1始まりのインデックス番号）を付けること。例：pending[0]→「保1」、pending[1]→「保2」。保留事項の記載行は必ず独立した1行とし、話者名から始めること。全ての保留事項について漏れなく保N付きで記載すること。保N なしで保留の内容が議事内容に含まれることは絶対に不可。
- 【リスクの記載と番号付け】risks 配列の各リスクは、それが議論された議題の content に必ず記載すること。記載する際は該当の文の末尾に「リN」（Nは risks 配列の1始まりのインデックス番号）を付けること。例：risks[0]→「リ1」、risks[1]→「リ2」。
- 【課題の記載と番号付け】issues 配列の各課題は、それが議論された議題の content に必ず記載すること。記載する際は該当の文の末尾に「課N」（Nは issues 配列の1始まりのインデックス番号）を付けること。例：issues[0]→「課1」、issues[1]→「課2」。

以下のJSON構造で出力してください（マークダウン不要、JSONのみ）:
{"agenda_items":["議題1","議題2"],"minutes_by_agenda":[{"title":"議題名","content":"発言者名: 内容。不確かな発言者は [?]発言者名: の形式でマーク。"}],"decisions":[{"content":"決定内容","decided_by":"決定者（不明な場合は要確認）","decided_by_uncertain":false,"scope":"影響範囲（文字起こしに明示がない場合は末尾に（AIが推測）を付記）","importance":"高","priority":"高"}],"todos":[{"content":"アクション内容","assignee":"担当者","assignee_uncertain":false,"due":"YYYY/MM/DD または ○月末 または YYYY年○月以降 または 要確認 または 未定","importance":"高","priority":"高","match_type":"new","existing_no":null,"progress":"","match_reason":""}],"pending":[{"content":"保留事項","reason":"保留理由","next_action":"次回の扱い・期限"}],"risks":[{"content":"リスク内容","category":"スケジュール","impact":"高","probability":"中","response":"対応方針（文字起こしに明示がない場合は末尾に（AIが推測）を付記）","owner":"担当者","importance":"高","priority":"高","match_type":"new","existing_no":null,"progress":"","match_reason":""}],"issues":[{"content":"課題内容","category":"設計・要件","owner":"担当者","due":"YYYY/MM/DD または 未定 または 要確認","resolution":"解決策（文字起こしに明示がない場合は末尾に（AIが推測）を付記）","importance":"中","priority":"中","match_type":"new","existing_no":null,"progress":"","match_reason":""}],"exec_report":[{"content":"報告内容","decision_needed":"要","background":"背景・経緯（文字起こしに明示がない場合は末尾に（AIが推測）を付記）","recipient":"報告先役員名","deadline":"YYYY/MM/DD または 未定 または 要確認","importance":"緊急","priority":"緊急","match_type":"new","existing_no":null,"progress":"","match_reason":""}],"manager_report":[{"content":"報告内容","action_needed":"要","background":"背景・経緯（文字起こしに明示がない場合は末尾に（AIが推測）を付記）","recipient":"担当室長名","deadline":"YYYY/MM/DD または 未定 または 要確認","importance":"高","priority":"高","match_type":"new","existing_no":null,"progress":"","match_reason":""}],"investment_contracts":[{"type":"設備投資審議 または 次期契約 または 保守契約","content":"案件内容","vendor":"ベンダー名","period":"実施期間","status":"審議予定 または 承認待ち または 契約予定 または 継続（文字起こしに明示がない場合は末尾に（AIが推測）を付記）"}]}`;

  // ── Pass 1: メイン抽出 ──────────────────────────────────────
  onLog('🤖 [1/2] 文字起こしを解析・照合中（高精度モード）...');

  // 配布資料のファイルをAPIに添付（PDF・画像のみ）
  // ── サイズ上限：モバイル回線は厳しめ ──
  const isMobile = /iPhone|iPad|Android|Mobile/i.test(navigator.userAgent);
  const FILE_MAX_BYTES  = isMobile ? 3 * 1024 * 1024 : 5 * 1024 * 1024;   // mobile:3MB / PC:5MB
  const TOTAL_MAX_BYTES = isMobile ? 5 * 1024 * 1024 : 8 * 1024 * 1024;   // mobile:5MB / PC:8MB
  const materialContent = [];
  const matFiles = (basicInfo.materials||[]).filter(m=>m.blobUrl && m.name);
  let totalMatBytes = 0;

  if (matFiles.length > 0) {
    onLog('📎 配布資料を読み込み中...');
    for (const mat of matFiles) {
      const ext = mat.name.split('.').pop().toLowerCase();
      try {
        // ファイルサイズ取得
        const resp = await fetch(mat.blobUrl);
        const blob = await resp.blob();
        const fileSizeBytes = blob.size;

        if (fileSizeBytes > FILE_MAX_BYTES) {
          onLog(`⚠️ ${mat.name}（${(fileSizeBytes/1024/1024).toFixed(1)}MB）はサイズ上限（5MB）を超えるためスキップします`);
          continue;
        }
        if (totalMatBytes + fileSizeBytes > TOTAL_MAX_BYTES) {
          onLog(`⚠️ 資料の合計サイズ上限（8MB）に達したため ${mat.name} 以降をスキップします`);
          break;
        }

        // Base64変換
        const b64 = await new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result.split(',')[1]);
          r.onerror = reject;
          r.readAsDataURL(blob);
        });

        if (ext === 'pdf') {
          materialContent.push({ type:'document', source:{ type:'base64', media_type:'application/pdf', data:b64 } });
          materialContent.push({ type:'text', text:`↑ 配布資料: ${mat.name}` });
          totalMatBytes += fileSizeBytes;
        } else if (['png','jpg','jpeg','webp'].includes(ext)) {
          const mt = {png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',webp:'image/webp'}[ext];
          materialContent.push({ type:'image', source:{ type:'base64', media_type:mt, data:b64 } });
          materialContent.push({ type:'text', text:`↑ 配布資料（画像）: ${mat.name}` });
          totalMatBytes += fileSizeBytes;
        } else if (ext === 'pptx') {
          const text = await extractPptxText(mat.blobUrl);
          if (text.trim()) {
            materialContent.push({ type:'text', text:`【スライドテキスト（${mat.name}）】\n${text}` });
            totalMatBytes += new Blob([text]).size;
          }
        }
      } catch(e) { onLog(`⚠️ ${mat.name} 読み込みスキップ: ${e.message}`); }
    }
    if (materialContent.length > 0) {
      onLog(`✅ 資料読み込み完了（合計 ${(totalMatBytes/1024/1024).toFixed(1)}MB）`);
    }
  }

  const messageContent = materialContent.length > 0
    ? [...materialContent, { type:'text', text:`【重要】上記の配布資料の内容を参照して解析の精度を高めてください。固有名詞・数値・アジェンダ構造は資料の記載を正とします。\n\n${prompt}` }]
    : prompt;

  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:16000,
      temperature:0,
      system:SYSTEM_PROMPT,
      messages:[{role:'user', content: messageContent}]
    }),
    signal: signal || undefined
  });
  if(!res.ok) throw new Error(`API Error ${res.status}: ${await res.text()}`);
  const data = await res.json();

  // stop_reason チェック：max_tokens で打ち切られた場合はログに警告
  if(data.stop_reason === 'max_tokens') onLog('⚠️ 出力が上限に達しました。結果が不完全な場合は文字起こしを短くしてお試しください。');

  const text = data.content[0].text;
  let totalCost = calcCost(data.usage);
  let totalUsage = {...(data.usage||{})};
  let pass1Result;
  try {
    pass1Result = repairAndParseJSON(text);
  } catch(e) {
    throw new Error('JSON解析失敗（Pass1）: ' + e.message);
  }

  // ── Pass 2: 漏れ確認パス ────────────────────────────────────
  onLog('🔍 [2/2] 漏れ確認パス実行中...');
  const summaryForVerify = [
    pass1Result.decisions?.length  ? `【抽出済み決定事項】\n`+pass1Result.decisions.map((d,i)=>`${i+1}. ${d.content}`).join('\n') : '',
    pass1Result.todos?.length       ? `【抽出済みToDo】\n`+pass1Result.todos.map((t,i)=>`${i+1}. ${t.content}（担当:${t.assignee}　期日:${t.due||'未定'}）`).join('\n') : '',
    pass1Result.risks?.length       ? `【抽出済みリスク】\n`+pass1Result.risks.map((r,i)=>`${i+1}. ${r.content}`).join('\n') : '',
    pass1Result.issues?.length      ? `【抽出済み課題】\n`+pass1Result.issues.map((r,i)=>`${i+1}. ${r.content}`).join('\n') : '',
    pass1Result.pending?.length     ? `【抽出済み保留】\n`+pass1Result.pending.map((r,i)=>`${i+1}. ${r.content}`).join('\n') : '',
    pass1Result.exec_report?.length ? `【抽出済み役員報告】\n`+pass1Result.exec_report.map((r,i)=>`${i+1}. ${r.content}`).join('\n') : '',
    pass1Result.investment_contracts?.length ? `【抽出済み投資・契約案件】\n`+pass1Result.investment_contracts.map((r,i)=>`${i+1}. [${r.type||''}] ${r.content} ベンダー:${r.vendor||'未定'} 期間:${r.period||'未定'}`).join('\n') : '',
  ].filter(Boolean).join('\n\n');

  const verifyPrompt = `以下の文字起こしから、すでに抽出済みの項目リストを提示します。
文字起こし全体を最初から最後まで再精読し、リストに含まれていない「決定事項」「ToDo」「リスク」「課題」「保留」「役員報告」が1件でもないか確認してください。

${summaryForVerify}

【文字起こし（再確認対象）】
${speakerNote}${processedTranscript}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
【確認観点①：漏れチェック（文字起こしのみ根拠とすること）】
- 上記リストに含まれていない「〜してください」「〜をお願いします」発言はないか
- 上記リストに含まれていない決定・合意・方針確定の発言はないか
- 上記リストに含まれていない懸念・問題・課題の発言はないか
- 上記リストに含まれていない保留・継続審議事項はないか（「決まり次第ご案内」「はっきりしていない」等）
- 上記リストに含まれていない投資案件・契約案件はないか
⚠️ 重要：追加する項目の根拠は必ず文字起こしの発言とすること。配布資料（スライド等）にのみ記載されている内容は追加しない。

【確認観点②：ToDo期日の精緻化（最重要）】
Pass1で due が「要確認」「未定」になっているToDoについて、以下を確認すること：
- 文字起こし中に「〇月まで」「〇月末」「〇月以降」「〇月から」等の時期に関する発言がないか
- 添付スライド（マスタースケジュール・工程表等）に期日の記載がないか
より具体的な期日（○月末・YYYY年○月以降等）に変更できる場合は、追記として todos 配列に含めること。
ただし推測・補完は禁止。文字起こしまたはスライドに明示がある場合のみ変更すること。

【確認観点③：ToDo品質フィルタ】
Pass1で生成された以下のようなToDoは除外（no_additionalに追記しないこと）：
- 方針・意向の表明のみで成果物が不明（「〜と連携して進める」「〜を活用して効率化していく」等）
- 他のToDoと内容が7割以上重複するもの

【期日ルール（Pass1と同じ5段階）】
- 明示された日付のみ記載。段階：①YYYY/MM/DD ②○月末 ③YYYY年○月以降 ④要確認 ⑤未定
- 推測・補完は一切禁止。「決まり次第案内」等→要確認、言及なし→未定。

漏れが見つかった場合のみ、以下のJSON形式で追記分だけを出力してください（マークダウン不要）。
漏れが全くない場合は {"no_additional":true} とだけ出力してください。

{"no_additional":false,"decisions":[...],"todos":[...],"risks":[...],"issues":[...],"pending":[...],"exec_report":[...],"manager_report":[...],"investment_contracts":[...]}

※ 各配列の要素のフォーマットはPass1と同じ形式を使用すること。追記がないカテゴリは空配列[]でよい。`;

  try {
    const res2 = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        temperature:0,
        system:SYSTEM_PROMPT,
        messages:[{role:'user',content:verifyPrompt}]
      }),
      signal: signal || undefined
    });
    if(res2.ok){
      const data2 = await res2.json();
      totalCost += calcCost(data2.usage);
      if(data2.usage){
        totalUsage.input_tokens  = (totalUsage.input_tokens||0)  + (data2.usage.input_tokens||0);
        totalUsage.output_tokens = (totalUsage.output_tokens||0) + (data2.usage.output_tokens||0);
      }
      const text2 = data2.content[0].text;
      try {
        const additional = repairAndParseJSON(text2);
        const addedCounts = ['decisions','todos','risks','issues','pending','exec_report','manager_report','investment_contracts']
          .filter(k=>Array.isArray(additional[k])&&additional[k].length>0)
          .map(k=>`${k}:+${additional[k].length}`).join(' ');
        if(addedCounts) onLog(`✅ 漏れ確認完了 — 追記あり（${addedCounts}）`);
        else onLog('✅ 漏れ確認完了 — 追記なし');
        pass1Result = mergeVerification(pass1Result, additional);
      } catch(e2){ onLog('⚠️ 漏れ確認パース失敗（Pass1結果を使用）'); }
    }
  } catch(e){ onLog('⚠️ 漏れ確認パス失敗（Pass1結果を使用）'); }

  onLog('📊 データを整理中...');
  pass1Result._cost  = totalCost;
  pass1Result._usage = totalUsage;
  return pass1Result;
}

function ApiKeyModal({onSave,onClose,current,currentAdmin,onSaveAdmin}){
  const [key,setKey]=useState(current||'');
  const [adminKey,setAdminKey]=useState(currentAdmin||'');
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">🔑 API キー設定</div>
        <div className="notice notice-info">APIキーは <strong>console.anthropic.com</strong> で発行できます。入力内容はブラウザのlocalStorageに保存されます。</div>
        <label>Claude APIキー <span className="req">*</span></label>
        <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-api03-..." autoFocus/>
        <div style={{marginTop:14}}>
          <label>Admin APIキー <span style={{fontSize:11,color:'#718096',fontWeight:400}}>（利用コスト取得用・任意）</span></label>
          <input type="password" value={adminKey} onChange={e=>setAdminKey(e.target.value)} placeholder="sk-ant-admin01-..." style={{marginTop:4}}/>
          <div style={{fontSize:11,color:'#718096',marginTop:4}}>
            コンソール → Settings → Admin API Keys で発行。通常のAPIキーとは別です。
