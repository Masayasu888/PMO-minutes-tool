function StepIndicator({step,setStep,maxReached,hasResult,validation,analyzing}){
  // validation: { 1: {ok:bool, warnings:[]}, 2: {ok:bool, warnings:[]}, ... }
  return(
    <div className="steps" style={{alignItems:'center',position:'relative'}}>
      {analyzing && (
        <div style={{position:'absolute',inset:0,borderRadius:10,background:'rgba(255,255,255,0.65)',
          zIndex:10,display:'flex',alignItems:'center',justifyContent:'center',cursor:'not-allowed'}}>
          <span style={{fontSize:11,color:'#718096',fontWeight:600,background:'#fff',
            padding:'3px 12px',borderRadius:20,border:'1px solid #d0d8e4'}}>
            🔒 AI解析中は移動できません
          </span>
        </div>
      )}
      {STEPS.map((s,idx)=>{
        const isActive = s.n === step;
        const isAI = s.n === 3;
        const isAIPre = s.n === 2;
        const visited = s.n <= maxReached;
        const v = validation && validation[s.n];
        // バリデーション状態の判定
        const hasError   = visited && v && !v.ok;
        const hasOk      = visited && v && v.ok;
        const isAIDone   = isAI && !!hasResult;
        const cls = [
          'step-item',
          isAI ? 'ai-action' : '',
          isAIPre ? 'ai-pre' : '',
          isActive ? 'active' : '',
          // done は AI完了時のみ（他はvalidation表示に切り替え）
          isAIDone ? 'done' : '',
        ].filter(Boolean).join(' ');

        // ステップ円のコンテンツと色
        let circleContent, circleStyle={};
        if (isAI) {
          circleContent = <span className="ai-inner">{isAIDone ? '✓' : '⚡'}</span>;
        } else if (isActive) {
          circleContent = s.n < 3 ? s.n : s.n - 1;
        } else if (hasError) {
          circleContent = '!';
          circleStyle = {borderColor:'#E53E3E', background:'#FFF5F5', color:'#E53E3E'};
        } else if (hasOk) {
          circleContent = '✓';
          circleStyle = {borderColor:'#38A169', background:'#F0FFF4', color:'#38A169'};
        } else {
          circleContent = s.n < 3 ? s.n : s.n - 1;
        }

        return(
          <div key={s.n} className={cls} onClick={()=>setStep(s.n)} style={{cursor:'pointer'}}>
            {isAI ? (
              <>
                <div className="step-circle">
                  <span className="ai-inner">{isAIDone ? '✓' : '⚡'}</span>
                </div>
                <div className="step-label" style={{fontSize:9,letterSpacing:.2}}>
                  AI解析<br/><span style={{color:'#a0aec0',fontWeight:400,fontSize:8}}>自動処理</span>
                </div>
              </>
            ) : (
              <>
                <div className="step-circle" style={circleStyle}>{circleContent}</div>
                <div className="step-label" style={hasError?{color:'#E53E3E'}:hasOk&&!isActive?{color:'#38A169'}:{}}>
                  {s.label}
                  {hasError && v.warnings && v.warnings.length > 0 && (
                    <div style={{fontSize:8,color:'#E53E3E',fontWeight:600,marginTop:2,lineHeight:1.3,whiteSpace:'normal',maxWidth:72}}>
                      {v.warnings[0]}
                    </div>
                  )}
                </div>
              </>
            )}
          </div>
        );
      })}
    </div>
  );
}

function buildValidation(basicInfo, transcript, result) {
  const step1Warnings = [];
  if (!basicInfo.meetingName) step1Warnings.push('会議名が未入力');
  if (!basicInfo.date)        step1Warnings.push('日付が未入力');
  if (!basicInfo.startTime)   step1Warnings.push('開始時刻が未入力');
  if ((basicInfo.attendees||[]).length === 0) step1Warnings.push('出席者が未入力');

  const step2Warnings = [];
  if (!transcript) step2Warnings.push('文字起こしが未入力');

  return {
    1: { ok: step1Warnings.length === 0, warnings: step1Warnings },
    2: { ok: step2Warnings.length === 0, warnings: step2Warnings },
    3: { ok: !!result, warnings: result ? [] : ['未解析'] },
    4: { ok: !!result, warnings: [] },
    5: { ok: !!result, warnings: [] },
  };
}

// ── 資料解析・辞書自動生成ユーティリティ ──────────────────
async function blobUrlToBase64(blobUrl) {
  const res = await fetch(blobUrl);
  const blob = await res.blob();
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}

async function extractPptxText(blobUrl) {
  try {
    const res = await fetch(blobUrl);
    const ab = await res.arrayBuffer();
    const zip = await JSZip.loadAsync(ab);
    const slideKeys = Object.keys(zip.files)
      .filter(n => /^ppt\/slides\/slide\d+\.xml$/.test(n))
      .sort((a,b) => {
        const na = parseInt(a.match(/\d+/)[0]);
        const nb = parseInt(b.match(/\d+/)[0]);
        return na - nb;
      });
    let text = '';
    for (const sk of slideKeys) {
      const xml = await zip.files[sk].async('string');
      const matches = xml.match(/<a:t(?:\s[^>]*)?>([^<]*)<\/a:t>/g) || [];
      const slideText = matches.map(m => m.replace(/<[^>]+>/g,'')).filter(Boolean).join(' ');
      if (slideText.trim()) text += slideText.trim() + '\n---\n';
    }
    return text;
  } catch(e) { return ''; }
}

async function autoGenerateGlossary(materials, apiKey) {
  const targets = (materials||[]).filter(m => m.blobUrl && m.name);
  if (!targets.length) return { candidates:[], error:'添付ファイルがありません。配布・投影資料にファイルを添付してください。' };

  const content = [];
  let hasContent = false;

  for (const mat of targets) {
    const ext = mat.name.split('.').pop().toLowerCase();
    try {
      if (ext === 'pdf') {
        const b64 = await blobUrlToBase64(mat.blobUrl);
        content.push({ type:'document', source:{ type:'base64', media_type:'application/pdf', data:b64 } });
        content.push({ type:'text', text:`↑ファイル名: ${mat.name}` });
        hasContent = true;
      } else if (['png','jpg','jpeg','webp','gif'].includes(ext)) {
        const b64 = await blobUrlToBase64(mat.blobUrl);
        const mt = { png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg', webp:'image/webp', gif:'image/gif' }[ext];
        content.push({ type:'image', source:{ type:'base64', media_type:mt, data:b64 } });
        content.push({ type:'text', text:`↑ファイル名: ${mat.name}` });
        hasContent = true;
      } else if (ext === 'pptx') {
        const text = await extractPptxText(mat.blobUrl);
        if (text.trim()) {
          content.push({ type:'text', text:`【スライドテキスト抽出（${mat.name}）】\n${text}` });
          hasContent = true;
        }
      }
    } catch(e) { console.warn('スキップ:', mat.name, e); }
  }

  if (!hasContent) return { candidates:[], error:'PDF・画像・PPTXファイルのみ自動生成に対応しています。' };

  content.push({ type:'text', text:`上記の資料に含まれる固有名詞・システム名・製品名・略語・専門用語から、会議の音声認識で誤記・誤変換されやすい項目を抽出してください。

各項目について「音声認識される読み方または誤記 → 正しい表記（補足）」の形式で列挙してください。
マークダウンや説明文は不要です。JSONのみ返答してください：
{"glossary":["ガラス → Aras（PLMパッケージ）","KDX → OKDX（プロジェクト名）"]}` });

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2000, temperature:0, messages:[{role:'user',content}] })
  });
  if (!res.ok) throw new Error(`API Error ${res.status}`);
  const data = await res.json();
  const raw = data.content[0].text.trim().replace(/^```json\s*/,'').replace(/\s*```$/,'');
  const parsed = JSON.parse(raw);
  return { candidates: parsed.glossary || [], error:null };
}

// ── 話者ラベル検出・置換ユーティリティ ───────────────────
/**
 * 文字起こしから「話者N」「Speaker N」等のラベルを検出して一覧を返す
 * @returns [{label:'話者 1', count:15}, ...]  出現回数順
 */
function detectSpeakerLabels(transcript) {
  if (!transcript) return [];
  const freq = {};
  // 対応パターン：話者 N / 話者N / SpeakerN / Speaker N / 話者A 等
  const RE = /^(話者\s*\d+|Speaker\s*\d+|話者\s*[A-Z]|SPEAKER_\d+)(?:\s|$|:)/gim;
  let m;
  while ((m = RE.exec(transcript)) !== null) {
    const raw = m[1].trim().replace(/\s+/g, ' '); // "話者  5" → "話者 5" 正規化
    freq[raw] = (freq[raw] || 0) + 1;
  }
  return Object.entries(freq)
    .sort((a,b) => {
      // 「話者 1」「話者 2」...の順に並べるため番号でソート
      const na = parseInt(a[0].match(/\d+/)?.[0] || 0);
      const nb = parseInt(b[0].match(/\d+/)?.[0] || 0);
      return na - nb;
    })
    .map(([label, count]) => ({ label, count }));
}

/**
 * speakerMap に従い文字起こし内の話者ラベルを実名に置換する
 * @param {string} transcript
 * @param {Array<{label:string,name:string}>} speakerMap
 * @returns {string} 置換済みテキスト
 */
function applySpeakerMap(transcript, speakerMap) {
  if (!transcript || !speakerMap || speakerMap.length === 0) return transcript;
  const valid = speakerMap.filter(m => m.label && m.name && m.name.trim());
  if (valid.length === 0) return transcript;
  // ラベルの長いものから順に置換（部分一致を防ぐ）
  const sorted = [...valid].sort((a,b) => b.label.length - a.label.length);
  let result = transcript;
  for (const {label, name} of sorted) {
    const esc = label.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    // 「話者 5 35:26」の「話者 5」部分だけを置換（時刻は残す）
    result = result.replace(new RegExp(esc + '(?=\\s|:|：|\\n|$)', 'gm'), name.trim());
  }
  return result;
}

function SpeakerMappingInput({ value, onChange, transcript, attendees }) {
  const [items, setItems] = React.useState(()=> value && value.length ? value : []);
  const [detecting, setDetecting] = React.useState(false);

  // 外部からvalueが変わったら同期
  React.useEffect(() => { if(value) setItems(value); }, [JSON.stringify(value)]);

  // 変更を親に通知
  const emit = (next) => { setItems(next); onChange(next); };

  const upd = (i, key, val) => emit(items.map((it,idx)=>idx===i?{...it,[key]:val}:it));
  const del = (i) => emit(items.filter((_,idx)=>idx!==i));
  const add = () => emit([...items, {label:'', name:''}]);

  // 出席者の名前リスト（datalist用）
  const nameList = (attendees||[]).flatMap(a => {
    const names = [];
    if (a.name) names.push(a.name);
    if (a.members) a.members.forEach(m => m.name && names.push(m.name));
    return names;
  }).filter(Boolean);

  // 文字起こしから話者ラベルを自動検出
  const handleDetect = () => {
    if (!transcript || !transcript.trim()) {
      alert('先にStep2で文字起こしを入力してください。');
      return;
    }
    setDetecting(true);
    try {
      const detected = detectSpeakerLabels(transcript);
      if (detected.length === 0) {
        alert('話者ラベル（「話者N」「Speaker N」等）が見つかりませんでした。\n話者分離されていない文字起こしの場合は対応表の入力は不要です。');
        return;
      }
      // 既存マッピングを保持しつつ新規ラベルを追加
      const existingLabels = new Set(items.map(it=>it.label));
      const toAdd = detected.filter(d=>!existingLabels.has(d.label));
      const next = [...items, ...toAdd.map(d=>({label:d.label, name:'', count:d.count}))];
      emit(next);
    } finally {
      setDetecting(false);
    }
  };

  const hasTranscript = transcript && transcript.trim().length > 50;
  const detectedCount = detectSpeakerLabels(transcript).length;

  return (
    <div>
      {/* 状態インジケーター */}
      {hasTranscript && (
        <div style={{
          display:'flex',alignItems:'center',justifyContent:'space-between',
          background: detectedCount > 0 ? '#EBF8FF' : '#F0FFF4',
          border:`1px solid ${detectedCount > 0 ? '#BEE3F8' : '#9AE6B4'}`,
          borderRadius:6, padding:'7px 12px', marginBottom:10, flexWrap:'wrap', gap:6
        }}>
          <span style={{fontSize:11,color: detectedCount > 0 ? '#2B6CB0' : '#276749'}}>
            {detectedCount > 0
              ? `📊 文字起こしに話者ラベルが ${detectedCount} 種類検出されました（話者分離あり）`
              : `✅ 話者ラベルなし — 話者分離なしの文字起こしです（対応表の入力は不要）`}
          </span>
          {detectedCount > 0 && (
            <button onClick={handleDetect} disabled={detecting}
              style={{background:'#2B6CB0',color:'#fff',border:'none',borderRadius:5,
                padding:'4px 12px',fontSize:11,fontWeight:700,cursor:'pointer',flexShrink:0}}>
              {detecting ? '検出中…' : '🔍 ラベルを対応表に取り込む'}
            </button>
          )}
        </div>
      )}
      {!hasTranscript && (
        <div style={{fontSize:11,color:'#a0aec0',marginBottom:8,padding:'6px 10px',
          background:'#f8fafc',borderRadius:6,border:'1px solid #e2e8f0'}}>
          💡 Step2で文字起こしを入力すると、話者ラベルを自動検出できます
        </div>
      )}

      {/* 対応表エントリ */}
      {items.length > 0 && (
        <div style={{display:'flex',flexDirection:'column',gap:4,marginBottom:8}}>
          {/* ヘッダー */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 18px 1fr 28px',gap:4,
            padding:'3px 8px',fontSize:10,fontWeight:700,color:'#718096'}}>
            <span>話者ラベル</span><span></span><span>実名（出席者から選択可）</span><span></span>
          </div>
          {items.map((it,i)=>(
            <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 18px 1fr 28px',
              gap:4,alignItems:'center'}}>
              <input value={it.label||''} onChange={e=>upd(i,'label',e.target.value)}
                placeholder="話者 1"
                style={{padding:'5px 8px',fontSize:12,border:'1.5px solid #d0d8e4',
                  borderRadius:5,fontFamily:'monospace',background:'#f8fafc'}}/>
              <span style={{textAlign:'center',color:'#9AE6B4',fontWeight:700}}>→</span>
              <div style={{position:'relative'}}>
                <input list={`speaker-name-list-${i}`} value={it.name||''}
                  onChange={e=>upd(i,'name',e.target.value)}
                  placeholder="本間 靖之"
                  style={{padding:'5px 8px',fontSize:12,border:'1.5px solid #d0d8e4',
                    borderRadius:5,width:'100%',
                    background: it.name ? '#f0fff4' : '#fff',
                    borderColor: it.name ? '#9AE6B4' : '#d0d8e4'}}/>
                <datalist id={`speaker-name-list-${i}`}>
                  {nameList.map((n,j)=><option key={j} value={n}/>)}
                </datalist>
              </div>
              <button onClick={()=>del(i)}
                style={{background:'none',border:'none',cursor:'pointer',color:'#ccc',
                  fontSize:15,padding:0,lineHeight:1}}
                onMouseOver={e=>e.currentTarget.style.color='#e53e3e'}
                onMouseOut={e=>e.currentTarget.style.color='#ccc'}>🗑</button>
            </div>
          ))}
        </div>
      )}

      {/* 追加ボタン */}
      <button onClick={add}
        style={{background:'none',border:'1.5px dashed #2E75B6',color:'#2E75B6',
          borderRadius:6,padding:'6px 14px',fontSize:12,cursor:'pointer',
          width:'100%',marginTop:items.length>0?0:0}}>
        ＋ 話者を手動で追加
      </button>

      {/* 有効マッピング数サマリー */}
      {items.length > 0 && (
        <div style={{fontSize:10,color:'#718096',marginTop:5,textAlign:'right'}}>
          {items.filter(it=>it.label&&it.name).length} / {items.length} 件が実名登録済み
          {items.some(it=>it.label&&!it.name) &&
            <span style={{color:'#e67e22',marginLeft:6}}>⚠ 未入力の話者があります</span>}
        </div>
      )}
    </div>
  );
}

// ── 配布資料リンク入力コンポーネント ──────────────────────
// materials: [{name:'', url:'', blobUrl:'', isLocal:false}]
function MaterialsInput({ value, onChange }){
  const [items, setItems] = useState(()=>{
    if(value && Array.isArray(value) && value.length>0) return value;
    return [{name:'', url:'', blobUrl:'', isLocal:false}];
  });
  const [showFolderPicker, setShowFolderPicker] = useState(false);
  const [folderFiles, setFolderFiles] = useState([]);
  const [folderName, setFolderName] = useState('');

  useEffect(()=>{ onChange(items); }, [items]);

  const upd = (i, key, val) => {
    setItems(items.map((it,idx)=>idx===i?{...it,[key]:val}:it));
  };
  const add = () => setItems([...items, {name:'', url:'', blobUrl:'', isLocal:false}]);
  const del = (i) => {
    // Blob URLを解放
    if(items[i].blobUrl) URL.revokeObjectURL(items[i].blobUrl);
    const next = items.filter((_,idx)=>idx!==i);
    setItems(next.length ? next : [{name:'', url:'', blobUrl:'', isLocal:false}]);
  };

  const folderInputRef = useRef();

  const handleFolderChange = (e) => {
    const allFiles = Array.from(e.target.files || []);
    e.target.value = '';
    if (allFiles.length === 0) return;
    const fileEntries = allFiles
      .filter(f => !f.name.startsWith('.') && f.name !== 'Thumbs.db' && f.name !== 'desktop.ini')
      .sort((a,b) => a.name.localeCompare(b.name, 'ja'))
      .map(f => ({ name: f.name, file: f, handle: null }));
    setFolderName(`${allFiles.length}件選択`);
    setFolderFiles(fileEntries);
    setShowFolderPicker(true);
  };

  // ファイルを選択して追加
  const [dupWarning, setDupWarning] = useState([]); // 重複ファイル名リスト

  const pickFile = async (fileInfo, checked) => {
    if(!checked) return;
    // 重複チェック（既存の名前付きアイテムと一致する場合は警告して取り込まない）
    const already = items.some(it => it.name === fileInfo.name && it.name);
    if(already){
      setDupWarning([fileInfo.name]);
      return;
    }
    try {
      const file = fileInfo.file
        ? fileInfo.file
        : await fileInfo.handle.getFile();
      const blobUrl = URL.createObjectURL(file);
      const newItem = { name: fileInfo.name, url: '', blobUrl, isLocal:true };
      const emptyIdx = items.findIndex(it=>!it.name && !it.url);
      if(emptyIdx >= 0) {
        setItems(items.map((it,i)=>i===emptyIdx ? newItem : it));
      } else {
        setItems([...items, newItem]);
      }
    } catch(e) { alert('ファイル読み込みエラー: ' + e.message); }
  };

  // フォルダ選択・直接選択でファイルを一括追加
  const addFromFileInput = (files) => {
    const newItems = [...items];
    const dups = [];
    Array.from(files).forEach(file => {
      // 重複チェック
      const already = newItems.some(it => it.name === file.name && it.name);
      if(already){ dups.push(file.name); return; }
      const blobUrl = URL.createObjectURL(file);
      // blobUrl はローカル開封用。url（Word埋め込みリンク）は別管理
      const newItem = { name: file.name, url: '', blobUrl, isLocal:true };
      const emptyIdx = newItems.findIndex(it=>!it.name && !it.url);
      if(emptyIdx >= 0) newItems[emptyIdx] = newItem;
      else newItems.push(newItem);
    });
    if(dups.length > 0) setDupWarning(dups);
    setItems(newItems);
  };

  return(
    <div>
      {items.map((item,i)=>{
        // ファイル名からBox検索URL生成（拡張子除去して検索しやすく）
        const searchName = (item.name||'').replace(/\.[^.]+$/, '');
        const boxSearchUrl = `https://app.box.com/search?query=${encodeURIComponent(searchName)}`;
        return (
        <div key={i} style={{marginBottom:4}}>
          <div className="material-item" style={{alignItems:'center'}}>
            <span className="material-link-icon">{item.isLocal ? '💾' : '📄'}</span>
            <input className="material-name" value={item.name}
              onChange={e=>upd(i,'name',e.target.value)}
              placeholder="資料名（例: アジェンダ_v1.0）"/>
            <span className="material-divider">｜</span>
            <span className="material-link-icon" style={{color: item.url?'#2E75B6':'#a0aec0'}}>🔗</span>
            <input className="material-url" value={item.url}
              onChange={e=>upd(i,'url',e.target.value)}
              onFocus={async(e)=>{
                // フォーカス時にクリップボードにBOX URLがあれば自動貼り付け
                if(!item.url && navigator.clipboard){
                  try{
                    const txt=(await navigator.clipboard.readText()).trim();
                    if(txt.startsWith('https://') && (txt.includes('box.com') || txt.includes('sharepoint.com'))){
                      upd(i,'url',txt);
                    }
                  }catch(e){}
                }
              }}
              placeholder={item.isLocal ? 'BOX URL（クリックで自動貼り付け）' : 'URL（任意）'}
              style={{color:'#2E75B6'}}/>
            {item.name && !item.url && (
              <a href={boxSearchUrl} target="_blank" rel="noreferrer"
                title={`「${searchName}」をBOXで検索して開く`}
                style={{flexShrink:0,background:'#0061D5',color:'#fff',
                  borderRadius:5,padding:'3px 8px',fontSize:11,fontWeight:700,
                  textDecoration:'none',whiteSpace:'nowrap',lineHeight:1.5,
                  display:'flex',alignItems:'center',gap:3}}>
                <span style={{fontSize:13}}>📦</span> BOX検索
              </a>
            )}
            {item.url && (
              <a href={item.url} target="_blank" rel="noreferrer"
                style={{fontSize:11,color:'#2E75B6',textDecoration:'none',flexShrink:0,padding:'0 4px'}}
                title="開く">↗</a>
            )}
            <button className="material-del" onClick={()=>del(i)}>🗑</button>
          </div>
          {item.isLocal && !item.url && (
            <div style={{fontSize:10,color:'#0061D5',paddingLeft:28,marginTop:2,lineHeight:1.6}}>
              💡 <strong>📦 BOX検索</strong>ボタン → ファイルを開く → URLをコピー →
              URL欄をクリックで自動貼り付け
            </div>
          )}
        </div>
        );
      })}

      {/* 重複ファイル警告 */}
      {dupWarning.length > 0 && (
        <div style={{margin:'6px 0',padding:'8px 12px',background:'#FFFBEB',border:'1.5px solid #F6AD55',borderRadius:6,display:'flex',alignItems:'flex-start',gap:8}}>
          <span style={{fontSize:15,flexShrink:0}}>⚠️</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:'#744210',marginBottom:3}}>
              以下のファイルは既に追加済みのため取り込みをスキップしました
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
              {dupWarning.map((n,i)=>(
                <span key={i} style={{background:'#FEEBC8',color:'#744210',padding:'2px 8px',borderRadius:10,fontSize:11,fontWeight:600,border:'1px solid #F6AD55'}}>
                  {n}
                </span>
              ))}
            </div>
          </div>
          <button onClick={()=>setDupWarning([])}
            style={{background:'none',border:'none',cursor:'pointer',color:'#a0aec0',fontSize:16,lineHeight:1,flexShrink:0,padding:'0 2px'}}>✕</button>
        </div>
      )}

      {/* アクションボタン行 */}
      <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>
        <button className="material-add" style={{flex:1,marginTop:0}} onClick={add}>＋ 手入力で追加</button>
        <label className="material-add" style={{flex:1,marginTop:0,borderColor:'#38A169',color:'#38A169',cursor:'pointer',textAlign:'center'}}>
          📁 フォルダから選択
          <input ref={folderInputRef} type="file" multiple
            style={{display:'none'}} onChange={handleFolderChange}/>
        </label>
        <label className="material-add" style={{flex:1,marginTop:0,borderColor:'#9B59B6',color:'#9B59B6',cursor:'pointer',textAlign:'center'}}>
          📎 ファイルを直接選択
          <input type="file" multiple style={{display:'none'}}
            accept=".pdf,.docx,.doc,.xlsx,.xls,.pptx,.ppt,.txt,.png,.jpg,.jpeg"
            onChange={e=>addFromFileInput(e.target.files)}/>
        </label>
      </div>

      {/* フォルダピッカーモーダル */}
      {showFolderPicker && (
        <div className="modal-overlay" onClick={()=>setShowFolderPicker(false)}>
          <div className="modal" style={{maxWidth:500,width:'95%',maxHeight:'80vh',overflowY:'auto'}}
            onClick={e=>e.stopPropagation()}>
            <div className="modal-title">📁 ファイル確認: {folderName}</div>
            <div className="notice notice-info" style={{marginBottom:12,fontSize:11}}>
              追加したいファイルにチェックを入れて「完了」を押してください。<br/>
              💡 フォルダ内のファイルを選ぶには、ダイアログでフォルダを開き <strong>Ctrl+A</strong> で全選択できます。
            </div>
            {folderFiles.length === 0 && (
              <div style={{color:'#a0aec0',fontSize:12,textAlign:'center',padding:16}}>
                対応ファイル（PDF・Office・画像等）が見つかりませんでした
              </div>
            )}
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {folderFiles.map((f,i)=>{
                const alreadyAdded = items.some(it=>it.name===f.name);
                const ext = (f.name||'').split('.').pop().toLowerCase();
                const icon = ext==='pdf'?'📕':ext.startsWith('doc')?'📘':ext.startsWith('xls')?'📗':ext.startsWith('ppt')?'📙':'📄';
                const checkId = `fpick-${i}`;
                return(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',
                    width:'100%',boxSizing:'border-box',
                    border:'1.5px solid '+(alreadyAdded?'#9AE6B4':'#e2e8f0'),
                    borderRadius:6,cursor:'pointer',
                    background:alreadyAdded?'#F0FFF4':'#fff',transition:'.1s'}}
                    onClick={()=>{const cb=document.getElementById(checkId);if(cb){cb.checked=!cb.checked;pickFile(f,cb.checked);}}}>
                    <input id={checkId} type="checkbox" defaultChecked={alreadyAdded}
                      onClick={e=>e.stopPropagation()}
                      onChange={e=>pickFile(f, e.target.checked)}
                      style={{cursor:'pointer',flexShrink:0,width:15,height:15}}/>
                    <span style={{fontSize:16,flexShrink:0,lineHeight:1}}>{icon}</span>
                    <span style={{flex:1,minWidth:0,fontSize:12,fontWeight:400,color:'#222',
                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',lineHeight:1.5}}>
                      {f.name || '(名前なし)'}
                    </span>
                    {alreadyAdded && <span style={{fontSize:10,color:'#38A169',flexShrink:0,fontWeight:600}}>✅ 追加済</span>}
                  </div>
                );
              })}
            </div>
            <div className="btn-row" style={{marginTop:16}}>
              <button className="btn btn-primary" onClick={()=>setShowFolderPicker(false)}>完了</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 名前履歴編集モーダル ──────────────────────────────────
function AttendeeHistoryModal({ orgKey, onClose }){
  const [hist, setHist] = useState(()=>{
    const h = loadAttendeeHistory();
    return h[orgKey] ? [...h[orgKey]] : [];
  });
  const [editing, setEditing] = useState(null); // {idx, sei, mei}

  // 名前を姓・名に分割（スペース区切り）
  const splitName = (name) => {
    const parts = (name||'').trim().split(/\s+/);
    return parts.length >= 2
      ? { sei: parts[0], mei: parts.slice(1).join(' ') }
      : { sei: parts[0]||'', mei: '' };
  };

  const save = (newList) => {
    const all = loadAttendeeHistory();
    all[orgKey] = newList;
    localStorage.setItem(ATTENDEE_KEY, JSON.stringify(all));
    setHist([...newList]);
  };
  const del = (i) => save(hist.filter((_,idx)=>idx!==i));
  const startEdit = (i) => {
    const { sei, mei } = splitName(hist[i]);
    setEditing({ idx:i, sei, mei });
  };
  const commitEdit = () => {
    if(!editing) return;
    const fullName = [editing.sei, editing.mei].filter(Boolean).join(' ').trim();
    if(!fullName) return;
    const next = hist.map((n,i)=>i===editing.idx ? fullName : n).filter(Boolean);
    save(next); setEditing(null);
  };
  const moveUp = (i) => {
    if(i===0) return;
    const next=[...hist]; [next[i-1],next[i]]=[next[i],next[i-1]]; save(next);
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">📝 【{orgKey}】名前履歴の編集</div>
        <div className="notice notice-info" style={{marginBottom:12}}>
          姓・名を分けて表示・編集できます。Enterまたは✓で確定してください。
        </div>
        {hist.length===0 && <div style={{color:'#888',fontSize:13,padding:'8px 0'}}>履歴がありません</div>}
        <div style={{maxHeight:300,overflowY:'auto',border:'1px solid #e2e8f0',borderRadius:6}}>
          {hist.map((name,i)=>{
            const {sei,mei} = splitName(name);
            return (
              <div key={i} style={{padding:'8px 10px',borderBottom:'1px solid #f0f0f0'}}>
                {editing && editing.idx===i ? (
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <div style={{display:'flex',gap:4,flex:1}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,color:'#888',marginBottom:2}}>姓</div>
                        <input value={editing.sei}
                          onChange={e=>setEditing({...editing,sei:e.target.value})}
                          onKeyDown={e=>{if(e.key==='Enter')commitEdit(); if(e.key==='Escape')setEditing(null);}}
                          style={{width:'100%',padding:'4px 8px',border:'1.5px solid #2E75B6',borderRadius:4,fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}
                          autoFocus placeholder="例: 宮守"/>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,color:'#888',marginBottom:2}}>名</div>
                        <input value={editing.mei}
                          onChange={e=>setEditing({...editing,mei:e.target.value})}
                          onKeyDown={e=>{if(e.key==='Enter')commitEdit(); if(e.key==='Escape')setEditing(null);}}
                          style={{width:'100%',padding:'4px 8px',border:'1.5px solid #2E75B6',borderRadius:4,fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}
                          placeholder="例: 秀勝"/>
                      </div>
                    </div>
                    <button onClick={commitEdit} style={{background:'#1F7A4D',color:'#fff',border:'none',borderRadius:4,padding:'5px 10px',cursor:'pointer',fontSize:12,marginTop:14}}>✓</button>
                    <button onClick={()=>setEditing(null)} style={{background:'#e2e8f0',border:'none',borderRadius:4,padding:'5px 8px',cursor:'pointer',fontSize:12,marginTop:14}}>✕</button>
                  </div>
                ) : (
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <div style={{flex:1,display:'flex',gap:8,alignItems:'baseline'}}>
                      <span style={{fontSize:13,fontWeight:600}}>{sei}</span>
                      {mei && <span style={{fontSize:13,color:'#444'}}>{mei}</span>}
                      {!mei && <span style={{fontSize:11,color:'#bbb'}}>（名未設定）</span>}
                    </div>
                    <button onClick={()=>startEdit(i)} style={{background:'none',border:'1px solid #d0d8e4',borderRadius:4,padding:'2px 7px',cursor:'pointer',fontSize:11,color:'#555'}}>編集</button>
                    <button onClick={()=>moveUp(i)} disabled={i===0} style={{background:'none',border:'1px solid #d0d8e4',borderRadius:4,padding:'2px 7px',cursor:'pointer',fontSize:11,color:'#555'}}>↑</button>
                    <button onClick={()=>del(i)} style={{background:'none',border:'none',cursor:'pointer',color:'#e53e3e',fontSize:16,lineHeight:1}}>🗑</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div className="btn-row" style={{marginTop:16,justifyContent:'flex-end'}}>
          <button className="btn btn-primary" onClick={onClose}>閉じる</button>
        </div>
      </div>
    </div>
  );
}

function TagNameInput({ orgKey, tags: tagsProp, setTags }){
  // ローカルstateで即時表示、親stateも同時更新
  const [tags, setTagsLocal] = useState(tagsProp||[]);
  const [input, setInput] = useState('');
  const [suggestions, setSuggestions] = useState([]);
  const [showSug, setShowSug] = useState(false);
  const [showHistEdit, setShowHistEdit] = useState(false);
  const inputRef = useRef();

  // 親から渡されるtagsが変わったら同期
  useEffect(()=>{ setTagsLocal(tagsProp||[]); }, [JSON.stringify(tagsProp)]);

  const getSuggestions = (val) => {
    const hist = loadAttendeeHistory();
    const all = hist[orgKey] || [];
    return all.filter(n => n.includes(val) && !tags.includes(n)).slice(0, 8);
  };

  const addTag = (name) => {
    const n = name.trim();
    if(!n || tags.includes(n)) return;
    const next = [...tags, n];
    setTagsLocal(next);
    setTags(next);
    saveAttendeeHistory(orgKey, [n]);
    setInput(''); setShowSug(false);
  };

  const delTag = (i) => {
    const next = tags.filter((_,idx)=>idx!==i);
    setTagsLocal(next); setTags(next);
  };

  const handleKey = (e) => {
    if(e.key==='Enter'||e.key==='、'||e.key===','){
      e.preventDefault(); addTag(input);
    } else if(e.key==='Backspace' && !input && tags.length){
      const next = tags.slice(0,-1);
      setTagsLocal(next); setTags(next);
    }
  };

  const handleChange = (e) => {
    const v = e.target.value;
    if(v.includes('、')||v.includes(',')){
      v.split(/[、,]/).forEach(n=>n.trim()&&addTag(n.trim()));
      return;
    }
    setInput(v);
    setSuggestions(getSuggestions(v));
    setShowSug(true);
  };

  return(
    <div>
      <div className="tag-area" onClick={()=>inputRef.current && inputRef.current.focus()}>
        {tags.map((name,i)=>(
          <span key={i} className="tag">
            {name}
            <button className="tag-del" onClick={e=>{e.stopPropagation();delTag(i);}}>✕</button>
          </span>
        ))}
        <div className="name-input-wrap">
          <input ref={inputRef} className="name-input" value={input}
            onChange={handleChange} onKeyDown={handleKey}
            onFocus={()=>{setSuggestions(getSuggestions(input));setShowSug(true);}}
            onBlur={()=>setTimeout(()=>setShowSug(false),150)}
            placeholder={tags.length?'名前を追加…':'名前を入力（Enterで追加）'}/>
          {showSug && suggestions.length>0 && (
            <div className="suggest-list">
              {suggestions.map((s,i)=>(
                <div key={i} className="suggest-item" onMouseDown={()=>addTag(s)}>{s}</div>
              ))}
            </div>
          )}
        </div>
      </div>
      <button onClick={()=>setShowHistEdit(true)}
        style={{background:'none',border:'none',color:'#999',fontSize:11,cursor:'pointer',padding:'2px 0',marginTop:2}}>
        📋 履歴を編集・修正
      </button>
      {showHistEdit && <AttendeeHistoryModal orgKey={orgKey} onClose={()=>setShowHistEdit(false)}/>}
    </div>
  );
}

const DEFAULT_ORGS = ['KE','IBM','PwC'];

// マスター検索：日本語・英字・ローマ字対応
function searchPersonMaster(query, excludeNames=[]) {
  const master = loadPersonMaster();
  const q = query.trim().toLowerCase();
  if (!q) return [];
  return master.filter(p => {
    if (excludeNames.includes(p.name)) return false;
    const name = p.name.toLowerCase();
    const email = (p.email||'').toLowerCase();
    // 日本語・英字どちらでも検索
    return name.includes(q) || email.includes(q) ||
      name.replace(/\s/g,'').includes(q.replace(/\s/g,''));
  }).slice(0, 8);
}

// ── 手入力出席者コンポーネント ───────────────────────────────
// ── チェックボックス式出席者選択コンポーネント ────────────────
function ManualAttendeesInput({ value, onChange, masterSource='org' }) {
  // masterSource: 'org' = 手入力出席者マスター(OrgAttMaster)
  //               'ics' = ICS出席者マスター(PersonMaster) をorg別に集約

  const loadMasterForSource = () => {
    if (masterSource === 'ics') {
      // PersonMaster [{name,email,org}] → { org: [name,...] } に変換
      const persons = loadPersonMaster();
      const map = {};
      persons.forEach(p => {
        if (!p.org || !p.name) return;
        if (!map[p.org]) map[p.org] = [];
        if (!map[p.org].includes(p.name)) map[p.org].push(p.name);
      });
      return map;
    }
    return loadOrgAttMaster();
  };

  const [masterData, setMasterData] = React.useState(() => loadMasterForSource());

  // チェック状態: { "org::name": true/false }
  const toChecked = (attendees) => {
    const map = {};
    (attendees||[]).forEach(o => {
      (o.names||[]).forEach(n => { map[`${o.org}::${n}`] = true; });
    });
    return map;
  };
  const [checked, setChecked] = React.useState(() => toChecked(value));
  const [expandedOrgs, setExpandedOrgs] = React.useState({});

  // ── インライン直接登録フォーム ──
  const [quickOrg,  setQuickOrg]  = React.useState('');
  const [quickName, setQuickName] = React.useState('');
  const [quickMsg,  setQuickMsg]  = React.useState(''); // "登録済み" flash
  const quickOrgRef  = React.useRef(null);
  const quickNameRef = React.useRef(null);

  const handleQuickAdd = () => {
    const org  = quickOrg.trim();
    const name = quickName.trim();
    if (!org || !name) return;
    if (masterSource !== 'org') return; // OrgAttMasterのみ対応

    // 名前をカンマ区切りで複数受け付ける
    const names = name.split(/[、,，]+/).map(n=>n.trim()).filter(Boolean);

    // OrgAttMasterに保存
    const cur = loadOrgAttMaster();
    const next = {...cur};
    if (!next[org]) next[org] = [];
    const added = [];
    names.forEach(n => {
      if (!next[org].includes(n)) { next[org].push(n); added.push(n); }
    });
    saveOrgAttMaster(next);

    // masterDataを更新（アコーディオンに即反映）
    const newMaster = loadMasterForSource(); // 再読み込み
    setMasterData(newMaster);

    // 登録した名前を自動チェック
    const newChecked = {...checked};
    names.forEach(n => { newChecked[`${org}::${n}`] = true; });
    setChecked(newChecked);

    // 組織アコーディオンを自動展開
    setExpandedOrgs(p => ({...p, [org]: true}));

    // onChange通知
    buildAndNotifyWith(newChecked, newMaster);

    // フラッシュメッセージ
    const addedMsg = added.length > 0
      ? `✓ ${org}：${added.join('、')} を登録しました`
      : `⚠️ ${names.join('、')} はすでに登録済みです`;
    setQuickMsg(addedMsg);
    setTimeout(() => setQuickMsg(''), 2500);

    // 氏名欄をクリアし、組織欄はそのまま（連続登録しやすく）
    setQuickName('');
    setTimeout(() => quickNameRef.current?.focus(), 30);
  };

  // checkedからattendees配列を再構築してonChange（masterData引数を取れる版）
  const buildAndNotifyWith = (newChecked, mData) => {
    const md = mData || masterData;
    const map = {};
    Object.entries(newChecked).forEach(([key, v]) => {
      if (!v) return;
      const sep = key.indexOf('::');
      const org = key.slice(0, sep);
      const name = key.slice(sep + 2);
      if (!map[org]) map[org] = [];
      map[org].push(name);
    });
    const masterOrgs = Object.keys(md).sort();
    const allOrgs = [...new Set([...masterOrgs, ...Object.keys(map)])];
    onChange(allOrgs.filter(o => map[o]?.length > 0).map(o => ({ org: o, names: map[o] })));
  };

  // checkedからattendees配列を再構築してonChange
  const buildAndNotify = (newChecked) => {
    buildAndNotifyWith(newChecked, masterData);
  };

  const toggleName = (org, name) => {
    const key = `${org}::${name}`;
    const next = { ...checked, [key]: !checked[key] };
    setChecked(next);
    buildAndNotify(next);
  };

  const toggleOrg = (org) => {
    const names = masterData[org] || [];
    const allChecked = names.every(n => checked[`${org}::${n}`]);
    const next = { ...checked };
    names.forEach(n => { next[`${org}::${n}`] = !allChecked; });
    setChecked(next);
    buildAndNotify(next);
  };

  const selectedCount = Object.values(checked).filter(Boolean).length;
  const orgs = Object.keys(masterData).sort();

  // インライン登録フォーム（常に表示）
  const quickAddForm = masterSource === 'org' && (
    <div style={{marginTop:10,background:'#F0FFF4',border:'1.5px solid #9AE6B4',
      borderRadius:8,padding:'10px 12px'}}>
      <div style={{fontSize:11,fontWeight:700,color:'#276749',marginBottom:7,display:'flex',alignItems:'center',gap:5}}>
        <span>＋</span><span>出席者を直接追加</span>
        <span style={{fontWeight:400,color:'#68D391',fontSize:10}}>（マスターに保存＆即選択）</span>
      </div>
      <div style={{display:'flex',gap:7,alignItems:'center',flexWrap:'wrap'}}>
        <input
          ref={quickOrgRef}
          value={quickOrg}
          onChange={e=>setQuickOrg(e.target.value)}
          onKeyDown={e=>{
            if(e.key==='Tab'){e.preventDefault();quickNameRef.current?.focus();}
            if(e.key==='Enter'){quickNameRef.current?.focus();}
          }}
          list="quick-orgs-datalist"
          placeholder="組織名　例：KE"
          style={{width:120,padding:'7px 10px',border:'1.5px solid #9AE6B4',borderRadius:6,
            fontSize:13,fontFamily:'inherit',outline:'none',background:'#fff',boxSizing:'border-box'}}
        />
        <datalist id="quick-orgs-datalist">
          {Object.keys(masterData).sort().map(o=><option key={o} value={o}/>)}
        </datalist>
        <input
          ref={quickNameRef}
          value={quickName}
          onChange={e=>setQuickName(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();handleQuickAdd();}}}
          placeholder="氏名　例：田中、山田"
          style={{flex:1,minWidth:130,padding:'7px 10px',border:'1.5px solid #9AE6B4',borderRadius:6,
            fontSize:13,fontFamily:'inherit',outline:'none',background:'#fff',boxSizing:'border-box'}}
        />
        <button
          onClick={handleQuickAdd}
          disabled={!quickOrg.trim()||!quickName.trim()}
          style={{padding:'7px 16px',background: (quickOrg.trim()&&quickName.trim()) ? '#1F7A4D':'#a0aec0',
            color:'#fff',border:'none',borderRadius:6,cursor:(quickOrg.trim()&&quickName.trim())?'pointer':'not-allowed',
            fontSize:13,fontWeight:700,whiteSpace:'nowrap',transition:'.15s'}}>
          追加
        </button>
      </div>
      {quickMsg && (
        <div style={{marginTop:6,fontSize:11,color:quickMsg.startsWith('✓')?'#276749':'#C05621',
          fontWeight:600,animation:'fadeIn .2s'}}>
          {quickMsg}
        </div>
      )}
      <div style={{fontSize:10,color:'#68D391',marginTop:5}}>
        Tab で氏名欄へ移動 ／ Enter で追加 ／ 氏名はカンマ区切りで複数入力可
      </div>
    </div>
  );

  if (orgs.length === 0) {
    return (
      <div>
        <div style={{background:'#EBF3FB',border:'1.5px solid #2E75B6',borderRadius:8,padding:'12px 14px',fontSize:12,color:'#1a4a7a',marginBottom:8}}>
          {masterSource === 'ics'
            ? '💡 ICSファイルを取り込むと出席者が登録されます。取り込み後にここで選択できるようになります。'
            : '💡 下のフォームから組織名・氏名を入力して直接追加できます。'}
        </div>
        {quickAddForm}
      </div>
    );
  }

  return (
    <div>
      {/* 選択済みサマリー */}
      {selectedCount > 0 && (
        <div style={{marginBottom:8,padding:'6px 12px',background:'#EBF3FB',borderRadius:6,
          display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:12,color:'#1F3864',fontWeight:700}}>✓ {selectedCount}名選択中</span>
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
            {Object.entries(
              Object.entries(checked)
                .filter(([,v])=>v)
                .reduce((acc,[key])=>{
                  const sep=key.indexOf('::'); const org=key.slice(0,sep); const name=key.slice(sep+2);
                  if(!acc[org])acc[org]=[];acc[org].push(name);return acc;
                },{})
            ).map(([org,names])=>(
              <span key={org} style={{fontSize:11,background:'#fff',border:'1px solid #bee3f8',
                borderRadius:10,padding:'2px 8px',color:'#1F3864'}}>
                {org}：{names.join('、')}
              </span>
            ))}
          </div>
        </div>
      )}

      {/* アコーディオン：組織名タップで展開 */}
      <div style={{border:'1.5px solid #d0d8e4',borderRadius:8,overflow:'hidden',background:'#fff'}}>
        {orgs.map((org, oi) => {
          const names = masterData[org] || [];
          const checkedCount = names.filter(n => checked[`${org}::${n}`]).length;
          const allChk = checkedCount === names.length && names.length > 0;
          const isOpen = !!expandedOrgs[org];
          return (
            <div key={org} style={{borderBottom: oi < orgs.length-1 ? '1px solid #e8edf2' : 'none'}}>
              {/* 組織ヘッダー行：クリックで展開/折りたたみ */}
              <div
                onClick={()=>setExpandedOrgs(p=>({...p,[org]:!isOpen}))}
                style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',cursor:'pointer',
                  userSelect:'none',background: checkedCount>0 ? '#EBF3FB' : '#fff',
                  transition:'.12s'}}>
                <span style={{fontWeight:700,fontSize:13,color:'#1F3864',flex:1}}>
                  {org}
                  {checkedCount>0 && (
                    <span style={{marginLeft:8,fontSize:11,fontWeight:400,color:'#1F7A4D'}}>
                      ✓ {checkedCount}名選択
                    </span>
                  )}
                </span>
                <span style={{fontSize:11,color:'#aaa'}}>{names.length}名</span>
                <span style={{fontSize:12,color:'#888',transform:isOpen?'rotate(180deg)':'rotate(0deg)',
                  transition:'.15s',display:'inline-block'}}>▼</span>
              </div>

              {/* 展開時：名前ボタン + 全員選択 */}
              {isOpen && (
                <div style={{padding:'10px 14px 12px',borderTop:'1px solid #f0f4f8',
                  background: '#fafcff'}}>
                  <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:8}}>
                    {names.map(name => {
                      const isChk = !!checked[`${org}::${name}`];
                      return (
                        <button key={name} onClick={()=>toggleName(org,name)}
                          style={{padding:'6px 16px',borderRadius:20,cursor:'pointer',
                            fontSize:13,fontWeight:isChk?700:400,transition:'.1s',
                            background: isChk ? '#2E75B6' : '#f0f4f8',
                            color: isChk ? '#fff' : '#444',
                            border: '1.5px solid '+(isChk?'#2E75B6':'#d0d8e4')}}>
                          {isChk ? `✓ ${name}` : name}
                        </button>
                      );
                    })}
                  </div>
                  <button onClick={()=>toggleOrg(org)}
                    style={{fontSize:11,padding:'3px 12px',borderRadius:10,border:'1.5px solid #2E75B6',
                      cursor:'pointer',fontWeight:700,background:allChk?'#2E75B6':'#fff',
                      color:allChk?'#fff':'#2E75B6',transition:'.1s'}}>
                    {allChk ? '✓ 全員選択中（解除）' : '全員選択'}
                  </button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* インライン直接追加フォーム */}
      {quickAddForm}

      {/* 下部ヒント：masterSourceに応じてメッセージを変える */}
      <div style={{marginTop:6,fontSize:11,color:'#aaa',textAlign:'center'}}>
        {masterSource === 'ics'
          ? '出席者を追加するには「📋 予定本文を貼り付けて解析」または「👥 ICS出席者マスター」をご利用ください'
          : '登録済みメンバーの管理は右上の「✏️ 手入力出席者マスター」からできます'}
      </div>
    </div>
  );
}

function AttendeesInput({ value, onChange, onOpenPersonMaster }){
  const [showPicker, setShowPicker] = React.useState(false);
  const orgs = (value && value.length > 0)
    ? value.filter(function(o){ return o.names && o.names.length > 0; })
    : [];

  const removeName = function(orgKey, name) {
    onChange(orgs.map(function(o){ return o.org===orgKey ? {org:o.org, names:o.names.filter(function(n){ return n!==name; })} : o; }));
  };

  // PersonMasterから選択して追加
  const handlePickFromMaster = (selectedOrgs) => {
    // 既存と合算
    const merged = [...orgs];
    selectedOrgs.forEach(({org, names}) => {
      const idx = merged.findIndex(o => o.org === org);
      if (idx >= 0) {
        const combined = [...new Set([...merged[idx].names, ...names])];
        merged[idx] = { org, names: combined };
      } else {
        merged.push({ org, names });
      }
    });
    onChange(merged);
    setShowPicker(false);
  };

  return (
    <div style={{border:'1.5px solid #d0d8e4',borderRadius:8,padding:12}}>
      {orgs.length === 0 && (
        <div style={{color:'#aaa',fontSize:12,marginBottom:8,textAlign:'center'}}>
          出席者が登録されていません
        </div>
      )}
      {orgs.map(function(o, i){
        return (
          <div key={i} style={{marginBottom:8}}>
            <strong style={{fontSize:13,color:'#1F3864'}}>[{o.org}]</strong>
            {o.names.map(function(name, j){
              return (
                <span key={j} style={{marginLeft:6,background:'#EBF3FB',padding:'3px 9px',borderRadius:12,fontSize:12,display:'inline-flex',alignItems:'center',gap:4}}>
                  {name}
                  <button onClick={function(){ removeName(o.org, name); }} style={{background:'none',border:'none',cursor:'pointer',color:'#e53e3e',fontSize:12,lineHeight:1,padding:0}}>✕</button>
                </span>
              );
            })}
          </div>
        );
      })}
      <button onClick={()=>setShowPicker(true)}
        style={{marginTop:4,background:'#1F3864',border:'none',color:'#fff',
          borderRadius:6,padding:'7px 14px',cursor:'pointer',fontSize:12,fontWeight:700,
          width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
        ＋ 手入力出席者マスターから選択して追加
      </button>
      {showPicker && (
        <AttendeePickerModal
          current={orgs}
          onAdd={handlePickFromMaster}
          onClose={()=>setShowPicker(false)}
        />
      )}
    </div>
  );
}

// ICSモード用：組織別マスターから出席者をチェックして追加するモーダル
function AttendeePickerModal({ current, onAdd, onClose }) {
  const master = loadOrgAttMaster();
  const orgList = Object.keys(master).sort();
  const [checked, setChecked] = React.useState({});

  const toggleName = (org, name) => {
    const key = `${org}::${name}`;
    setChecked(p => ({ ...p, [key]: !p[key] }));
  };
  const toggleOrg = (org) => {
    const names = master[org] || [];
    const allChk = names.every(n => checked[`${org}::${n}`]);
    const next = { ...checked };
    names.forEach(n => { next[`${org}::${n}`] = !allChk; });
    setChecked(next);
  };

  const handleAdd = () => {
    const map = {};
    Object.entries(checked).forEach(([key, v]) => {
      if (!v) return;
      const sep = key.indexOf('::');
      const org = key.slice(0, sep), name = key.slice(sep + 2);
      if (!map[org]) map[org] = [];
      map[org].push(name);
    });
    onAdd(Object.keys(map).map(org => ({ org, names: map[org] })));
  };

  const selectedCount = Object.values(checked).filter(Boolean).length;

  if (orgList.length === 0) {
    return (
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
          <div className="modal-title">👥 出席者を選択</div>
          <div style={{padding:'20px 0',textAlign:'center',color:'#888',fontSize:13}}>
            手入力出席者マスターに登録がありません。<br/>
            「✏️ 手入力出席者マスター」からメンバーを登録してください。
          </div>
          <div className="btn-row" style={{justifyContent:'flex-end'}}>
            <button className="btn btn-primary" onClick={onClose}>閉じる</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div className="modal-title" style={{margin:0}}>👥 出席者を選択して追加</div>
          {selectedCount > 0 && <span style={{background:'#EBF3FB',color:'#1F3864',fontWeight:700,fontSize:12,padding:'3px 10px',borderRadius:12}}>{selectedCount}名選択中</span>}
        </div>
        <div style={{maxHeight:320,overflowY:'auto',border:'1px solid #e2e8f0',borderRadius:8,marginBottom:12}}>
          {orgList.map((org, oi) => {
            const names = master[org] || [];
            const checkedCount = names.filter(n => checked[`${org}::${n}`]).length;
            const allChk = checkedCount === names.length && names.length > 0;
            const someChk = checkedCount > 0 && !allChk;
            return (
              <div key={org} style={{borderBottom: oi < orgList.length-1 ? '1px solid #f0f4f8':'none'}}>
                <div onClick={()=>toggleOrg(org)}
                  style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',
                    background: checkedCount>0?'#EBF3FB':'#f8fafc',cursor:'pointer',userSelect:'none'}}>
                  <span style={{width:16,height:16,border:'2px solid '+(allChk||someChk?'#2E75B6':'#bbc'),
                    borderRadius:3,display:'flex',alignItems:'center',justifyContent:'center',
                    background:allChk?'#2E75B6':someChk?'#d4e8fa':'#fff',flexShrink:0}}>
                    {allChk && <span style={{color:'#fff',fontSize:11,fontWeight:900}}>✓</span>}
                    {someChk && <span style={{color:'#2E75B6',fontSize:11,fontWeight:900}}>−</span>}
                  </span>
                  <span style={{fontWeight:700,fontSize:13,color:'#1F3864',flex:1}}>【{org}】</span>
                  <span style={{fontSize:11,color:'#888'}}>{checkedCount}/{names.length}名</span>
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:5,padding:'6px 12px 8px 36px'}}>
                  {names.map(name => {
                    const isChk = !!checked[`${org}::${name}`];
                    return (
                      <button key={name} onClick={()=>toggleName(org,name)}
                        style={{padding:'4px 12px',borderRadius:20,border:'1.5px solid '+(isChk?'#2E75B6':'#ccd'),
                          background:isChk?'#2E75B6':'#fff',color:isChk?'#fff':'#444',
                          fontSize:12,fontWeight:isChk?700:400,cursor:'pointer',transition:'.1s'}}>
                        {isChk&&'✓ '}{name}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
        <div className="btn-row" style={{justifyContent:'space-between'}}>
          <button className="btn btn-gray" onClick={onClose}>キャンセル</button>
          <button className="btn btn-primary" onClick={handleAdd} disabled={selectedCount===0}
            style={{opacity:selectedCount===0?0.5:1}}>
            ＋ {selectedCount}名を追加
          </button>
        </div>
      </div>
    </div>
  );
}

const PERSON_MASTER_KEY = 'pmo_person_master';   // [{name,email,org}]
const DOMAIN_MASTER_KEY = 'pmo_domain_master';   // [{domain,org}]

const DEFAULT_DOMAINS = [
  { domain:'kokusai-electric.com', org:'KE' },
  { domain:'ibm.com',              org:'IBM' },
  { domain:'jp.ibm.com',           org:'IBM' },
  { domain:'pwc.com',              org:'PwC' },
  { domain:'hopes.co.jp',          org:'Hopes' },
  { domain:'msol.co.jp',           org:'MSOL' },
];

function loadPersonMaster(){ try{ return JSON.parse(localStorage.getItem(PERSON_MASTER_KEY)||'[]'); }catch(e){ return []; } }
function savePersonMaster(list){ localStorage.setItem(PERSON_MASTER_KEY, JSON.stringify(list)); }
function loadDomainMaster(){
  try{
    const stored = localStorage.getItem(DOMAIN_MASTER_KEY);
    if (!stored) return [...DEFAULT_DOMAINS];
    return JSON.parse(stored); // 空配列でもそのまま返す
  }catch(e){ return [...DEFAULT_DOMAINS]; }
}
function saveDomainMaster(list){ localStorage.setItem(DOMAIN_MASTER_KEY, JSON.stringify(list)); }

// ドメイン→組織の判別（DEFAULT_DOMAINSも含めて検索）
function orgFromEmail(email) {
  if (!email) return '';
  const domain = (email.split('@')[1] || '').toLowerCase();
  const stored = loadDomainMaster();
  const found = stored.find(d => domain === d.domain);
  if (found) return found.org;
  const def = DEFAULT_DOMAINS.find(d => domain === d.domain);
  return def ? def.org : '';
}

// ドメイン名から組織名を推測する
function guessOrgFromDomain(domain) {
  if (!domain) return '';
  let d = domain.toLowerCase();
  // 地域・サブドメインプレフィックスを除去（jp., cn., us. など）
  d = d.replace(/^(www|mail|smtp|ftp|jp|us|cn|uk|kr|de|fr|au|sg|hk|tw|in|eu)\./i, '');
  // TLDサフィックスを除去
  d = d.replace(/\.(co\.jp|co\.uk|ne\.jp|ac\.jp|or\.jp|com|net|org|jp|biz|io|gov|edu|info)$/, '');
  // ドットで分割し最初のセグメントをメインドメインとして使用
  const main = d.split('.')[0] || d;
  // ハイフン区切りの各単語を処理
  const words = main.split('-');
  return words.map(w => {
    if (!w) return '';
    // 4文字以下の単語は略語とみなし大文字に
    if (w.length <= 4) return w.toUpperCase();
    return w.charAt(0).toUpperCase() + w.slice(1);
  }).join(' ').trim();
}

// 英字名を「名 姓」→「姓 名」に変換
function reverseEnglishName(rawName) {
  if (!rawName) return '';
  // 日本語文字が含まれる場合はそのまま
  if (/[\u3000-\u9FFF\uF900-\uFAFF]/.test(rawName)) return rawName;
  // スラッシュ区切り「英語名 / 日本語名」→ 日本語部分を優先
  if (rawName.includes('/')) {
    const parts = rawName.split('/').map(s => s.trim());
    const jpPart = parts.find(p => /[\u3000-\u9FFF]/.test(p));
    if (jpPart) return jpPart;
    // 英語部分のみ → 最後の部分を姓として前に
    const engParts = parts[0].trim().split(/[\s.]+/).filter(Boolean);
    if (engParts.length >= 2) return engParts.slice(1).join(' ') + ' ' + engParts[0];
    return parts[0].trim();
  }
  // ドット or スペース区切り → 反転
  const parts = rawName.trim().split(/[\s.]+/).filter(Boolean);
  if (parts.length >= 2) return parts.slice(1).join(' ') + ' ' + parts[0];
  return rawName;
}

// ICSの1出席者行から {name, email} を抽出
function parseAttendeeRaw(line) {
  // mailto: からメールアドレスを取得
  const mailMatch = line.match(/mailto:([^\s;>]+)/i);
  const email = mailMatch ? mailMatch[1].trim().toLowerCase() : '';

  // CN= の値を取得（引用符あり・なし両対応）
  let rawName = '';
  const cnQuoted = line.match(/CN="([^"]+)"/i);   // CN="..."
  const cnPlain  = line.match(/CN=([^;:\s"]+)/i); // CN=...（引用符なし）
  if (cnQuoted) {
    rawName = cnQuoted[1].trim();
  } else if (cnPlain) {
    rawName = cnPlain[1].trim();
  }

  // CNがメールアドレスそのもの or 空の場合→emailのローカル部から生成
  if (!rawName || rawName.toLowerCase() === email || rawName.includes('@')) {
    const local = email.split('@')[0] || '';
    rawName = local;
  }

  // スラッシュ区切り「英語名 / 日本語名」→日本語部分を優先
  if (rawName.includes('/')) {
    const parts = rawName.split('/').map(s => s.trim());
    const jpPart = parts.find(p => /[\u3000-\u9FFF\uF900-\uFAFF]/.test(p));
    if (jpPart) {
      return { name: jpPart, email, rawName };
    }
    // 英語部分のみ → reverseEnglishName
    rawName = parts[0].trim();
  }

  const name = reverseEnglishName(rawName);
  return { name, email, rawName };
}

// 英字かどうか（日本語文字を含まない）
function isEnglishName(name) {
  return !/[\u3000-\u9FFF\uF900-\uFAFF]/.test(name);
}


// ── ドメイン→組織マスター管理モーダル ────────────────────────
function DomainMasterModal({ onClose, icsRaws }) {
  const readList = () => {
    try {
      const s = localStorage.getItem(DOMAIN_MASTER_KEY);
      return s ? JSON.parse(s) : [...DEFAULT_DOMAINS];
    } catch(e) { return [...DEFAULT_DOMAINS]; }
  };
  const [list, setList] = useState(()=>{
    const s = localStorage.getItem(DOMAIN_MASTER_KEY);
    if (s === null) {
      // 初回のみ DEFAULT_DOMAINS を書き込む
      localStorage.setItem(DOMAIN_MASTER_KEY, JSON.stringify(DEFAULT_DOMAINS));
      return [...DEFAULT_DOMAINS];
    }
    try {
      // 2回目以降は localStorage の内容をそのまま使用（削除済みドメインは復活させない）
      return JSON.parse(s);
    } catch(e) { return [...DEFAULT_DOMAINS]; }
  });
  const [domain, setDomain] = useState('');
  const [org, setOrg] = useState('');
  const [newDomains, setNewDomains] = useState([]);
  const [icsUnknown, setIcsUnknown] = useState(null);

  const save = (next) => {
    localStorage.setItem(DOMAIN_MASTER_KEY, JSON.stringify(next));
    setList([...next]);
  };
  const add = () => {
    const d = domain.trim().toLowerCase().replace(/^@/,'');
    const o = org.trim();
    if (!d || !o || list.find(x=>x.domain===d)) return;
    save([...list, {domain:d, org:o}]);
    setDomain(''); setOrg('');
  };
  const del = (i) => save(list.filter((_,j)=>j!==i));

  const scanIcs = () => {
    const currentList = readList();
    const raws = icsRaws || [];
    const unknown = {};
    raws.forEach(r => {
      if (!r.email) return;
      const d = (r.email.split('@')[1]||'').toLowerCase();
      if (!d) return;
      const isKnown = currentList.some(x => d === x.domain);
      if (!isKnown) {
        if (!unknown[d]) unknown[d] = [];
        unknown[d].push(r.email);
      }
    });
    setIcsUnknown(Object.entries(unknown).map(([d,emails])=>({domain:d,emails,org:''})));
  };

  const updUnknown = (i, val) => setIcsUnknown(icsUnknown.map((d,idx)=>idx===i?{...d,org:val}:d));

  const registerUnknown = () => {
    const toAdd = icsUnknown.filter(d=>d.org.trim());
    if (toAdd.length === 0) { setIcsUnknown(null); return; }
    const current = readList();
    const newList = [...current];
    toAdd.forEach(d => { if (!newList.find(m=>m.domain===d.domain)) newList.push({domain:d.domain,org:d.org.trim()}); });
    save(newList);
    setNewDomains(toAdd.map(d=>d.domain));
    setIcsUnknown(null);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">🌐 ドメイン→組織マスター</div>
        <div className="notice notice-info" style={{marginBottom:10}}>
          メールドメインと組織の対応を登録します。ICS取り込み時に自動判別します。
        </div>
        {icsRaws && icsRaws.length > 0 ? (
          <button onClick={scanIcs} style={{width:'100%',marginBottom:12,padding:'8px',background:'#EBF3FB',border:'1.5px solid #2E75B6',borderRadius:6,color:'#1F3864',fontSize:12,cursor:'pointer',fontWeight:600}}>
            🔍 読み込み済みICSから未登録ドメインを確認
          </button>
        ) : (
          <div style={{fontSize:11,color:'#888',marginBottom:10,padding:'6px 10px',background:'#f8f8f8',borderRadius:4,textAlign:'center'}}>
            💡 Step1で.icsを読み込むと、未登録ドメインをここで確認できます
          </div>
        )}
        {icsUnknown !== null && (
          <div style={{marginBottom:12,border:'1.5px solid #2E75B6',borderRadius:6,overflow:'hidden'}}>
            <div style={{background:'#2E75B6',color:'#fff',padding:'6px 12px',fontSize:12,fontWeight:600}}>
              {icsUnknown.length===0 ? '✅ 未登録ドメインはありません' : `未登録ドメイン ${icsUnknown.length}件`}
            </div>
            {icsUnknown.map((d,i)=>(
              <div key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'7px 12px',borderTop:'1px solid #e2e8f0'}}>
                <span style={{flex:1,fontSize:12,color:'#444'}}>@{d.domain}<br/><span style={{fontSize:10,color:'#999'}}>{d.emails.length}名</span></span>
                <input value={d.org} onChange={e=>updUnknown(i,e.target.value)} placeholder="組織名を入力"
                  style={{flex:1,padding:'4px 8px',border:'1.5px solid #d0d8e4',borderRadius:4,fontSize:12,fontFamily:'inherit',outline:'none'}}/>
              </div>
            ))}
            {icsUnknown.length>0 && (
              <div style={{padding:'8px 12px',borderTop:'1px solid #e2e8f0',display:'flex',justifyContent:'flex-end'}}>
                <button className="btn btn-primary" style={{fontSize:12,padding:'6px 14px'}} onClick={registerUnknown}>登録する</button>
              </div>
            )}
          </div>
        )}
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <input value={domain} onChange={e=>setDomain(e.target.value)} placeholder="例: nssol.nipponsteel.com"
            style={{flex:2}} onKeyDown={e=>e.key==='Enter'&&add()}/>
          <input value={org} onChange={e=>setOrg(e.target.value)} placeholder="組織名"
            style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&add()}/>
          <button className="btn btn-blue" style={{padding:'7px 12px',fontSize:12}} onClick={add}>追加</button>
        </div>
        <div style={{maxHeight:240,overflowY:'auto',border:'1px solid #e2e8f0',borderRadius:6}}>
          {list.length===0 && <div style={{padding:'16px',textAlign:'center',color:'#888',fontSize:12}}>登録済みドメインはありません</div>}
          {list.map((item,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',padding:'7px 12px',borderBottom:'1px solid #f0f0f0',background:newDomains.includes(item.domain)?'#E8F5E9':'transparent'}}>
              <span style={{flex:2,fontSize:13,color:'#444'}}>@{item.domain}</span>
              <span style={{flex:1,fontSize:13,fontWeight:600,color:'#1F3864'}}>{item.org}</span>
              {newDomains.includes(item.domain) && <span style={{fontSize:10,color:'#1F7A4D',marginRight:8}}>✅ 新規追加</span>}
              <button onClick={(e)=>{e.stopPropagation();del(i);}}
                style={{background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:4,cursor:'pointer',color:'#e53e3e',fontSize:13,padding:'4px 10px',minWidth:40}}>
                削除
              </button>
            </div>
          ))}
        </div>
        <div className="btn-row" style={{marginTop:16,justifyContent:'flex-end'}}>
          <button className="btn btn-primary" onClick={onClose}>閉じる</button>
        </div>
      </div>
    </div>
  );
}

// データ構造: { [org]: string[] }  例: { "KE": ["田中","山田","山下（信）"] }
const ORG_ATT_MASTER_KEY = 'pmo_org_attendee_master';
function loadOrgAttMaster(){ try{ return JSON.parse(localStorage.getItem(ORG_ATT_MASTER_KEY)||'{}'); }catch(e){ return {}; } }
function saveOrgAttMaster(data){ localStorage.setItem(ORG_ATT_MASTER_KEY, JSON.stringify(data)); }

function OrgAttendeeMasterModal({ onClose }) {
  const [master, setMaster] = useState(()=>loadOrgAttMaster());
  const [bulkInput, setBulkInput] = useState('');
  // 重複チェック結果: [{org, name, existing}]
  const [conflicts, setConflicts] = useState([]);
  // 確認待ちキュー: [{org, name, rename:''}]
  const [queue, setQueue] = useState([]);
  const [queueIdx, setQueueIdx] = useState(0);
  const [renameVal, setRenameVal] = useState('');
  // 一括入力を解析して登録処理
  const handleBulkRegister = () => {
    const lines = bulkInput.split('\n').map(l=>l.trim()).filter(Boolean);
    const toRegister = []; // {org, name}
    for (const line of lines) {
      const m = line.match(/^([^\s\u3000　,、]+)[\s\u3000　]+(.+)$/);
      if (!m) continue;
      const org = m[1].trim();
      const names = m[2].split(/[、,，]+/).map(n=>n.trim()).filter(Boolean);
      names.forEach(name => toRegister.push({org, name}));
    }
    if (!toRegister.length) return;
    // 重複チェック
    const cur = {...master};
    const dups = [];
    const ok = [];
    for (const {org, name} of toRegister) {
      const existing = cur[org] || [];
      if (existing.includes(name)) {
        dups.push({org, name, rename:''});
      } else {
        ok.push({org, name});
      }
    }
    // 重複なしはすぐ登録
    const next = {...cur};
    ok.forEach(({org, name}) => {
      if (!next[org]) next[org] = [];
      if (!next[org].includes(name)) next[org].push(name);
    });
    setMaster(next); saveOrgAttMaster(next);
    setBulkInput('');
    // 登録後に組織名欄にフォーカスを戻す
    setTimeout(()=>document.getElementById('org-input-field')?.focus(), 50);
    if (dups.length > 0) {
      setQueue(dups); setQueueIdx(0); setRenameVal(dups[0].name);
    }
  };

  // 重複確認：別名で登録
  const resolveRename = () => {
    const item = queue[queueIdx];
    const name = renameVal.trim();
    if (name && name !== item.name) {
      const next = {...master};
      if (!next[item.org]) next[item.org] = [];
      if (!next[item.org].includes(name)) {
        next[item.org].push(name);
        setMaster(next); saveOrgAttMaster(next);
      }
    }
    advanceQueue();
  };
  // 重複確認：スキップ
  const resolveSkip = () => advanceQueue();
  const advanceQueue = () => {
    const next = queueIdx + 1;
    if (next < queue.length) {
      setQueueIdx(next); setRenameVal(queue[next].name);
    } else {
      setQueue([]); setQueueIdx(0); setRenameVal('');
    }
  };

  // 氏名個別削除
  const delName = (org, name) => {
    const next = {...master};
    next[org] = (next[org]||[]).filter(n=>n!==name);
    if (next[org].length===0) delete next[org];
    setMaster(next); saveOrgAttMaster(next);
  };
  // 組織ごと削除
  const delOrg = (org) => {
    if (!window.confirm(`「${org}」の全メンバーを削除しますか？`)) return;
    const next = {...master};
    delete next[org];
    setMaster(next); saveOrgAttMaster(next);
  };

  // 組織名変更
  const [editOrgName, setEditOrgName] = useState(null); // { oldOrg, newOrg }
  const startEditOrg = (org) => setEditOrgName({ oldOrg: org, newOrg: org });
  const commitEditOrg = () => {
    if (!editOrgName) return;
    const { oldOrg, newOrg } = editOrgName;
    const trimmed = newOrg.trim();
    if (!trimmed || trimmed === oldOrg) { setEditOrgName(null); return; }
    if (master[trimmed]) { alert(`「${trimmed}」はすでに存在します`); return; }
    const next = {};
    Object.keys(master).forEach(k => {
      next[k === oldOrg ? trimmed : k] = master[k];
    });
    setMaster(next); saveOrgAttMaster(next);
    setEditOrgName(null);
  };

  const orgs = Object.keys(master).sort();

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:560}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">✏️ 手入力出席者マスター</div>

        {/* 重複確認ダイアログ */}
        {queue.length > 0 && queueIdx < queue.length && (
          <div style={{background:'#FFF8EC',border:'1.5px solid #E6A817',borderRadius:8,padding:14,marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:13,color:'#7D4E00',marginBottom:8}}>
              ⚠️ 重複確認 （{queueIdx+1}/{queue.length}件）
            </div>
            <div style={{fontSize:13,marginBottom:10}}>
              <strong>「{queue[queueIdx].org}」</strong> に <strong>「{queue[queueIdx].name}」</strong> はすでに登録されています。
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <input value={renameVal} onChange={e=>setRenameVal(e.target.value)}
                placeholder="別名で登録（例：山下（信））"
                style={{flex:1,minWidth:160,padding:'6px 10px',border:'1.5px solid #E6A817',borderRadius:6,fontSize:13}}
                onKeyDown={e=>e.key==='Enter'&&resolveRename()}/>
              <button onClick={resolveRename}
                style={{background:'#1F7A4D',color:'#fff',border:'none',borderRadius:6,padding:'7px 14px',cursor:'pointer',fontSize:13,fontWeight:700}}>
                別名で登録
              </button>
              <button onClick={resolveSkip}
                style={{background:'#e2e8f0',border:'none',borderRadius:6,padding:'7px 14px',cursor:'pointer',fontSize:13}}>
                スキップ
              </button>
            </div>
          </div>
        )}

        {/* 組織名・氏名分離入力 */}
        {queue.length === 0 && (
        <div style={{background:'#f8fafc',border:'1.5px solid #d0d8e4',borderRadius:10,padding:14,marginBottom:14}}>

                  // bulkInputの先頭行の組織名部分だけ更新

// ── .ics（iCalendar）解析 ────────────────────────────────
function parseIcs(text) {
  // 複数行にまたがる値を結合（RFC5545の折り返し）- 先にunfold
  const unfold = (t) => t.replace(/\r?\n[ \t]/g, '');
  const unfolded = unfold(text);

  const get = (key) => {
    // TZID付き（例: DTSTART;TZID="Tokyo Standard Time":20260324T150000）を優先
    const reTzid = new RegExp('^' + key + ';TZID[^:]*:(.+)$', 'im');
    const mTzid = unfolded.match(reTzid);
    if (mTzid) return mTzid[1].trim();
    // TZID付きがなければ通常版、ただし1601年（Windowsタイムゾーン基準値）は除外
    const rePlain = new RegExp('^' + key + '[^:]*:(.+)$', 'gim');
    let m;
    while ((m = rePlain.exec(unfolded)) !== null) {
      const val = m[1].trim();
      if (!val.startsWith('16010101')) return val; // 1601年はスキップ
    }
    return '';
  };

  // 日時変換（Outlook各種形式に対応）
  const parseDate = (dt) => {
    if (!dt) return { date: '', time: '' };
    // 数字8桁を直接探す（フォーマットに依存しない）
    const dateMatch = dt.match(/(\d{8})/);
    const timeMatch = dt.match(/T(\d{6})/);
    if (!dateMatch) return { date: '', time: '' };
    const datePart = dateMatch[1];
    const timePart = timeMatch ? timeMatch[1] : '000000';
    const isUTC = dt.endsWith('Z');
    const y = datePart.slice(0,4), mo = datePart.slice(4,6), d = datePart.slice(6,8);
    const hh = parseInt(timePart.slice(0,2)), mi = timePart.slice(2,4);
    if (isUTC) {
      const utcMs = Date.UTC(parseInt(y), parseInt(mo)-1, parseInt(d), hh, parseInt(mi));
      const jst = new Date(utcMs + 9*60*60*1000);
      return {
        date: `${jst.getUTCFullYear()}-${String(jst.getUTCMonth()+1).padStart(2,'0')}-${String(jst.getUTCDate()).padStart(2,'0')}`,
        time: `${String(jst.getUTCHours()).padStart(2,'0')}:${String(jst.getUTCMinutes()).padStart(2,'0')}`
      };
    }
    return { date: `${y}-${mo}-${d}`, time: `${String(hh).padStart(2,'0')}:${mi}` };
  };


  const summary  = get('SUMMARY')  .replace(/^全体/,'全体').replace(/\\,/g,',').replace(/\\n/g,' ');
  const location = get('LOCATION').replace(/\\,/g,',').replace(/\\n/g,' ').replace(/\\;/g,' ').replace(/\\#/g,'').replace(/%23/g,'').replace(/[#＃]/g,'').replace(/\s{2,}/g,' ').trim();
  const dtStart  = parseDate(get('DTSTART'));
  const dtEnd    = parseDate(get('DTEND'));

  // DESCRIPTIONからアジェンダを抽出
  const parseAgenda = () => {
    const desc = get('DESCRIPTION')
      .replace(/\\n/g, '\n').replace(/\\,/g, ',').replace(/\\;/g, ';').replace(/\r/g, '').trim();
    if (!desc) return '';
    const lines = desc.split('\n').map(l => l.trim()).filter(Boolean);

    // メタ情報行の除外パターン
    const isMetaLine = (l) =>
      /^【日時[】:]/.test(l) ||
      /^【会議体[】:]/.test(l) ||
      /^【場所[】:]/.test(l) ||
      /^【開催[】:]/.test(l) ||
      /^【参加[】:]/.test(l) ||
      /^【出席[】:]/.test(l) ||
      /^【備考[】:]/.test(l) ||
      /^【注意[】:]/.test(l) ||
      /https?:\/\//.test(l) ||
      /\d{1,2}[\/\-]\d{1,2}.*\d{1,2}:\d{2}/.test(l) ||
      /アクセス[・\s]/.test(l) ||
      /ショップ|レストラン|フロア|タワー|ビル|〒/.test(l) ||
      /^〒/.test(l) ||
      l.length < 3;

    // セクションヘッダー（【内容】【アジェンダ】等）を検出
    const agendaKeyRe = /^【?\s*(アジェンダ|議題|Agenda|agenda|内容|議事|目的)[】:：）\s]*/i;

    // 【内容】または【アジェンダ】セクションを探す
    const agendaStartIdx = lines.findIndex(l => agendaKeyRe.test(l));

    let items = [];
    if (agendaStartIdx >= 0) {
      // キーワードと同一行の残りテキストを最初のアイテム候補とする
      const sameLine = lines[agendaStartIdx].replace(agendaKeyRe, '').trim();
      if (sameLine.length > 2 && !isMetaLine(sameLine)) items.push(sameLine);

      // セクション以降・次のセクションヘッダーまでを収集
      for (let i = agendaStartIdx + 1; i < lines.length; i++) {
        const l = lines[i];
        if (/^【.{1,10}[】:：]/.test(l)) break; // 次のセクションで終了
        if (isMetaLine(l)) continue;
        const cleaned = l.replace(/^[\s\-・●▶►▸\d\.\)）①②③④⑤　]+/, '').trim();
        if (cleaned.length > 2) items.push(cleaned);
      }
    } else {
      // キーワードなし → メタ情報除外・目的行を収集
      for (const l of lines) {
        if (isMetaLine(l)) continue;
        if (/^【.{1,10}[】:：]/.test(l)) continue; // セクションヘッダーをスキップ
        const cleaned = l
          .replace(/を開催いたします[。.]?/g, '')
          .replace(/のご案内[。.]?/g, '')
          .replace(/について[。.]?$/g, '')
          .replace(/^[\-・●▶\s]+/, '')
          .trim();
        if (cleaned.length > 4) items.push(cleaned);
        if (items.length >= 5) break;
      }
    }

    // 重複除去（大文字・小文字・空白を正規化して比較）
    const seen = new Set();
    items = items.filter(item => {
      const key = item.replace(/\s/g, '').toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    // 番号を振る
    return items.filter(Boolean).map((item, i) => `${i + 1}．${item}`).join('\n');
  };

  const agenda = parseAgenda();

  // 出席者を抽出（ATTENDEE行を全部取得）- name/email両方取得
  const attendeeRaws = [];
  const reAtt = /^ATTENDEE[^\r\n]*/gim;
  let m;
  while ((m = reAtt.exec(unfolded)) !== null) {
    const raw = parseAttendeeRaw(m[0].trim());
    if (raw.email || raw.name) attendeeRaws.push(raw);
  }
  const attendeeNames = attendeeRaws.map(a => a.name).filter(Boolean);

  // 会議名から回数を抽出（例：「全体PMO定例 第46回」→ name=全体PMO定例, no=46）
  const noMatch = summary.match(/第(\d+)回/);
  const meetingNo   = noMatch ? noMatch[1] : '';
  const meetingName = summary.replace(/　?第\d+回/, '').trim();

  return {
    meetingName,
    meetingNo,
    date:      dtStart.date,
    startTime: dtStart.time,
    endTime:   dtEnd.time,
    location,
    agenda,
    attendeeNames,
    attendeeRaws,  // [{name, email, rawName}]
  };
}
