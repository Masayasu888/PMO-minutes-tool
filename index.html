<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会議議事録・管理台帳 自動生成ツール</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@1.41.0/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo UI','Meiryo',sans-serif;background:#F0F4F8;color:#1a202c;min-height:100vh}
.app-wrap{max-width:960px;margin:0 auto;padding:16px}
.app-header{background:#1F3864;color:#fff;padding:14px 20px;border-radius:10px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.app-title{font-size:18px;font-weight:700;letter-spacing:.5px}
.app-sub{font-size:11px;color:#a0b4cc;margin-top:2px}
.btn-key{background:#2E75B6;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer}
.btn-key:hover{background:#1a5c9e}
.steps{display:flex;margin-bottom:20px;background:#fff;border-radius:10px;padding:12px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.step-item{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer}
.step-item:not(:last-child)::after{content:'';position:absolute;top:18px;left:60%;width:80%;height:2px;background:#d0d8e4}
.step-item.done:not(:last-child)::after{background:#2E75B6}
.step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:2px solid #d0d8e4;background:#fff;color:#999;position:relative;z-index:1;transition:.2s}
.step-item.active .step-circle{border-color:#2E75B6;background:#2E75B6;color:#fff}
.step-item.done .step-circle{border-color:#1F7A4D;background:#1F7A4D;color:#fff}
.step-label{font-size:10px;color:#666;margin-top:4px;text-align:center;line-height:1.3}
.step-item.active .step-label{color:#2E75B6;font-weight:600}
.card{background:#fff;border-radius:10px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.card-title{font-size:16px;font-weight:700;color:#1F3864;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #EBF3FB}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-1{margin-bottom:12px}
label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:4px}
input,textarea,select{width:100%;padding:9px 12px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:13px;font-family:'Meiryo UI','Meiryo',sans-serif;outline:none;transition:.15s;background:#fafbfc}
input:focus,textarea:focus,select:focus{border-color:#2E75B6;background:#fff}
textarea{resize:vertical;min-height:70px}
.req{color:#e53e3e;margin-left:2px}
.btn{padding:10px 24px;border-radius:7px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;font-family:'Meiryo UI',sans-serif}
.btn-primary{background:#1F3864;color:#fff}.btn-primary:hover{background:#16295a}
.btn-green{background:#1F7A4D;color:#fff}.btn-green:hover{background:#175e3b}
.btn-blue{background:#2E75B6;color:#fff}.btn-blue:hover{background:#1d5fa0}
.btn-gray{background:#e2e8f0;color:#444}.btn-gray:hover{background:#cbd5e0}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.upload-area{border:2px dashed #a0aec0;border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:.15s;background:#fafbfc}
.upload-area:hover,.upload-area.drag{border-color:#2E75B6;background:#EBF3FB}
.upload-area input{display:none}
.upload-icon{font-size:28px;margin-bottom:6px}
.upload-hint{font-size:12px;color:#718096;margin-top:4px}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:#EBF3FB;border:1px solid #bee3f8;padding:5px 12px;border-radius:20px;font-size:12px;color:#2c5282;margin-top:8px}
.file-chip button{background:none;border:none;cursor:pointer;color:#e53e3e;font-size:14px;line-height:1}
.analyzing-wrap{text-align:center;padding:40px}
.spinner{width:48px;height:48px;border:4px solid #EBF3FB;border-top-color:#2E75B6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-log{background:#1a202c;color:#68d391;padding:16px;border-radius:8px;font-size:12px;font-family:monospace;max-height:160px;overflow-y:auto;margin-top:16px;text-align:left}
.tabs{display:flex;gap:4px;margin-bottom:0;flex-wrap:wrap}
.tab{padding:7px 12px;border-radius:6px 6px 0 0;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #d0d8e4;border-bottom:none;background:#f0f4f8;color:#555}
.tab.active{background:#fff;color:#1F3864;border-color:#2E75B6;border-bottom-color:#fff}
.tab-content{background:#fff;border:1.5px solid #2E75B6;border-radius:0 8px 8px 8px;padding:16px}
.preview-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
.preview-table th{background:#1F3864;color:#fff;padding:8px 10px;text-align:left;font-size:12px}
.preview-table td{padding:8px 10px;border-bottom:1px solid #eee;vertical-align:top}
.preview-table tr:nth-child(even) td{background:#f8fafc}
.preview-table td textarea{border:none;background:transparent;padding:0;resize:none;width:100%;font-size:13px;font-family:'Meiryo UI',sans-serif;min-height:36px}
.preview-table td textarea:focus{outline:1px solid #2E75B6;background:#fff;border-radius:3px;padding:3px}
.preview-table td select{border:none;background:transparent;padding:0;font-size:13px;font-family:'Meiryo UI',sans-serif}
.preview-table td select:focus{outline:1px solid #2E75B6;background:#fff;border-radius:3px}
.dl-card{border:1.5px solid #d0d8e4;border-radius:8px;padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dl-info .dl-name{font-weight:700;color:#1F3864;font-size:14px}
.dl-info .dl-desc{font-size:12px;color:#718096;margin-top:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:28px;width:90%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:700;color:#1F3864;margin-bottom:16px}
.notice{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:12px}
.notice-info{background:#EBF3FB;color:#1a4a7a;border-left:3px solid #2E75B6}
.notice-warn{background:#FFF3CD;color:#7D4E00;border-left:3px solid #E6A817}
.notice-ok{background:#E8F5E9;color:#1B5E20;border-left:3px solid #4CAF50}
.section-divider{font-size:12px;font-weight:700;color:#2E75B6;padding:10px 0 6px;border-bottom:1px solid #EBF3FB;margin-bottom:10px}
@media(max-width:600px){
  .form-row,.form-row-3{grid-template-columns:1fr}
  .steps{padding:8px}.step-label{display:none}
  .card{padding:16px}.btn{padding:9px 16px;font-size:13px}
}

/* ── 出席者タグ入力UI ───────────────────────────────────── */
.attendee-block{border:1.5px solid #d0d8e4;border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#fafbfc}
.attendee-org-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.attendee-org-label{font-size:12px;font-weight:700;color:#1F3864;min-width:60px;white-space:nowrap}
.attendee-org-input{flex:1;padding:5px 8px;border:1px solid #d0d8e4;border-radius:5px;font-size:12px;font-family:inherit;outline:none}
.attendee-org-input:focus{border-color:#2E75B6;background:#fff}
.attendee-del-btn{background:none;border:none;color:#e53e3e;cursor:pointer;font-size:16px;line-height:1;padding:2px 4px}
.tag-area{display:flex;flex-wrap:wrap;gap:6px;min-height:28px}
.tag{display:inline-flex;align-items:center;gap:4px;background:#EBF3FB;border:1px solid #bee3f8;padding:3px 8px;border-radius:14px;font-size:12px;color:#1a4a7a;cursor:default}
.tag-del{background:none;border:none;color:#888;cursor:pointer;font-size:13px;line-height:1;padding:0 2px}
.tag-del:hover{color:#e53e3e}
.name-input-wrap{position:relative;flex:1;min-width:120px}
.name-input{width:100%;padding:4px 8px;border:1px dashed #a0aec0;border-radius:14px;font-size:12px;font-family:inherit;outline:none;background:transparent}
.name-input:focus{border-color:#2E75B6;background:#fff;border-style:solid}
.suggest-list{position:absolute;top:100%;left:0;z-index:100;background:#fff;border:1.5px solid #2E75B6;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);min-width:160px;max-height:180px;overflow-y:auto;margin-top:2px}
.suggest-item{padding:7px 12px;font-size:12px;cursor:pointer;color:#333}
.suggest-item:hover{background:#EBF3FB;color:#1F3864}
.add-org-btn{background:none;border:1.5px dashed #2E75B6;color:#2E75B6;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;width:100%;margin-top:4px}
.add-org-btn:hover{background:#EBF3FB}

/* ── 出席者UI（新設計） ─────────────────────────────────── */
.att-wrap{border:1.5px solid #d0d8e4;border-radius:10px;overflow:hidden;background:#fff}
.att-tabs{display:flex;gap:0;border-bottom:1.5px solid #d0d8e4;background:#f8fafc;flex-wrap:wrap}
.att-tab{padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent;transition:.15s;white-space:nowrap}
.att-tab.active{color:#1F3864;border-bottom-color:#2E75B6;background:#fff}
.att-tab:hover:not(.active){background:#EBF3FB;color:#1F3864}
.att-tab-add{padding:7px 10px;font-size:12px;cursor:pointer;border:none;background:none;color:#2E75B6;border-bottom:2px solid transparent}
.att-body{padding:12px 14px}
.att-tags{display:flex;flex-wrap:wrap;gap:6px;min-height:28px;margin-bottom:10px}
.att-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:600;color:#1a4a7a;background:#EBF3FB;border:1px solid #bee3f8}
.att-tag-del{background:none;border:none;cursor:pointer;color:#888;font-size:13px;line-height:1;padding:0 2px}
.att-tag-del:hover{color:#e53e3e}
.att-search-wrap{position:relative}
.att-search-row{display:flex;gap:8px;align-items:center}
.att-search-input{flex:1;padding:7px 10px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:13px;font-family:inherit;outline:none}
.att-search-input:focus{border-color:#2E75B6}
.att-suggest{position:absolute;top:100%;left:0;right:0;z-index:200;background:#fff;border:1.5px solid #2E75B6;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);margin-top:4px;max-height:200px;overflow-y:auto}
.att-suggest-item{padding:8px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.att-suggest-item:hover{background:#EBF3FB}
.att-suggest-badge{font-size:10px;padding:2px 6px;border-radius:8px;background:#EBF3FB;color:#1F3864;font-weight:700}
.att-suggest-new{padding:8px 12px;font-size:12px;color:#2E75B6;cursor:pointer;border-top:1px solid #e2e8f0;display:flex;align-items:center;gap:6px}
.att-suggest-new:hover{background:#EBF3FB}
.att-org-select{padding:7px 10px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#333;min-width:80px}
.att-org-select:focus{border-color:#2E75B6}
/* ── 配布資料リンク入力 ──────────────────────────────────── */
.material-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1.5px solid #d0d8e4;border-radius:6px;margin-bottom:6px;background:#fafbfc;transition:.15s}
.material-item:focus-within{border-color:#2E75B6;background:#fff}
.material-name{flex:1;border:none;background:transparent;font-size:13px;font-family:inherit;outline:none;min-width:0}
.material-url{flex:1;border:none;background:transparent;font-size:12px;font-family:inherit;outline:none;color:#2E75B6;min-width:0}
.material-url::placeholder{color:#a0aec0}
.material-divider{color:#d0d8e4;user-select:none}
.material-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;line-height:1;padding:0 2px;flex-shrink:0}
.material-del:hover{color:#e53e3e}
.material-add{background:none;border:1.5px dashed #2E75B6;color:#2E75B6;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;width:100%;margin-top:2px}
.material-add:hover{background:#EBF3FB}
.material-link-icon{font-size:12px;color:#a0aec0;flex-shrink:0}

/* ── 会議中モード ─────────────────────────────────────────── */
.live-mode-wrap{max-width:1400px;margin:0 auto;padding:16px}
.live-header{background:#1a202c;color:#fff;padding:12px 20px;border-radius:10px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.live-title{font-size:16px;font-weight:700;color:#fc8181;display:flex;align-items:center;gap:6px;white-space:nowrap}
.live-title.recording{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.live-settings{background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.live-setting-group{display:flex;flex-direction:column;gap:4px;min-width:160px}
.live-setting-group label{font-size:11px;font-weight:600;color:#444}
.live-setting-group input{padding:6px 10px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
.live-setting-group input:focus{border-color:#2E75B6}
.live-panels{display:grid;grid-template-columns:1fr 1fr;gap:12px;height:calc(100vh - 280px);min-height:400px}
.live-panel{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
.live-panel-header{padding:10px 16px;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;flex-shrink:0}
.live-panel-body{flex:1;overflow-y:auto;padding:12px 16px;font-size:13px;line-height:1.7}
.live-transcript-line{padding:2px 0;border-bottom:1px solid #f0f4f8}
.live-transcript-time{font-size:11px;color:#a0aec0;margin-right:6px;font-family:monospace}
.live-interim{color:#a0aec0;font-style:italic;padding:4px 0}
.ai-flag{padding:8px 12px;border-radius:6px;margin-bottom:8px;font-size:12px}
.ai-flag-root{background:#FFF5F5;border-left:3px solid #E53E3E;color:#742a2a}
.ai-flag-warn{background:#FFFBEB;border-left:3px solid #D69E2E;color:#744210}
.ai-flag-risk{background:#FFF5F5;border-left:3px solid #E53E3E;color:#742a2a}
.ai-flag-issue{background:#FAF5FF;border-left:3px solid #805AD5;color:#44337a}
.ai-section{margin-bottom:14px}
.ai-section-title{font-size:11px;font-weight:700;color:#2E75B6;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid #EBF3FB;text-transform:uppercase;letter-spacing:.5px}
.ai-question{padding:6px 10px;background:#EBF3FB;border-radius:4px;margin-bottom:4px;font-size:12px;color:#1a4a7a}
.ai-contradiction{padding:6px 10px;background:#FFF3CD;border-radius:4px;margin-bottom:4px;font-size:12px;color:#7D4E00}
.ai-summary{font-size:12px;color:#333;line-height:1.7;background:#f8fafc;padding:10px;border-radius:6px}
.ai-exec{font-size:12px;font-weight:600;color:#C55A11;background:#FFF4EB;padding:10px;border-radius:6px;border-left:3px solid #C55A11}
.analyzing-badge{display:inline-flex;align-items:center;gap:4px;background:#EBF3FB;color:#2E75B6;padding:3px 8px;border-radius:10px;font-size:11px}
.live-btn{padding:7px 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;transition:.15s}
.live-btn-red{background:#E53E3E;color:#fff}.live-btn-red:hover{background:#c53030}
.live-btn-green{background:#38A169;color:#fff}.live-btn-green:hover{background:#2f855a}
.live-btn-gray{background:#e2e8f0;color:#444}.live-btn-gray:hover{background:#cbd5e0}
.live-btn-blue{background:#2E75B6;color:#fff}.live-btn-blue:hover{background:#1d5fa0}
.live-btn-dark{background:#1F3864;color:#fff}.live-btn-dark:hover{background:#16295a}
.live-btn:disabled{opacity:.5;cursor:not-allowed}
.mode-toggle{display:flex;gap:8px;align-items:center}
.mode-btn{padding:6px 14px;border-radius:6px;border:1.5px solid #d0d8e4;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#555;transition:.15s}
.mode-btn.active{background:#1F3864;color:#fff;border-color:#1F3864}
.mode-btn.live-active{background:#E53E3E;color:#fff;border-color:#E53E3E}
@media(max-width:768px){.live-panels{grid-template-columns:1fr;height:auto}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── 今日の日付 ─────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const STEPS = [
  {n:1,label:'基本情報'},{n:2,label:'ファイル\nアップロード'},
  {n:3,label:'AI解析'},{n:4,label:'プレビュー\n・編集'},{n:5,label:'ダウンロード'}
];

const IP_OPTS = ['','緊急','高','中','低'];
const EMPTY = {agenda_items:[],minutes_by_agenda:[],decisions:[],todos:[],pending:[],risks:[],issues:[],exec_report:[],manager_report:[]};

// ── XML escape ───────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function generateDocx(basicInfo, result){
  const W = 9947;
  const FONT = `<w:rFonts w:ascii="Meiryo UI" w:hAnsi="Meiryo UI" w:cs="Meiryo UI" w:eastAsia="Meiryo UI"/>`;
  const HDR  = '143D69';
  const date = basicInfo.date ? basicInfo.date.replace(/-/g,'/') : '';
  const today = new Date();
  const todayStr = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;
  const meetingTitle = `${basicInfo.meetingName}${basicInfo.meetingNo ? ` 第${basicInfo.meetingNo}回` : ''}`;

  // ── セル生成（テンプレートに合わせてsz=22、罫線はtable levelのみ）──
  function cell(text, w, opts={}){
    const shade = opts.shade ? `<w:shd w:val="clear" w:color="auto" w:fill="${opts.shade}"/>` : '';
    const span  = opts.span  ? `<w:gridSpan w:val="${opts.span}"/>` : '';
    const vA    = `<w:vAlign w:val="center"/>`;
    // テンプレート通り：セル個別の罫線は下側白線のみ（ヘッダー色セルのみ）
    const tcBdr = opts.shade === HDR
      ? `<w:tcBorders><w:bottom w:val="single" w:sz="6" w:color="FFFFFF"/></w:tcBorders>`
      : '';
    const mar   = `<w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="120" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:right w:w="120" w:type="dxa"/></w:tcMar>`;
    const wElem = w ? `<w:tcW w:w="${w}" w:type="dxa"/>` : '';
    const isHdr = opts.shade === HDR;
    const txtColor = isHdr ? 'FFFFFF' : (opts.textColor || '000000');
    const bold = isHdr ? '<w:b/><w:bCs/>' : (opts.bold ? '<w:b/><w:bCs/>' : '');
    const sz = 22; // テンプレート実測値 sz=22（11pt）統一
    const jc = opts.center ? '<w:jc w:val="center"/>' : '';
    const lines = String(text||'').split('\n');
    const parasXml = lines.map(line =>

// ── Excel生成（ExcelJS版・完全書式対応） ────────────────────
async function generateXlsx(basicInfo, result, xlsxTemplateFile, xlsxDataFile) {
  const mtg = basicInfo.meetingName + (basicInfo.meetingNo ? ` 第${basicInfo.meetingNo}回` : '');
  const dt  = basicInfo.date ? basicInfo.date.replace(/-/g,'/') : '';

  // ── 照合ログ（判定理由シート用） ───────────────────────────
  const matchLog = []; // {sheet, content, match_type, existing_no, reason, progress}

  // ── 既存ファイルから過去データを読み込む ─────────────────
  // ExcelJSはブラウザでarrayBufferからの読み込みをサポート
  let existingSheetData = {}; // {sheetName: [{row data...}, ...]}
  const srcFile = xlsxDataFile || xlsxTemplateFile;
  if (srcFile) {
    try {
      const ab = await srcFile.arrayBuffer();
      const wbOld = new ExcelJS.Workbook();
      await wbOld.xlsx.load(ab);
      wbOld.eachSheet((ws, sheetId) => {
        const rows = [];
        let headerRow = null;
        let headers = [];
        ws.eachRow({ includeEmpty: false }, (row, rowNum) => {
          // ExcelJSのrow.valuesはセルオブジェクトになる場合があるので
          // getCell().valueで確実に値を取得する
          const getCellVal = (colIdx) => {
            const cell = row.getCell(colIdx);
            const v = cell ? cell.value : null;
            return v;
          };
          // 列数を特定
          const colCount = row.cellCount || 30;

          const toStr = (v) => {
            if (v === null || v === undefined) return '';
            if (typeof v === 'object' && v !== null) {
              if (v instanceof Date) {
                const y = v.getFullYear();
                const m = String(v.getMonth()+1).padStart(2,'0');
                const d = String(v.getDate()).padStart(2,'0');
                return `${y}/${m}/${d}`;
              }
              if (v.richText) return v.richText.map(r=>r.text||'').join('');
              if (v.result !== undefined) return toStr(v.result);
              if (v.text !== undefined) return String(v.text);
              if (v.error !== undefined) return '';
              // 共有文字列インデックスなど → JSON化して中身を見る
              try {
                const j = JSON.stringify(v);
                // {"value":"例"} 形式
                if (v.value !== undefined) return String(v.value);
                return '';
              } catch(e) { return ''; }
            }
            if (typeof v === 'number' && v > 40000 && v < 60000) {
              const date = new Date(Math.round((v - 25569) * 86400 * 1000));
              const y = date.getUTCFullYear();
              const mo = String(date.getUTCMonth()+1).padStart(2,'0');
              const d = String(date.getUTCDate()).padStart(2,'0');
              return `${y}/${mo}/${d}`;
            }
            return String(v);
          };

          if (!headerRow) {
            // ヘッダー行を探す（No.を含む行）
            const vals = Array.from({length: colCount}, (_, i) => toStr(getCellVal(i+1)));
            if (vals.some(v => v.includes('No.'))) {
              headerRow = rowNum;
              headers = vals.map(v => v.replace(/\n/g,''));
            }
          } else {
            // データ行
            const rowObj = {};
            headers.forEach((h, i) => {
              rowObj[h] = toStr(getCellVal(i+1));
            });
            // 例行・progress行・空行はスキップ
            const noVal = rowObj['No.'] || rowObj['No'];
            if (noVal && noVal !== '例' && rowObj['行種別'] !== 'progress') {
              rows.push(rowObj);
            }
          }
        });
        if (rows.length > 0) existingSheetData[ws.name] = rows;
      });
    } catch(e) {
      console.warn('既存ファイル読み込みエラー:', e);
    }
  }

  // 既存データ＋新規データを結合する関数
  function mergeData(sheetName, newRows) {
    const existing = existingSheetData[sheetName] || [];
    let maxNo = existing.reduce((m, r) => Math.max(m, parseInt(r['No.']||0)), 0);
    const merged = existing.map(r => ({...r}));

    newRows.forEach(row => {
      const matchType   = row.match_type   || 'new';
      const existingNo  = row.existing_no  ? String(row.existing_no) : null;
      const progressText = row.progress    || '';
      const matchReason = row.match_reason || '';

      // 判定ログに記録
      matchLog.push({
        sheet:      sheetName,
        content:    row.content || row['アクション内容'] || row['リスク内容'] || row['課題内容'] || row['報告内容'] || '',
        match_type: matchType,
        existing_no: existingNo || '',
        reason:     matchReason,
        progress:   progressText,
      });

      if (matchType === 'same' && existingNo) {
        const target = merged.find(r => String(r['No.']) === existingNo);
        if (target) {
          if (progressText) {
            target['最新進捗日']   = row['会議日'] || '';
            target['最新進捗内容'] = progressText;
          }
          target['_updated'] = true;
          return;
        }
      }

      const newRow = { ...row, 'No.': ++maxNo };
      delete newRow.match_type;
      delete newRow.existing_no;
      delete newRow.progress;
      delete newRow.match_reason;
      if (matchType === 'similar') {
        newRow['類似No.\n・判定'] = `⚠️ No.${existingNo} 類似`;
        newRow['_similar'] = true;
      }
      merged.push(newRow);
    });

    return merged;
  }

        ws.mergeCells(1, start, 1, end);

        applyStyle(cell, secStyle(sec.bgColor));

    ws.getRow(3).height = 30;

    // 既存データ行を追記
    let rowNum = 4;

    existingData.forEach((rowData, idx) => {

      const isSimilar  = !!rowData['_similar'];
      const isUpdated  = !!rowData['_updated'];
      // 行高さ：最長セルの文字数から推定（列幅40文字想定、1行約15px）
      const maxLen = Math.max(...Object.values(rowData).map(v => String(v||'').length));
      const estLines = Math.max(2, Math.ceil(maxLen / 35));
      ws.getRow(rowNum).height = Math.min(150, estLines * 16 + 8);

      allCols.forEach((col, ci) => {
        const cell = ws.getCell(rowNum, ci + 1);
        const val = rowData[col.key] !== undefined ? rowData[col.key] : '';
        // _similar/_updated/_isNew は内部フラグなので空文字
        cell.value = String(col.key.startsWith('_') ? '' : val);

        // 完了は行全体グレー
        if (isComplete) {
          cell.font      = { name: FONT_NAME, size: 10, color: { argb: 'FF808080' } };
          cell.fill      = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD9D9D9' } };
          cell.border    = { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                             left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} };
          cell.alignment = { horizontal: col.center?'center':'left', vertical:'top', wrapText:true };
        // 類似は黄色背景・茶色枠
        } else if (isSimilar) {
          cell.font      = { name: FONT_NAME, size: 10, color: { argb: 'FF000000' } };
          cell.fill      = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF3CD' } };
          cell.border    = { top:{style:'thin',color:{argb:'FFE6A817'}}, bottom:{style:'thin',color:{argb:'FFE6A817'}},
                             left:{style:'thin',color:{argb:'FFE6A817'}}, right:{style:'thin',color:{argb:'FFE6A817'}} };
          cell.alignment = { horizontal: col.center?'center':'left', vertical:'top', wrapText:true };
        // 進捗更新は薄青背景
        } else if (isUpdated) {
          cell.font      = { name: FONT_NAME, size: 10, color: { argb: 'FF000000' } };
          cell.fill      = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFDBEAFE' } };
          cell.border    = { top:{style:'thin',color:{argb:'FF2E75B6'}}, bottom:{style:'thin',color:{argb:'FF2E75B6'}},
                             left:{style:'thin',color:{argb:'FF2E75B6'}}, right:{style:'thin',color:{argb:'FF2E75B6'}} };
          cell.alignment = { horizontal: col.center?'center':'left', vertical:'top', wrapText:true };
        } else if (col.type === 'importance' || col.type === 'priority') {
          applyStyle(cell, impStyle(val, isAlt));
        } else if (col.type === 'share') {
          applyStyle(cell, shareStyle(val, isAlt));
        } else if (col.type === 'yohi') {

        } else if (col.type === 'status') {

// ── Download helper ───────────────────────────────────────
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function makeDocxFilename(meetingName, date, version=1){
  const safe = (meetingName||'会議').replace(/[\\/:*?"<>|]/g,'');
  const d = (date||'').replace(/-/g,'');
  const v = version > 1 ? `_v${version}` : '';
  return `議事録_${safe}_${d}${v}.docx`;
}
function makeXlsxFilename(date){
  const d = (date||'').replace(/-/g,'');
  const ts = new Date().toTimeString().slice(0,5).replace(':','');
  return `会議管理台帳_${d}_${ts}.xlsx`;
}

// ── Claude API ────────────────────────────────────────────
async function callClaude(apiKey, basicInfo, transcript, onLog, existingData={}){
  onLog('📡 Claude APIに接続中...');
  const attendees = (basicInfo.attendees||[]).map(o=>{
    const names = Array.isArray(o.names)?o.names.join('、'):(o.names||'');
    return names?`【${o.org}】　${names}`:`【${o.org}】`;
  }).join('\n');

  // 既存の未完了アイテムをシートごとに整形
  const sheetMap = {
    'todos':           'To-Do',
    'risks':           'リスク',
    'issues':          '課題',
    'exec_report':     '役員報告事項',
    'manager_report':  '室長報告事項',
  };
  let existingSection = '';
  Object.entries(sheetMap).forEach(([key, sheetName]) => {
    const rows = (existingData[sheetName] || []).filter(r =>
      r['最終\nステータス'] !== '完了' && r['No.'] && r['No.'] !== '例'
    );
    if (rows.length === 0) return;
    existingSection += `\n【既存の未完了${sheetName}】\n`;
    rows.forEach(r => {
      const contentKey = key === 'todos' ? 'アクション内容'
        : key === 'risks'  ? 'リスク内容'
        : key === 'issues' ? '課題内容'
        : '報告内容';
      existingSection += `No.${r['No.']}: ${r[contentKey]||''} (担当:${r['担当者']||r['報告先役員']||r['担当室長']||''} 状況:${r['最終\nステータス']||''})\n`;
    });
  });

  const prompt = `以下の会議情報と文字起こしを分析し、JSON形式で抽出してください。

【基本情報】
会議名: ${basicInfo.meetingName}${basicInfo.meetingNo?` 第${basicInfo.meetingNo}回`:''}
日時: ${basicInfo.date} ${basicInfo.startTime}〜${basicInfo.endTime}
場所: ${basicInfo.location}
出席者: ${attendees}
作成者: ${basicInfo.author}
配布資料: ${Array.isArray(basicInfo.materials)?basicInfo.materials.filter(m=>m.name).map(m=>m.url?`${m.name}（${m.url}）`:m.name).join('、'):basicInfo.materials||''}

【文字起こし】
${transcript}
${existingSection ? existingSection + '\n' : ''}
重要度・優先度は「緊急」「高」「中」「低」の4段階で判定してください。

【発言者の記載ルール】
議事内容・ToDo・担当者の記載において発言者を特定する際：
- 出席者リストや文脈から名前が特定できる場合 → **名前のみ**（例：川鍋、宮守、篠原）
- 名前が特定できない場合のみ → 「話者X」形式（例：話者3）
- 出席者リストの氏名（姓のみでも可）と文字起こしの発言者を積極的に照合してください

【既存アイテムの照合ルール】
既存の未完了アイテムが提供されている場合、文字起こしの内容と照合してください。
- 同一: 内容・担当者・文脈が明確に一致 → match_type="same", existing_no=該当No.
- 類似: 関連しているが同一か判断しにくい → match_type="similar", existing_no=該当No.
- 新規: 既存リストにない → match_type="new"（existing_noは省略）

以下のJSON構造で出力してください（マークダウン不要、JSONのみ）:
{"agenda_items":["議題1"],"minutes_by_agenda":[{"title":"議題名","content":"発言録（発言者名: 発言内容）"}],"decisions":[{"content":"決定内容","decided_by":"決定者","scope":"影響範囲","importance":"高","priority":"高"}],"todos":[{"content":"アクション","assignee":"担当者","due":"YYYY/MM/DD","importance":"高","priority":"高","match_type":"new","existing_no":null,"progress":"今回の文字起こしから読み取れる進捗内容（あれば）","match_reason":"判定の根拠（例: 発言者が進捗を報告、内容が一致）"}],"pending":[{"content":"保留内容","reason":"理由","next_action":"次回の扱い"}],"risks":[{"content":"リスク内容","category":"カテゴリ","impact":"高","probability":"高","response":"対応方針","owner":"担当者","importance":"高","priority":"高","match_type":"new","existing_no":null,"progress":"","match_reason":""}],"issues":[{"content":"課題内容","category":"カテゴリ","owner":"担当者","due":"期日","resolution":"解決策","importance":"中","priority":"中","match_type":"new","existing_no":null,"progress":"","match_reason":""}],"exec_report":[{"content":"報告内容","decision_needed":"要","background":"背景","recipient":"役員名","deadline":"期限","importance":"緊急","priority":"緊急","match_type":"new","existing_no":null,"progress":"","match_reason":""}],"manager_report":[{"content":"報告内容","action_needed":"要","background":"背景","recipient":"室長名","deadline":"期限","importance":"高","priority":"高","match_type":"new","existing_no":null,"progress":"","match_reason":""}]}`;

  onLog('🤖 文字起こしを解析・照合中...');
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,system:'日本のPMO議事録・管理台帳作成の専門家です。指定のJSON形式のみで出力してください。',messages:[{role:'user',content:prompt}]})
  });
  if(!res.ok) throw new Error(`API Error ${res.status}: ${await res.text()}`);
  const data = await res.json();
  onLog('✅ 解析・照合完了！データを処理中...');
  const text = data.content[0].text.trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
  try { return JSON.parse(text); }
  catch(e){ const m=text.match(/\{[\s\S]+\}/); if(m) return JSON.parse(m[0]); throw new Error('JSON解析失敗: '+e.message); }
}

const MEETING_MASTER_KEY = 'pmo_meeting_master';

function loadMeetingMaster(){

    return v ? JSON.parse(v) : ['全体PMO定例','ステアリングコミッティ','WG会議','周辺システム定例'];
  } catch(e){ return []; }
}

function saveMeetingMaster(list){
  localStorage.setItem(MEETING_MASTER_KEY, JSON.stringify(list));
}

function MeetingMasterModal({onClose}){
  const [list, setList] = useState(()=>loadMeetingMaster());
  const [input, setInput] = useState('');
  const add = () => {
    const v = input.trim();
    if(!v || list.includes(v)) return;
    const next = [...list, v];
    setList(next); saveMeetingMaster(next); setInput('');
  };
  const del = (i) => {
    const next = list.filter((_,idx)=>idx!==i);
    setList(next); saveMeetingMaster(next);
  };
  const moveUp = (i) => {
    if(i===0) return;
    const next=[...list]; [next[i-1],next[i]]=[next[i],next[i-1]];
    setList(next); saveMeetingMaster(next);
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">📋 会議名マスター管理</div>
        <div className="notice notice-info" style={{marginBottom:12}}>
          登録した会議名はStep1のプルダウンに表示されます。手入力も引き続き可能です。
        </div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&add()}
            placeholder="会議名を入力してEnterまたは追加ボタン"
            style={{flex:1}}/>
          <button className="btn btn-blue" style={{padding:'9px 14px',fontSize:13}} onClick={add}>追加</button>
        </div>
        <div style={{maxHeight:300,overflowY:'auto',border:'1px solid #e2e8f0',borderRadius:6}}>
          {list.length===0 && <div style={{padding:12,color:'#888',fontSize:13,textAlign:'center'}}>登録された会議名はありません</div>}
          {list.map((name,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',padding:'8px 12px',borderBottom:'1px solid #f0f0f0',gap:6}}>
              <span style={{flex:1,fontSize:13}}>{name}</span>
              <button onClick={()=>moveUp(i)} disabled={i===0}
                style={{background:'none',border:'1px solid #d0d8e4',borderRadius:4,padding:'3px 7px',cursor:'pointer',fontSize:12,color:'#555'}}>↑</button>
              <button onClick={()=>del(i)}
                style={{background:'none',border:'none',cursor:'pointer',color:'#e53e3e',fontSize:16,lineHeight:1}}>🗑</button>
            </div>
          ))}
        </div>
        <div className="btn-row" style={{marginTop:16,justifyContent:'flex-end'}}>
          <button className="btn btn-primary" onClick={onClose}>閉じる</button>
        </div>
      </div>
    </div>
  );
}

const ATTENDEE_KEY = 'pmo_attendee_history';

function loadAttendeeHistory(){
  try{ return JSON.parse(localStorage.getItem(ATTENDEE_KEY)||'{}'); }
  catch(e){ return {}; }
}
function saveAttendeeHistory(org, names){
  const hist = loadAttendeeHistory();
  if(!hist[org]) hist[org] = [];
  names.forEach(n => {
    if(n && !hist[org].includes(n)) hist[org].unshift(n);
  });
  hist[org] = hist[org].slice(0, 30); // 最大30件
  localStorage.setItem(ATTENDEE_KEY, JSON.stringify(hist));
}

  });

  useEffect(()=>{ onChange(items); }, [items]);

  const upd = (i, key, val) => {
    const next = items.map((it,idx)=>idx===i?{...it,[key]:val}:it);
    setItems(next);
  };
  const add = () => setItems([...items, {name:'', url:''}]);
  const del = (i) => {
    const next = items.filter((_,idx)=>idx!==i);
    setItems(next.length ? next : [{name:'', url:''}]);
  };

  return(
    <div>
      {items.map((item,i)=>(
        <div key={i} className="material-item">
          <span className="material-link-icon">📄</span>
          <input className="material-name" value={item.name}
            onChange={e=>upd(i,'name',e.target.value)}
            placeholder="資料名（例: アジェンダ_v1.0）"/>
          <span className="material-divider">｜</span>
          <span className="material-link-icon" style={{color:'#2E75B6'}}>🔗</span>
          <input className="material-url" value={item.url}
            onChange={e=>upd(i,'url',e.target.value)}
            placeholder="URL（任意）"/>
          <button className="material-del" onClick={()=>del(i)}>🗑</button>
        </div>
      ))}
      <button className="material-add" onClick={add}>＋ 資料を追加</button>
    </div>
  );
}

// ── 名前履歴編集モーダル ──────────────────────────────────
function AttendeeHistoryModal({ orgKey, onClose }){
  const [hist, setHist] = useState(()=>{
    const h = loadAttendeeHistory();
    return h[orgKey] ? [...h[orgKey]] : [];
  });
  const [editing, setEditing] = useState(null); // {idx, sei, mei}

  // 名前を姓・名に分割（スペース区切り）
  const splitName = (name) => {
    const parts = (name||'').trim().split(/\s+/);
    return parts.length >= 2
      ? { sei: parts[0], mei: parts.slice(1).join(' ') }
      : { sei: parts[0]||'', mei: '' };
  };

  const save = (newList) => {
    const all = loadAttendeeHistory();
    all[orgKey] = newList;
    localStorage.setItem(ATTENDEE_KEY, JSON.stringify(all));
    setHist([...newList]);
  };
  const del = (i) => save(hist.filter((_,idx)=>idx!==i));
  const startEdit = (i) => {
    const { sei, mei } = splitName(hist[i]);
    setEditing({ idx:i, sei, mei });
  };
  const commitEdit = () => {
    if(!editing) return;
    const fullName = [editing.sei, editing.mei].filter(Boolean).join(' ').trim();
    if(!fullName) return;
    const next = hist.map((n,i)=>i===editing.idx ? fullName : n).filter(Boolean);
    save(next); setEditing(null);
  };
  const moveUp = (i) => {
    if(i===0) return;
    const next=[...hist]; [next[i-1],next[i]]=[next[i],next[i-1]]; save(next);
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">📝 【{orgKey}】名前履歴の編集</div>
        <div className="notice notice-info" style={{marginBottom:12}}>
          姓・名を分けて表示・編集できます。Enterまたは✓で確定してください。
        </div>
        {hist.length===0 && <div style={{color:'#888',fontSize:13,padding:'8px 0'}}>履歴がありません</div>}
        <div style={{maxHeight:300,overflowY:'auto',border:'1px solid #e2e8f0',borderRadius:6}}>
          {hist.map((name,i)=>{
            const {sei,mei} = splitName(name);
            return (
              <div key={i} style={{padding:'8px 10px',borderBottom:'1px solid #f0f0f0'}}>
                {editing && editing.idx===i ? (
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <div style={{display:'flex',gap:4,flex:1}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,color:'#888',marginBottom:2}}>姓</div>
                        <input value={editing.sei}
                          onChange={e=>setEditing({...editing,sei:e.target.value})}
                          onKeyDown={e=>{if(e.key==='Enter')commitEdit(); if(e.key==='Escape')setEditing(null);}}
                          style={{width:'100%',padding:'4px 8px',border:'1.5px solid #2E75B6',borderRadius:4,fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}
                          autoFocus placeholder="例: 宮守"/>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:10,color:'#888',marginBottom:2}}>名</div>
                        <input value={editing.mei}
                          onChange={e=>setEditing({...editing,mei:e.target.value})}
                          onKeyDown={e=>{if(e.key==='Enter')commitEdit(); if(e.key==='Escape')setEditing(null);}}
                          style={{width:'100%',padding:'4px 8px',border:'1.5px solid #2E75B6',borderRadius:4,fontSize:13,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}}
                          placeholder="例: 秀勝"/>
                      </div>
                    </div>
                    <button onClick={commitEdit} style={{background:'#1F7A4D',color:'#fff',border:'none',borderRadius:4,padding:'5px 10px',cursor:'pointer',fontSize:12,marginTop:14}}>✓</button>
                    <button onClick={()=>setEditing(null)} style={{background:'#e2e8f0',border:'none',borderRadius:4,padding:'5px 8px',cursor:'pointer',fontSize:12,marginTop:14}}>✕</button>
                  </div>
                ) : (
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <div style={{flex:1,display:'flex',gap:8,alignItems:'baseline'}}>
                      <span style={{fontSize:13,fontWeight:600}}>{sei}</span>
                      {mei && <span style={{fontSize:13,color:'#444'}}>{mei}</span>}
                      {!mei && <span style={{fontSize:11,color:'#bbb'}}>（名未設定）</span>}
                    </div>
                    <button onClick={()=>startEdit(i)} style={{background:'none',border:'1px solid #d0d8e4',borderRadius:4,padding:'2px 7px',cursor:'pointer',fontSize:11,color:'#555'}}>編集</button>
                    <button onClick={()=>moveUp(i)} disabled={i===0} style={{background:'none',border:'1px solid #d0d8e4',borderRadius:4,padding:'2px 7px',cursor:'pointer',fontSize:11,color:'#555'}}>↑</button>
                    <button onClick={()=>del(i)} style={{background:'none',border:'none',cursor:'pointer',color:'#e53e3e',fontSize:16,lineHeight:1}}>🗑</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div className="btn-row" style={{marginTop:16,justifyContent:'flex-end'}}>
          <button className="btn btn-primary" onClick={onClose}>閉じる</button>
        </div>
      </div>
    </div>
  );
}

function TagNameInput({ orgKey, tags: tagsProp, setTags }){
  // ローカルstateで即時表示、親stateも同時更新
  const [tags, setTagsLocal] = useState(tagsProp||[]);
  const [input, setInput] = useState('');
  const [suggestions, setSuggestions] = useState([]);
  const [showSug, setShowSug] = useState(false);
  const [showHistEdit, setShowHistEdit] = useState(false);
  const inputRef = useRef();

  // 親から渡されるtagsが変わったら同期
  useEffect(()=>{ setTagsLocal(tagsProp||[]); }, [JSON.stringify(tagsProp)]);

  const getSuggestions = (val) => {
    const hist = loadAttendeeHistory();
    const all = hist[orgKey] || [];
    return all.filter(n => n.includes(val) && !tags.includes(n)).slice(0, 8);
  };

  const addTag = (name) => {
    const n = name.trim();
    if(!n || tags.includes(n)) return;
    const next = [...tags, n];
    setTagsLocal(next);
    setTags(next);
    saveAttendeeHistory(orgKey, [n]);
    setInput(''); setShowSug(false);
  };

  const delTag = (i) => {
    const next = tags.filter((_,idx)=>idx!==i);
    setTagsLocal(next); setTags(next);
  };

  const handleKey = (e) => {
    if(e.key==='Enter'||e.key==='、'||e.key===','){
      e.preventDefault(); addTag(input);
    } else if(e.key==='Backspace' && !input && tags.length){
      const next = tags.slice(0,-1);
      setTagsLocal(next); setTags(next);
    }
  };

  const handleChange = (e) => {
    const v = e.target.value;
    if(v.includes('、')||v.includes(',')){
      v.split(/[、,]/).forEach(n=>n.trim()&&addTag(n.trim()));
      return;
    }
    setInput(v);
    setSuggestions(getSuggestions(v));
    setShowSug(true);
  };

  return(
    <div>
      <div className="tag-area" onClick={()=>inputRef.current && inputRef.current.focus()}>
        {tags.map((name,i)=>(
          <span key={i} className="tag">
            {name}
            <button className="tag-del" onClick={e=>{e.stopPropagation();delTag(i);}}>✕</button>
          </span>
        ))}
        <div className="name-input-wrap">
          <input ref={inputRef} className="name-input" value={input}
            onChange={handleChange} onKeyDown={handleKey}
            onFocus={()=>{setSuggestions(getSuggestions(input));setShowSug(true);}}
            onBlur={()=>setTimeout(()=>setShowSug(false),150)}
            placeholder={tags.length?'名前を追加…':'名前を入力（Enterで追加）'}/>
          {showSug && suggestions.length>0 && (
            <div className="suggest-list">
              {suggestions.map((s,i)=>(
                <div key={i} className="suggest-item" onMouseDown={()=>addTag(s)}>{s}</div>
              ))}
            </div>
          )}
        </div>
      </div>
      <button onClick={()=>setShowHistEdit(true)}
        style={{background:'none',border:'none',color:'#999',fontSize:11,cursor:'pointer',padding:'2px 0',marginTop:2}}>
        📋 履歴を編集・修正
      </button>
      {showHistEdit && <AttendeeHistoryModal orgKey={orgKey} onClose={()=>setShowHistEdit(false)}/>}
    </div>
  );
}

const DEFAULT_ORGS = ['KE','IBM','PwC'];

// マスター検索：日本語・英字・ローマ字対応
function searchPersonMaster(query, excludeNames=[]) {
  const master = loadPersonMaster();
  const q = query.trim().toLowerCase();
  if (!q) return [];
  return master.filter(p => {
    if (excludeNames.includes(p.name)) return false;
    const name = p.name.toLowerCase();
    const email = (p.email||'').toLowerCase();
    // 日本語・英字どちらでも検索
    return name.includes(q) || email.includes(q) ||
      name.replace(/\s/g,'').includes(q.replace(/\s/g,''));
  }).slice(0, 8);
}

// 出席者マスター・ドメインマスター
// ══════════════════════════════════════════════════════════
const PERSON_MASTER_KEY = 'pmo_person_master';   // [{name,email,org}]
const DOMAIN_MASTER_KEY = 'pmo_domain_master';   // [{domain,org}]

const DEFAULT_DOMAINS = [
  { domain:'kokusai-electric.com', org:'KE' },
  { domain:'ibm.com',              org:'IBM' },
  { domain:'jp.ibm.com',           org:'IBM' },
  { domain:'pwc.com',              org:'PwC' },
  { domain:'hopes.co.jp',          org:'Hopes' },
  { domain:'msol.co.jp',           org:'MSOL' },
];

function loadPersonMaster(){ try{ return JSON.parse(localStorage.getItem(PERSON_MASTER_KEY)||'[]'); }catch(e){ return []; } }
function savePersonMaster(list){ localStorage.setItem(PERSON_MASTER_KEY, JSON.stringify(list)); }
function loadDomainMaster(){
  try{
    const stored = localStorage.getItem(DOMAIN_MASTER_KEY);
    if (!stored) return [...DEFAULT_DOMAINS];
    return JSON.parse(stored); // 空配列でもそのまま返す
  }catch(e){ return [...DEFAULT_DOMAINS]; }
}
function saveDomainMaster(list){ localStorage.setItem(DOMAIN_MASTER_KEY, JSON.stringify(list)); }

// ドメイン→組織の判別（DEFAULT_DOMAINSも含めて検索）
function orgFromEmail(email) {
  if (!email) return '';
  const domain = (email.split('@')[1] || '').toLowerCase();
  const stored = loadDomainMaster();
  const found = stored.find(d => domain === d.domain);
  if (found) return found.org;
  const def = DEFAULT_DOMAINS.find(d => domain === d.domain);
  return def ? def.org : '';
}

// 英字名を「名 姓」→「姓 名」に変換
function reverseEnglishName(rawName) {
  if (!rawName) return '';
  // 日本語文字が含まれる場合はそのまま
  if (/[\u3000-\u9FFF\uF900-\uFAFF]/.test(rawName)) return rawName;
  // スラッシュ区切り「英語名 / 日本語名」→ 日本語部分を優先
  if (rawName.includes('/')) {
    const parts = rawName.split('/').map(s => s.trim());
    const jpPart = parts.find(p => /[\u3000-\u9FFF]/.test(p));
    if (jpPart) return jpPart;
    // 英語部分のみ → 最後の部分を姓として前に
    const engParts = parts[0].trim().split(/[\s.]+/).filter(Boolean);
    if (engParts.length >= 2) return engParts.slice(1).join(' ') + ' ' + engParts[0];
    return parts[0].trim();
  }
  // ドット or スペース区切り → 反転
  const parts = rawName.trim().split(/[\s.]+/).filter(Boolean);
  if (parts.length >= 2) return parts.slice(1).join(' ') + ' ' + parts[0];
  return rawName;
}

// ICSの1出席者行から {name, email} を抽出
function parseAttendeeRaw(line) {
  // mailto: からメールアドレスを取得
  const mailMatch = line.match(/mailto:([^\s;>]+)/i);
  const email = mailMatch ? mailMatch[1].trim().toLowerCase() : '';

  // CN= の値を取得（引用符あり・なし両対応）
  let rawName = '';
  const cnQuoted = line.match(/CN="([^"]+)"/i);   // CN="..."
  const cnPlain  = line.match(/CN=([^;:\s"]+)/i); // CN=...（引用符なし）
  if (cnQuoted) {
    rawName = cnQuoted[1].trim();
  } else if (cnPlain) {
    rawName = cnPlain[1].trim();
  }

  // CNがメールアドレスそのもの or 空の場合→emailのローカル部から生成
  if (!rawName || rawName.toLowerCase() === email || rawName.includes('@')) {
    const local = email.split('@')[0] || '';
    rawName = local;
  }

  // スラッシュ区切り「英語名 / 日本語名」→日本語部分を優先
  if (rawName.includes('/')) {
    const parts = rawName.split('/').map(s => s.trim());
    const jpPart = parts.find(p => /[\u3000-\u9FFF\uF900-\uFAFF]/.test(p));
    if (jpPart) {
      return { name: jpPart, email, rawName };
    }
    // 英語部分のみ → reverseEnglishName
    rawName = parts[0].trim();
  }

  const name = reverseEnglishName(rawName);
  return { name, email, rawName };
}

// 英字かどうか（日本語文字を含まない）
function isEnglishName(name) {
  return !/[\u3000-\u9FFF\uF900-\uFAFF]/.test(name);
}


// ── ドメイン→組織マスター管理モーダル ────────────────────────
function DomainMasterModal({ onClose, icsRaws }) {
  const readList = () => {
    try {
      const s = localStorage.getItem(DOMAIN_MASTER_KEY);
      return s ? JSON.parse(s) : [...DEFAULT_DOMAINS];
    } catch(e) { return [...DEFAULT_DOMAINS]; }
  };
  const [list, setList] = useState(()=>{
    const s = localStorage.getItem(DOMAIN_MASTER_KEY);
    if (s === null) {
      // 初回のみ DEFAULT_DOMAINS を書き込む
      localStorage.setItem(DOMAIN_MASTER_KEY, JSON.stringify(DEFAULT_DOMAINS));
      return [...DEFAULT_DOMAINS];
    }
    try {
      // 2回目以降は localStorage の内容をそのまま使用（削除済みドメインは復活させない）
      return JSON.parse(s);
    } catch(e) { return [...DEFAULT_DOMAINS]; }
  });
  const [domain, setDomain] = useState('');
  const [org, setOrg] = useState('');
  const [newDomains, setNewDomains] = useState([]);
  const [icsUnknown, setIcsUnknown] = useState(null);

  const save = (next) => {
    localStorage.setItem(DOMAIN_MASTER_KEY, JSON.stringify(next));
    setList([...next]);
  };
  const add = () => {
    const d = domain.trim().toLowerCase().replace(/^@/,'');
    const o = org.trim();
    if (!d || !o || list.find(x=>x.domain===d)) return;
    save([...list, {domain:d, org:o}]);
    setDomain(''); setOrg('');
  };
  const del = (i) => save(list.filter((_,j)=>j!==i));

  const scanIcs = () => {
    const currentList = readList();
    const raws = icsRaws || [];
    const unknown = {};
    raws.forEach(r => {
      if (!r.email) return;
      const d = (r.email.split('@')[1]||'').toLowerCase();
      if (!d) return;
      const isKnown = currentList.some(x => d === x.domain);
      if (!isKnown) {
        if (!unknown[d]) unknown[d] = [];
        unknown[d].push(r.email);
      }
    });
    setIcsUnknown(Object.entries(unknown).map(([d,emails])=>({domain:d,emails,org:''})));
  };

  const updUnknown = (i, val) => setIcsUnknown(icsUnknown.map((d,idx)=>idx===i?{...d,org:val}:d));

  const registerUnknown = () => {
    const toAdd = icsUnknown.filter(d=>d.org.trim());
    if (toAdd.length === 0) { setIcsUnknown(null); return; }
    const current = readList();
    const newList = [...current];
    toAdd.forEach(d => { if (!newList.find(m=>m.domain===d.domain)) newList.push({domain:d.domain,org:d.org.trim()}); });
    save(newList);
    setNewDomains(toAdd.map(d=>d.domain));
    setIcsUnknown(null);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">🌐 ドメイン→組織マスター</div>
        <div className="notice notice-info" style={{marginBottom:10}}>
          メールドメインと組織の対応を登録します。ICS取り込み時に自動判別します。
        </div>
        {icsRaws && icsRaws.length > 0 ? (
          <button onClick={scanIcs} style={{width:'100%',marginBottom:12,padding:'8px',background:'#EBF3FB',border:'1.5px solid #2E75B6',borderRadius:6,color:'#1F3864',fontSize:12,cursor:'pointer',fontWeight:600}}>
            🔍 読み込み済みICSから未登録ドメインを確認
          </button>
        ) : (
          <div style={{fontSize:11,color:'#888',marginBottom:10,padding:'6px 10px',background:'#f8f8f8',borderRadius:4,textAlign:'center'}}>
            💡 Step1で.icsを読み込むと、未登録ドメインをここで確認できます
          </div>
        )}
        {icsUnknown !== null && (
          <div style={{marginBottom:12,border:'1.5px solid #2E75B6',borderRadius:6,overflow:'hidden'}}>
            <div style={{background:'#2E75B6',color:'#fff',padding:'6px 12px',fontSize:12,fontWeight:600}}>
              {icsUnknown.length===0 ? '✅ 未登録ドメインはありません' : `未登録ドメイン ${icsUnknown.length}件`}
            </div>
            {icsUnknown.map((d,i)=>(
              <div key={i} style={{display:'flex',gap:8,alignItems:'center',padding:'7px 12px',borderTop:'1px solid #e2e8f0'}}>
                <span style={{flex:1,fontSize:12,color:'#444'}}>@{d.domain}<br/><span style={{fontSize:10,color:'#999'}}>{d.emails.length}名</span></span>
                <input value={d.org} onChange={e=>updUnknown(i,e.target.value)} placeholder="組織名を入力"
                  style={{flex:1,padding:'4px 8px',border:'1.5px solid #d0d8e4',borderRadius:4,fontSize:12,fontFamily:'inherit',outline:'none'}}/>
              </div>
            ))}
            {icsUnknown.length>0 && (
              <div style={{padding:'8px 12px',borderTop:'1px solid #e2e8f0',display:'flex',justifyContent:'flex-end'}}>
                <button className="btn btn-primary" style={{fontSize:12,padding:'6px 14px'}} onClick={registerUnknown}>登録する</button>
              </div>
            )}
          </div>
        )}
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <input value={domain} onChange={e=>setDomain(e.target.value)} placeholder="例: nssol.nipponsteel.com"
            style={{flex:2}} onKeyDown={e=>e.key==='Enter'&&add()}/>
          <input value={org} onChange={e=>setOrg(e.target.value)} placeholder="組織名"
            style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&add()}/>
          <button className="btn btn-blue" style={{padding:'7px 12px',fontSize:12}} onClick={add}>追加</button>
        </div>
        <div style={{maxHeight:240,overflowY:'auto',border:'1px solid #e2e8f0',borderRadius:6}}>
          {list.length===0 && <div style={{padding:'16px',textAlign:'center',color:'#888',fontSize:12}}>登録済みドメインはありません</div>}
          {list.map((item,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',padding:'7px 12px',borderBottom:'1px solid #f0f0f0',background:newDomains.includes(item.domain)?'#E8F5E9':'transparent'}}>
              <span style={{flex:2,fontSize:13,color:'#444'}}>@{item.domain}</span>
              <span style={{flex:1,fontSize:13,fontWeight:600,color:'#1F3864'}}>{item.org}</span>

// ── .ics（iCalendar）解析 ────────────────────────────────
function parseIcs(text) {
  // 複数行にまたがる値を結合（RFC5545の折り返し）- 先にunfold
  const unfold = (t) => t.replace(/\r?\n[ \t]/g, '');
  const unfolded = unfold(text);

  const get = (key) => {
    // TZID付き（例: DTSTART;TZID="Tokyo Standard Time":20260324T150000）を優先
    const reTzid = new RegExp('^' + key + ';TZID[^:]*:(.+)$', 'im');
    const mTzid = unfolded.match(reTzid);
    if (mTzid) return mTzid[1].trim();
    // TZID付きがなければ通常版、ただし1601年（Windowsタイムゾーン基準値）は除外
    const rePlain = new RegExp('^' + key + '[^:]*:(.+)$', 'gim');
    let m;
    while ((m = rePlain.exec(unfolded)) !== null) {
      const val = m[1].trim();
      if (!val.startsWith('16010101')) return val; // 1601年はスキップ
    }
    return '';
  };

  // 日時変換（Outlook各種形式に対応）
  const parseDate = (dt) => {
    if (!dt) return { date: '', time: '' };
    // 数字8桁を直接探す（フォーマットに依存しない）
    const dateMatch = dt.match(/(\d{8})/);
    const timeMatch = dt.match(/T(\d{6})/);
    if (!dateMatch) return { date: '', time: '' };
    const datePart = dateMatch[1];
    const timePart = timeMatch ? timeMatch[1] : '000000';
    const isUTC = dt.endsWith('Z');
    const y = datePart.slice(0,4), mo = datePart.slice(4,6), d = datePart.slice(6,8);
    const hh = parseInt(timePart.slice(0,2)), mi = timePart.slice(2,4);
    if (isUTC) {
      const utcMs = Date.UTC(parseInt(y), parseInt(mo)-1, parseInt(d), hh, parseInt(mi));
      const jst = new Date(utcMs + 9*60*60*1000);
      return {
        date: `${jst.getUTCFullYear()}-${String(jst.getUTCMonth()+1).padStart(2,'0')}-${String(jst.getUTCDate()).padStart(2,'0')}`,
        time: `${String(jst.getUTCHours()).padStart(2,'0')}:${String(jst.getUTCMinutes()).padStart(2,'0')}`
      };
    }
    return { date: `${y}-${mo}-${d}`, time: `${String(hh).padStart(2,'0')}:${mi}` };
  };


  const summary  = get('SUMMARY')  .replace(/^全体/,'全体').replace(/\\,/g,',').replace(/\\n/g,' ');
  const location = get('LOCATION') .replace(/\\,/g,',').replace(/\\n/g,' ');
  const dtStart  = parseDate(get('DTSTART'));
  const dtEnd    = parseDate(get('DTEND'));

  // 出席者を抽出（ATTENDEE行を全部取得）- name/email両方取得
  const attendeeRaws = [];
  const reAtt = /^ATTENDEE[^\r\n]*/gim;
  let m;
  while ((m = reAtt.exec(unfolded)) !== null) {
    const raw = parseAttendeeRaw(m[0].trim());
    if (raw.email || raw.name) attendeeRaws.push(raw);
  }
  const attendeeNames = attendeeRaws.map(a => a.name).filter(Boolean);

  // 会議名から回数を抽出（例：「全体PMO定例 第46回」→ name=全体PMO定例, no=46）
  const noMatch = summary.match(/第(\d+)回/);
  const meetingNo   = noMatch ? noMatch[1] : '';
  const meetingName = summary.replace(/　?第\d+回/, '').trim();

  return {
    meetingName,
    meetingNo,
    date:      dtStart.date,
    startTime: dtStart.time,
    endTime:   dtEnd.time,
    location,
    attendeeNames,
    attendeeRaws,  // [{name, email, rawName}]
  };
}

// ── Step 1 ─────────────────────────────────────────────────
function Step1({data,setData,onNext,onOpenPersonMaster}){
  const upd=(k,v)=>setData(p=>({...p,[k]:v}));
  const [showMaster, setShowMaster] = useState(false);
  const [meetingList, setMeetingList] = useState(()=>loadMeetingMaster());
  const refreshList = () => setMeetingList(loadMeetingMaster());
  const icsRef = useRef();
  const [icsLoaded, setIcsLoaded] = useState(false);

  // ── ICS取り込み状態管理（新仕様）──────────────────────────
  // icsPhase: null | 'stepA' | 'stepB' | 'stepC' | 'stepD'
  const [icsPhase, setIcsPhase] = useState(null);
  const [icsRaws, setIcsRaws] = useState([]);        // 全出席者Raw
  const [icsOrgs, setIcsOrgs] = useState([]);        // 構築中の組織データ
  // Step B: 未登録ドメイン
  const [pendingDomains, setPendingDomains] = useState([]); // [{domain, org:'', emails:[]}]
  // Step C: 未登録メンバー
  const [pendingMembers, setPendingMembers] = useState([]); // [{email,name,rawName,detectedOrg,orgName:'',displayName:''}]
  // Step D: 日本語名更新候補
  const [updateQueue, setUpdateQueue] = useState([]);  // [{person, newName}]
  const [updateIdx, setUpdateIdx] = useState(0);

  // 組織配列に名前を追加するヘルパー
  const addToOrgs = (orgs, name, org) => {
    if (!name || !org) return orgs;
    const exists = orgs.find(o => o.org === org);
    if (exists) {
      return orgs.map(o => o.org === org
        ? { ...o, names: o.names.includes(name) ? o.names : [...o.names, name] }
        : o
      );
    }
    return [...orgs, { org, names: [name] }];
  };

  // ICS処理の完了（Step1に反映）
  const finalizeIcs = (orgs) => {
    setData(p => ({ ...p, attendees: orgs }));
    setIcsPhase(null);
    setIcsLoaded(true);
  };

  // .ics読み込み
  const handleIcs = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = parseIcs(e.target.result);
        setData(p => ({
          ...p,
          meetingName: parsed.meetingName || p.meetingName,
          meetingNo:   parsed.meetingNo   || p.meetingNo,
          date:        parsed.date        || p.date,
          startTime:   parsed.startTime   || p.startTime,
          endTime:     parsed.endTime     || p.endTime,
          location:    parsed.location    || p.location,
        }));
        const rawAll = (parsed.attendeeRaws || []).filter(r => r.email || r.name);
        // メールアドレスで重複排除
        const seen = new Set();
        const raws = rawAll.filter(r => {
          const key = r.email || r.name;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
        setIcsRaws(raws);
        setData(p => ({ ...p, _icsRaws: raws }));
        setIcsPhase('stepA');
      } catch(err) {
        alert('.icsファイルの解析に失敗しました: ' + err.message);
      }
    };
    reader.readAsText(file, 'UTF-8');
  };

  // Step A: 全員 or 担当者のみ選択後の処理開始
  const startIcsImport = (importAll) => {
    let raws = icsRaws;
    if (!importAll) {
      // 担当者のみ = OWNERまたはORGANIZERのみ（簡易: 自分のメール除外）
      // 実際には主催者のみ残す（最初の1件）
      raws = icsRaws.slice(0, 1);
    }
    const initOrgs = [{org:'KE',names:[]},{org:'IBM',names:[]},{org:'PwC',names:[]}];
    setIcsOrgs(initOrgs);
    processStepB(raws, initOrgs);
  };

  // Step B: 未登録ドメインを収集してテーブル表示
  const processStepB = (raws, orgs) => {
    const allKnown = loadDomainMaster();
    const unknownDomains = {};
    raws.forEach(r => {
      if (!r.email) return;
      const domain = (r.email.split('@')[1] || '').toLowerCase();
      if (!domain) return;
      // 完全一致のみ（endsWith による誤マッチを防ぐ）
      const known = allKnown.find(d => domain === d.domain);
      if (!known) {
        if (!unknownDomains[domain]) unknownDomains[domain] = new Set();
        unknownDomains[domain].add(r.email); // Setで重複排除
      }
    });
    const domainList = Object.entries(unknownDomains).map(([domain, emailSet]) => ({
      domain, emails: [...emailSet], org: '', confirmed: false
    }));
    if (domainList.length > 0) {
      setPendingDomains(domainList);
      setIcsRaws(raws);
      setIcsOrgs(orgs);
      setIcsPhase('stepB');
    } else {
      processStepC(raws, orgs);
    }
  };

  // Step B完了: ドメインを登録してStep Cへ
  const completStepB = (domainList) => {
    const toAdd = domainList.filter(d => d.org.trim());
    if (toAdd.length > 0) {
      const stored = localStorage.getItem(DOMAIN_MASTER_KEY);
      const master = stored ? JSON.parse(stored) : [...DEFAULT_DOMAINS];
      const newMaster = [...master];
      toAdd.forEach(d => {
        if (!newMaster.find(m => m.domain === d.domain)) {
          newMaster.push({ domain: d.domain, org: d.org.trim() });
        }
      });
      localStorage.setItem(DOMAIN_MASTER_KEY, JSON.stringify(newMaster));
      
      
    } else {
      
    }
    processStepC(icsRaws, icsOrgs);
  };

  // Step C: 未登録メンバーを収集してテーブル表示
  const processStepC = (raws, orgs) => {
    const master = loadPersonMaster();
    const members = [];
    const updateCandidates = [];

    raws.forEach(r => {
      if (!r.email && !r.name) return;
      const existing = r.email
        ? master.find(p => p.email === r.email)
        : null;

      if (existing) {
        // 登録済み
        if (existing.confirmed) {
          // 確定済み: 日本語名なし + 今回日本語名あり → Step D候補
          if (isEnglishName(existing.name) && !isEnglishName(r.name) && r.name !== r.email) {
            updateCandidates.push({ person: existing, newName: r.name });
          }
          // それ以外は何もしない（確定済みは更新しない）
        } else {
          // 未確定: 日本語名があれば更新候補
          if (isEnglishName(existing.name) && !isEnglishName(r.name) && r.name !== r.email) {
            updateCandidates.push({ person: existing, newName: r.name });
          }
        }
      } else {
        // 未登録
        const detectedOrg = orgFromEmail(r.email) || 'KE';
        members.push({
          email: r.email || '',
          name: r.name || '',
          rawName: r.rawName || '',
          detectedOrg,
          orgName: detectedOrg,
          displayName: r.name || '',
          include: true,
          confirmed: false,
        });
      }
    });

    setIcsOrgs(orgs);
    setIcsRaws(raws);

    if (members.length > 0) {
      setPendingMembers(members);
      setUpdateQueue(updateCandidates);
      setIcsPhase('stepC');
    } else if (updateCandidates.length > 0) {
      setUpdateQueue(updateCandidates);
      setUpdateIdx(0);
      setIcsPhase('stepD');
    } else {
      // 全員登録済み → 出席者リストに追加して完了
      let orgsResult = orgs;
      raws.forEach(r => {
        if (!r.email && !r.name) return;
        const existing = master.find(p => p.email === r.email);
        if (existing) orgsResult = addToOrgs(orgsResult, existing.name, existing.org);
      });
      finalizeIcs(orgsResult);
    }
  };

  // Step C完了: メンバー登録してStep Dへ
  const completeStepC = (members) => {
    const master = loadPersonMaster();
    const toRegister = members.filter(m => m.include && m.displayName.trim());
    const newMaster = [...master, ...toRegister.map(m => ({
      name: m.displayName.trim(),
      email: m.email,
      org: m.orgName || m.detectedOrg,
      confirmed: false,
    }))];
    savePersonMaster(newMaster);

    // 出席者リストに追加
    let orgsResult = icsOrgs;
    // 登録済み全員も追加
    const allMaster = newMaster;
    icsRaws.forEach(r => {
      if (!r.email && !r.name) return;
      const p = allMaster.find(m => m.email === r.email);
      if (p) orgsResult = addToOrgs(orgsResult, p.name, p.org);
    });

    if (updateQueue.length > 0) {
      setIcsOrgs(orgsResult);
      setUpdateIdx(0);
      setIcsPhase('stepD');
    } else {
      finalizeIcs(orgsResult);
    }
  };

  // Step D: 日本語名更新（1件ずつ）
  const handleUpdateName = (doUpdate) => {
    const master = loadPersonMaster();
    const current = updateQueue[updateIdx];
    if (doUpdate && current) {
      const updated = master.map(p =>
        p.email === current.person.email ? { ...p, name: current.newName } : p
      );
      savePersonMaster(updated);
      // orgsも更新
      const newOrgs = icsOrgs.map(o => ({
        ...o,
        names: o.names.map(n => n === current.person.name ? current.newName : n)
      }));
      setIcsOrgs(newOrgs);
    }
    const nextIdx = updateIdx + 1;
    if (nextIdx >= updateQueue.length) {
      finalizeIcs(icsOrgs);
    } else {
      setUpdateIdx(nextIdx);
    }
  };


  return(
    <div className="card">
      <div className="card-title">📋 Step 1 ― 基本情報の入力</div>
      <div style={{background:'#EBF3FB',border:'1.5px solid #2E75B6',borderRadius:8,padding:'10px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:12,color:'#1a4a7a',flex:1}}>
          📅 Outlookの会議ファイル（.ics）をアップロードすると基本情報が自動入力されます
        </span>
        <input ref={icsRef} type="file" accept=".ics" style={{display:'none'}}
          onChange={e=>{if(e.target.files[0]){handleIcs(e.target.files[0]); e.target.value='';} }}/>
        <button className="btn btn-blue" style={{padding:'6px 14px',fontSize:12,whiteSpace:'nowrap'}}
          onClick={()=>icsRef.current.click()}>
          📅 .icsを読み込む
        </button>
        {icsLoaded && (
          <span style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:12,color:'#1F7A4D',whiteSpace:'nowrap'}}>✅ 読み込み済み</span>
            <button onClick={()=>{
              setIcsLoaded(false);
              setIcsPhase(null);
              setIcsRaws([]);
              if(icsRef.current){ icsRef.current.value=''; icsRef.current.click(); }
            }}
              style={{background:'#EBF3FB',border:'1px solid #2E75B6',color:'#2E75B6',borderRadius:4,fontSize:11,cursor:'pointer',padding:'2px 8px',whiteSpace:'nowrap'}}>
              🔄 再取り込み
            </button>
          </span>
        )}
      </div>
      {/* ICS Step A/B/C/D ダイアログ */}
      {icsPhase==='stepA' && (
        <IcsStepA
          count={icsRaws.length}
          onAll={()=>startIcsImport(true)}
          onOwnerOnly={()=>startIcsImport(false)}
          onSkip={()=>{setIcsPhase(null);setIcsLoaded(true);}}
        />
      )}
      {icsPhase==='stepB' && (
        <IcsStepB
          domains={pendingDomains}
          onComplete={completStepB}
          onSkip={()=>processStepC(icsRaws, icsOrgs)}
        />
      )}
      {icsPhase==='stepC' && (
        <IcsStepC
          members={pendingMembers}
          onComplete={completeStepC}
          onSkip={()=>{
            if(updateQueue.length>0){setUpdateIdx(0);setIcsPhase('stepD');}
            else finalizeIcs(icsOrgs);
          }}
        />
      )}
      {icsPhase==='stepD' && updateQueue.length>0 && (
        <IcsStepD
          item={updateQueue[updateIdx]}
          current={updateIdx+1}
          total={updateQueue.length}
          onUpdate={handleUpdateName}
          onSkip={()=>handleUpdateName(false)}
        />
      )}
      <div className="form-row">
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
            <label style={{margin:0}}>会議名 <span className="req">*</span></label>
            <button onClick={()=>setShowMaster(true)}
              style={{background:'none',border:'1px solid #2E75B6',borderRadius:4,padding:'2px 8px',fontSize:11,color:'#2E75B6',cursor:'pointer'}}>
              ＋ マスター管理
            </button>
          </div>
          <input list="meeting-list" value={data.meetingName}
            onChange={e=>upd('meetingName',e.target.value)}
            placeholder="全体PMO定例（プルダウンまたは手入力）"/>
          <datalist id="meeting-list">
            {meetingList.map((name,i)=><option key={i} value={name}/>)}
          </datalist>
        </div>
        <div><label>回数</label>
          <input value={data.meetingNo} onChange={e=>upd('meetingNo',e.target.value)} placeholder="46"/></div>
      </div>
      {showMaster && <MeetingMasterModal onClose={()=>{setShowMaster(false);refreshList();}}/>}
      <div className="form-row-3">
        <div><label>開催日 <span className="req">*</span></label>
          <input type="date" value={data.date} onChange={e=>upd('date',e.target.value)}/></div>
        <div><label>開始時刻</label>
          <input type="time" value={data.startTime} onChange={e=>upd('startTime',e.target.value)}/></div>
        <div><label>終了時刻</label>
          <input type="time" value={data.endTime} onChange={e=>upd('endTime',e.target.value)}/></div>
      </div>
      <div className="form-row">
        <div><label>場所・形式</label>
          <input value={data.location} onChange={e=>upd('location',e.target.value)}/></div>
        <div><label>作成者</label>
          <input value={data.author} onChange={e=>upd('author',e.target.value)}/></div>
      </div>
      <div className="section-divider" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span>出席者</span>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>{ if(onOpenPersonMaster) onOpenPersonMaster('person'); }}
            style={{background:'none',border:'1px solid #2E75B6',borderRadius:4,padding:'2px 8px',fontSize:11,color:'#2E75B6',cursor:'pointer'}}>
            👥 参加者マスター
          </button>
          <button onClick={()=>{ if(onOpenPersonMaster) onOpenPersonMaster('domain'); }}
            style={{background:'none',border:'1px solid #2E75B6',borderRadius:4,padding:'2px 8px',fontSize:11,color:'#2E75B6',cursor:'pointer'}}>
            🌐 組織マスター
          </button>
        </div>
      </div>
      <div style={{fontSize:11,color:'#888',marginBottom:6}}>
        💡 名前を入力して <strong>Enter</strong> で追加。「、」または「,」で区切ると複数名を一括登録できます。
      </div>
      <AttendeesInput value={data.attendees} onChange={v=>upd('attendees',v)} onOpenPersonMaster={()=>setShowPersonMaster(true)}/>
      <div className="form-row-1" style={{marginTop:8}}>
        <label style={{marginBottom:6}}>配布・投影資料</label>
        <MaterialsInput value={data.materials} onChange={v=>upd('materials',v)}/>
      </div>
      <div className="btn-row">
        <button className="btn btn-primary"
          disabled={!data.meetingName||!data.date}
          onClick={onNext}>次へ →</button>
      </div>
    </div>
  );
}

// ── TableEditor ────────────────────────────────────────────
function TableEditor({data,setData,cols}){
  if(!data||data.length===0) return <div style={{color:'#888',fontSize:13,padding:'12px 0'}}>（該当する項目はありませんでした）</div>;
  const upd=(i,k,v)=>setData(p=>p.map((r,ri)=>ri===i?{...r,[k]:v}:r));
  const del=(i)=>setData(p=>p.filter((_,ri)=>ri!==i));
  return(
    <div style={{overflowX:'auto'}}>
      <table className="preview-table">
        <thead><tr>{cols.map(c=><th key={c.key} style={{minWidth:c.w||80}}>{c.label}</th>)}<th style={{width:36}}>削除</th></tr></thead>
        <tbody>
          {data.map((row,i)=>(
            <tr key={i}>
              {cols.map(c=>(
                <td key={c.key}>
                  {c.type==='select'?(
                    <select value={row[c.key]||''} onChange={e=>upd(i,c.key,e.target.value)} style={{width:'100%',minWidth:c.w||70}}>
                      {c.options.map(o=><option key={o} value={o}>{o||'―'}</option>)}
                    </select>
                  ):(
                    <textarea value={row[c.key]||''} onChange={e=>upd(i,c.key,e.target.value)} style={{minHeight:c.tall?60:32}}/>
                  )}
                </td>
              ))}
              <td><button onClick={()=>del(i)} style={{color:'#e53e3e',background:'none',border:'none',cursor:'pointer',fontSize:16}}>🗑</button></td>
            </tr>
          ))}
        </tbody>
      </table>
      <button className="btn btn-gray" style={{fontSize:12,padding:'5px 12px',marginTop:6}} onClick={()=>setData(p=>[...p,{}])}>＋ 行追加</button>
    </div>
  );
}

  return(

  // ファイルテキスト抽出
  const extractFileText = (file) => new Promise((resolve) => {
    const name = file.name.toLowerCase();
    const reader = new FileReader();
    if (name.endsWith('.txt')) {
      reader.onload = e => resolve(e.target.result);
      reader.readAsText(file, 'UTF-8');
    } else if (name.endsWith('.docx')) {
      // docxはZIP内のword/document.xmlからテキスト抽出
      reader.onload = async e => {
        try {
          const ab = e.target.result;
          const { files } = await JSZip.loadAsync(ab);
          const xmlFile = files['word/document.xml'];
          if (!xmlFile) { resolve('[docx読み込みエラー]'); return; }
          const xml = await xmlFile.async('string');
          const text = xml.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
          resolve(text.slice(0, 8000)); // 最大8000文字
        } catch(err) { resolve('[docx読み込みエラー: ' + err.message + ']'); }
      };
      reader.readAsArrayBuffer(file);
    } else {
      // その他（pdf等）はテキストとして試みる
      reader.onload = e => resolve(String(e.target.result).slice(0, 8000));
      reader.readAsText(file, 'UTF-8');
    }
  });

  const recognizerRef    = useRef(null);

  const transcriptRef    = useRef([]);

  useEffect(() => { transcriptRef.current = transcript; }, [transcript]);

  // マイクデバイス一覧を取得

  const loadBoxPrevMinutes = async () => {

    try {

    if (!apiKey) { onOpenKeyModal(); return; }
    const SpeechSDK = window.SpeechSDK;
    if (!SpeechSDK) { alert('Azure Speech SDK の読み込みに失敗しました。ページを再読込してください。'); return; }
    try {
      saveAzureSettings();
      const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(azureKey, azureRegion);

      // マイクデバイス選択
      let audioConfig;
      if (micMode === 'vbcable') {

          audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();

      } else if (micMode === 'physical' || micMode === 'mixed') {
