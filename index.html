        const physDevice = micDevices.find(d =>
          d.label.includes('マイク配列') || d.label.toLowerCase().includes('array')
        );
        const deviceId = (selectedMicId && selectedMicId !== 'default')
          ? selectedMicId
          : (physDevice ? physDevice.deviceId : 'default');
        if (deviceId && deviceId !== 'default') {
          audioConfig = SpeechSDK.AudioConfig.fromMicrophoneInput(deviceId);
        } else {
          audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
        }
      } else {
        audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
      }

      const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

      // PMO専門用語をヒントとして登録
      const phraseList = SpeechSDK.PhraseListGrammar.fromRecognizer(recognizer);
      ['PMO','PgMO','ステコミ','IBM','MSOL','KE','KOKUSAI Electric','SAP','S/4HANA',
       'ERP','CRM','Salesforce','ARAS','PLM','Sfotes','サプライヤーポータル',
       'スコープ','マイルストーン','ガバナンス','エスカレーション','リスク','課題台帳'
      ].forEach(t => phraseList.addPhrase(t));

      recognizer.recognizing = (_, e) => { setInterimText(e.result.text); };
      recognizer.recognized  = (_, e) => {
        if (e.result.reason === SpeechSDK.ResultReason.RecognizedSpeech && e.result.text) {
          const time = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
          setTranscript(prev => {
            const next = [...prev, { time, text: e.result.text }];
            transcriptRef.current = next;
            return next;
          });
          setInterimText('');
        }
      };
      recognizer.canceled = (_, e) => {
        if (e.reason === SpeechSDK.CancellationReason.Error) {
          alert('Azure Speech エラー: ' + e.errorDetails + '\nキーとリージョンを確認してください。');
          stopRecording();
        }
      };

      recognizer.startContinuousRecognitionAsync(
        () => { setIsRecording(true); setShowSettings(false); },
        (err) => { alert('録音開始エラー: ' + err); }
      );
      recognizerRef.current = recognizer;

      // 30秒ごとに自動分析
      timerRef.current = setInterval(() => { runAnalysis(); }, 30000);
    } catch(e) { alert('エラー: ' + e.message); }
  };

  const stopRecording = () => {
    if (recognizerRef.current) {
      recognizerRef.current.stopContinuousRecognitionAsync();
      recognizerRef.current = null;
    }
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
    setIsRecording(false);
    setInterimText('');
  };

  const runAnalysis = async () => {
    const lines = transcriptRef.current;
    if (!lines.length || !apiKey) return;
    const fullText = lines.map(l => `[${l.time}] ${l.text}`).join('\n');
    const newText  = lines.slice(analyzedLenRef.current).map(l => `[${l.time}] ${l.text}`).join('\n');
    if (!newText.trim()) return;

    // 参考ファイルのテキストを結合
    const refText = refFilesRef.current.length > 0
      ? refFilesRef.current.map(f => `=== ${f.name} ===\n${f.text}`).join('\n\n')
      : '';

    setIsAnalyzing(true);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1200,
          messages: [{
            role: 'user',
            content: `あなたはグローバルERPプロジェクトのクライアント側PMOアシスタントです。
ベンダー（IBM・MSOL等）との会議をリアルタイムでモニタリングし、PMO担当者（Masa）が見落としなく適切に判断・指摘できるよう支援します。

【前回議事録】
${prevMinutes || '（なし）'}
${refText ? `\n【参考ファイル（事前アップロード）】\n${refText}` : ''}

【今回の会議テキスト全体】
${fullText}

【最新の新規発言（前回分析以降）】
${newText}

以下のJSON形式のみで回答してください（説明文・マークダウン不要）：
{
  "flags": [
    {"type": "根拠不足|矛盾|リスク|課題", "speaker": "発言者(不明な場合は空)", "content": "問題のある発言内容", "reason": "指摘理由（具体的に）"}
  ],
  "questions": ["今すぐ確認すべき質問1", "質問2"],
  "contradictions": ["前回議事録または参考ファイルとの矛盾・変化点"],
  "summary": "ここまでの会議内容の要約（3〜5行）",
  "exec_summary": "役員が知るべきプロジェクト状況（1〜2行・経営者視点）"
}`
          }]
        })
      });
      const data = await res.json();
      const text = (data.content?.[0]?.text || '').replace(/```json\n?|\n?```/g,'').trim();
      try {
        const parsed = JSON.parse(text);
        setAnalysis(parsed);
        analyzedLenRef.current = lines.length;
        setAnalysisCount(c => c + 1);
        if (analysisPanelRef.current) analysisPanelRef.current.scrollTop = 0;
      } catch(e) { console.error('Parse error:', e, text); }
    } catch(e) { console.error('Analysis error:', e); }
    setIsAnalyzing(false);
  };

  const handleEndMeeting = () => {
    stopRecording();
    const fullText = transcriptRef.current.map(l => `[${l.time}] ${l.text}`).join('\n');
    onEndMeeting(fullText);
  };

  const flagClass = (type) => ({
    '根拠不足': 'ai-flag-root', '矛盾': 'ai-flag-warn',
    'リスク': 'ai-flag-risk', '課題': 'ai-flag-issue'
  }[type] || 'ai-flag-warn');

  return (
    <div className="live-mode-wrap">
      {/* ヘッダー */}
      <div className="live-header">
        <div className={`live-title ${isRecording ? 'recording' : ''}`}>
          {isRecording ? '🔴' : '⚫'} 会議中モード
          {isRecording && micMode === 'physical' && <span style={{fontSize:11,marginLeft:6,color:'#90CDF4'}}>🎤 対面</span>}
          {isRecording && micMode === 'mixed'    && <span style={{fontSize:11,marginLeft:6,color:'#9AE6B4'}}>🎤💻 混在</span>}
          {isRecording && micMode === 'vbcable'  && <span style={{fontSize:11,marginLeft:6,color:'#FEB2B2'}}>🔁 Teams</span>}
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          {!isRecording
            ? <button className="live-btn live-btn-green" onClick={startRecording}>▶ 録音開始</button>
            : <button className="live-btn live-btn-gray"  onClick={stopRecording}>⏸ 一時停止</button>
          }
          <button className="live-btn live-btn-blue" onClick={runAnalysis} disabled={isAnalyzing || !transcript.length}>
            {isAnalyzing ? '⏳ 分析中...' : '🤖 今すぐ分析'}
          </button>
          <button className="live-btn live-btn-gray" onClick={()=>setShowSettings(s=>!s)}>
            ⚙️ 設定
          </button>
          <button className="live-btn live-btn-dark" onClick={handleEndMeeting}>
            ✅ 会議終了→議事録作成
          </button>
        </div>
        {isAnalyzing && <span className="analyzing-badge">⏳ AI分析中...</span>}
        {analysisCount > 0 && !isAnalyzing && <span style={{fontSize:11,color:'#68d391'}}>✓ 分析 {analysisCount}回完了</span>}
      </div>

      {/* 設定パネル */}
      {showSettings && (
        <div className="live-settings">
          <div className="live-setting-group" style={{minWidth:220}}>
            <label>🔷 Azure Speech キー</label>
            <input type="password" value={azureKey} onChange={e=>setAzureKey(e.target.value)} placeholder="Azure Subscription Key"/>
          </div>
          <div className="live-setting-group" style={{minWidth:140}}>
            <label>🌏 リージョン</label>
            <input value={azureRegion} onChange={e=>setAzureRegion(e.target.value)} placeholder="japaneast"/>
          </div>

          {/* マイク選択 */}
          <div style={{borderLeft:'1px solid #e2e8f0',paddingLeft:12,display:'flex',flexDirection:'column',gap:6}}>
            <div style={{fontSize:11,fontWeight:700,color:'#444'}}>🎤 会議形式を選択</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              <button
                className={`live-btn ${micMode==='physical'?'live-btn-blue':'live-btn-gray'}`}

              <button
                className={`live-btn ${micMode==='mixed'?'live-btn-blue':'live-btn-gray'}`}

                🎤💻 混在<br/><span style={{fontSize:10}}>対面＋Teams</span>
              </button>
              <button
                className={`live-btn ${micMode==='vbcable'?'live-btn-red':'live-btn-gray'}`}

            </div>
            {micMode === 'physical' && (
              <div style={{fontSize:11,color:'#2B6CB0',background:'#EBF3FB',padding:'6px 8px',borderRadius:4}}>

                <div style={{marginTop:4}}>

            {micMode === 'mixed' && (

            {micMode === 'vbcable' && (
              <div style={{fontSize:11,color:'#C53030',background:'#FFF5F5',padding:'6px 8px',borderRadius:4}}>

                <div style={{marginTop:6,display:'flex',gap:6,alignItems:'center'}}>

            {/* デバイス詳細選択（任意） */}
            {micDevices.length > 0 && (

                <label style={{fontSize:10}}>デバイス詳細（任意）</label>

                    <option key={d.deviceId} value={d.deviceId}>
                      {d.label || `マイク ${d.deviceId.slice(0,8)}`}

                    </option>
                  ))}
                </select>
              </div>
            )}
          </div>
          <div style={{borderLeft:'1px solid #e2e8f0',paddingLeft:12,display:'flex',flexDirection:'column',gap:6}}>
            <div style={{fontSize:11,fontWeight:700,color:'#444'}}>📦 前回議事録（Box）</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>

              <button className="live-btn live-btn-blue" onClick={loadBoxPrevMinutes}>Box読込</button>

          {/* 参考ファイルアップロード */}
          <div style={{borderLeft:'1px solid #e2e8f0',paddingLeft:12,display:'flex',flexDirection:'column',gap:6,minWidth:220}}>
            <div style={{fontSize:11,fontWeight:700,color:'#444'}}>📎 参考ファイル（AI分析に活用）</div>
            <div style={{fontSize:10,color:'#718096'}}>議事録・報告書・課題台帳など（.txt / .docx）</div>
            <label style={{cursor:'pointer'}}>
              <input type="file" multiple accept=".txt,.docx,.doc"
                style={{display:'none'}}
                onChange={e=>handleRefFileAdd(e.target.files)}/>
              <div style={{
                border:'2px dashed #a0aec0',borderRadius:6,padding:'6px 12px',
                textAlign:'center',fontSize:12,color:'#2E75B6',background:'#fafbfc',
                cursor:'pointer',transition:'.15s'
              }}>
                ＋ ファイルを追加
              </div>
            </label>
            {refFiles.length > 0 && (
              <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:120,overflowY:'auto'}}>
                {refFiles.map(f=>(
                  <div key={f.name} style={{
                    display:'flex',alignItems:'center',gap:6,
                    background:'#EBF3FB',border:'1px solid #bee3f8',
                    borderRadius:4,padding:'3px 8px',fontSize:11
                  }}>
                    <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#1a4a7a'}}>
                      📄 {f.name}
                    </span>
                    <span style={{color:'#a0aec0',fontSize:10,flexShrink:0}}>

                    </span>

                      onClick={()=>removeRefFile(f.name)}>×</button>
                  </div>
                ))}
                <button className="live-btn live-btn-gray" style={{fontSize:10,padding:'2px 8px',alignSelf:'flex-start'}}
                  onClick={()=>setRefFiles([])}>すべて削除</button>
              </div>
            )}
            {refFiles.length === 0 && (
              <div style={{fontSize:10,color:'#a0aec0'}}>ファイルなし（未設定）</div>

      {/* メインパネル */}

        {/* 左：文字起こし */}

          <div className="live-panel-header" style={{background:'#2D3748'}}>

            {transcript.length === 0 && !interimText && (
              <div style={{color:'#a0aec0',textAlign:'center',marginTop:40,fontSize:13}}>
                {isRecording ? '音声を待機中...' : '「録音開始」ボタンで開始します'}
              </div>
            )}
            {transcript.map((line, i) => (
              <div key={i} className="live-transcript-line">
                <span className="live-transcript-time">{line.time}</span>
                <span>{line.text}</span>
              </div>
            ))}
            {interimText && (
              <div className="live-interim">
                <span className="live-transcript-time">...</span>
                {interimText}
              </div>
            )}
          </div>
        </div>

        {/* 右：AIアシスト */}
        <div className="live-panel">
          <div className="live-panel-header" style={{background:'#1F3864'}}>
            🤖 AIアシストパネル
            <span style={{marginLeft:'auto',fontSize:11,color:'#a0b4cc'}}>
              {analysis ? `最終分析: ${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}` : '分析待ち'}
            </span>
            {refFiles.length > 0 && (
              <span style={{marginLeft:8,fontSize:10,background:'#2E75B6',color:'#fff',padding:'1px 6px',borderRadius:8}}>
                📎 {refFiles.length}件
              </span>
            )}
          </div>
          <div className="live-panel-body" ref={analysisPanelRef}>
            {!analysis && (
              <div style={{color:'#a0aec0',textAlign:'center',marginTop:40,fontSize:13}}>
                会議開始後30秒で自動分析されます<br/>

                    <div className="ai-exec">{analysis.exec_summary}</div>
                  </div>
                )}

                {/* 要約 */}
                {analysis.summary && (
                  <div className="ai-section">
                    <div className="ai-section-title">📋 ここまでの要約</div>
                    <div className="ai-summary">{analysis.summary}</div>
                  </div>
                )}

                {analysis.flags && analysis.flags.length > 0 && (

                      </div>

                )}

                {/* 確認すべき質問 */}
                {analysis.questions && analysis.questions.length > 0 && (
                  <div className="ai-section">
                    <div className="ai-section-title">💬 確認すべき質問 ({analysis.questions.length}件)</div>
                    {analysis.questions.map((q, i) => (
                      <div key={i} className="ai-question">❓ {q}</div>
                    ))}
                  </div>
                )}

                {/* 前回との矛盾 */}
                {analysis.contradictions && analysis.contradictions.length > 0 && (
                  <div className="ai-section">
                    <div className="ai-section-title">⚠️ 前回議事録との差分・矛盾</div>
                    {analysis.contradictions.map((c, i) => (
                      <div key={i} className="ai-contradiction">⚡ {c}</div>
                    ))}
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      </div>

      {/* 統合セットアップガイドモーダル */}
      {showSetupModal && (() => {
        const steps = setupSteps[setupMode] || [];
        const currentStep = steps[setupStep] || {};
        const isLast = setupStep === steps.length - 1;
        const color = modeColors[setupMode] || '#1F3864';
        return (
          <div className="modal-overlay" style={{zIndex:2000}}>
            <div className="modal" style={{maxWidth:540,width:'95%'}}>
              {/* ヘッダー */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:15,color}}>
                  {modeLabels[setupMode]} — 会議前チェックリスト
                </div>
                <button style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:'#888'}}
                  onClick={()=>setShowSetupModal(false)}>✕</button>
              </div>

              {/* ステップインジケーター */}
              <div style={{display:'flex',gap:3,marginBottom:14}}>
                {steps.map((s,i)=>(
                  <div key={i} style={{flex:1,height:6,borderRadius:3,
                    background: setupStep>i ? color : setupStep===i ? color+'99' : '#e2e8f0',
                    transition:'.2s'}}/>
                ))}
              </div>
              <div style={{fontSize:11,color:'#888',marginBottom:12}}>
                ステップ {setupStep+1} / {steps.length}：{currentStep.title}
              </div>

              {/* 現在のステップ内容 */}
              <div className={`notice notice-${currentStep.noticeType||'info'}`} style={{marginBottom:12}}>
                <span dangerouslySetInnerHTML={{__html: currentStep.notice||''}}/>
              </div>

              <div style={{background:'#f8fafc',borderRadius:8,padding:12,marginBottom:16,fontSize:13,lineHeight:1.9}}>
                {(currentStep.steps||[]).map((s,i)=>(
                  <div key={i} style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                    <span style={{minWidth:20,fontWeight:700,color}}>{i+1}.</span>
                    <span dangerouslySetInnerHTML={{__html:s}}/>
                  </div>
                ))}
              </div>

              {/* ナビゲーション */}
              <div style={{display:'flex',gap:8,justifyContent:'space-between',alignItems:'center'}}>
                <div style={{display:'flex',gap:8}}>
                  {setupStep > 0 && (
                    <button className="live-btn live-btn-gray" style={{fontSize:12}}
                      onClick={()=>setSetupStep(s=>s-1)}>← 戻る</button>
                  )}
                  {currentStep.skip && (
                    <button className="live-btn live-btn-gray" style={{fontSize:12}}
                      onClick={()=>setSetupStep(s=>s+1)}>{currentStep.skip} →</button>
                  )}
                </div>
                {!isLast ? (
                  <button className="live-btn live-btn-blue" style={{fontSize:13}}
                    onClick={()=>setSetupStep(s=>s+1)}>✅ 完了 → 次へ</button>
                ) : (
                  <button className="live-btn live-btn-green" style={{fontSize:13}}
                    onClick={()=>{
                      if(setupMode==='vbcable') completeVbSetup();
                      else setShowSetupModal(false);
                    }}>
                    🎉 チェック完了！録音を開始する
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function App(){

  const [showDomainMaster,setShowDomainMaster]=useState(false);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('claude_api_key')||'');
  const [basicInfo,setBasicInfo]=useState({
    meetingName:'', meetingNo:'', date:todayStr(),
    startTime:'10:00', endTime:'11:00',
    location:'KE（本社）応接室x、オンライン（Teams）',
    author:'安田 真和',
    attendees: [{org:'KE',names:[]},{org:'IBM',names:[]},{org:'PwC',names:[]}],
    materials:[{name:'',url:''}]
  });
  const [transcript,setTranscript]=useState('');
  const [docxTemplateFile,setDocxTemplateFile]=useState(null);
  const [xlsxTemplateFile,setXlsxTemplateFile]=useState(null);
  const [xlsxDataFile,setXlsxDataFile]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [logs,setLogs]=useState([]);
  const [error,setError]=useState('');
  const [result,setResult]=useState(null);
  const [docVersion,setDocVersion]=useState(1);

  const saveApiKey=(key)=>{setApiKey(key);localStorage.setItem('claude_api_key',key);setShowKeyModal(false);};
  const goTo=(n)=>{setStep(n);setMaxReached(m=>Math.max(m,n));};

  // 会議中モード終了 → 議事録作成モードへ
  const handleEndLiveMeeting = (liveTranscript) => {
    setTranscript(liveTranscript);
    setAppMode('post');
    setStep(1);
    setMaxReached(1);
  };

  const handleAnalyze=async()=>{
    if(!apiKey){setShowKeyModal(true);return;}
    setAnalyzing(true);setError('');setLogs([]);
    const addLog=(l)=>setLogs(p=>[...p,l]);
    try{
      // 既存ファイルからデータを事前読み込み
      let existingData = {};
      const srcFile = xlsxDataFile || xlsxTemplateFile;
      if (srcFile) {
        addLog('📊 既存台帳を読み込み中...');
        try {
          const ab = await srcFile.arrayBuffer();
          const wbOld = new ExcelJS.Workbook();
          await wbOld.xlsx.load(ab);
          wbOld.eachSheet((ws) => {
            const rows = [];
            let headerRow = null;
            let headers = [];
            ws.eachRow({ includeEmpty: false }, (row, rowNum) => {
              const colCount = row.cellCount || 30;
              const toStr = (v) => {
                if (v === null || v === undefined) return '';
                if (typeof v === 'object' && v !== null) {
                  if (v instanceof Date) { const y=v.getFullYear(),m=String(v.getMonth()+1).padStart(2,'0'),d=String(v.getDate()).padStart(2,'0'); return `${y}/${m}/${d}`; }
                  if (v.richText) return v.richText.map(r=>r.text||'').join('');
                  if (v.result !== undefined) return toStr(v.result);
                  if (v.text !== undefined) return String(v.text);
                  if (v.value !== undefined) return String(v.value);
                  if (v.error !== undefined) return '';
                  return '';
                }
                if (typeof v === 'number' && v > 40000 && v < 60000) { const dt=new Date(Math.round((v-25569)*86400*1000)); return `${dt.getUTCFullYear()}/${String(dt.getUTCMonth()+1).padStart(2,'0')}/${String(dt.getUTCDate()).padStart(2,'0')}`; }
                return String(v);
              };
              const getV = (ci) => { const c = row.getCell(ci); return c ? c.value : null; };
              if (!headerRow) {
                const vals = Array.from({length: colCount}, (_, i) => toStr(getV(i+1)));
                if (vals.some(v => v.includes('No.'))) {
                  headerRow = rowNum;
                  headers = vals.map(v => v.replace(/\n/g,''));
                }
              } else {
                const rowObj = {};
                headers.forEach((h, i) => { rowObj[h] = toStr(getV(i+1)); });
                const noVal = rowObj['No.'] || rowObj['No'];
                if (noVal && noVal !== '例' && rowObj['行種別'] !== 'progress') {
                  rows.push(rowObj);
                }
              }
            });
            if (rows.length > 0) existingData[ws.name] = rows;
          });
          addLog(`📋 既存データ読み込み完了（${Object.keys(existingData).join('、')}）`);
        } catch(e) { addLog('⚠️ 既存ファイル読み込みエラー（無視して続行）'); }
      }
      const r=await callClaude(apiKey,basicInfo,transcript,addLog,existingData);
      addLog('📊 データを整理・照合中...');
      setResult({...EMPTY,...r,_existingData:existingData});
      goTo(4);
    }catch(e){setError(e.message);}
    setAnalyzing(false);
  };

  return(
    <div className={appMode === 'live' ? 'live-mode-wrap' : 'app-wrap'} style={appMode === 'live' ? {maxWidth:'none',padding:0} : {}}>
      {/* ヘッダー（常時表示） */}
      <div className={appMode === 'live' ? '' : 'app-wrap'} style={appMode === 'live' ? {padding:'0 16px'} : {padding:0}}>
      <div className="app-header" style={appMode==='live'?{borderRadius:'10px 10px 0 0',marginBottom:0}:{}}>
        <div>
          <div className="app-title">
            {appMode === 'live' ? '🔴 会議中モード' : '会議議事録・管理台帳 自動生成ツール'}
          </div>
          <div style={{fontSize:10,color:'#a0b4cc',marginTop:2}}>v14</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {/* モード切り替えボタン */}
          <div className="mode-toggle">
            <button className={`mode-btn ${appMode==='post'?'active':''}`}
              onClick={()=>setAppMode('post')}>📄 会議後モード</button>
            <button className={`mode-btn ${appMode==='live'?'live-active':''}`}
              onClick={()=>setAppMode('live')}>🔴 会議中モード</button>
          </div>
          {appMode === 'post' && (<>
            <button onClick={()=>setShowPersonMaster(true)}
              style={{background:'rgba(255,255,255,0.15)',color:'#fff',border:'1px solid rgba(255,255,255,0.3)',borderRadius:6,padding:'5px 10px',fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>
              👥 出席者マスター
            </button>
            <button onClick={()=>setShowDomainMaster(true)}
              style={{background:'rgba(255,255,255,0.15)',color:'#fff',border:'1px solid rgba(255,255,255,0.3)',borderRadius:6,padding:'5px 10px',fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}}>
              🌐 ドメイン設定
            </button>
          </>)}
          <button className="btn-key" onClick={()=>setShowKeyModal(true)}>
            {apiKey?'🔑 APIキー設定済':'🔑 APIキー設定'}
          </button>
        </div>
      </div>
      </div>

      {/* 会議中モード */}
      {appMode === 'live' && (
        <LiveMeetingMode
          apiKey={apiKey}
          onEndMeeting={handleEndLiveMeeting}
          onOpenKeyModal={()=>setShowKeyModal(true)}
        />
      )}

      {/* 会議後モード（既存Step1〜5） */}
      {appMode === 'post' && (<div className="app-wrap" style={{paddingTop:0}}>
      <StepIndicator step={step} setStep={setStep} maxReached={maxReached}/>
      {step===1&&<Step1 data={basicInfo} setData={setBasicInfo} onNext={()=>goTo(2)} onOpenPersonMaster={(type)=>{if(type==='domain')setShowDomainMaster(true);else setShowPersonMaster(true);}}/>}
      {step===2&&<Step2 transcript={transcript} setTranscript={setTranscript}
        docxTemplateFile={docxTemplateFile} setDocxTemplateFile={setDocxTemplateFile}
        xlsxTemplateFile={xlsxTemplateFile} setXlsxTemplateFile={setXlsxTemplateFile}
        xlsxDataFile={xlsxDataFile} setXlsxDataFile={setXlsxDataFile}
        onNext={()=>goTo(3)} onBack={()=>goTo(1)}/>}
      {step===3&&<Step3 onAnalyze={handleAnalyze} onBack={()=>goTo(2)} analyzing={analyzing} logs={logs} error={error}/>}
      {step===4&&result&&<Step4 result={result} setResult={setResult} onNext={()=>goTo(5)} onBack={()=>goTo(3)}/>}
      {step===5&&result&&<Step5 basicInfo={basicInfo} result={result}
        docxTemplateFile={docxTemplateFile}
        xlsxTemplateFile={xlsxTemplateFile} xlsxDataFile={xlsxDataFile}
        onBack={()=>goTo(4)} docVersion={docVersion} setDocVersion={setDocVersion}/>}
      </div>)}

      {showKeyModal&&<ApiKeyModal current={apiKey} onSave={saveApiKey} onClose={()=>setShowKeyModal(false)}/>}
      {showPersonMaster&&<PersonMasterModal onClose={()=>setShowPersonMaster(false)}/>}
      {showDomainMaster&&<DomainMasterModal onClose={()=>setShowDomainMaster(false)} icsRaws={basicInfo._icsRaws||[]}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
