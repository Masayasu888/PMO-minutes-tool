<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会議議事録・管理台帳 自動生成ツール</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo UI','Meiryo',sans-serif;background:#F0F4F8;color:#1a202c;min-height:100vh}
.app-wrap{max-width:960px;margin:0 auto;padding:16px}
.app-header{background:#1F3864;color:#fff;padding:14px 20px;border-radius:10px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.app-title{font-size:18px;font-weight:700;letter-spacing:.5px}
.app-sub{font-size:11px;color:#a0b4cc;margin-top:2px}
.btn-key{background:#2E75B6;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer}
.btn-key:hover{background:#1a5c9e}
.steps{display:flex;margin-bottom:20px;background:#fff;border-radius:10px;padding:12px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.step-item{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;cursor:pointer}
.step-item:not(:last-child)::after{content:'';position:absolute;top:18px;left:60%;width:80%;height:2px;background:#d0d8e4}
.step-item.done:not(:last-child)::after{background:#2E75B6}
.step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:2px solid #d0d8e4;background:#fff;color:#999;position:relative;z-index:1;transition:.2s}
.step-item.active .step-circle{border-color:#2E75B6;background:#2E75B6;color:#fff}
.step-item.done .step-circle{border-color:#1F7A4D;background:#1F7A4D;color:#fff}
.step-label{font-size:10px;color:#666;margin-top:4px;text-align:center;line-height:1.3}
.step-item.active .step-label{color:#2E75B6;font-weight:600}
.card{background:#fff;border-radius:10px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.card-title{font-size:16px;font-weight:700;color:#1F3864;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #EBF3FB}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.form-row-1{margin-bottom:12px}
label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:4px}
input,textarea,select{width:100%;padding:9px 12px;border:1.5px solid #d0d8e4;border-radius:6px;font-size:13px;font-family:'Meiryo UI','Meiryo',sans-serif;outline:none;transition:.15s;background:#fafbfc}
input:focus,textarea:focus,select:focus{border-color:#2E75B6;background:#fff}
textarea{resize:vertical;min-height:70px}
.req{color:#e53e3e;margin-left:2px}
.btn{padding:10px 24px;border-radius:7px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;font-family:'Meiryo UI',sans-serif}
.btn-primary{background:#1F3864;color:#fff}.btn-primary:hover{background:#16295a}
.btn-green{background:#1F7A4D;color:#fff}.btn-green:hover{background:#175e3b}
.btn-blue{background:#2E75B6;color:#fff}.btn-blue:hover{background:#1d5fa0}
.btn-gray{background:#e2e8f0;color:#444}.btn-gray:hover{background:#cbd5e0}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.upload-area{border:2px dashed #a0aec0;border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:.15s;background:#fafbfc}
.upload-area:hover,.upload-area.drag{border-color:#2E75B6;background:#EBF3FB}
.upload-area input{display:none}
.upload-icon{font-size:28px;margin-bottom:6px}
.upload-hint{font-size:12px;color:#718096;margin-top:4px}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:#EBF3FB;border:1px solid #bee3f8;padding:5px 12px;border-radius:20px;font-size:12px;color:#2c5282;margin-top:8px}
.file-chip button{background:none;border:none;cursor:pointer;color:#e53e3e;font-size:14px;line-height:1}
.analyzing-wrap{text-align:center;padding:40px}
.spinner{width:48px;height:48px;border:4px solid #EBF3FB;border-top-color:#2E75B6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-log{background:#1a202c;color:#68d391;padding:16px;border-radius:8px;font-size:12px;font-family:monospace;max-height:160px;overflow-y:auto;margin-top:16px;text-align:left}
.tabs{display:flex;gap:4px;margin-bottom:0;flex-wrap:wrap}
.tab{padding:7px 12px;border-radius:6px 6px 0 0;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #d0d8e4;border-bottom:none;background:#f0f4f8;color:#555}
.tab.active{background:#fff;color:#1F3864;border-color:#2E75B6;border-bottom-color:#fff}
.tab-content{background:#fff;border:1.5px solid #2E75B6;border-radius:0 8px 8px 8px;padding:16px}
.preview-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
.preview-table th{background:#1F3864;color:#fff;padding:8px 10px;text-align:left;font-size:12px}
.preview-table td{padding:8px 10px;border-bottom:1px solid #eee;vertical-align:top}
.preview-table tr:nth-child(even) td{background:#f8fafc}
.preview-table td textarea{border:none;background:transparent;padding:0;resize:none;width:100%;font-size:13px;font-family:'Meiryo UI',sans-serif;min-height:36px}
.preview-table td textarea:focus{outline:1px solid #2E75B6;background:#fff;border-radius:3px;padding:3px}
.preview-table td select{border:none;background:transparent;padding:0;font-size:13px;font-family:'Meiryo UI',sans-serif}
.preview-table td select:focus{outline:1px solid #2E75B6;background:#fff;border-radius:3px}
.dl-card{border:1.5px solid #d0d8e4;border-radius:8px;padding:16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dl-info .dl-name{font-weight:700;color:#1F3864;font-size:14px}
.dl-info .dl-desc{font-size:12px;color:#718096;margin-top:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:28px;width:90%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:700;color:#1F3864;margin-bottom:16px}
.notice{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:12px}
.notice-info{background:#EBF3FB;color:#1a4a7a;border-left:3px solid #2E75B6}
.notice-warn{background:#FFF3CD;color:#7D4E00;border-left:3px solid #E6A817}
.notice-ok{background:#E8F5E9;color:#1B5E20;border-left:3px solid #4CAF50}
.section-divider{font-size:12px;font-weight:700;color:#2E75B6;padding:10px 0 6px;border-bottom:1px solid #EBF3FB;margin-bottom:10px}
@media(max-width:600px){
  .form-row,.form-row-3{grid-template-columns:1fr}
  .steps{padding:8px}.step-label{display:none}
  .card{padding:16px}.btn{padding:9px 16px;font-size:13px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── 今日の日付 ─────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const STEPS = [
  {n:1,label:'基本情報'},{n:2,label:'ファイル\nアップロード'},
  {n:3,label:'AI解析'},{n:4,label:'プレビュー\n・編集'},{n:5,label:'ダウンロード'}
];

const IP_OPTS = ['','緊急','高','中','低'];
const EMPTY = {agenda_items:[],minutes_by_agenda:[],decisions:[],todos:[],pending:[],risks:[],issues:[],exec_report:[],manager_report:[]};

// ── XML escape ───────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function generateDocx(basicInfo, result){
  const W = 9947;
  const FONT = `<w:rFonts w:ascii="Meiryo UI" w:hAnsi="Meiryo UI" w:cs="Meiryo UI" w:eastAsia="Meiryo UI"/>`;
  const HDR  = '143D69';
  const date = basicInfo.date ? basicInfo.date.replace(/-/g,'/') : '';
  const meetingTitle = `${basicInfo.meetingName}${basicInfo.meetingNo ? ` 第${basicInfo.meetingNo}回` : ''}`;

  // ── セル生成（テンプレートに合わせてsz=22、罫線はtable levelのみ）──
  function cell(text, w, opts={}){
    const shade = opts.shade ? `<w:shd w:val="clear" w:color="auto" w:fill="${opts.shade}"/>` : '';
    const span  = opts.span  ? `<w:gridSpan w:val="${opts.span}"/>` : '';
    const vA    = `<w:vAlign w:val="center"/>`;
    // テンプレート通り：セル個別の罫線は下側白線のみ（ヘッダー色セルのみ）
    const tcBdr = opts.shade === HDR
      ? `<w:tcBorders><w:bottom w:val="single" w:sz="6" w:color="FFFFFF"/></w:tcBorders>`
      : '';
    const mar   = `<w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="120" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:right w:w="120" w:type="dxa"/></w:tcMar>`;
    const wElem = w ? `<w:tcW w:w="${w}" w:type="dxa"/>` : '';
    const isHdr = opts.shade === HDR;
    const txtColor = isHdr ? 'FFFFFF' : (opts.textColor || '000000');
    const bold = isHdr ? '<w:b/><w:bCs/>' : (opts.bold ? '<w:b/><w:bCs/>' : '');
    const sz = 22; // テンプレート実測値 sz=22（11pt）統一
    const jc = opts.center ? '<w:jc w:val="center"/>' : '';
    const lines = String(text||'').split('\n');
    const parasXml = lines.map(line =>
      `<w:p><w:pPr>${jc}<w:spacing w:before="0" w:after="40"/></w:pPr><w:r><w:rPr>${FONT}${bold}<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/><w:color w:val="${txtColor}"/></w:rPr><w:t xml:space="preserve">${esc(line)}</w:t></w:r></w:p>`
    ).join('');
    return `<w:tc><w:tcPr>${wElem}${span}${tcBdr}${shade}${vA}${mar}</w:tcPr>${parasXml}</w:tc>`;
  }

  function row(h, cells){ return `<w:tr><w:trPr><w:trHeight w:val="${h}"/></w:trPr>${cells}</w:tr>`; }

  const attendeesCell = [
    basicInfo.attendeesKE  ? `【KE】　${basicInfo.attendeesKE}`  : '【KE】',
    basicInfo.attendeesIBM ? `【IBM】　${basicInfo.attendeesIBM}` : '【IBM】',
    basicInfo.attendeesPwC ? `【PwC】　${basicInfo.attendeesPwC}` : '【PwC】',
  ].join('\n');

  // 決定事項・ToDo・議事内容は全て同一表内（テンプレート通り改ページなし）
  // テンプレートのtblBordersはcolor=auto（自動色）
  const tblBdr = `<w:tblBorders>
<w:top w:val="single" w:sz="4" w:color="auto"/>
<w:left w:val="single" w:sz="4" w:color="auto"/>
<w:bottom w:val="single" w:sz="4" w:color="auto"/>
<w:right w:val="single" w:sz="4" w:color="auto"/>
<w:insideH w:val="single" w:sz="4" w:color="auto"/>
<w:insideV w:val="single" w:sz="4" w:color="auto"/>
</w:tblBorders>`;

  // 議事内容は文字起こしから抽出した内容を全て1セルに詰める
  const minutesContent = result.minutes_by_agenda.length
    ? result.minutes_by_agenda.map((m,i)=>`${i+1}. ${m.title||''}\n${(m.content||'').split('\n').map(l=>l?'　'+l:'').join('\n')}`).join('\n\n')
    : '（記録なし）';

  // ── ヘッダー表（実測: 2178/3685/1673/2411、空Row8は除外）────
  const headerTableXml = `<w:tbl>
<w:tblPr><w:tblW w:w="${W}" w:type="dxa"/>${tblBdr}</w:tblPr>
<w:tblGrid><w:gridCol w:w="2178"/><w:gridCol w:w="3685"/><w:gridCol w:w="1673"/><w:gridCol w:w="2411"/></w:tblGrid>
${row(454,  cell('議題', 2178,{shade:HDR}) + cell(meetingTitle,3685,{bold:true}) + cell('回数',1673,{shade:HDR}) + cell(basicInfo.meetingNo?`第${basicInfo.meetingNo}回`:'',2411))}
${row(454,  cell('日時', 2178,{shade:HDR}) + cell(`${date} ${basicInfo.startTime||''}〜${basicInfo.endTime||''}`,3685) + cell('作成日',1673,{shade:HDR}) + cell(date,2411))}
${row(454,  cell('場所', 2178,{shade:HDR}) + cell(basicInfo.location||'',3685) + cell('作成者',1673,{shade:HDR}) + cell(basicInfo.author||'',2411))}
${row(1021, cell('出席者\n(敬称略) (順不同)',2178,{shade:HDR}) + cell(attendeesCell,7769,{span:3}))}
${row(1021, cell('【配布資料/投影資料】\n'+(basicInfo.materials||'・'),W,{span:4}))}
${row(1021, cell('【決定事項】\n'+(result.decisions.length?result.decisions.map(d=>`・${d.content||''}`).join('\n'):'・なし'),W,{span:4}))}
${row(820,  cell('【ToDo】\n'+(result.todos.length?result.todos.map(t=>`★ ${t.content||''}（${t.assignee||''}、${t.due||''}）`).join('\n'):'なし'),W,{span:4}))}
${row(7938, cell('【議事内容】　★＝ToDo\n'+minutesContent, W,{span:4}))}
</w:tbl>`;
  // ※ テンプレートの空Row8（高さ13608）は出力に含めない → 保留セクションが同ページに続く

  // ── セクションヘッダー（sz=24・bold、テンプレート実測）────────
  function secHdr(text){
    return `<w:p><w:pPr><w:spacing w:before="200" w:after="80"/></w:pPr><w:r><w:rPr>${FONT}<w:b/><w:bCs/><w:sz w:val="24"/><w:szCs w:val="24"/></w:rPr><w:t>${esc(text)}</w:t></w:r></w:p>`;
  }
  function itemPara(text, sz=20){
    return `<w:p><w:pPr><w:spacing w:before="0" w:after="60"/></w:pPr><w:r><w:rPr>${FONT}<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/></w:rPr><w:t xml:space="preserve">${esc(text)}</w:t></w:r></w:p>`;
  }

  // ── 各種表（sz=22統一、tblBdr=auto）────────────────────────
  function makeTable(headers, colWidths, hdrColor, dataRows){
    const total = colWidths.reduce((a,b)=>a+b,0);
    const tbl2Bdr = `<w:tblBorders><w:top w:val="single" w:sz="4" w:color="auto"/><w:left w:val="single" w:sz="4" w:color="auto"/><w:bottom w:val="single" w:sz="4" w:color="auto"/><w:right w:val="single" w:sz="4" w:color="auto"/><w:insideH w:val="single" w:sz="4" w:color="auto"/><w:insideV w:val="single" w:sz="4" w:color="auto"/></w:tblBorders>`;
    const hdrRow = `<w:tr>${headers.map((h,i)=>cell(h,colWidths[i],{shade:hdrColor,center:true})).join('')}</w:tr>`;
    const rows = dataRows.map(r=>`<w:tr><w:trPr><w:trHeight w:val="500"/></w:trPr>${r.map((v,i)=>cell(v,colWidths[i],{center:i===0})).join('')}</w:tr>`).join('');
    return `<w:tbl><w:tblPr><w:tblW w:w="${total}" w:type="dxa"/>${tbl2Bdr}</w:tblPr><w:tblGrid>${colWidths.map(c=>`<w:gridCol w:w="${c}"/>`).join('')}</w:tblGrid>${hdrRow}${rows}</w:tbl>`;
  }

  // リスク（実測: 567/3685/1247/1247/3685）
  const riskXml = result.risks.length
    ? makeTable(['No.','リスク内容','影響度','重要度','対応方針'],[567,3685,1247,1247,3685],'843C0C',
        result.risks.map((r,i)=>[i+1,r.content||'',r.impact||'',r.importance||'',r.response||'']))
    : itemPara('（該当なし）');

  // 課題（実測: 567/3685/1247/1247/3685）
  const issueXml = result.issues.length
    ? makeTable(['No.','課題内容','優先度','重要度','担当者・期日'],[567,3685,1247,1247,3685],'7030A0',
        result.issues.map((r,i)=>[i+1,r.content||'',r.priority||'',r.importance||'',`${r.owner||''}　${r.due||''}`]))
    : itemPara('（該当なし）');

  // 室長報告（実測: 1275/3819/1271/3819）
  const mgrXml = result.manager_report.length
    ? makeTable(['No.','報告内容','対応要否','背景・経緯'],[1275,3819,1271,3819],'375623',
        result.manager_report.map((r,i)=>[i+1,r.content||'',r.action_needed||'',r.background||'']))
    : itemPara('（該当なし）');

  // 役員報告（実測: 1275/3819/1271/3819）
  const execXml = result.exec_report.length
    ? makeTable(['No.','報告内容','判断要否','背景・経緯'],[1275,3819,1271,3819],'C55A11',
        result.exec_report.map((r,i)=>[i+1,r.content||'',r.decision_needed||'',r.background||'']))
    : itemPara('（該当なし）');

  // 保留
  const pendingXml = result.pending.length
    ? result.pending.map((p,i)=>itemPara(`${i+1}. ${p.content||''}（理由: ${p.reason||''}）`)).join('')
    : itemPara('（該当なし）');

  function pageBreak(){ return `<w:p><w:r><w:rPr/><w:br w:type="page"/></w:r></w:p>`; }

  const docXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
<w:body>
<w:p><w:pPr><w:spacing w:before="0" w:after="160"/></w:pPr><w:r><w:rPr>${FONT}<w:b/><w:bCs/><w:sz w:val="28"/><w:szCs w:val="28"/><w:color w:val="${HDR}"/></w:rPr><w:t>${esc(meetingTitle)}　議事録</w:t></w:r></w:p>
${headerTableXml}
${pageBreak()}
${secHdr('【保留・継続審議事項】')}
${pendingXml}
${secHdr('【リスク一覧】')}
${riskXml}
${secHdr('【課題一覧】')}
${issueXml}
${pageBreak()}
${secHdr('【室長への報告事項】')}
${mgrXml}
${pageBreak()}
${secHdr('【役員への報告事項】')}
${execXml}
<w:sectPr>
<w:pgSz w:w="11906" w:h="16838"/>
<w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134"/>
</w:sectPr>
</w:body>
</w:document>`;

  const zip = new JSZip();
  zip.file('[Content_Types].xml',`<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/></Types>`);
  zip.file('_rels/.rels',`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`);
  zip.file('word/document.xml', docXml);
  zip.file('word/_rels/document.xml.rels',`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`);
  zip.file('word/styles.xml',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Meiryo UI" w:hAnsi="Meiryo UI" w:cs="Meiryo UI" w:eastAsia="Meiryo UI"/><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr></w:rPrDefault></w:docDefaults></w:styles>`);
  return zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
}
// ── Excel生成（ExcelJS版・完全書式対応） ────────────────────
async function generateXlsx(basicInfo, result, xlsxTemplateFile, xlsxDataFile) {
  const mtg = basicInfo.meetingName + (basicInfo.meetingNo ? ` 第${basicInfo.meetingNo}回` : '');
  const dt  = basicInfo.date ? basicInfo.date.replace(/-/g,'/') : '';

  // ── スタイル定義 ──────────────────────────────────────────
  const FONT_NAME = 'Meiryo UI';

  // ヘッダーセルスタイル生成
  function hdrStyle(bgArgb) {
    return {
      font:      { name: FONT_NAME, bold: true, color: { argb: 'FFFFFFFF' }, size: 10 },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + bgArgb } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: 'center', vertical: 'middle', wrapText: true },
    };
  }

  // データセルスタイル生成
  function dataStyle(isAlt, center=false) {
    return {
      font:      { name: FONT_NAME, size: 10, color: { argb: 'FF000000' } },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: isAlt ? 'FFEAF2FB' : 'FFFFFFFF' } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: center ? 'center' : 'left', vertical: 'top', wrapText: true },
    };
  }

  // 重要度・優先度の色
  function impStyle(val, isAlt) {
    const fills = { '緊急':'FFFF5252','高':'FFFFCDD2','中':'FFFFF9C4','低':'FFC8E6C9' };
    const bgArgb = fills[val] || (isAlt ? 'FFEAF2FB' : 'FFFFFFFF');
    return {
      font:      { name: FONT_NAME, size: 10, bold: val==='緊急', color: { argb: val==='緊急' ? 'FFFFFFFF' : 'FF000000' } },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: bgArgb } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: 'center', vertical: 'top', wrapText: true },
    };
  }

  // 共有済未の色
  function shareStyle(val, isAlt) {
    const bgArgb = val==='済' ? 'FFC8E6C9' : val==='未' ? 'FFFFCDD2' : (isAlt ? 'FFEAF2FB' : 'FFFFFFFF');
    return {
      font:      { name: FONT_NAME, size: 10, color: { argb: 'FF000000' } },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: bgArgb } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: 'center', vertical: 'top', wrapText: true },
    };
  }

  // 要/否スタイル
  function yohiStyle(val, isAlt) {
    const bgArgb = val==='要' ? 'FFFFCDD2' : (isAlt ? 'FFEAF2FB' : 'FFFFFFFF');
    return {
      font:      { name: FONT_NAME, size: 10, bold: val==='要', color: { argb: val==='要' ? 'FFB71C1C' : 'FF000000' } },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: bgArgb } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: 'center', vertical: 'top', wrapText: true },
    };
  }

  // ステータスの色
  function statusStyle(val, isAlt) {
    const fills = { '完了':'FFC8E6C9','対応中':'FFFFF9C4','遅延':'FFFFCDD2','保留':'FFE0E0E0','未着手':'FFF5F5F5' };
    return {
      font:      { name: FONT_NAME, size: 10, color: { argb: 'FF000000' } },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: fills[val] || (isAlt?'FFEAF2FB':'FFFFFFFF') } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: 'center', vertical: 'top', wrapText: true },
    };
  }

  // ── ExcelJSワークブック生成 ────────────────────────────────
  const wb = new ExcelJS.Workbook();
  wb.creator = '安田 真和';
  wb.created = new Date();

  // セクション見出しスタイル
  function secStyle(bgArgb) {
    return {
      font:      { name: FONT_NAME, bold: true, size: 10, color: { argb: 'FFFFFFFF' } },
      fill:      { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + bgArgb } },
      border:    { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                   left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} },
      alignment: { horizontal: 'center', vertical: 'middle', wrapText: true },
    };
  }

  // ── シート構築汎用関数 ─────────────────────────────────────
  function buildSheet(sheetName, tabColor, sections, existingData=[]) {
    const ws = wb.addWorksheet(sheetName, { properties: { tabColor: { argb: 'FF' + tabColor } } });

    // sections: [{ label, bgColor, cols:[{key,header,width,type}] }]
    // 全セクションのカラムをフラットに展開
    const allCols = [];
    sections.forEach(sec => sec.cols.forEach(c => allCols.push({ ...c, secBg: sec.bgColor, secLabel: sec.label })));

    // Row1: セクション見出し（マージ）
    let colIdx = 1;
    sections.forEach(sec => {
      const start = colIdx;
      const end = colIdx + sec.cols.length - 1;
      if (start === end) {
        const cell = ws.getCell(1, start);
        cell.value = sec.label;
        applyStyle(cell, secStyle(sec.bgColor));
      } else {
        ws.mergeCells(1, start, 1, end);
        const cell = ws.getCell(1, start);
        cell.value = sec.label;
        applyStyle(cell, secStyle(sec.bgColor));
      }
      colIdx += sec.cols.length;
    });
    ws.getRow(1).height = 16;

    // Row2: カラムヘッダー
    allCols.forEach((col, i) => {
      const cell = ws.getCell(2, i + 1);
      cell.value = col.header;
      applyStyle(cell, hdrStyle(col.secBg));
      ws.getColumn(i + 1).width = col.width;
    });
    ws.getRow(2).height = 32;

    // Row3: 例データ行（薄く）
    const exampleVals = { 'No.':'例','会議名':'第46回 全体PMO定例','会議日':'2026/02/02','最終
ステータス':'未着手','共有
済未':'未','行種別':'item' };
    allCols.forEach((col, i) => {
      const cell = ws.getCell(3, i + 1);
      cell.value = exampleVals[col.key] || '';
      const s = dataStyle(false, col.center);
      s.font = { ...s.font, color: { argb: 'FF999999' }, italic: true };
      applyStyle(cell, s);
    });
    ws.getRow(3).height = 30;

    // 既存データ行を追記
    let rowNum = 4;
    let maxNo = 0;
    existingData.forEach((rowData, idx) => {
      const isAlt = idx % 2 === 1;
      const isComplete = rowData['最終
ステータス'] === '完了';
      // 行高さ：最長セルの文字数から推定（列幅40文字想定、1行約15px）
      const maxLen = Math.max(...Object.values(rowData).map(v => String(v||'').length));
      const estLines = Math.max(2, Math.ceil(maxLen / 35));
      ws.getRow(rowNum).height = Math.min(150, estLines * 16 + 8);

      allCols.forEach((col, ci) => {
        const cell = ws.getCell(rowNum, ci + 1);
        const val = rowData[col.key] !== undefined ? rowData[col.key] : '';
        cell.value = String(val);

        // 完了は行全体グレー
        if (isComplete) {
          cell.font      = { name: FONT_NAME, size: 10, color: { argb: 'FF808080' } };
          cell.fill      = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD9D9D9' } };
          cell.border    = { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}},
                             left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} };
          cell.alignment = { horizontal: col.center?'center':'left', vertical:'top', wrapText:true };
        } else if (col.type === 'importance' || col.type === 'priority') {
          applyStyle(cell, impStyle(val, isAlt));
        } else if (col.type === 'share') {
          applyStyle(cell, shareStyle(val, isAlt));
        } else if (col.type === 'yohi') {
          applyStyle(cell, yohiStyle(val, isAlt));
        } else if (col.type === 'status') {
          applyStyle(cell, statusStyle(val, isAlt));
        } else {
          applyStyle(cell, dataStyle(isAlt, col.center || col.key === 'No.'));
        }
      });

      // 行種別列を非表示用に記録
      const noVal = rowData['No.'];
      if (noVal && !isNaN(Number(noVal))) maxNo = Math.max(maxNo, Number(noVal));
      rowNum++;
    });

    // フィルター設定（Row2）
    ws.autoFilter = { from: { row: 2, column: 1 }, to: { row: 2, column: allCols.length } };
    ws.views = [{ state: 'frozen', ySplit: 2, activeCell: 'A3' }];

    // 行種別列を非表示
    const rtIdx = allCols.findIndex(c => c.key === '行種別');
    if (rtIdx >= 0) ws.getColumn(rtIdx + 1).hidden = true;

    return ws;
  }

  // ExcelJSスタイル適用ヘルパー（Object.assignより確実）
  function applyStyle(cell, s) {
    if (s.font)      cell.font      = s.font;
    if (s.fill)      cell.fill      = s.fill;
    if (s.border)    cell.border    = s.border;
    if (s.alignment) cell.alignment = s.alignment;
  }

  // ── 共通セクション定義 ────────────────────────────────────
  const SEC_BASIC   = { bgColor:'1F3864' };
  const SEC_IMP     = { label:'🔺 重要度／優先度', bgColor:'6D3B6D',
    cols:[{key:'重要度', header:'重要度', width:10, type:'importance', center:true},
          {key:'優先度', header:'優先度', width:10, type:'priority',   center:true}] };
  const SEC_PROG    = { label:'📝 最新進捗', bgColor:'2D6A9F',
    cols:[{key:'最新進捗日',   header:'最新進捗日',   width:13},
          {key:'最新進捗内容', header:'最新進捗内容', width:38}] };
  const SEC_SHARE   = { label:'📤 共有管理', bgColor:'5B2C8D',
    cols:[{key:'共有先',    header:'共有先',    width:18},
          {key:'共有
済未', header:'共有
済未', width:9, type:'share', center:true}] };
  const SEC_SIM     = { label:'🔍 類似判定', bgColor:'8B6914',
    cols:[{key:'類似No.
・判定', header:'類似No.
・判定', width:12, center:true}] };
  const SEC_STATUS  = { label:'最終ステータス', bgColor:'1F3864',
    cols:[{key:'最終
ステータス', header:'最終
ステータス', width:13, type:'status', center:true}] };
  const SEC_ROWTYPE = { label:'', bgColor:'404040',
    cols:[{key:'行種別', header:'行種別', width:8, center:true}] };

  // ── 各シートのデータマッピング ─────────────────────────────
  const baseDecisions = result.decisions.map((d,i) => ({
    'No.': i+1, '会議名':mtg, '会議日':dt, '関連議題':'', '決定内容':d.content||'',
    '決定者':d.decided_by||'', '影響範囲':d.scope||'', '重要度':d.importance||'',
    '優先度':d.priority||'', '最新進捗日':'', '最新進捗内容':'',
    '共有先':'', '共有
済未':'未', '類似No.
・判定':'', '最終
ステータス':'未着手', '行種別':'item'
  }));

  const baseTodos = result.todos.map((t,i) => ({
    'No.':i+1, '会議名':mtg, '会議日':dt, 'アクション内容':t.content||'',
    '担当者':t.assignee||'', '期日':t.due||'', '重要度':t.importance||'',
    '優先度':t.priority||'', '最新進捗日':'', '最新進捗内容':'',
    '共有先':'', '共有
済未':'未', '類似No.
・判定':'', '最終
ステータス':'未着手', '行種別':'item'
  }));

  const baseRisks = result.risks.map((r,i) => ({
    'No.':i+1, '会議名':mtg, '会議日':dt, 'リスク内容':r.content||'',
    'カテゴリ':r.category||'', '影響度':r.impact||'', '発生確率':r.probability||'',
    '対応方針':r.response||'', '担当者':r.owner||'', '重要度':r.importance||'',
    '優先度':r.priority||'', '最新進捗日':'', '最新進捗内容':'',
    '共有先':'', '共有
済未':'未', '類似No.
・判定':'', '最終
ステータス':'未着手', '行種別':'item'
  }));

  const baseIssues = result.issues.map((r,i) => ({
    'No.':i+1, '会議名':mtg, '会議日':dt, '課題内容':r.content||'',
    'カテゴリ':r.category||'', '担当者':r.owner||'', '解決策・対応内容':r.resolution||'',
    '重要度':r.importance||'', '優先度':r.priority||'', '最新進捗日':'', '最新進捗内容':'',
    '共有先':'', '共有
済未':'未', '類似No.
・判定':'', '最終
ステータス':'未着手', '行種別':'item'
  }));

  const baseExec = result.exec_report.map((r,i) => ({
    'No.':i+1, '会議名':mtg, '会議日':dt, '報告内容':r.content||'',
    '判断要否':r.decision_needed||'', '背景・経緯':r.background||'', '報告先役員':r.recipient||'',
    '重要度':r.importance||'', '優先度':r.priority||'', '最新進捗日':'', '最新進捗内容':'',
    '共有先':'', '共有
済未':'未', '類似No.
・判定':'', '最終
ステータス':'未着手', '行種別':'item'
  }));

  const baseMgr = result.manager_report.map((r,i) => ({
    'No.':i+1, '会議名':mtg, '会議日':dt, '報告内容':r.content||'',
    '対応要否':r.action_needed||'', '背景・経緯':r.background||'', '担当室長':r.recipient||'',
    '重要度':r.importance||'', '優先度':r.priority||'', '最新進捗日':'', '最新進捗内容':'',
    '共有先':'', '共有
済未':'未', '類似No.
・判定':'', '最終
ステータス':'未着手', '行種別':'item'
  }));

  // ── INDEX シート ──────────────────────────────────────────
  const wsIdx = wb.addWorksheet('📋 INDEX', { properties: { tabColor: { argb: 'FF1F3864' } } });
  wsIdx.views = [{ showGridLines: false }];
  wsIdx.getColumn(1).width = 3;
  wsIdx.getColumn(2).width = 22;
  wsIdx.getColumn(3).width = 36;
  const idxTitle = wsIdx.getCell('B2');
  idxTitle.value = '会議議事録 管理台帳';
  idxTitle.font = { name: FONT_NAME, bold: true, size: 18, color: { argb: 'FF1F3864' } };
  wsIdx.getRow(2).height = 40;
  const idxSub = wsIdx.getCell('B3');
  idxSub.value = 'グローバル経営基盤 将来像実現プロジェクト  |  Ver 4.0  確定版';
  idxSub.font = { name: FONT_NAME, size: 10, color: { argb: 'FF595959' } };
  wsIdx.getRow(3).height = 20;
  [['決定事項','会議で正式に決定した事項','2E75B6'],
   ['To-Do','担当者・期日付きアクション管理','1F7A4D'],
   ['リスク','プログラム上のリスク管理','843C0C'],
   ['課題','解決すべき課題の管理','7030A0'],
   ['役員報告事項','役員への判断・報告が必要な事項','C55A11'],
   ['室長報告事項','担当室長への報告が必要な事項','375623'],
  ].forEach(([name,desc,color],i) => {
    const r = i + 5;
    const c1 = wsIdx.getCell(r, 2);
    c1.value = name;
    c1.font  = { name:FONT_NAME, bold:true, size:10, color:{argb:'FFFFFFFF'} };
    c1.fill  = { type:'pattern', pattern:'solid', fgColor:{argb:'FF'+color} };
    c1.alignment = { horizontal:'center', vertical:'middle' };
    c1.border = { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}}, left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} };
    const c2 = wsIdx.getCell(r, 3);
    c2.value = desc;
    c2.font  = { name:FONT_NAME, size:9 };
    c2.fill  = { type:'pattern', pattern:'solid', fgColor:{argb: i%2===0 ? 'FFEAF2FB' : 'FFFFFFFF'} };
    c2.border = { top:{style:'thin',color:{argb:'FFBFBFBF'}}, bottom:{style:'thin',color:{argb:'FFBFBFBF'}}, left:{style:'thin',color:{argb:'FFBFBFBF'}}, right:{style:'thin',color:{argb:'FFBFBFBF'}} };
    wsIdx.getRow(r).height = 22;
  });

  // ── 各シート構築 ──────────────────────────────────────────
  buildSheet('決定事項', '2E75B6', [
    { ...SEC_BASIC, label:'基本情報', cols:[
      {key:'No.',     header:'No.',     width:5,  center:true},
      {key:'会議名',   header:'会議名',   width:22},
      {key:'会議日',   header:'会議日',   width:12, center:true},
      {key:'関連議題', header:'関連議題', width:20},
      {key:'決定内容', header:'決定内容', width:42},
      {key:'決定者',   header:'決定者',   width:12},
      {key:'影響範囲', header:'影響範囲', width:18},
    ]}, SEC_IMP, SEC_PROG, SEC_SHARE, SEC_SIM, SEC_STATUS, SEC_ROWTYPE,
  ], baseDecisions);

  buildSheet('To-Do', '1F7A4D', [
    { ...SEC_BASIC, label:'基本情報', cols:[
      {key:'No.',          header:'No.',          width:5,  center:true},
      {key:'会議名',        header:'会議名',        width:22},
      {key:'会議日',        header:'会議日',        width:12, center:true},
      {key:'アクション内容', header:'アクション内容', width:40},
      {key:'担当者',        header:'担当者',        width:12},
      {key:'期日',          header:'期日',          width:12, center:true},
    ]}, SEC_IMP, SEC_PROG, SEC_SHARE, SEC_SIM, SEC_STATUS, SEC_ROWTYPE,
  ], baseTodos);

  buildSheet('リスク', '843C0C', [
    { ...SEC_BASIC, label:'基本情報', cols:[
      {key:'No.',      header:'No.',      width:5,  center:true},
      {key:'会議名',    header:'会議名',    width:22},
      {key:'会議日',    header:'会議日',    width:12, center:true},
      {key:'リスク内容', header:'リスク内容', width:40},
      {key:'カテゴリ',  header:'カテゴリ',  width:14},
      {key:'影響度',    header:'影響度',    width:10, type:'importance', center:true},
      {key:'発生確率',  header:'発生確率',  width:10, type:'importance', center:true},
      {key:'対応方針',  header:'対応方針',  width:32},
      {key:'担当者',    header:'担当者',    width:12},
    ]}, SEC_IMP, SEC_PROG, SEC_SHARE, SEC_SIM, SEC_STATUS, SEC_ROWTYPE,
  ], baseRisks);

  buildSheet('課題', '7030A0', [
    { ...SEC_BASIC, label:'基本情報', cols:[
      {key:'No.',         header:'No.',         width:5,  center:true},
      {key:'会議名',       header:'会議名',       width:22},
      {key:'会議日',       header:'会議日',       width:12, center:true},
      {key:'課題内容',     header:'課題内容',     width:40},
      {key:'カテゴリ',     header:'カテゴリ',     width:14},
      {key:'担当者',       header:'担当者',       width:12},
      {key:'解決策・対応内容', header:'解決策・対応内容', width:30},
    ]}, SEC_IMP, SEC_PROG, SEC_SHARE, SEC_SIM, SEC_STATUS, SEC_ROWTYPE,
  ], baseIssues);

  buildSheet('役員報告事項', 'C55A11', [
    { ...SEC_BASIC, label:'基本情報', cols:[
      {key:'No.',      header:'No.',      width:5,  center:true},
      {key:'会議名',    header:'会議名',    width:22},
      {key:'会議日',    header:'会議日',    width:12, center:true},
      {key:'報告内容',  header:'報告内容',  width:42},
      {key:'判断要否',  header:'判断要否',  width:10, type:'yohi', center:true},
      {key:'背景・経緯', header:'背景・経緯', width:34},
      {key:'報告先役員', header:'報告先役員', width:14},
    ]}, SEC_IMP, SEC_PROG, SEC_SHARE, SEC_SIM, SEC_STATUS, SEC_ROWTYPE,
  ], baseExec);

  buildSheet('室長報告事項', '375623', [
    { ...SEC_BASIC, label:'基本情報', cols:[
      {key:'No.',      header:'No.',      width:5,  center:true},
      {key:'会議名',    header:'会議名',    width:22},
      {key:'会議日',    header:'会議日',    width:12, center:true},
      {key:'報告内容',  header:'報告内容',  width:42},
      {key:'対応要否',  header:'対応要否',  width:10, type:'yohi', center:true},
      {key:'背景・経緯', header:'背景・経緯', width:34},
      {key:'担当室長',  header:'担当室長',  width:14},
    ]}, SEC_IMP, SEC_PROG, SEC_SHARE, SEC_SIM, SEC_STATUS, SEC_ROWTYPE,
  ], baseMgr);

  // ── バッファに書き出し ─────────────────────────────────────
  const buffer = await wb.xlsx.writeBuffer();
  return new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
}

// ── Download helper ───────────────────────────────────────
function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function makeDocxFilename(meetingName, date, version=1){
  const safe = (meetingName||'会議').replace(/[\\/:*?"<>|]/g,'');
  const d = (date||'').replace(/-/g,'');
  const v = version > 1 ? `_v${version}` : '';
  return `議事録_${safe}_${d}${v}.docx`;
}
function makeXlsxFilename(date){
  const d = (date||'').replace(/-/g,'');
  const ts = new Date().toTimeString().slice(0,5).replace(':','');
  return `会議管理台帳_${d}_${ts}.xlsx`;
}

// ── Claude API ────────────────────────────────────────────
async function callClaude(apiKey, basicInfo, transcript, onLog){
  onLog('📡 Claude APIに接続中...');
  const attendees = `【KE】${basicInfo.attendeesKE||''}\n【IBM】${basicInfo.attendeesIBM||''}\n【PwC】${basicInfo.attendeesPwC||''}`;
  const prompt = `以下の会議情報と文字起こしを分析し、JSON形式で抽出してください。

【基本情報】
会議名: ${basicInfo.meetingName}${basicInfo.meetingNo?` 第${basicInfo.meetingNo}回`:''}
日時: ${basicInfo.date} ${basicInfo.startTime}〜${basicInfo.endTime}
場所: ${basicInfo.location}
出席者: ${attendees}
作成者: ${basicInfo.author}
配布資料: ${basicInfo.materials}

【文字起こし】
${transcript}

重要度・優先度は「緊急」「高」「中」「低」の4段階で判定してください。
- 緊急: 即日対応必須、役員判断が当日必要
- 高: 今週中に対応必要、ステコミ・役員で言及
- 中: 今月中に対応
- 低: 余裕がある時に対応

以下のJSON構造で出力してください（マークダウン不要、JSONのみ）:
{"agenda_items":["議題1"],"minutes_by_agenda":[{"title":"議題名","content":"発言録（発言者名: 発言内容）"}],"decisions":[{"content":"決定内容","decided_by":"決定者","scope":"影響範囲","importance":"高","priority":"高"}],"todos":[{"content":"アクション","assignee":"担当者","due":"YYYY/MM/DD","importance":"高","priority":"高"}],"pending":[{"content":"保留内容","reason":"理由","next_action":"次回の扱い"}],"risks":[{"content":"リスク内容","category":"カテゴリ","impact":"高","probability":"高","response":"対応方針","owner":"担当者","importance":"高","priority":"高"}],"issues":[{"content":"課題内容","category":"カテゴリ","owner":"担当者","due":"期日","resolution":"解決策","importance":"中","priority":"中"}],"exec_report":[{"content":"報告内容","decision_needed":"要","background":"背景","recipient":"役員名","deadline":"期限","importance":"緊急","priority":"緊急"}],"manager_report":[{"content":"報告内容","action_needed":"要","background":"背景","recipient":"室長名","deadline":"期限","importance":"高","priority":"高"}]}`;

  onLog('🤖 文字起こしを解析中...');
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,system:'日本のPMO議事録・管理台帳作成の専門家です。指定のJSON形式のみで出力してください。',messages:[{role:'user',content:prompt}]})
  });
  if(!res.ok) throw new Error(`API Error ${res.status}: ${await res.text()}`);
  const data = await res.json();
  onLog('✅ 解析完了！データを処理中...');
  const text = data.content[0].text.trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
  try { return JSON.parse(text); }
  catch(e){ const m=text.match(/\{[\s\S]+\}/); if(m) return JSON.parse(m[0]); throw new Error('JSON解析失敗: '+e.message); }
}

const MEETING_MASTER_KEY = 'pmo_meeting_master';

function loadMeetingMaster(){
  try {
    const v = localStorage.getItem(MEETING_MASTER_KEY);
    return v ? JSON.parse(v) : ['全体PMO定例','ステアリングコミッティ','WG会議','周辺システム定例'];
  } catch(e){ return []; }
}

function saveMeetingMaster(list){
  localStorage.setItem(MEETING_MASTER_KEY, JSON.stringify(list));
}

function MeetingMasterModal({onClose}){
  const [list, setList] = useState(()=>loadMeetingMaster());
  const [input, setInput] = useState('');
  const add = () => {
    const v = input.trim();
    if(!v || list.includes(v)) return;
    const next = [...list, v];
    setList(next); saveMeetingMaster(next); setInput('');
  };
  const del = (i) => {
    const next = list.filter((_,idx)=>idx!==i);
    setList(next); saveMeetingMaster(next);
  };
  const moveUp = (i) => {
    if(i===0) return;
    const next=[...list]; [next[i-1],next[i]]=[next[i],next[i-1]];
    setList(next); saveMeetingMaster(next);
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">📋 会議名マスター管理</div>

            <div key={i} style={{display:'flex',alignItems:'center',padding:'8px 12px',borderBottom:'1px solid #f0f0f0',gap:6}}>

          <button className="btn btn-primary" onClick={onClose}>閉じる</button>
        </div>

    </div>
  );
}

  const [tab,setTab]=useState('minutes');
  const upd=(key,val)=>setResult(p=>({...p,[key]:val}));
  const IP=[{key:'importance',label:'重要度',type:'select',options:IP_OPTS,w:70},{key:'priority',label:'優先度',type:'select',options:IP_OPTS,w:70}];
  const tabs=[
    {id:'minutes',label:`📝 議事内容`},
    {id:'decisions',label:`✅ 決定事項 (${result.decisions?.length||0})`},
    {id:'todos',label:`📌 ToDo (${result.todos?.length||0})`},
    {id:'risks',label:`⚠️ リスク (${result.risks?.length||0})`},
    {id:'issues',label:`🔧 課題 (${result.issues?.length||0})`},
    {id:'exec',label:`👔 役員報告 (${result.exec_report?.length||0})`},
    {id:'mgr',label:`📋 室長報告 (${result.manager_report?.length||0})`},
    {id:'pending',label:`⏸ 保留 (${result.pending?.length||0})`},
  ];
  return(
    <div className="card">
      <div className="card-title">📄 Step 4 ― プレビュー・編集</div>
      <div className="notice notice-info" style={{marginBottom:12}}>各タブで内容を確認・編集できます。重要度・優先度はAIが自動判定しましたが、必要に応じて修正してください。</div>
      <div className="tabs">{tabs.map(t=><div key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</div>)}</div>
      <div className="tab-content">
        {tab==='minutes'&&<MinutesEditor data={result.minutes_by_agenda} setData={v=>upd('minutes_by_agenda',v)}/>}
        {tab==='decisions'&&<TableEditor data={result.decisions} setData={v=>upd('decisions',v)} cols={[{key:'content',label:'決定内容',w:200,tall:true},...IP,{key:'decided_by',label:'決定者',w:80},{key:'scope',label:'影響範囲',w:100}]}/>}
        {tab==='todos'&&<TableEditor data={result.todos} setData={v=>upd('todos',v)} cols={[{key:'content',label:'アクション内容',w:200,tall:true},...IP,{key:'assignee',label:'担当者',w:80},{key:'due',label:'期日',w:90}]}/>}
        {tab==='risks'&&<TableEditor data={result.risks} setData={v=>upd('risks',v)} cols={[{key:'content',label:'リスク内容',w:200,tall:true},...IP,{key:'impact',label:'影響度',w:70},{key:'owner',label:'担当者',w:80},{key:'response',label:'対応方針',w:150,tall:true}]}/>}
        {tab==='issues'&&<TableEditor data={result.issues} setData={v=>upd('issues',v)} cols={[{key:'content',label:'課題内容',w:200,tall:true},...IP,{key:'owner',label:'担当者',w:80},{key:'due',label:'期日',w:90},{key:'resolution',label:'解決策',w:150,tall:true}]}/>}
        {tab==='exec'&&<TableEditor data={result.exec_report} setData={v=>upd('exec_report',v)} cols={[{key:'content',label:'報告内容',w:200,tall:true},...IP,{key:'decision_needed',label:'判断要否',type:'select',options:['','要','否'],w:70},{key:'recipient',label:'報告先',w:80},{key:'background',label:'背景',w:150,tall:true}]}/>}
        {tab==='mgr'&&<TableEditor data={result.manager_report} setData={v=>upd('manager_report',v)} cols={[{key:'content',label:'報告内容',w:200,tall:true},...IP,{key:'action_needed',label:'対応要否',type:'select',options:['','要','否'],w:70},{key:'recipient',label:'室長名',w:80},{key:'background',label:'背景',w:150,tall:true}]}/>}
        {tab==='pending'&&<TableEditor data={result.pending} setData={v=>upd('pending',v)} cols={[{key:'content',label:'保留内容',w:200,tall:true},{key:'reason',label:'理由',w:150},{key:'next_action',label:'次回の扱い',w:120}]}/>}
      </div>
      <div className="btn-row">
        <button className="btn btn-gray" onClick={onBack}>← 戻る</button>
        <button className="btn btn-primary" onClick={onNext}>ダウンロードへ →</button>
      </div>
    </div>
  );
}

// ── Step 5 ─────────────────────────────────────────────────
function Step5({basicInfo,result,docxTemplateFile,xlsxTemplateFile,xlsxDataFile,onBack,docVersion,setDocVersion}){
  const [downloading,setDownloading]=useState('');
  const dlWord=async()=>{
    setDownloading('word');
    try{const blob=await generateDocx(basicInfo,result);downloadBlob(blob,makeDocxFilename(basicInfo.meetingName,basicInfo.date,docVersion));setDocVersion(v=>v+1);}
    catch(e){alert('Word生成エラー: '+e.message);}
    setDownloading('');
  };
  const dlExcel=async()=>{
    setDownloading('excel');
    try{
      const blob=await generateXlsx(basicInfo,result,xlsxTemplateFile,xlsxDataFile);
      downloadBlob(blob,makeXlsxFilename(basicInfo.date));
    }catch(e){alert('Excel生成エラー: '+e.message); console.error(e);}
    setDownloading('');
  };
  const dlBoth=async()=>{await dlWord();await dlExcel();};
  const stats=[
    ['決定事項',result.decisions?.length||0,'#2E75B6'],
    ['ToDo',result.todos?.length||0,'#1F7A4D'],
    ['リスク',result.risks?.length||0,'#843C0C'],
    ['課題',result.issues?.length||0,'#7030A0'],
    ['役員報告',result.exec_report?.length||0,'#C55A11'],
    ['室長報告',result.manager_report?.length||0,'#375623'],
  ];
  return(
    <div className="card">
      <div className="card-title">⬇️ Step 5 ― ダウンロード</div>
      <div className="notice notice-ok" style={{marginBottom:16}}>解析完了！ファイルはダウンロードフォルダに保存されます（既存ファイルは上書きされません）。</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:20}}>
        {stats.map(([label,count,color])=>(
          <div key={label} style={{textAlign:'center',background:'#f8fafc',borderRadius:8,padding:'10px 4px',border:`2px solid ${color}22`}}>
            <div style={{fontSize:22,fontWeight:700,color}}>{count}</div>
            <div style={{fontSize:11,color:'#666'}}>{label}</div>
          </div>
        ))}
      </div>
      <div className="dl-card">
        <div className="dl-info">
          <div className="dl-name">📄 議事録 .docx</div>
          <div className="dl-desc">{docxTemplateFile?`テンプレート「${docxTemplateFile.name}」の形式で出力。`:'デフォルト形式で出力。'}Meiryo UI / Calibri フォント。室長・役員報告は改ページ分離。</div>
        </div>
        <button className="btn btn-blue" onClick={dlWord} disabled={!!downloading}>{downloading==='word'?'生成中...':'⬇️ Word'}</button>
      </div>
      <div className="dl-card">
        <div className="dl-info">
          <div className="dl-name">📊 管理台帳 .xlsx</div>
          <div className="dl-desc">{xlsxDataFile?'既存台帳に追記します。':xlsxTemplateFile?'テンプレートに転記します。':'新規作成します。'}To-Doシート対応。</div>
        </div>
        <button className="btn btn-green" onClick={dlExcel} disabled={!!downloading}>{downloading==='excel'?'生成中...':'⬇️ Excel'}</button>
      </div>
      <div style={{marginTop:12}}>
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={dlBoth} disabled={!!downloading}>
          {downloading?'生成中...':'⬇️ Word + Excel を両方ダウンロード'}
        </button>
      </div>
      <div className="btn-row" style={{marginTop:20}}>
        <button className="btn btn-gray" onClick={onBack}>← 編集に戻る</button>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────
function App(){
  const [step,setStep]=useState(1);
  const [maxReached,setMaxReached]=useState(1);
  const [showKeyModal,setShowKeyModal]=useState(false);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('claude_api_key')||'');
  const [basicInfo,setBasicInfo]=useState({
    meetingName:'', meetingNo:'', date:todayStr(),
    startTime:'10:00', endTime:'11:00',
    location:'KE（本社）応接室x、オンライン（Teams）',
    author:'安田 真和',
    attendeesKE:'', attendeesIBM:'', attendeesPwC:'',
    materials:''
  });
  const [transcript,setTranscript]=useState('');
  const [docxTemplateFile,setDocxTemplateFile]=useState(null);
  const [xlsxTemplateFile,setXlsxTemplateFile]=useState(null);
  const [xlsxDataFile,setXlsxDataFile]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [logs,setLogs]=useState([]);
  const [error,setError]=useState('');
  const [result,setResult]=useState(null);
  const [docVersion,setDocVersion]=useState(1);

  const saveApiKey=(key)=>{setApiKey(key);localStorage.setItem('claude_api_key',key);setShowKeyModal(false);};
  const goTo=(n)=>{setStep(n);setMaxReached(m=>Math.max(m,n));};

  const handleAnalyze=async()=>{
    if(!apiKey){setShowKeyModal(true);return;}
    setAnalyzing(true);setError('');setLogs([]);
    const addLog=(l)=>setLogs(p=>[...p,l]);
    try{
      const r=await callClaude(apiKey,basicInfo,transcript,addLog);
      addLog('📊 データを整理中...');
      setResult({...EMPTY,...r});
      goTo(4);
    }catch(e){setError(e.message);}
    setAnalyzing(false);
  };

  return(
    <div className="app-wrap">
      <div className="app-header">
        <div>
          <div className="app-title">会議議事録・管理台帳 自動生成ツール</div>
          <div className="app-sub">グローバル経営基盤 将来像実現プロジェクト PMO</div>
        </div>
        <button className="btn-key" onClick={()=>setShowKeyModal(true)}>
          {apiKey?'🔑 APIキー設定済':'🔑 APIキー設定'}
        </button>
      </div>
      <StepIndicator step={step} setStep={setStep} maxReached={maxReached}/>
      {step===1&&<Step1 data={basicInfo} setData={setBasicInfo} onNext={()=>goTo(2)}/>}
      {step===2&&<Step2 transcript={transcript} setTranscript={setTranscript}
        docxTemplateFile={docxTemplateFile} setDocxTemplateFile={setDocxTemplateFile}
        xlsxTemplateFile={xlsxTemplateFile} setXlsxTemplateFile={setXlsxTemplateFile}
        xlsxDataFile={xlsxDataFile} setXlsxDataFile={setXlsxDataFile}
        onNext={()=>goTo(3)} onBack={()=>goTo(1)}/>}
      {step===3&&<Step3 onAnalyze={handleAnalyze} onBack={()=>goTo(2)} analyzing={analyzing} logs={logs} error={error}/>}
      {step===4&&result&&<Step4 result={result} setResult={setResult} onNext={()=>goTo(5)} onBack={()=>goTo(3)}/>}
      {step===5&&result&&<Step5 basicInfo={basicInfo} result={result}
        docxTemplateFile={docxTemplateFile}
        xlsxTemplateFile={xlsxTemplateFile} xlsxDataFile={xlsxDataFile}
        onBack={()=>goTo(4)} docVersion={docVersion} setDocVersion={setDocVersion}/>}
      {showKeyModal&&<ApiKeyModal current={apiKey} onSave={saveApiKey} onClose={()=>setShowKeyModal(false)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
